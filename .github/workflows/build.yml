name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows Build ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bundle Python backend with PyInstaller
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name server backend/server.py
          mkdir backend-dist
          copy dist\server.exe backend-dist\server.exe
        shell: cmd

      - name: Update package.json for bundled backend
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.build.extraResources = @(@{from="backend-dist/"; to="backend/"; filter=@("**/*")})
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
        shell: pwsh

      - name: Install npm dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  # ── macOS Build ──────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bundle Python backend with PyInstaller
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name server backend/server.py
          mkdir -p backend-dist
          cp dist/server backend-dist/server
          chmod +x backend-dist/server

      - name: Update package.json for bundled backend and zip target
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.build.extraResources = [{ from: 'backend-dist/', to: 'backend/', filter: ['**/*'] }];
            pkg.build.mac.target = [{ target: 'zip', arch: ['x64', 'arm64'] }];
            pkg.build.mac.identity = null;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Install npm dependencies
        run: npm install

      - name: Build macOS app
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc codesign (voorkomt beschadigd-melding)
        run: |
          # Zoek de gebouwde .app
          if [ -d "dist/mac-arm64/Brouwerij Admin.app" ]; then
            ARM_APP="dist/mac-arm64/Brouwerij Admin.app"
          fi
          if [ -d "dist/mac/Brouwerij Admin.app" ]; then
            X64_APP="dist/mac/Brouwerij Admin.app"
          fi

          for APP in "$ARM_APP" "$X64_APP"; do
            if [ -n "$APP" ] && [ -d "$APP" ]; then
              echo "Signing: $APP"
              xattr -cr "$APP"
              codesign --force --deep --sign - "$APP"
              codesign --verify --deep "$APP" && echo "OK: $APP"
            fi
          done

      - name: Zip gesigneerde apps
        run: |
          if [ -d "dist/mac-arm64/Brouwerij Admin.app" ]; then
            cd "dist/mac-arm64"
            zip -r "../../Brouwerij.Admin-arm64-mac.zip" "Brouwerij Admin.app"
            cd ../..
          fi
          if [ -d "dist/mac/Brouwerij Admin.app" ]; then
            cd "dist/mac"
            zip -r "../../Brouwerij.Admin-x64-mac.zip" "Brouwerij Admin.app"
            cd ../..
          fi
          ls *.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: "*.zip"

  # ── Release ──────────────────────────────────────────────────────────────────
  create-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-app
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

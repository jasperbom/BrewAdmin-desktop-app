name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows Build ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bundle Python backend met PyInstaller
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name server backend/server.py
          mkdir backend-dist
          copy dist\server.exe backend-dist\server.exe
          copy backend\server.py backend-dist\server.py
        shell: cmd

      - name: Update package.json voor bundled backend
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.build.extraResources = @(@{from="backend-dist/"; to="backend/"; filter=@("**/*")})
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
        shell: pwsh

      - name: Install npm dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  # ── macOS Build ──────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bundle Python backend met PyInstaller
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name server backend/server.py
          mkdir -p backend-dist
          cp dist/server backend-dist/server
          chmod +x backend-dist/server
          cp backend/server.py backend-dist/server.py

      - name: Update package.json voor bundled backend
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.build.extraResources = [
              { from: 'backend-dist/', to: 'backend/', filter: ['**/*'] },
              { from: 'static/', to: 'static/', filter: ['**/*'] }
            ];
            pkg.build.mac.identity = null;
            // Alleen .app bouwen, geen DMG — wij maken de DMG zelf
            pkg.build.mac.target = [
              { target: 'dir', arch: ['x64'] },
              { target: 'dir', arch: ['arm64'] }
            ];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Install npm dependencies
        run: npm install

      - name: Build macOS .app (geen DMG door electron-builder)
        run: npm run build:mac -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc codesign en maak DMGs
        run: |
          TAG="${{ github.ref_name }}"
          for ARCH in x64 arm64; do
            SRCDIR="dist/mac$([ $ARCH = arm64 ] && echo -arm64 || echo '')"
            APP="$SRCDIR/Brouwerij Admin.app"
            if [ -d "$APP" ]; then
              echo "=== Signing $ARCH ==="
              xattr -cr "$APP"
              find "$APP/Contents" -type f | while read f; do
                codesign --force --sign - "$f" 2>/dev/null || true
              done
              codesign --force --deep --sign - "$APP"
              codesign --verify --deep "$APP" && echo "OK signed"

              echo "=== DMG maken $ARCH ==="
              DMGNAME="Brouwerij.Admin-${TAG}-${ARCH}-mac.dmg"
              hdiutil create -volname "Brouwerij Admin" \
                -srcfolder "$APP" \
                -ov -format UDZO \
                "$DMGNAME"
              echo "Aangemaakt: $DMGNAME"
            fi
          done
          ls *.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: "*.dmg"

  # ── Release ──────────────────────────────────────────────────────────────────
  create-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-app
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Sync van HA Addon

on:
  schedule:
    - cron: '0 6 * * *'  # Elke dag om 06:00 UTC controleren
  workflow_dispatch:       # Ook handmatig te starten

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout desktop app
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Haal nieuwste index.html op van HA addon
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/jasperbom/BrewAdmin-HA-App/main/brew-admin.html" \
             -o /tmp/index_new.html

      - name: Vergelijk met huidige versie
        id: check
        run: |
          if ! diff -q static/index.html /tmp/index_new.html > /dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Nieuwe versie gevonden!"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Geen wijzigingen, alles is up-to-date."
          fi

      - name: Bereken nieuw versienummer
        id: version
        if: steps.check.outputs.changed == 'true'
        run: |
          # Pak het hoogste bestaande tag en verhoog minor versie
          LATEST=$(git tag --sort=-v:refname | head -1)
          echo "Huidige tag: $LATEST"

          # Parse major.minor.patch
          MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo $LATEST | sed 's/v//' | cut -d. -f3)

          # Verhoog minor, reset patch
          NEW_MINOR=$((MINOR + 1))
          NEW_TAG="v${MAJOR}.${NEW_MINOR}.0"
          echo "Nieuw versienummer: $NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Kopieer nieuwe frontend
        if: steps.check.outputs.changed == 'true'
        run: cp /tmp/index_new.html static/index.html

      - name: Commit en tag nieuwe versie
        if: steps.check.outputs.changed == 'true'
        run: |
          NEW_TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/index.html
          git commit -m "feat: frontend automatisch bijgewerkt van HA addon (${NEW_TAG})"
          git tag "$NEW_TAG"
          git push origin main
          git push origin "$NEW_TAG"
          echo "🚀 Nieuwe versie $NEW_TAG gepusht — build wordt automatisch gestart!"

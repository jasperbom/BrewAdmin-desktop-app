<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ===== I18N =====
const SUPPORTED_LANGS = ['nl', 'en', 'de', 'fr', 'es'];
const detectLang = () => {
  const browser = (navigator.language || navigator.userLanguage || 'en').toLowerCase().split('-')[0];
  return SUPPORTED_LANGS.includes(browser) ? browser : 'en';
};
let _lang = 'nl';
const t = (key) => {
  const trans = window.BREW_TRANS;
  if (!trans) return key;
  return (trans[_lang] && trans[_lang][key]) || (trans['nl'] && trans['nl'][key]) || key;
};

// ===== CONSTANTS =====
const BF_MAP = {"Planning":"Gepland","Brewing":"Brouwen","Fermenting":"Vergisten","Conditioning":"Conditioneren","Carbonating":"Conditioneren","Packaging":"Verpakt","Completed":"Gesloten","Archived":"Gesloten"};
const STATUS_CLR = {"Gepland":"bg-slate-100 text-slate-600 ring-1 ring-slate-200","Brouwen":"bg-blue-100 text-blue-700 ring-1 ring-blue-200","Vergisten":"bg-amber-100 text-amber-700 ring-1 ring-amber-200","Vergisting":"bg-amber-100 text-amber-700 ring-1 ring-amber-200","Conditioneren":"bg-purple-100 text-purple-700 ring-1 ring-purple-200","Lagering":"bg-purple-100 text-purple-700 ring-1 ring-purple-200","Verpakt":"bg-emerald-100 text-emerald-700 ring-1 ring-emerald-200","Gesloten":"bg-gray-100 text-gray-500 ring-1 ring-gray-200"};
const STATUSSEN = ["Gepland","Brouwen","Vergisten","Conditioneren","Verpakt","Gesloten"];
const ING_TYPES = ["Mout","Hop","Gist","Suiker","Overig"];
const EENHEDEN = ["kg","g","L","mL","pkg","stuks"];

// Eenheden-conversie: zet hoeveelheid om van 'van' naar 'naar' eenheid.
// Geeft null terug als de eenheden niet compatibel zijn (bijv. L naar kg).
const UNIT_BASE = { mL:{group:'volume',f:1}, L:{group:'volume',f:1000}, g:{group:'mass',f:1}, kg:{group:'mass',f:1000} };
const convertEenheid = (amount, van, naar) => {
  if (!amount || van === naar) return Number(amount);
  const v = UNIT_BASE[van], n = UNIT_BASE[naar];
  if (!v || !n || v.group !== n.group) return null; // niet converteerbaar
  return (Number(amount) * v.f) / n.f;
};
// Compatibele eenheden voor een gegeven eenheid (zelfde groep + discrete)
const compatibeleEenheden = (eenheid) => {
  const base = UNIT_BASE[eenheid];
  if (!base) return [eenheid]; // pkg/stuks: alleen zichzelf
  return EENHEDEN.filter(e => UNIT_BASE[e]?.group === base.group);
};
const VERPAKKINGEN = ["Fust 20L","Fust 30L","Fust 50L","Fles 33cL","Fles 50cL","Fles 75cL","Blik 33cL","Blik 50cL"];
const VERPAKKING_DEFAULTS = [
  {naam:'Fles 33cL',inhoud_liter:0.33,type:'fles'},{naam:'Fles 50cL',inhoud_liter:0.50,type:'fles'},{naam:'Fles 75cL',inhoud_liter:0.75,type:'fles'},
  {naam:'Blik 33cL',inhoud_liter:0.33,type:'blik'},{naam:'Blik 50cL',inhoud_liter:0.50,type:'blik'},
  {naam:'Fust 10L',inhoud_liter:10,type:'fust'},{naam:'Fust 20L',inhoud_liter:20,type:'fust'},{naam:'Fust 30L',inhoud_liter:30,type:'fust'},{naam:'Fust 50L',inhoud_liter:50,type:'fust'},
];
const ONDERDEEL_TYPES = [
  {type:'fles',      label:'pkg_fles'},
  {type:'blik',      label:'pkg_blik'},
  {type:'fust',      label:'pkg_fust'},
  {type:'kroonkurk', label:'pkg_kroonkurk'},
  {type:'deksel',    label:'pkg_deksel'},
  {type:'cap',       label:'pkg_cap'},
  {type:'label',     label:'pkg_label_type'},
  {type:'overig',    label:'ing_type_overig'},
];
// Labels voor kostencomponenten per verpakkingstype
const verpKostenLabels = (type) => ({
  fles: {verpakking:t('pkg_fles'),   afsluiting:t('pkg_kroonkurk')},
  blik: {verpakking:t('pkg_blik'),   afsluiting:t('pkg_deksel')},
  fust: {verpakking:t('pkg_fust'),   afsluiting:t('pkg_cap')},
}[type] || {verpakking:t('pkg_default'), afsluiting:t('pkg_closure_default')});

// ===== STORAGE =====
const lsGet = (k, d=[]) => { try { return JSON.parse(localStorage.getItem('craftery_'+k)) ?? d; } catch(e) { return d; } };
const lsSet = (k, v) => localStorage.setItem('craftery_'+k, JSON.stringify(v));

// API base URL — computed from current page URL so it works via direct access
// (http://addon:8099/) AND via HA Ingress (/api/hassio_ingress/TOKEN/).
// Absolute paths like /api/data/... would go to HA's own server, not the addon.
const API_BASE = (() => {
  const p = window.location.pathname;
  return p.replace(/[^/]*$/, '') + 'api/data/';
})();
// Base path for all addon API endpoints (upload, file, etc.)
// Must be relative so it works both directly and via HA Ingress.
const ADDON_BASE = API_BASE.replace('api/data/', '');

// Sync state — use Sets so re-renders don't inflate counters
const _allKeys     = new Set(); // all store keys registered (deduped)
const _fetchedKeys = new Set(); // keys whose initial server fetch has resolved
let _syncPending   = 0;         // in-flight save requests
let _syncErrors    = 0;         // failed save requests
let _serverReachable = null;    // null=unknown, true, false

const _postToServer = (key, data) => {
  _syncPending++;
  return fetch(API_BASE + key, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  })
  .then(r => {
    _syncPending = Math.max(0, _syncPending - 1);
    _serverReachable = true;
    if (!r.ok) _syncErrors++;
    return r.ok;
  })
  .catch(() => {
    _syncPending = Math.max(0, _syncPending - 1);
    _serverReachable = false;
    _syncErrors++;
    return false;
  });
};

const useStore = (key, initial=[], { secure=false }={}) => {
  _allKeys.add(key); // Set deduplicates — safe to call on every render
  const [data, setData] = useState(() => secure ? initial : lsGet(key, initial));
  const modified = React.useRef(false);

  React.useEffect(() => {
    fetch(API_BASE + key)
      .then(r => {
        _serverReachable = true;
        if (r.ok) {
          // Server heeft data — verwijder eventuele oude ls-kopie bij secure sleutels
          if (secure) localStorage.removeItem('craftery_' + key);
          return r.json();
        }
        if (r.status === 404) {
          // Server heeft deze sleutel nog niet — push localStorage (of initial) omhoog.
          // Bij secure: ook eventuele oude ls-data migreren (eenmalig upgrade-pad) en dan verwijderen.
          const localRaw = localStorage.getItem('craftery_' + key);
          const toSync = localRaw !== null ? JSON.parse(localRaw) : initial;
          if (secure && localRaw !== null) localStorage.removeItem('craftery_' + key);
          try { _postToServer(key, toSync); } catch(e) {}
        }
        return null;
      })
      .then(d => {
        _fetchedKeys.add(key);
        if (d !== null && d !== undefined && !modified.current) {
          setData(d);
          if (!secure) lsSet(key, d);
        }
      })
      .catch(() => {
        _fetchedKeys.add(key);
        _serverReachable = false;
      });
  }, [key]);

  const save = (val) => {
    modified.current = true;
    setData(prev => {
      const next = typeof val === 'function' ? val(prev) : val;
      if (!secure) lsSet(key, next);
      _postToServer(key, next);
      return next;
    });
  };
  return [data, save];
};

// Sync indicator in the nav bar
const SyncDot = () => {
  const [s, setS] = useState('loading');
  React.useEffect(() => {
    const id = setInterval(() => {
      const allLoaded = _allKeys.size > 0 && _fetchedKeys.size >= _allKeys.size;
      if (_serverReachable === false && allLoaded && _syncErrors > 0) { setS('error'); return; }
      if (!allLoaded)           { setS('loading'); return; }
      if (_syncPending > 0)     { setS('pending'); return; }
      if (_syncErrors > 0)      { setS('error'); return; }
      if (_serverReachable)     { setS('ok'); return; }
      setS('loading');
    }, 600);
    return () => clearInterval(id);
  }, []);
  const cfg = {
    loading: { cls: 'bg-gray-400 animate-pulse',  title: 'Verbinden met server...' },
    pending: { cls: 'bg-yellow-400 animate-pulse', title: t('msg_saving') },
    ok:      { cls: 'bg-green-400',                title: 'Gesynchroniseerd met server' },
    error:   { cls: 'bg-red-500',                  title: 'Verbinding mislukt — data alleen lokaal' },
  }[s] || { cls: 'bg-gray-400', title: '' };
  return (
    <span title={cfg.title}
      className={`inline-block w-2.5 h-2.5 rounded-full flex-shrink-0 cursor-help ${cfg.cls}`} />
  );
};

const newId = (arr) => arr.length ? Math.max(0, ...arr.map(x=>x.id))+1 : 1;

// ===== BREWFATHER INTEGRATION =====
// Alle Brewfather-aanroepen lopen via de backend-proxy zodat de API-credentials
// nooit in de browser-netwerkinspector verschijnen.
const BF_TO_APP = {Planning:'Gepland',Brewing:'Brouwen',Fermenting:'Vergisten',Conditioning:'Conditioneren',Carbonating:'Conditioneren',Packaging:'Verpakt',Completed:'Gesloten',Archived:'Gesloten'};
const _BF_PROXY = (() => { const p = window.location.pathname; return p.replace(/[^/]*$/, '') + 'api/brewfather/'; })();
const _BF_TEST  = (() => { const p = window.location.pathname; return p.replace(/[^/]*$/, '') + 'api/brewfather/test'; })();

// ── WooCommerce proxy helpers ──────────────────────────────────────────────
const _WC_PROXY = (() => { const p = window.location.pathname; return p.replace(/[^/]*$/, '') + 'api/woocommerce/'; })();
const _WC_PUT   = (() => { const p = window.location.pathname; return p.replace(/[^/]*$/, '') + 'api/woocommerce/put/'; })();
const _WC_TEST  = (() => { const p = window.location.pathname; return p.replace(/[^/]*$/, '') + 'api/woocommerce/test'; })();
const _WC_PING  = (() => { const p = window.location.pathname; return p.replace(/[^/]*$/, '') + 'api/woocommerce/ping'; })();

const wcGet = async (subpath) => {
  const r = await fetch(_WC_PROXY + subpath.replace(/^\//, ''));
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.message || `WC ${r.status}`); }
  return r.json();
};
const wcPut = async (subpath, data) => {
  const r = await fetch(_WC_PUT + subpath.replace(/^\//, ''), {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.message || `WC ${r.status}`); }
  return r.json();
};
const wcTestCreds = async (body) => {
  try {
    const r = await fetch(_WC_TEST, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    const d = await r.json().catch(()=>({}));
    if (!r.ok) return {ok: false, status: r.status, detail: d.error||''};
    return {ok: d.ok === true, status: d.status, detail: d.detail||''};
  } catch(e) { return {ok: false, status: 0, detail: e.message}; }
};
// bfFetch stuurt geen credentials mee — de backend leest ze zelf van schijf.
const bfFetch = (path, opts={}) => fetch(_BF_PROXY + path.replace(/^\//, ''), opts);
// bfTest POST'et de (nog niet opgeslagen) credentials naar onze eigen backend.
const bfTest = async (uid, key) => {
  try {
    const r = await fetch(_BF_TEST, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({userId: uid, apiKey: key}),
    });
    if (!r.ok) return false;
    const d = await r.json();
    return d.ok === true;
  } catch(e) { return false; }
};
const bfGetBatches = async () => {
  const statuses = ['Planning','Brewing','Fermenting','Conditioning','Completed'];
  const all = [];
  for (const s of statuses) {
    let startAfter = null;
    for (;;) {
      const r = await bfFetch(`batches?status=${s}&complete=true&limit=50${startAfter?'&start_after='+startAfter:''}`);
      if (!r.ok) break;
      const d = await r.json();
      all.push(...d);
      if (d.length < 50) break;
      startAfter = d[d.length-1]._id;
    }
  }
  return all;
};

const bfGetRecipes = async () => {
  const all = [];
  let startAfter = null;
  for (;;) {
    const r = await bfFetch(`recipes?complete=true&limit=50${startAfter?'&start_after='+startAfter:''}`);
    if (!r.ok) break;
    const d = await r.json();
    all.push(...d);
    if (d.length < 50) break;
    startAfter = d[d.length-1]._id;
  }
  return all.map(r => ({
    id: r._id,
    naam: r.name || 'Onbekend',
    auteur: r.author || '',
    type: r.type || '',
    stijl: r.style?.name || '',
    equipment: r.equipment?.name || '',
    batch_size: r.batchSize || '',
    OG: r.og || '',
    FG: r.fg || '',
    ABV: r.abv || '',
    IBU: r.ibu || '',
    notities: r.notes || '',
    tags:   Array.isArray(r.searchTags) ? r.searchTags : (r.searchTags ? [r.searchTags] : []),
    mout:   (r.fermentables||[]).map(f => ({naam:f.name||'', hoeveelheid:Number(f.amount||0), eenheid:'kg'})),
    hop:    (r.hops||[]).map(h =>        ({naam:h.name||'', hoeveelheid:Number(h.amount||0), eenheid:'g',    gebruik:h.use||''})),
    gist:   (r.yeasts||[]).map(y =>      ({naam:y.name||'', hoeveelheid:Number(y.amount||1), eenheid:y.unit||'pkg'})),
    overig: (r.miscs||[]).map(m =>       ({naam:m.name||'', hoeveelheid:Number(m.amount||0), eenheid:m.unit||'g', gebruik:m.use||''})),
  }));
};
const bfNumSafe = (v) => {
  if (v === null || v === undefined || v === '') return '';
  if (typeof v === 'number') return v;
  if (typeof v === 'object') {
    const n = v.$numberDouble ?? v.$numberDecimal ?? v.$numberInt ?? v.$numberLong;
    if (n !== undefined) return Number(n) || '';
  }
  const n = Number(v);
  return isNaN(n) ? '' : n;
};
const bfMapBatch = (b) => ({
  brewfather_id:  b._id,
  naam:           b.recipe?.name || b.name || 'Onbekend',
  batch_nummer:   b.batchNo != null ? String(b.batchNo) : '',
  stijl:          b.recipe?.style?.name || '',
  status:         BF_TO_APP[b.status] || 'Gepland',
  liter_vergist:  bfNumSafe(b.measuredBatchSize || b.estimatedBatchSize || b.recipe?.batchSize),
  OG:  bfNumSafe(b.measuredOg  || b.estimatedOg),
  FG:  bfNumSafe(b.measuredFg  || b.estimatedFg),
  ABV: bfNumSafe(b.measuredAbv || b.estimatedAbv),
  tank:'', electra_kosten:'', water_kosten:'', schoonmaak_kosten:'', overige_kosten:'',
  notities: (Array.isArray(b.notes)?b.notes.join(' '):(typeof b.notes==='object'&&b.notes?'':b.notes||'')) || (Array.isArray(b.tasteNotes)?b.tasteNotes.join(' '):(typeof b.tasteNotes==='object'&&b.tasteNotes?'':b.tasteNotes||'')),
  brouwzaal_eff: bfNumSafe(b.measuredBrewhouseEfficiency != null ? b.measuredBrewhouseEfficiency : b.estimatedBrewhouseEfficiency),
  maisch_eff: bfNumSafe(b.measuredMashEfficiency),
  maisch_ph: bfNumSafe(b.measuredMashPh),
  product_ph: bfNumSafe(b.measuredFermentationPh != null ? b.measuredFermentationPh : b.measuredPh),
  datum: b.brewDate ? new Date(b.brewDate).toISOString().split('T')[0] : tod(),
});
const bfMapBis = (b, batchId, startId) => {
  const rows = [];
  const r = b.recipe || {};
  (r.fermentables||[]).forEach(f => rows.push({batch_id:batchId, ingredient_naam:f.name||'', ingredient_type:'Mout',           hoeveelheid:Number(f.amount||0).toFixed(3), eenheid:'kg'}));
  (r.hops||[]).forEach(h =>        rows.push({batch_id:batchId, ingredient_naam:h.name||'', ingredient_type:'Hop',            hoeveelheid:Number(h.amount||0).toFixed(1), eenheid:'g'}));
  (r.yeasts||[]).forEach(y =>      rows.push({batch_id:batchId, ingredient_naam:y.name||'', ingredient_type:'Gist',           hoeveelheid:Number(y.amount||1),            eenheid:'stuk'}));
  (r.miscs||[]).forEach(m =>       rows.push({batch_id:batchId, ingredient_naam:m.name||'', ingredient_type:'Overig',         hoeveelheid:Number(m.amount||1),            eenheid:m.amountType||'g'}));
  return rows.map((row,i) => ({...row, id: startId+i, ingredient_id:null, lot_id:'', kosten:'', afboeken:false}));
};

const fmt = (v) => '€'+Number(v||0).toLocaleString('nl-NL',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD = (d) => d ? new Date(d+'T12:00:00').toLocaleDateString('nl-NL') : '';
const tod = () => new Date().toISOString().split('T')[0];
const accijnsCalc = (L, abv, r1=7.51, r2=24.17, inst=null) => {
  const liter = L; const hl = L/100;
  if (inst?.customFormulaEnabled && inst?.customFormula) {
    try {
      const result = new Function('liter','abv','hl','r1','r2', `"use strict"; return (${inst.customFormula});`)(liter,abv||0,hl,r1,r2);
      if (typeof result === 'number' && !isNaN(result)) return result;
    } catch(e) {}
  }
  return Math.max(hl*(abv||0)*r1, hl*r2);
};

const excelExport = (ing,lots,bat,bi,av,uit,acc,verp,ond,log,archief,geslotenBieren,recepten,tanks,artikelen,hygieneItems,hygieneGroups,inkoopFacturen,verkoopFacturen) => {
  const wb = XLSX.utils.book_new();
  const toRow = o => { const r={}; for(const [k,v] of Object.entries(o)) r[k]=(v!==null&&typeof v==='object')?JSON.stringify(v):v; return r; };
  const prep = d => (d||[]).length ? d.map(toRow) : [{}];
  [['Ingredienten',ing],['Lots',lots],['Batches',bat],['BatchIngredienten',bi],['Afvullingen',av],['Uitslagen',uit],['Accijns',acc],['Verpakkingen',verp||[]],
   ['Onderdelen',ond||[]],['VoorraadLog',log||[]],['VoorraadArchief',archief||[]],['GeslotenBieren',geslotenBieren||[]],
   ['Recepten',recepten||[]],['Tanks',tanks||[]],['Artikelen',artikelen||[]],
   ['HygieneItems',hygieneItems||[]],['HygieneGroups',hygieneGroups||[]],
   ['InkoopFacturen',inkoopFacturen||[]],['VerkoopFacturen',verkoopFacturen||[]]]
    .forEach(([n,d]) => XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prep(d)), n));
  XLSX.writeFile(wb, 'craftery_data.xlsx');
};

const excelImport = (file, cb) => {
  const r = new FileReader();
  r.onload = e => {
    const wb = XLSX.read(e.target.result, {type:'array'});
    const gs = n => wb.Sheets[n] ? XLSX.utils.sheet_to_json(wb.Sheets[n]) : [];
    const fromRow = o => { const r={}; for(const [k,v] of Object.entries(o)){ if(typeof v==='string'&&(v.startsWith('[')||v.startsWith('{'))){try{r[k]=JSON.parse(v);}catch{r[k]=v;}}else{r[k]=v;} } return r; };
    const parse = n => gs(n).map(fromRow);
    cb({ ingredienten:gs('Ingredienten'), lots:gs('Lots'), batches:gs('Batches'),
         batchIngredienten:gs('BatchIngredienten'), afvullingen:gs('Afvullingen'),
         uitslagen:gs('Uitslagen'), accijns:gs('Accijns'), verpakkingen:gs('Verpakkingen'),
         onderdelen:parse('Onderdelen'), voorraadLog:parse('VoorraadLog'), voorraadArchief:parse('VoorraadArchief'),
         geslotenBieren:gs('GeslotenBieren'), recepten:parse('Recepten'), tanks:gs('Tanks'),
         artikelen:parse('Artikelen'), hygieneItems:parse('HygieneItems'), hygieneGroups:parse('HygieneGroups'),
         inkoopFacturen:parse('InkoopFacturen'), verkoopFacturen:parse('VerkoopFacturen') });
  };
  r.readAsArrayBuffer(file);
};

        {/* ── Verpakkingen tab ── */}
        {tab==='verpakkingen' && (
          <div className="border border-gray-200 rounded-lg p-3">
            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">{t('onderdeel_add_btn')}</p>
            <div className="space-y-2">

                <div>
                  <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Bestaand onderdeel</label>
                  <select className="w-full border rounded px-2 py-1.5 text-sm"
                    value={vOntvForm.od_id}
                    onChange={e=>{const od=onderdelen.find(o=>o.id===Number(e.target.value));od?setVOntvForm(f=>({...f,od_id:String(od.id),naam:od.naam,type:od.type||''})):setVOntvForm(f=>({...f,od_id:'',naam:'',type:''}));}}>
                    <option value="">— {t('lbl_or_new_ingredient')} —</option>
                    {[...onderdelen].sort((a,b)=>a.naam.localeCompare(b.naam,'nl')).map(o=><option key={o.id} value={String(o.id)}>{o.naam}</option>)}

                </div>
                {!vOntvForm.od_id && (
                  <Inp label={t('lbl_or_new_ingredient')+' *'} value={vOntvForm.naam} onChange={v=>setVOntvForm(f=>({...f,naam:v,od_id:''}))} placeholder="Fles 33cL" />

              </div>
              {!vOntvForm.od_id && (
                <Sel label={t('onderdeel_type')} value={vOntvForm.type} onChange={v=>setVOntvForm(f=>({...f,type:v}))}

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <Inp label={t('ing_lot_number')} value={vOntvForm.lotnr} onChange={v=>setVOntvForm(f=>({...f,lotnr:v}))} placeholder="L-2025-001" />
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-4 gap-3">
                <Inp label={t('lbl_qty_received')+' *'} type="number" value={vOntvForm.aantal}
                  onChange={v=>setVOntvForm(f=>{const ps=f.prijs_per_stuk,tot=f.totaalprijs;if(ps&&v)return{...f,aantal:v,totaalprijs:String((Number(ps)*Number(v)).toFixed(2))};if(!ps&&tot&&v)return{...f,aantal:v,prijs_per_stuk:String((Number(tot)/Number(v)).toFixed(4))};return{...f,aantal:v};})}
                  placeholder="24" />
                <Inp label={t('modal_price_per_unit')} type="number" value={vOntvForm.prijs_per_stuk}
                  onChange={v=>setVOntvForm(f=>({...f,prijs_per_stuk:v,totaalprijs:v&&f.aantal?String((Number(v)*Number(f.aantal)).toFixed(2)):f.totaalprijs}))}
                  placeholder="0.00" />
                <Inp label="Totaalprijs ex BTW (€)" type="number" value={vOntvForm.totaalprijs}
                  onChange={v=>setVOntvForm(f=>({...f,totaalprijs:v,prijs_per_stuk:v&&f.aantal?String((Number(v)/Number(f.aantal)).toFixed(4)):f.prijs_per_stuk}))}
                  placeholder="0.00" />
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">BTW%</label>
                  <select value={vOntvForm.btw_tarief} onChange={e=>setVOntvForm(f=>({...f,btw_tarief:e.target.value}))}
                    className="border border-gray-300 rounded-lg px-2 py-1.5 text-sm t-input focus:outline-none w-full">
                    <option value="0">0%</option>
                    <option value="9">9%</option>
                    <option value="21">21%</option>
                  </select>
                </div>
              </div>
              <div className="flex justify-end">
                <Btn onClick={voegVerpakkingToe}>{t('modal_add_to_list')}</Btn>
              </div>
            </div>
          </div>
        )}

        {/* ── Vrije regels tab ── */}
        {tab==='vrije' && (
          <div className="border border-gray-200 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Vrije regelitems</p>
              <button onClick={()=>setVrijeRegels(r=>[...r,{naam:'',netto:'',btw_tarief:21}])}
                className="text-xs text-blue-600 hover:text-blue-800 font-medium">+ Regel toevoegen</button>
            </div>
            <div className="space-y-2">
              {vrijeRegels.map((r,i)=>(
                <div key={i} className="flex gap-2 items-center">
                  <input type="text" value={r.naam} onChange={e=>setVrijeRegels(prev=>prev.map((x,j)=>j===i?{...x,naam:e.target.value}:x))}
                    placeholder="Omschrijving"
                    className="flex-1 border border-gray-200 rounded-lg px-3 py-1.5 text-sm t-input outline-none" />
                  <div className="flex items-center gap-1">
                    <span className="text-xs text-gray-400">€</span>
                    <input type="number" value={r.netto} onChange={e=>setVrijeRegels(prev=>prev.map((x,j)=>j===i?{...x,netto:e.target.value}:x))}
                      placeholder="0.00" min="0" step="0.01"
                      className="w-24 border border-gray-200 rounded-lg px-2 py-1.5 text-sm text-right t-input outline-none" />
                  </div>
                  <select value={r.btw_tarief} onChange={e=>setVrijeRegels(prev=>prev.map((x,j)=>j===i?{...x,btw_tarief:Number(e.target.value)}:x))}
                    className="border border-gray-200 rounded-lg px-2 py-1.5 text-sm t-input outline-none">
                    <option value={0}>0% BTW</option>
                    <option value={9}>9% BTW</option>
                    <option value={21}>21% BTW</option>
                  </select>
                  {vrijeRegels.length > 1 && (
                    <button onClick={()=>setVrijeRegels(prev=>prev.filter((_,j)=>j!==i))}
                      className="text-gray-300 hover:text-red-500 text-sm px-1">✕</button>
                  )}
                </div>
              ))}
            </div>
            {vrijeRegels.some(r=>r.naam.trim()&&parseFloat(r.netto)>0) && (
              <div className="bg-gray-50 rounded-xl p-3 text-sm flex justify-between mt-3">
                <span className="text-gray-500">Netto <span className="font-medium text-gray-800">{fmt(totVrijeNetto)}</span></span>
                <span className="text-gray-500">BTW <span className="font-medium text-blue-700">{fmt(totVrijeBtw)}</span></span>
                <span className="text-gray-500">Bruto <span className="font-bold text-gray-900">{fmt(totVrijeNetto+totVrijeBtw)}</span></span>
              </div>
            )}
          </div>
        )}

        {/* ── Gecombineerde productenlijst ── */}
        {(productLijst.length > 0 || verpakkingLijst.length > 0) && (
          <div>
            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">{t('modal_added_products')} ({productLijst.length + verpakkingLijst.length})</p>
            <div className="border border-gray-200 rounded-lg overflow-hidden">
              <table className="w-full text-sm">
                <thead className="bg-gray-50">
                  <tr>
                    <th className="px-3 py-2 text-left text-xs font-medium text-gray-500">{t('log_ingredient')}</th>
                    <th className="px-3 py-2 text-left text-xs font-medium text-gray-500">{t('lbl_quantity')}</th>
                    <th className="px-3 py-2 text-left text-xs font-medium text-gray-500">{t('lbl_lot')}</th>
                    <th className="px-3 py-2 text-left text-xs font-medium text-gray-500">{t('lbl_price_per_unit')}</th>
                    <th className="px-3 py-2 text-left text-xs font-medium text-gray-500">Totaal ex BTW</th>
                    <th className="px-2 py-2"></th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {productLijst.map((p,i)=>(
                    <tr key={p._id} className="bg-white">
                      <td className="px-3 py-2 font-medium">{p._naam}</td>
                      <td className="px-3 py-2">{p.qty} {p.eenh}</td>
                      <td className="px-3 py-2 text-gray-500">{p.lotnr||'—'}</td>
                      <td className="px-3 py-2 text-gray-500">{p.prijs?`€${p.prijs}`:'—'}</td>
                      <td className="px-3 py-2 text-gray-500">{p.totaalprijs?`€${p.totaalprijs}`:'—'}</td>
                      <td className="px-2 py-2 text-right">
                        <button onClick={()=>setProductLijst(prev=>prev.filter((_,j)=>j!==i))}
                          className="text-red-400 hover:text-red-600 text-xs font-medium">✕</button>
                      </td>
                    </tr>
                  ))}
                  {verpakkingLijst.map((v,i)=>(
                    <tr key={v._id} className="bg-blue-50">
                      <td className="px-3 py-2 font-medium">{v._naam} <span className="text-xs text-blue-400">(verpakking)</span></td>
                      <td className="px-3 py-2">{v.aantal} stuks</td>
                      <td className="px-3 py-2 text-gray-500">{v.lotnr||'—'}</td>
                      <td className="px-3 py-2 text-gray-500">{v.prijs_per_stuk?`€${v.prijs_per_stuk}`:'—'}</td>
                      <td className="px-3 py-2 text-gray-500">{v.totaalprijs?`€${v.totaalprijs}`:'—'}</td>
                      <td className="px-2 py-2 text-right">
                        <button onClick={()=>setVerpakkingLijst(prev=>prev.filter((_,j)=>j!==i))}
                          className="text-red-400 hover:text-red-600 text-xs font-medium">✕</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ── Footer ── */}
        <div className="flex justify-between items-center pt-1">
          <span className="text-sm text-gray-500">{t('modal_products_ready').replace('{n}', productLijst.length + verpakkingLijst.length)}</span>
          <div className="flex gap-2">
            <Btn v="secondary" onClick={onClose}>{t('btn_cancel')}</Btn>
            <Btn onClick={handleSave} disabled={uploading}>{uploading ? 'Uploaden…' : t('btn_save')}</Btn>
          </div>
        </div>
      </div>
    </Modal>
  );
}

// ===== INGREDIËNTEN =====
function IngredientenPage({ing, setIng, lots, setLots, verpakkingen, setVerpakkingen, onderdelen=[], setOnderdelen, log, setLog, bi=[], bat=[], setInkoopFacturen=()=>{}}) {
  const [tab, setTab] = useState('ingredienten');

  // --- Ingrediënten state ---
  const [sel, setSel] = useState(null);
  const [showO, setShowO] = useState(false);
  const [ontvangstInitTab, setOntvangstInitTab] = useState('ingredienten');
  const [ontvangstInitIngId, setOntvangstInitIngId] = useState('');
  const [showA, setShowA] = useState(null);
  const knownLeveranciers = React.useMemo(() =>
    [...new Set(lots.map(l=>l.leverancier).filter(Boolean))].sort(), [lots]);
  const [afQty, setAfQty] = useState('');
  const [afEenheid, setAfEenheid] = useState('');
  const [showLot, setShowLot] = useState(null);       // lot detail modal
  const [archiefOpen, setArchiefOpen] = useStore('ing_archief_open', {}); // {ingredientId: bool}
  const [lotEdit, setLotEdit] = useState({});          // editable fields of open lot
  const [lotCorr, setLotCorr] = useState({delta:'', richting:'+', reden:'', eenheid:''});
  const [ingZoek, setIngZoek] = useState('');          // zoekfilter ingrediënten
  const [groepDicht, setGroepDicht] = useStore('ing_groep_dicht', {});   // {type: bool} ingeklapte groepen
  const [vtIngeklapt, setVtIngeklapt] = useStore('verpakkingen_vt_ingeklapt', false);
  const [odIngeklapt, setOdIngeklapt] = useStore('verpakkingen_od_ingeklapt', false);

  const openLot = (lot) => {
    setShowLot(lot);
    setLotEdit({
      lotnummer:      lot.lotnummer||'',
      leverancier:    lot.leverancier||'',
      factuur_nummer: lot.factuur_nummer||'',
      aankoop_datum:  lot.aankoop_datum||'',
      eenheid:        lot.eenheid||'',
      hoeveelheid:    String(lot.hoeveelheid||''),
      houdbaarheid:   lot.houdbaarheid||'',
      prijs_per_eenheid: lot.prijs_per_eenheid!=null?String(lot.prijs_per_eenheid):'',
    });
    setLotCorr({delta:'', richting:'+', reden:'', eenheid: lot.eenheid||''});
  };
  const saveLot = () => {
    setLots(prev=>prev.map(l=>l.id!==showLot.id?l:{...l,
      lotnummer:      lotEdit.lotnummer,
      leverancier:    lotEdit.leverancier,
      factuur_nummer: lotEdit.factuur_nummer,
      aankoop_datum:  lotEdit.aankoop_datum,
      eenheid:        lotEdit.eenheid,
      hoeveelheid:    Number(lotEdit.hoeveelheid)||0,
      houdbaarheid:   lotEdit.houdbaarheid||null,
      prijs_per_eenheid: lotEdit.prijs_per_eenheid!==''?Number(lotEdit.prijs_per_eenheid):null,
      beschikbaar:    (Number(lotEdit.hoeveelheid)||0)>0,
    }));
    setShowLot(null);
  };
  const doCorrectie = (lot) => {
    const delta = Number(lotCorr.delta);
    if (!delta || delta <= 0) { alert(t('err_valid_qty')); return; }
    const corrEenh = lotCorr.eenheid || lot.eenheid;
    const deltaInLot = convertEenheid(delta, corrEenh, lot.eenheid);
    if (deltaInLot === null) { alert(t('err_convert_units').replace('{from}',corrEenh).replace('{to}',lot.eenheid)); return; }
    const nieuweQty = lotCorr.richting === '+'
      ? Number(lot.hoeveelheid) + deltaInLot
      : Math.max(0, Number(lot.hoeveelheid) - deltaInLot);
    setLots(prev=>prev.map(l=>l.id!==lot.id?l:{...l, hoeveelheid:nieuweQty, beschikbaar:nieuweQty>0}));
    addLog({ingredient_id:lot.ingredient_id, ingredient_naam:ing.find(i=>i.id===lot.ingredient_id)?.naam||'',
      lot_id:lot.id, lotnummer:lot.lotnummer||'', type:'correctie',
      hoeveelheid:lotCorr.richting==='-'?-delta:delta, eenheid:corrEenh,
      referentie: lotCorr.reden||'Handmatige correctie'});
    setLotCorr({delta:'', richting:'+', reden:'', eenheid: lot.eenheid});
    // Sync updated lot into showLot so modal reflects new qty
    setShowLot(prev=>({...prev, hoeveelheid:nieuweQty, beschikbaar:nieuweQty>0}));
    setLotEdit(prev=>({...prev, hoeveelheid:String(nieuweQty)}));
  };

  // --- Verpakkingen state ---
  const [showVOntv, setShowVOntv] = useState(false);
  const emptyVO = {od_id:'',verpakking_id:'',naam:'',inhoud_liter:'',type:'',lotnr:'',aantal:'',preset:'',kosten_verpakking:'',kosten_afsluiting:'',kosten_label:'',leverancier:'',factuurnummer:'',prijs_per_stuk:'',totaalprijs:'',btw_tarief:'21'};
  const [vOntvForm, setVOntvForm] = useState(emptyVO);
  const [showVAfboek, setShowVAfboek] = useState(null);
  const [vAfQty, setVAfQty] = useState('');
  const [showVEdit, setShowVEdit] = useState(null); // holds verpakking being edited
  const emptyVE = {naam:'',inhoud_liter:'',type:'',kosten_verpakking:'',kosten_afsluiting:'',kosten_label:'',leverancier:'',factuurnummer:''};
  const [vEditForm, setVEditForm] = useState(emptyVE);
  // --- Onderdelen state ---
  const emptyOD = {od_id:'',naam:'',type:'',lotnr:'',kosten_per_stuk:'',leverancier:'',factuurnummer:''};
  const [showODEdit, setShowODEdit] = useState(null);
  const [odEditForm, setOdEditForm] = useState(emptyOD);
  const [showODAdd, setShowODAdd] = useState(false);
  const [odAddForm, setOdAddForm] = useState(emptyOD);
  const [odQty, setOdQty] = useState('');
  const [odPrijs, setOdPrijs] = useState('');
  const [odTotaalprijs, setOdTotaalprijs] = useState('');
  // --- Verpakking type state ---
  const emptyVT = {naam:'',inhoud_liter:'',type:'',onderdelen:[]}; // onderdelen: [{onderdeel_id, aantal}]
  const [showVTAdd, setShowVTAdd] = useState(false);
  const [vtForm, setVtForm] = useState(emptyVT);
  const [vtOnderdeel, setVtOnderdeel] = useState({onderdeel_id:'',aantal:'1'});

  // --- Log helper ---
  const addLog = (entry) => setLog(prev=>[...prev,{id:newId(prev||[]),datum:tod(),...entry}]);

  // --- Ingrediënten logic ---
  const activeLots  = (iid) => lots.filter(l=>l.ingredient_id===iid && l.beschikbaar && Number(l.hoeveelheid||0)>0);
  const archiefLots = (iid) => lots.filter(l=>l.ingredient_id===iid && (!l.beschikbaar || Number(l.hoeveelheid||0)===0));
  const totalQty    = (iid) => activeLots(iid).reduce((s,l)=>s+Number(l.hoeveelheid||0),0);
  const lotBatches  = (lotId) => {
    const usages = bi.filter(x=>x.lot_id===lotId && x.afgeboekt);
    return usages.map(x=>({ ...x, batch: bat.find(b=>b.id===x.batch_id) }));
  };

  const saveOntvangst = async ({factuurForm, productLijst, verpakkingLijst, vrijeRegels, bijlage}) => {
    let updatedIng = [...ing];
    const newLots = [];
    productLijst.forEach(p => {
      let iid;
      if (p.ing_id) { iid = Number(p.ing_id); }
      else {
        const existing = updatedIng.find(i=>i.naam.toLowerCase()===p.nieuw.trim().toLowerCase());
        if (existing) { iid = existing.id; }
        else {
          const n = {id:newId(updatedIng), naam:p.nieuw.trim(), type:p.type, fabrikant:p.fabrikant};
          updatedIng = [...updatedIng, n]; iid = n.id;
        }
      }
      const lot = {id:newId([...lots,...newLots]), ingredient_id:iid, hoeveelheid:Number(p.qty), eenheid:p.eenh,
        houdbaarheid:p.tht||null, lotnummer:p.lotnr||'', leverancier:factuurForm.leverancier||'',
        prijs_per_eenheid:p.prijs?Number(p.prijs):null, factuur_nummer:factuurForm.factuur||'',
        aankoop_datum:factuurForm.datum||tod(), btw_tarief:Number(p.btw_tarief)||0, beschikbaar:true};
      newLots.push(lot);
      addLog({ingredient_id:iid, ingredient_naam:updatedIng.find(i=>i.id===iid)?.naam||p.nieuw.trim(),
        lot_id:lot.id, lotnummer:lot.lotnummer||'', type:'ontvangst',
        hoeveelheid:Number(p.qty), eenheid:p.eenh, referentie:factuurForm.factuur||factuurForm.leverancier||''});
    });
    setIng(updatedIng);
    setLots(prev=>[...prev,...newLots]);
    // --- onderdelen (previously verpakkingen) ---
    verpakkingLijst.forEach(v => {
      const n = Number(v.aantal);
      const naam = v._naam||v.naam.trim();
      const bestaand = v.od_id
        ? onderdelen.find(o=>o.id===Number(v.od_id))
        : onderdelen.find(o=>o.naam.toLowerCase()===naam.toLowerCase());
      if (bestaand) {
        setOnderdelen(prev=>prev.map(o=>o.id===bestaand.id?{
          ...o, voorraad:Number(o.voorraad||0)+n,
          lotnr:v.lotnr||o.lotnr||'',
          leverancier:factuurForm.leverancier||o.leverancier||'',
          factuurnummer:factuurForm.factuur||o.factuurnummer||'',
        }:o));
      } else {
        setOnderdelen(prev=>[...prev,{
          id:newId(prev), naam, type:v.type||'overig',
          lotnr:v.lotnr||'',
          kosten_per_stuk:v.prijs_per_stuk?Number(v.prijs_per_stuk):0,
          leverancier:factuurForm.leverancier||'', factuurnummer:factuurForm.factuur||'',
          voorraad:n,
        }]);
      }
    });
    // --- inkoop_factuur record aanmaken ---
    const factuurRegels = [];
    productLijst.forEach(p => {
      const pn = p.prijs ? Number(p.prijs) : 0;
      const netto = pn * Number(p.qty||0);
      const tarief = Number(p.btw_tarief)||0;
      const naam = p.ing_id ? (ing.find(i=>i.id===Number(p.ing_id))?.naam||p.nieuw.trim()) : p.nieuw.trim();
      factuurRegels.push({type:'ingredient', naam, hoeveelheid:Number(p.qty), eenheid:p.eenh,
        prijs_per_eenheid:pn||null, netto, btw_tarief:tarief, btw_bedrag:netto*tarief/100});
    });
    verpakkingLijst.forEach(v => {
      const ps = v.prijs_per_stuk ? Number(v.prijs_per_stuk) : 0;
      const netto = ps * Number(v.aantal||0);
      const tarief = Number(v.btw_tarief)||0;
      factuurRegels.push({type:'verpakking', naam:v._naam||v.naam.trim(), aantal:Number(v.aantal),
        prijs_per_stuk:ps||null, netto, btw_tarief:tarief, btw_bedrag:netto*tarief/100});
    });
    // Vrije regels als 'overig' toevoegen aan factuur
    vrijeRegels.forEach(r => {
      const netto = parseFloat(r.netto)||0;
      const tarief = Number(r.btw_tarief)||0;
      factuurRegels.push({type:'overig', naam:r.naam.trim(), netto, btw_tarief:tarief, btw_bedrag:+(netto*tarief/100).toFixed(2)});
    });
    if (factuurRegels.length > 0) {
      const totaal_netto = factuurRegels.reduce((s,r)=>s+r.netto, 0);
      const totaal_btw   = factuurRegels.reduce((s,r)=>s+r.btw_bedrag, 0);
      setInkoopFacturen(prev=>[...prev, {
        id: newId(prev),
        datum: factuurForm.datum||tod(),
        factuurnummer: factuurForm.factuur||'',
        leverancier: factuurForm.leverancier||'',
        regels: factuurRegels,
        totaal_netto, totaal_btw, totaal_bruto: totaal_netto+totaal_btw,
        bijlage,
      }]);
    }
    setShowO(false);
  };

  const doAfboeken = (lot) => {
    const q = Number(afQty);
    if (!q||q<=0) { alert(t('err_valid_qty')); return; }
    const van = afEenheid || lot.eenheid;
    const qInLot = convertEenheid(q, van, lot.eenheid);
    if (qInLot === null) { alert(t('err_convert_units').replace('{from}',van).replace('{to}',lot.eenheid)); return; }
    setLots(prev=>prev.map(l=>l.id!==lot.id?l:{...l, hoeveelheid:Math.max(0,Number(l.hoeveelheid)-qInLot), beschikbaar:Number(l.hoeveelheid)-qInLot>0}));
    addLog({ingredient_id:lot.ingredient_id, ingredient_naam:ing.find(i=>i.id===lot.ingredient_id)?.naam||'',
      lot_id:lot.id, lotnummer:lot.lotnummer||'', type:'afboeking',
      hoeveelheid:q, eenheid:van, referentie:'Handmatig afgeboekt'});
    setShowA(null); setAfQty(''); setAfEenheid('');
  };

  // --- Verpakkingen logic ---
  const vpVoorraad = (vp) => {
    if (!vp.onderdelen?.length) return Number(vp.voorraad||0);
    const stocks = vp.onderdelen.map(o => {
      const od = onderdelen.find(d=>d.id===o.onderdeel_id);
      return Math.floor(Number(od?.voorraad||0) / Number(o.aantal||1));
    });
    return stocks.length ? Math.min(...stocks) : 0;
  };
  const vpKosten = (vp) => {
    if (!vp.onderdelen?.length) return Number(vp.kosten_verpakking||0)+Number(vp.kosten_afsluiting||0)+Number(vp.kosten_label||0);
    return vp.onderdelen.reduce((s,o) => {
      const od = onderdelen.find(d=>d.id===o.onderdeel_id);
      return s + Number(od?.kosten_per_stuk||0) * Number(o.aantal||1);
    }, 0);
  };
  const vKosten = (v) => vpKosten(v);

  const onPreset = (preset) => {
    if (!preset) { setVOntvForm(f=>({...f,preset:'',naam:'',inhoud_liter:'',type:''})); return; }
    const p = VERPAKKING_DEFAULTS.find(d=>d.naam===preset);
    setVOntvForm(f=>({...f, preset, naam:p?.naam||preset, inhoud_liter:String(p?.inhoud_liter||''), type:p?.type||'', verpakking_id:''}));
  };

  const saveVOntvangst = () => {
    const n = Number(vOntvForm.aantal);
    if (!n||n<=0) { alert(t('err_count_required')); return; }
    if (vOntvForm.verpakking_id) {
      // Aanvullen bestaand type — voorraad ophogen + leverancier/factuur bijwerken
      setVerpakkingen(prev=>prev.map(v=>v.id===Number(vOntvForm.verpakking_id)?{
        ...v, voorraad:Number(v.voorraad||0)+n,
        leverancier:vOntvForm.leverancier||v.leverancier||'',
        factuurnummer:vOntvForm.factuurnummer||v.factuurnummer||'',
      }:v));
    } else {
      if (!vOntvForm.naam.trim()) { alert(t('err_name_required')); return; }
      setVerpakkingen(prev=>[...prev,{
        id:newId(prev), naam:vOntvForm.naam.trim(), inhoud_liter:Number(vOntvForm.inhoud_liter||0),
        type:vOntvForm.type||'', voorraad:n,
        kosten_verpakking:vOntvForm.kosten_verpakking?Number(vOntvForm.kosten_verpakking):0,
        kosten_afsluiting:vOntvForm.kosten_afsluiting?Number(vOntvForm.kosten_afsluiting):0,
        kosten_label:vOntvForm.kosten_label?Number(vOntvForm.kosten_label):0,
        leverancier:vOntvForm.leverancier||'', factuurnummer:vOntvForm.factuurnummer||'',
      }]);
    }
    setShowVOntv(false); setVOntvForm(emptyVO);
  };

  const openVEdit = (v) => {
    setVEditForm({naam:v.naam, inhoud_liter:String(v.inhoud_liter||''), type:v.type||'',
      kosten_verpakking:String(v.kosten_verpakking||''), kosten_afsluiting:String(v.kosten_afsluiting||''), kosten_label:String(v.kosten_label||''),
      leverancier:v.leverancier||'', factuurnummer:v.factuurnummer||''});
    setShowVEdit(v);
  };

  const saveVEdit = () => {
    if (!vEditForm.naam.trim()) { alert(t('err_name_required')); return; }
    setVerpakkingen(prev=>prev.map(v=>v.id===showVEdit.id?{...v,
      naam:vEditForm.naam.trim(), inhoud_liter:Number(vEditForm.inhoud_liter||0), type:vEditForm.type||v.type||'',
      kosten_verpakking:Number(vEditForm.kosten_verpakking||0),
      kosten_afsluiting:Number(vEditForm.kosten_afsluiting||0),
      kosten_label:Number(vEditForm.kosten_label||0),
      leverancier:vEditForm.leverancier||'', factuurnummer:vEditForm.factuurnummer||'',
    }:v));
    setShowVEdit(null);
  };

  const doVAfboeken = () => {
    const q = Number(vAfQty);
    if (!q||q<=0) { alert(t('err_valid_count')); return; }
    setVerpakkingen(prev=>prev.map(v=>v.id===showVAfboek.id?{...v,voorraad:Math.max(0,Number(v.voorraad||0)-q)}:v));
    setShowVAfboek(null); setVAfQty('');
  };

  const saveODEdit = () => {
    if (!odEditForm.naam.trim()) { alert(t('err_name_required')); return; }
    setOnderdelen(prev=>prev.map(o=>o.id===showODEdit.id?{...o,...odEditForm,kosten_per_stuk:odEditForm.kosten_per_stuk?Number(odEditForm.kosten_per_stuk):0}:o));
    setShowODEdit(null);
  };
  const saveODAdd = () => {
    if (!odAddForm.od_id && !odAddForm.naam.trim()) { alert(t('err_name_required')); return; }
    if (!odQty || Number(odQty)<=0) { alert(t('err_qty_required')); return; }
    if (odAddForm.od_id) {
      setOnderdelen(prev=>prev.map(o=>o.id===Number(odAddForm.od_id)?{
        ...o, voorraad:Number(o.voorraad||0)+Number(odQty),
        lotnr:odAddForm.lotnr||o.lotnr||'',
        ...(odPrijs?{kosten_per_stuk:Number(odPrijs)}:{}),
      }:o));
    } else {
      setOnderdelen(prev=>[...prev,{
        id:newId(prev), naam:odAddForm.naam.trim(), type:odAddForm.type||'overig',
        lotnr:odAddForm.lotnr||'',
        kosten_per_stuk:odPrijs?Number(odPrijs):0,
        leverancier:odAddForm.leverancier||'', factuurnummer:odAddForm.factuurnummer||'',
        voorraad: Number(odQty),
      }]);
    }
    setOdAddForm(emptyOD); setOdQty(''); setOdPrijs(''); setOdTotaalprijs(''); setShowODAdd(false);
  };
  const saveVTAdd = () => {
    if (!vtForm.naam.trim()) { alert(t('err_name_required')); return; }
    if (showVEdit) {
      setVerpakkingen(prev=>prev.map(v=>v.id===showVEdit.id?{...v,naam:vtForm.naam.trim(),inhoud_liter:Number(vtForm.inhoud_liter||0),type:vtForm.type||'',onderdelen:vtForm.onderdelen}:v));
    } else {
      setVerpakkingen(prev=>[...prev,{id:newId(prev),naam:vtForm.naam.trim(),inhoud_liter:Number(vtForm.inhoud_liter||0),type:vtForm.type||'',onderdelen:vtForm.onderdelen,voorraad:0}]);
    }
    setVtForm(emptyVT); setVtOnderdeel({onderdeel_id:'',aantal:'1'}); setShowVTAdd(false); setShowVEdit(null);
  };
  const openVTEdit = (v) => {
    setVtForm({naam:v.naam,inhoud_liter:String(v.inhoud_liter||''),type:v.type||'',onderdelen:v.onderdelen||[]});
    setShowVEdit(v); setShowVTAdd(true);
  };

  const selIng = ing.find(i=>i.id===sel);
  const tabBtn = (t,l) => (
    <button onClick={()=>setTab(t)}
      className={`px-4 py-2 text-sm font-medium border-b-2 transition-colors ${tab===t?'t-tab font-semibold':'border-transparent text-gray-500 hover:text-gray-700'}`}>
      {l}
    </button>
  );

  return (
    <div>
      {/* Header: titel + tabs + actieknop op één lijn */}
      <div className="flex items-center justify-between mb-4">
        <div className="flex items-center gap-1">
          <h2 className="text-lg font-semibold mr-4">
            {tab==='verpakkingen'?`${t('ing_tab_packaging')}${verpakkingen.some(v=>Number(v.voorraad||0)===0)?' ⚠️':''}`:tab==='mutaties'?t('ing_tab_mutations'):t('ing_tab_ingredients')}
          </h2>
          {tabBtn('ingredienten',t('ing_tab_ingredients'))}
          {tabBtn('verpakkingen',`${t('ing_tab_packaging')}${verpakkingen.some(v=>Number(v.voorraad||0)===0)?' ⚠️':''}`)}
          {tabBtn('mutaties',t('ing_tab_mutations'))}
        </div>
        {tab==='ingredienten' && <Btn onClick={()=>{setOntvangstInitTab('ingredienten');setOntvangstInitIngId('');setShowO(true)}}>{t('btn_ontvangst')}</Btn>}
        {tab==='verpakkingen' && <Btn onClick={()=>{setOntvangstInitTab('verpakkingen');setOntvangstInitIngId('');setShowO(true)}}>{t('btn_ontvangst')}</Btn>}
        {tab==='mutaties' && <Btn onClick={()=>{setOntvangstInitTab('ingredienten');setOntvangstInitIngId('');setShowO(true)}}>{t('btn_ontvangst')}</Btn>}
      </div>

      {/* ======= INGREDIËNTEN TAB ======= */}
      {tab==='ingredienten' && (
        <div className="flex flex-col md:flex-row gap-4 md:items-start">
            <div className={`w-full md:w-60 md:flex-shrink-0${sel?' hidden md:block':''}`}>
              <div className="mb-2">
                <input type="text" placeholder={t('search_ingredient')}
                  className="w-full border rounded-lg px-3 py-2 text-sm t-input"
                  value={ingZoek} onChange={e=>{setIngZoek(e.target.value);setSel(null);}} />
              </div>
              <div className="bg-white rounded-xl shadow-card overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-gray-50/80 text-xs text-gray-500 uppercase tracking-widest border-b border-gray-100">
                  <tr><th className="px-3 py-1.5 text-left font-normal">{t('lbl_name')}</th><th className="px-3 py-1.5 text-right font-normal">{t('lbl_stock')}</th></tr>
                </thead>
                {ing.length===0
                  ? <tbody><tr><td colSpan={2} className="px-3 py-6 text-center text-gray-400">{t('msg_no_ingredients')}</td></tr></tbody>
                  : (() => {
                      const zoek = ingZoek.trim().toLowerCase();
                      const filtered = zoek ? ing.filter(i=>i.naam.toLowerCase().includes(zoek)||i.type.toLowerCase().includes(zoek)) : ing;
                      if (filtered.length===0) return <tbody><tr><td colSpan={2} className="px-3 py-6 text-center text-gray-400">Geen resultaten voor "{ingZoek}"</td></tr></tbody>;
                      return ING_TYPES.map(ingTyp => {
                        const groep = [...filtered.filter(i => i.type === ingTyp)].sort((a,b)=>a.naam.localeCompare(b.naam,'nl'));
                        if (groep.length === 0) return null;
                        const dicht = groepDicht[ingTyp] && !zoek; // zoeken forceert open
                        return (
                          <tbody key={ingTyp} className="divide-y divide-gray-100">
                            <tr className="bg-gray-50 cursor-pointer select-none hover:bg-gray-100"
                              onClick={()=>setGroepDicht(p=>({...p,[ingTyp]:!p[ingTyp]}))}>
                              <td colSpan={2} className="px-3 py-1.5 text-xs font-medium text-gray-500 uppercase tracking-wide">
                                <div className="flex items-center">
                                  <span className="mr-1.5 text-gray-400">{dicht?'▶':'▼'}</span>{t('ing_type_'+ingTyp.toLowerCase())}
                                  <span className="ml-1.5 font-normal text-gray-400">({groep.length})</span>
                                </div>
                              </td>
                            </tr>
                            {!dicht && groep.map(i => {
                              const tot = totalQty(i.id);
                              const eenh = activeLots(i.id)[0]?.eenheid||'';
                              return <tr key={i.id} onClick={()=>setSel(sel===i.id?null:i.id)}
                                className={`cursor-pointer t-hover transition-colors ${sel===i.id?'t-sel':''}`}>
                                <td className="px-3 py-2 font-medium">{i.naam}</td>
                                <td className={`px-3 py-2 text-right font-mono ${tot===0?'text-red-400':''}`}>{tot} {eenh}</td>
                              </tr>;
                            })}
                          </tbody>
                        );
                      });
                    })()
                }
              </table>
              </div>{/* /bg-white ing card */}
            </div>
            {sel && selIng && (<>
              <button className="md:hidden mb-2 flex items-center gap-1 text-sm font-semibold t-back border rounded-xl px-3 py-2 w-full transition-colors" onClick={()=>setSel(null)}>{t('btn_back')}</button>
              <div className="flex-1 min-w-0 bg-white rounded-xl shadow-card overflow-x-auto">
                <div className="px-4 py-2.5 t-hdr text-white flex items-center justify-between rounded-t-xl">
                  <span className="font-medium text-sm">{selIng.naam} — {t('ing_lots')}</span>
                  <Btn s="sm" v="header" onClick={()=>{setOntvangstInitTab('ingredienten');setOntvangstInitIngId(String(sel));setShowO(true)}}>{t('btn_add_lot')}</Btn>
                </div>
                <table className="w-full text-sm">
                  <thead className="text-xs text-gray-500 bg-gray-50">
                    <tr><th className="px-3 py-2 text-left">{t('lbl_lot_short')}</th><th className="px-3 py-2 text-right">{t('lbl_quantity_short')}</th><th className="px-3 py-2 text-left">{t('lbl_tht')}</th><th className="px-3 py-2 text-right">€/E</th></tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    {activeLots(sel).length===0 && <tr><td colSpan={4} className="px-3 py-4 text-center text-gray-400">{t('msg_no_active_lots')}</td></tr>}
                    {activeLots(sel).map(lot => {
                      const days = lot.houdbaarheid ? Math.ceil((new Date(lot.houdbaarheid)-new Date())/86400000) : null;
                      const exp = days!==null&&days<0; const soon = days!==null&&days>=0&&days<=30;
                      return <tr key={lot.id} className={`cursor-pointer t-hover transition-colors ${exp?'bg-red-50':soon?'bg-yellow-50':''}`}
                        onClick={()=>openLot(lot)}>
                        <td className="px-3 py-2">{lot.lotnummer||'—'}</td>
                        <td className="px-3 py-2 text-right font-mono">{lot.hoeveelheid} {lot.eenheid}</td>
                        <td className={`px-3 py-2 text-xs ${exp?'text-red-600':soon?'text-yellow-600':'text-gray-500'}`}>
                          {lot.houdbaarheid?fmtD(lot.houdbaarheid):'—'}{exp?' ⚠️':soon?` (${days}d)`:''}
                        </td>
                        <td className="px-3 py-2 text-right text-xs">{lot.prijs_per_eenheid?fmt(lot.prijs_per_eenheid):'—'}</td>
                      </tr>;
                    })}
                    {archiefLots(sel).length>0 && (
                      <tr>
                        <td colSpan={4} className="px-3 py-1">
                          <button className="flex items-center gap-1 text-xs font-medium text-gray-500 uppercase hover:text-gray-700 py-1"
                            onClick={()=>setArchiefOpen(p=>({...p,[sel]:!p[sel]}))}>
                            <span className="text-gray-400">{archiefOpen[sel]?'▼':'▶'}</span>
                            <span>{t('ing_archived_lots').replace('{n}',archiefLots(sel).length)}</span>
                          </button>
                        </td>
                      </tr>
                    )}
                    {archiefOpen[sel] && archiefLots(sel).map(lot => (
                      <tr key={lot.id} className="bg-gray-50 cursor-pointer hover:bg-gray-100 opacity-70"
                        onClick={()=>openLot(lot)}>
                        <td className="px-3 py-2 text-gray-500">{lot.lotnummer||'—'}</td>
                        <td className="px-3 py-2 text-right font-mono text-gray-400">{lot.hoeveelheid} {lot.eenheid} <span className="text-xs text-gray-300">({t('lbl_empty')})</span></td>
                        <td className="px-3 py-2 text-xs text-gray-400">{lot.houdbaarheid?fmtD(lot.houdbaarheid):'—'}</td>
                        <td className="px-3 py-2 text-right text-xs text-gray-400">{lot.prijs_per_eenheid?fmt(lot.prijs_per_eenheid):'—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </>)}
        </div>
      )}

      {/* ======= VERPAKKINGEN TAB ======= */}
      {tab==='verpakkingen' && (
        <div className="space-y-6">

          {/* --- Verpakkingstypes sectie --- */}
          <div>
            <div className="bg-white rounded-xl shadow-card overflow-x-auto">
              <div className={`px-4 py-2.5 t-hdr text-white font-medium text-sm flex items-center justify-between cursor-pointer select-none hover:opacity-90 ${vtIngeklapt?'rounded-xl':'rounded-t-xl'}`}
                onClick={()=>setVtIngeklapt(v=>!v)}>
                <span className="flex items-center gap-2">
                  <span className="text-white/70 text-xs">{vtIngeklapt?'▶':'▼'}</span>
                  {t('verpakking_components_section')}
                </span>
                <Btn s="sm" v="header" onClick={e=>{e.stopPropagation();setVtForm(emptyVT);setVtOnderdeel({onderdeel_id:'',aantal:'1'});setShowVEdit(null);setShowVTAdd(true)}}>{t('verpakking_add_btn')}</Btn>
              </div>
              {!vtIngeklapt && <table className="w-full text-sm">
                <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                  <tr>
                    <th className="px-3 py-2 text-left">{t('lbl_packaging')}</th>
                    <th className="px-3 py-2 text-right">{t('lbl_content')}</th>
                    <th className="px-3 py-2 text-left">{t('packaging_components')}</th>
                    <th className="px-3 py-2 text-right">{t('packaging_available')}</th>
                    <th className="px-3 py-2 text-right font-semibold text-gray-600">{t('packaging_cost_per_unit')}</th>
                    <th className="px-3 py-2"></th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {verpakkingen.length===0 && (
                    <tr><td colSpan={6} className="px-3 py-8 text-center text-gray-400">{t('msg_no_packaging')}</td></tr>
                  )}
                  {verpakkingen.map(v => {
                    const stock = vpVoorraad(v);
                    const totk = vpKosten(v);
                    return (
                      <tr key={v.id} className={stock===0?'bg-red-50':stock<=5?'bg-yellow-50':''}>
                        <td className="px-3 py-2.5 font-medium">
                          {v.naam}{v.type && <span className="ml-1.5 text-xs text-gray-400 capitalize">{v.type}</span>}
                        </td>
                        <td className="px-3 py-2.5 text-right text-gray-500">{Number(v.inhoud_liter||0)}L</td>
                        <td className="px-3 py-2.5 text-xs text-gray-500">
                          {(v.onderdelen||[]).length===0
                            ? <span className="text-gray-300">{t('packaging_no_components')}</span>
                            : (v.onderdelen||[]).map(o=>{
                                const od=onderdelen.find(d=>d.id===o.onderdeel_id);
                                return od ? <span key={o.onderdeel_id} className="inline-block mr-2">{o.aantal}× {od.naam}</span> : null;
                              })
                          }
                        </td>
                        <td className="px-3 py-2.5 text-right">
                          <span className={`font-mono font-semibold ${stock===0?'text-red-600':stock<=5?'text-yellow-600':'text-gray-800'}`}>{stock}</span>
                          {stock===0 && <span className="ml-1 text-xs text-red-400 font-normal">{t('packaging_empty')}</span>}
                          {stock>0&&stock<=5 && <span className="ml-1 text-xs text-yellow-500 font-normal">{t('packaging_low')}</span>}
                        </td>
                        <td className="px-3 py-2.5 text-right font-semibold text-sm">
                          {totk > 0 ? <span className="text-amber-700">{fmt(totk)}</span> : <span className="text-gray-300">—</span>}
                        </td>
                        <td className="px-3 py-2.5">
                          <div className="flex gap-1 justify-end">
                            <Btn s="sm" v="ghost" onClick={()=>openVTEdit(v)}>✏️</Btn>
                            <button onClick={()=>{if(confirm(t('error_confirm_delete_packaging')))setVerpakkingen(prev=>prev.filter(x=>x.id!==v.id))}}
                              className="text-red-400 hover:text-red-600 text-xs px-1.5">✕</button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>}
            </div>
          </div>

          {/* --- Onderdelen sectie --- */}
          <div>
            <div className="bg-white rounded-xl shadow-card overflow-x-auto">
              <div className={`px-4 py-2.5 t-hdr text-white font-medium text-sm flex items-center justify-between cursor-pointer select-none hover:opacity-90 ${odIngeklapt?'rounded-xl':'rounded-t-xl'}`}
                onClick={()=>setOdIngeklapt(v=>!v)}>
                <span className="flex items-center gap-2">
                  <span className="text-white/70 text-xs">{odIngeklapt?'▶':'▼'}</span>
                  {t('tab_onderdelen')}
                </span>
                <Btn s="sm" v="header" onClick={e=>{e.stopPropagation();setOdAddForm(emptyOD);setOdQty('');setOdPrijs('');setOdTotaalprijs('');setShowODAdd(true)}}>{t('onderdeel_add_btn')}</Btn>
              </div>
              {!odIngeklapt && <table className="w-full text-sm">
                <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                  <tr>
                    <th className="px-3 py-2 text-left">{t('lbl_onderdeel')}</th>
                    <th className="px-3 py-2 text-left">{t('onderdeel_type')}</th>
                    <th className="px-3 py-2 text-right">{t('lbl_stock')}</th>
                    <th className="px-3 py-2 text-right">{t('packaging_cost_per_unit')}</th>
                    <th className="px-3 py-2"></th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {onderdelen.length===0 && (
                    <tr><td colSpan={5} className="px-3 py-6 text-center text-gray-400">{t('onderdeel_none')}</td></tr>
                  )}
                  {onderdelen.map(od => (
                    <tr key={od.id} className={Number(od.voorraad||0)===0?'bg-red-50':''}>
                      <td className="px-3 py-2.5 font-medium">
                        {od.naam}
                        {(od.leverancier||od.factuurnummer) && (
                          <div className="text-xs text-gray-400 font-normal mt-0.5">
                            {od.leverancier}{od.leverancier&&od.factuurnummer&&' · '}{od.factuurnummer&&`F: ${od.factuurnummer}`}
                          </div>
                        )}
                      </td>
                      <td className="px-3 py-2.5 text-gray-500 text-xs capitalize">{od.type||'—'}</td>
                      <td className="px-3 py-2.5 text-right">
                        <span className={`font-mono font-semibold ${Number(od.voorraad||0)===0?'text-red-600':'text-gray-800'}`}>{Number(od.voorraad||0)}</span>

              {onderdelen.length === 0

                        onChange={v=>setVtOnderdeel(f=>({...f,onderdeel_id:v}))}
                        opts={onderdelen.map(o=>({v:String(o.id),l:o.naam}))} ph={t('err_no_component_selected')} />
                    </div>
                    <div className="w-24">
                      <Inp label={t('lbl_qty_needed')} type="number" value={vtOnderdeel.aantal}
                        onChange={v=>setVtOnderdeel(f=>({...f,aantal:v}))} placeholder="1" />
                    </div>
                    <Btn s="sm" onClick={()=>{
                      if (!vtOnderdeel.onderdeel_id) return;
                      const id = Number(vtOnderdeel.onderdeel_id);
                      setVtForm(f=>({...f,onderdelen:[...f.onderdelen.filter(o=>o.onderdeel_id!==id),{onderdeel_id:id,aantal:Number(vtOnderdeel.aantal)||1}]}));
                      setVtOnderdeel({onderdeel_id:'',aantal:'1'});
                    }}>{t('packaging_add_component')}</Btn>
                  </div>
                )
              }
            </div>
            <div className="flex justify-end gap-2">
              <Btn v="secondary" onClick={()=>{setShowVTAdd(false);setShowVEdit(null);}}>{t('btn_cancel')}</Btn>
              <Btn onClick={saveVTAdd}>{t('btn_save')}</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* ======= MUTATIES TAB ======= */}
      {tab==='mutaties' && (
        <div>
          <div className="bg-white rounded-xl shadow-card overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                <tr>
                  <th className="px-3 py-2 text-left">{t('lbl_date')}</th>

                  const isCorrPos = entry.type==='correctie' && Number(entry.hoeveelheid)>0;
                  const isIn = entry.type==='ontvangst'||entry.type==='terugboeking'||isCorrPos;
                  const clr = {ontvangst:'text-green-600 bg-green-50',gebruik:'text-red-600 bg-red-50',afboeking:'text-orange-600 bg-orange-50',terugboeking:'text-blue-600 bg-blue-50',correctie:'text-purple-600 bg-purple-50'};
                  const lbl = {ontvangst:'↑ '+t('mut_receipt'),gebruik:'↓ '+t('mut_usage'),afboeking:'↓ '+t('mut_booking'),terugboeking:'↑ '+t('mut_return'),correctie:isCorrPos?'↑ '+t('mut_correction'):'↓ '+t('mut_correction')};
                  return <tr key={entry.id} className="hover:bg-gray-50">
                    <td className="px-3 py-2 text-xs text-gray-500 whitespace-nowrap">{fmtD(entry.datum)}</td>
                    <td className="px-3 py-2 font-medium">{entry.ingredient_naam}</td>
                    <td className="px-3 py-2 text-xs text-gray-500">{entry.lotnummer||'—'}</td>
                    <td className="px-3 py-2">
                      <span className={`px-1.5 py-0.5 rounded text-xs font-medium ${clr[entry.type]||'text-gray-600 bg-gray-100'}`}>

                    </td>
                    <td className={`px-3 py-2 text-right font-mono text-xs font-semibold ${isIn?'text-green-600':'text-red-600'}`}>
                      {isIn?'+':'-'}{Math.abs(entry.hoeveelheid)} {entry.eenheid}
                    </td>
                    <td className="px-3 py-2 text-xs text-gray-500">{entry.referentie||'—'}</td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

      <div className={card}>
        <h2 className="text-lg font-semibold text-gray-700 mb-1">Inkoop bijlagen</h2>
        <p className="text-sm text-gray-500 mb-4">Download alle geüploade factuur­bijlagen van een bepaald jaar als ZIP-bestand.</p>
        <div className="flex flex-wrap items-end gap-3">
          <div>
            <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Jaar</label>
            <select value={bijlagenJaar} onChange={e=>setBijlagenJaar(Number(e.target.value))}
              className="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none t-input shadow-sm">
              {bijlagenJaren.map(y=>(
                <option key={y} value={y}>{y}{bijlagenPerJaar[y] ? ` (${bijlagenPerJaar[y]} bijlage${bijlagenPerJaar[y]>1?'n':''})` : ' (geen bijlagen)'}</option>
              ))}
            </select>
          </div>
          <button
            disabled={!bijlagenPerJaar[bijlagenJaar] || bijlagenStatus==='Bezig…'}
            onClick={async()=>{
              setBijlagenStatus('Bezig…');
              try {
                const resp = await fetch(`${ADDON_BASE}api/download_bijlagen/${bijlagenJaar}`);
                const ct = resp.headers.get('content-type')||'';
                if (ct.includes('zip')) {
                  const blob = await resp.blob();
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a');
                  a.href = url; a.download = `bijlagen_${bijlagenJaar}.zip`; a.click();
                  URL.revokeObjectURL(url);
                  setBijlagenStatus('');
                } else {
                  const err = await resp.json().catch(()=>({}));
                  setBijlagenStatus(err.error==='no_bijlagen'
                    ? `Geen bijlagen gevonden voor ${bijlagenJaar}.`
                    : 'Download mislukt.');
                  setTimeout(()=>setBijlagenStatus(''),4000);
                }
              } catch(e) {
                setBijlagenStatus('Download mislukt.');
                setTimeout(()=>setBijlagenStatus(''),4000);
              }
            }}
            className="flex items-center gap-2 px-4 py-2 bg-amber-700 text-white rounded text-sm font-medium hover:bg-amber-800 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
            ⬇ ZIP downloaden
          </button>
          {bijlagenStatus && <span className="text-sm text-gray-500">{bijlagenStatus}</span>}
        </div>
      </div>

      {/* Mutaties log */}
      <div className={card}>
        <h2 className="text-lg font-semibold text-gray-700 mb-1">{t('settings_data_log_title')}</h2>
        <p className="text-sm text-gray-500 mb-4">
          {t('settings_log_count').replace('{n}',(log||[]).length)}
        </p>
        <button onClick={clearLog}
          disabled={!(log||[]).length}
          className="px-4 py-2 bg-red-600 text-white rounded text-sm font-medium hover:bg-red-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
          {t('settings_log_clear')}
        </button>
        <p className="text-xs text-gray-400 mt-2">{t('settings_log_warning')}</p>
      </div>

      </>}

      <div className="pt-2 pb-2 text-center text-xs text-gray-400">
        {t('settings_footer_by')} · <a href="mailto:info@craftery.nl" className="underline hover:text-gray-600">info@craftery.nl</a>
      </div>
      </div>
    </div>
  );
}

// ===== BOEKHOUDING =====
function BoekhoudingPage({wcCreds, inkoopFacturen=[], setInkoopFacturen=()=>{}, ing=[], onderdelen=[], btwInst={}}) {
  const [orders, setOrders] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const now = new Date();
  const firstOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
  const [dateFrom, setDateFrom] = React.useState(firstOfMonth);
  const [dateTo, setDateTo] = React.useState(now.toISOString().slice(0,10));
  const [statusFilter, setStatusFilter] = React.useState('completed');
  const [activeView, setActiveView] = React.useState('orders');
  const [mainTab, setMainTab] = React.useState('verkoop');
  const [inkoopView, setInkoopView] = React.useState('facturen');
  const [inkoopSortDesc, setInkoopSortDesc] = React.useState(true);
  const [expandedFactuur, setExpandedFactuur] = React.useState(null);
  // Aangiftes tab state
  const [aangifteYear, setAangifteYear] = React.useState(new Date().getFullYear());
  const [aangifteOrders, setAangifteOrders] = React.useState([]);
  const [aangifteLoading, setAangifteLoading] = React.useState(false);
  const [aangifteError, setAangifteError] = React.useState('');
  const [aangifteFetched, setAangifteFetched] = React.useState(false);
  const [showVrijeFactuur, setShowVrijeFactuur] = React.useState(false);
  const [bijlageUploading, setBijlageUploading] = React.useState(null); // factuur id

  const uploadBijlageVoorFactuur = async (factuurId, file) => {
    setBijlageUploading(factuurId);
    try {
      const ext = (file.name.split('.').pop()||'').toLowerCase().replace(/[^a-z0-9]/g,'');
      const filename = `${factuurId}_${Date.now()}.${ext||'bin'}`;
      const b64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
      const resp = await fetch(`${ADDON_BASE}api/upload/${filename}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({data: b64}),
      });
      if (resp.ok) {
        setInkoopFacturen(prev => prev.map(f =>
          f.id === factuurId ? {...f, bijlage: {naam: file.name, bestand: filename}} : f
        ));
      }
    } catch(e) { console.error('Upload mislukt', e); }
    setBijlageUploading(null);
  };

  const knownLeveranciers = React.useMemo(() =>
    [...new Set(inkoopFacturen.map(f=>f.leverancier).filter(Boolean))].sort(), [inkoopFacturen]);

  const totals = React.useMemo(() => orders.reduce((acc, o) => {
    acc.omzet  += parseFloat(o.total||0) - parseFloat(o.total_tax||0);
    acc.btw    += parseFloat(o.total_tax||0);
    acc.totaal += parseFloat(o.total||0);
    acc.korting    += parseFloat(o.discount_total||0);
    acc.verzending += parseFloat(o.shipping_total||0);
    return acc;
  }, {omzet:0, btw:0, totaal:0, korting:0, verzending:0}), [orders]);

  const productTotals = React.useMemo(() => {
    const map = {};
    orders.forEach(o => (o.line_items||[]).forEach(item => {
      const key = item.sku || item.name;
      if (!map[key]) map[key] = {naam:item.name, sku:item.sku||'', stuks:0, omzet:0, btw:0};
      map[key].stuks += Number(item.quantity||0);
      map[key].omzet += parseFloat(item.total||0);
      map[key].btw   += parseFloat(item.total_tax||0);
    }));
    return Object.values(map).sort((a,b) => b.omzet - a.omzet);
  }, [orders]);

  const fetchOrders = async () => {
    if (!wcCreds?.enabled || !wcCreds.storeUrl) {
      setError('WooCommerce is niet ingesteld. Ga naar Instellingen om de koppeling te activeren.');
      return;
    }
    setLoading(true); setError('');
    try {
      const all = [];
      let pg = 1;
      while (true) {
        const qs = `orders?per_page=100&page=${pg}&status=${statusFilter}&after=${dateFrom}T00:00:00&before=${dateTo}T23:59:59&orderby=date&order=desc`;
        const batch = await wcGet(qs);
        all.push(...batch);
        if (batch.length < 100) break;
        pg++;
      }
      setOrders(all);
    } catch(e) { setError('Fout bij ophalen: ' + e.message); }
    finally { setLoading(false); }
  };

  const exportCSV = () => {
    const hdr = ['Bestellingsnr.','Datum','Klant','E-mail','Bedrijf','Status','Betaalmethode','Excl. BTW','BTW','Verzending','Korting','Totaal'];
    const rows = orders.map(o => [
      o.number,
      (o.date_paid||o.date_created||'').slice(0,10),
      `${o.billing?.first_name||''} ${o.billing?.last_name||''}`.trim(),
      o.billing?.email||'',
      o.billing?.company||'',
      o.status,
      o.payment_method_title||'',
      (parseFloat(o.total||0)-parseFloat(o.total_tax||0)).toFixed(2),
      parseFloat(o.total_tax||0).toFixed(2),
      parseFloat(o.shipping_total||0).toFixed(2),
      parseFloat(o.discount_total||0).toFixed(2),
      parseFloat(o.total||0).toFixed(2),
    ]);
    const csv = [hdr,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'})),download:`bestellingen_${dateFrom}_${dateTo}.csv`});
    a.click();
  };

  // ── Inkoop computed values ──────────────────────────────────────────────
  const inkoopGefilterd = React.useMemo(() =>
    inkoopFacturen
      .filter(f => f.datum >= dateFrom && f.datum <= dateTo)
      .sort((a,b) => inkoopSortDesc ? b.datum.localeCompare(a.datum) : a.datum.localeCompare(b.datum)),
    [inkoopFacturen, dateFrom, dateTo, inkoopSortDesc]
  );

  const inkoopTotals = React.useMemo(() =>
    inkoopGefilterd.reduce((s,f) => ({
      netto: s.netto + (f.totaal_netto||0),
      btw:   s.btw   + (f.totaal_btw||0),
      bruto: s.bruto + (f.totaal_bruto||0),
    }), {netto:0, btw:0, bruto:0}),
    [inkoopGefilterd]
  );

  const btwPerTarief = React.useMemo(() => {
    const map = {};
    inkoopGefilterd.forEach(f => (f.regels||[]).forEach(r => {
      const k = r.btw_tarief ?? 0;
      if (!map[k]) map[k] = {tarief:k, netto:0, btw:0};
      map[k].netto += r.netto||0;
      map[k].btw   += r.btw_bedrag||0;
    }));
    return Object.values(map).sort((a,b)=>a.tarief-b.tarief);
  }, [inkoopGefilterd]);

  const exportInkoopCSV = () => {
    const hdr = ['Datum','Factuurnummer','Leverancier','Netto excl. BTW','BTW%','BTW bedrag','Bruto incl. BTW'];
    const rows = [];
    inkoopGefilterd.forEach(f => {
      (f.regels||[]).forEach(r => rows.push([
        f.datum, f.factuurnummer, f.leverancier,
        r.netto.toFixed(2), r.btw_tarief, r.btw_bedrag.toFixed(2),
        (r.netto+r.btw_bedrag).toFixed(2),
      ]));
    });
    const csv = [hdr,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'})),download:`inkoop_${dateFrom}_${dateTo}.csv`});
    a.click();
  };

  const deleteFactuur = (id) => {
    if (!confirm('Inkoop factuur verwijderen?')) return;
    const f = inkoopFacturen.find(x=>x.id===id);
    if (f?.bijlage?.bestand) {
      fetch(`${ADDON_BASE}api/delete_upload/${f.bijlage.bestand}`, {method:'POST', body:'{}'}).catch(()=>{});
    }
    setInkoopFacturen(prev => prev.filter(f=>f.id!==id));
    if (expandedFactuur===id) setExpandedFactuur(null);
  };

  const saveVrijeFactuur = ({factuurForm, productLijst, verpakkingLijst, vrijeRegels, bijlage}) => {
    const regels = [];
    productLijst.forEach(p => {
      const netto = parseFloat(p.totaalprijs) || (Number(p.prijs||0) * Number(p.qty||0));
      const btw_tarief = Number(p.btw_tarief)||0;
      regels.push({naam: p._naam||p.nieuw||'', type: 'ingredient', netto, btw_tarief, btw_bedrag: +(netto*btw_tarief/100).toFixed(2)});
    });
    verpakkingLijst.forEach(v => {
      const netto = parseFloat(v.totaalprijs) || (Number(v.prijs_per_stuk||0) * Number(v.aantal||0));
      const btw_tarief = Number(v.btw_tarief)||0;
      regels.push({naam: v._naam||v.naam||'', type: 'verpakking', netto, btw_tarief, btw_bedrag: +(netto*btw_tarief/100).toFixed(2)});
    });
    vrijeRegels.forEach(r => {
      const netto = parseFloat(r.netto)||0;
      const btw_tarief = Number(r.btw_tarief)||0;
      regels.push({naam: r.naam.trim(), type: 'overig', netto, btw_tarief, btw_bedrag: +(netto*btw_tarief/100).toFixed(2)});
    });
    if (!regels.length) return;
    const totaal_netto = regels.reduce((s,r)=>s+r.netto, 0);
    const totaal_btw = regels.reduce((s,r)=>s+r.btw_bedrag, 0);
    setInkoopFacturen(prev => [...prev, {
      id: newId(prev),
      datum: factuurForm.datum || now.toISOString().slice(0,10),
      factuurnummer: factuurForm.factuur || '',
      leverancier: factuurForm.leverancier || '',
      regels,
      totaal_netto,
      totaal_btw,
      totaal_bruto: totaal_netto + totaal_btw,
      bijlage,
    }]);
    setShowVrijeFactuur(false);
  };

  // ── Aangiftes helpers ──────────────────────────────────────────────────────
  const getPeriodes = (year, periode) => {
    if (periode === 'maand') {
      const namen = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
      return Array.from({length:12}, (_,i) => {
        const m = String(i+1).padStart(2,'0');
        const lastDay = new Date(year, i+1, 0).getDate();
        return {label: namen[i], from:`${year}-${m}-01`, to:`${year}-${m}-${String(lastDay).padStart(2,'0')}`, key:`${year}-M${m}`};
      });
    }
    return [
      {label:'Q1', from:`${year}-01-01`, to:`${year}-03-31`, key:`${year}-Q1`},
      {label:'Q2', from:`${year}-04-01`, to:`${year}-06-30`, key:`${year}-Q2`},
      {label:'Q3', from:`${year}-07-01`, to:`${year}-09-30`, key:`${year}-Q3`},
      {label:'Q4', from:`${year}-10-01`, to:`${year}-12-31`, key:`${year}-Q4`},
    ];
  };

  const fetchJaarordrers = async (year) => {
    if (!wcCreds?.enabled || !wcCreds.storeUrl) { setAangifteError('WooCommerce niet actief — zie Instellingen.'); return; }
    setAangifteLoading(true); setAangifteError('');
    try {
      const all = [];
      let pg = 1;
      while (true) {
        const qs = `orders?per_page=100&page=${pg}&status=any&after=${year}-01-01T00:00:00&before=${year}-12-31T23:59:59&orderby=date&order=desc`;
        const batch = await wcGet(qs);
        all.push(...batch);
        if (batch.length < 100) break;
        pg++;
      }
      setAangifteOrders(all);
      setAangifteFetched(true);
    } catch(e) { setAangifteError('Fout bij ophalen: ' + e.message); }
    finally { setAangifteLoading(false); }
  };

  const fmt = n => '€\u00a0' + Number(n).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  const fmtDate = s => s ? s.slice(0,10) : '';
  const STATUS_LABELS = {completed:'Afgerond',processing:'In behandeling','on-hold':'In de wacht',cancelled:'Geannuleerd',refunded:'Terugbetaald',failed:'Mislukt',pending:'In afwachting'};
  const STATUS_COLORS = {completed:'bg-green-100 text-green-700',processing:'bg-blue-100 text-blue-700','on-hold':'bg-yellow-100 text-yellow-700',cancelled:'bg-gray-100 text-gray-500',refunded:'bg-orange-100 text-orange-700',failed:'bg-red-100 text-red-600',pending:'bg-purple-100 text-purple-600'};
  const card = 'bg-white rounded-2xl shadow-sm border border-gray-100 p-5';

  // (no early return — Inkoop tab is always available)

  return (
    <div className="max-w-7xl mx-auto px-4 py-6 space-y-5">

      {/* Header + hoofd-tabs */}
      <div className="flex items-center justify-between flex-wrap gap-3">
        <h2 className="text-xl font-bold text-gray-800">
          {t('nav_boekhouding')}
          {mainTab==='aangiftes' && <span className="ml-2 text-base font-normal text-gray-400">{aangifteYear}</span>}
        </h2>
        <div className="flex gap-2">
          {[{id:'verkoop',l:'Verkoop'},{id:'inkoop',l:'Inkoop'},{id:'aangiftes',l:'Aangiftes'}].map(tab=>(
            <button key={tab.id} onClick={()=>setMainTab(tab.id)}
              className={`px-5 py-2 rounded-xl text-sm font-semibold transition-colors ${mainTab===tab.id?'tbtn shadow':'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
              {tab.l}
            </button>
          ))}
        </div>
      </div>

      {/* ══════════════════════ VERKOOP ══════════════════════ */}
      {mainTab==='verkoop' && (<>

        {/* Filter */}
        <div className={card}>
          <div className="flex flex-wrap items-end gap-4">
            <div>
              <label className="block text-xs font-medium text-gray-500 mb-1">Van</label>
              <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}
                className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm t-input focus:outline-none" />
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-500 mb-1">Tot</label>
              <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}
                className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm t-input focus:outline-none" />
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-500 mb-1">Status</label>
              <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}
                className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm t-input focus:outline-none">
                <option value="any">Alle statussen</option>
                <option value="completed">Afgerond</option>
                <option value="processing">In behandeling</option>
                <option value="on-hold">In de wacht</option>
                <option value="refunded">Terugbetaald</option>
                <option value="cancelled">Geannuleerd</option>
              </select>
            </div>
            {wcCreds?.enabled
              ? <button onClick={fetchOrders} disabled={loading}
                  className="px-5 py-1.5 tbtn rounded-lg text-sm font-medium disabled:opacity-50 transition-colors">
                  {loading ? 'Ophalen…' : 'Ophalen'}
                </button>
              : <span className="text-xs text-orange-600 italic">WooCommerce niet actief — zie Instellingen</span>
            }
            {orders.length > 0 && (
              <button onClick={exportCSV} className="ml-auto px-4 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-medium transition-colors">
                ↓ CSV ({orders.length})
              </button>
            )}
          </div>
          {error && <p className="mt-3 text-sm text-red-600">{error}</p>}
        </div>

        {/* Samenvattingskaartjes */}
        {orders.length > 0 && (
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
            {[
              {label:'Omzet excl. BTW', val:totals.omzet,      cls:'text-green-700 font-bold'},
              {label:'BTW',             val:totals.btw,         cls:'text-blue-700'},
              {label:'Verzending',      val:totals.verzending,  cls:'text-gray-700'},
              {label:'Korting',         val:-totals.korting,    cls:'text-orange-600'},
              {label:'Totaal incl. BTW',val:totals.totaal,      cls:'text-gray-900 font-bold'},
            ].map(s => (
              <div key={s.label} className={card + ' text-center py-4'}>
                <div className={`text-base font-semibold ${s.cls}`}>{fmt(s.val)}</div>
                <div className="text-xs text-gray-400 mt-0.5">{s.label}</div>
                <div className="text-xs text-gray-300 mt-0.5">{orders.length} bestellingen</div>
              </div>
            ))}
          </div>
        )}

        {orders.length > 0 && (<>
          {/* Subtabs verkoop */}
          <div className="flex gap-2 flex-wrap">
            {[{id:'orders',l:'Bestellingen'},{id:'producten',l:'Per product'},{id:'betaling',l:'Per betaalmethode'}].map(v=>(
              <button key={v.id} onClick={()=>setActiveView(v.id)}
                className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${activeView===v.id?'tbtn':'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
                {v.l}
              </button>
            ))}
          </div>

          {/* Bestellingen */}
          {activeView==='orders' && (
            <div className={card + ' overflow-x-auto'}>
              <table className="w-full text-sm min-w-[700px]">
                <thead>
                  <tr className="border-b border-gray-100 text-xs text-gray-500 uppercase tracking-wide">
                    <th className="py-2 pr-3 text-left font-medium">#</th>
                    <th className="py-2 pr-3 text-left font-medium">Datum</th>
                    <th className="py-2 pr-3 text-left font-medium">Klant</th>
                    <th className="py-2 pr-3 text-left font-medium">Betaalmethode</th>
                    <th className="py-2 pr-3 text-left font-medium">Status</th>
                    <th className="py-2 pr-3 text-right font-medium">Excl. BTW</th>
                    <th className="py-2 pr-3 text-right font-medium">BTW</th>
                    <th className="py-2 text-right font-medium">Totaal</th>
                  </tr>
                </thead>
                <tbody>
                  {orders.map(o => (
                    <tr key={o.id} className="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                      <td className="py-2 pr-3 text-gray-400 text-xs">#{o.number}</td>
                      <td className="py-2 pr-3 text-gray-600 whitespace-nowrap">{fmtDate(o.date_paid||o.date_created)}</td>
                      <td className="py-2 pr-3">
                        <div className="font-medium text-gray-800">{(`${o.billing?.first_name||''} ${o.billing?.last_name||''}`).trim()||'—'}</div>
                        {o.billing?.company && <div className="text-xs text-gray-400">{o.billing.company}</div>}
                      </td>
                      <td className="py-2 pr-3 text-gray-500 text-xs whitespace-nowrap">{o.payment_method_title||'—'}</td>
                      <td className="py-2 pr-3">
                        <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${STATUS_COLORS[o.status]||'bg-gray-100 text-gray-500'}`}>
                          {STATUS_LABELS[o.status]||o.status}
                        </span>
                      </td>
                      <td className="py-2 pr-3 text-right text-gray-700 whitespace-nowrap">{fmt(parseFloat(o.total||0)-parseFloat(o.total_tax||0))}</td>
                      <td className="py-2 pr-3 text-right text-gray-500 whitespace-nowrap">{fmt(o.total_tax||0)}</td>
                      <td className="py-2 text-right font-semibold text-gray-800 whitespace-nowrap">{fmt(o.total||0)}</td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr className="border-t-2 border-gray-200">
                    <td colSpan={5} className="py-2 pr-3 text-right text-xs font-semibold text-gray-500 uppercase">Totaal ({orders.length})</td>
                    <td className="py-2 pr-3 text-right font-bold text-gray-800">{fmt(totals.omzet)}</td>
                    <td className="py-2 pr-3 text-right font-semibold text-gray-600">{fmt(totals.btw)}</td>
                    <td className="py-2 text-right font-bold text-gray-900">{fmt(totals.totaal)}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          )}

          {/* Per product */}
          {activeView==='producten' && (
            <div className={card + ' overflow-x-auto'}>
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-100 text-xs text-gray-500 uppercase tracking-wide">
                    <th className="py-2 pr-3 text-left font-medium">Product</th>
                    <th className="py-2 pr-3 text-left font-medium">SKU</th>
                    <th className="py-2 pr-3 text-right font-medium">Stuks</th>
                    <th className="py-2 pr-3 text-right font-medium">Omzet excl. BTW</th>
                    <th className="py-2 text-right font-medium">BTW</th>
                  </tr>
                </thead>

      {mainTab==='aangiftes' && (()=>{

        const today = now.toISOString().slice(0,10);

        return (<>
          {/* Jaar-selector + ophaalknop */}

            <div className="flex flex-wrap items-center gap-4">
              <div className="flex items-center gap-2">

                ? <button onClick={()=>fetchJaarordrers(aangifteYear)} disabled={aangifteLoading}

                  </button>
                : <span className="ml-auto text-xs text-orange-600 italic">WooCommerce niet actief — verkoop BTW niet beschikbaar</span>
              }
            </div>
            {aangifteError && <p className="mt-2 text-sm text-red-600">{aangifteError}</p>}
            {aangifteFetched && <p className="mt-2 text-xs text-green-600">✓ {aangifteOrders.length} bestellingen geladen voor {aangifteYear}</p>}
          </div>

          {/* Periode-kaarten */}
          <div className={`grid gap-4 ${periode==='maand' ? 'grid-cols-1 sm:grid-cols-2 lg:grid-cols-3' : 'grid-cols-1 sm:grid-cols-2'}`}>
            {periodes.map(p => {
              // Verkoop BTW voor deze periode
              const pOrders = aangifteOrders.filter(o => {
                const d = (o.date_paid||o.date_created||'').slice(0,10);
                return d >= p.from && d <= p.to && ['completed','processing'].includes(o.status);
              });
              const verkoopBtw   = pOrders.reduce((s,o)=>s+parseFloat(o.total_tax||0), 0);
              const verkoopNetto = pOrders.reduce((s,o)=>s+parseFloat(o.total||0)-parseFloat(o.total_tax||0), 0);

              // Inkoop voorbelasting
              const pFacturen = inkoopFacturen.filter(f => f.datum >= p.from && f.datum <= p.to);
              const voorbelasting = pFacturen.reduce((s,f)=>s+(f.totaal_btw||0), 0);
              const inkoopNetto   = pFacturen.reduce((s,f)=>s+(f.totaal_netto||0), 0);

              const teBetalen = verkoopBtw - voorbelasting;

              // Periode status
              const isFuture  = p.from > today;
              const isCurrent = p.from <= today && p.to >= today;
              const isPast    = p.to < today;

              const statusCls = isFuture
                ? 'bg-gray-50 border-gray-100'
                : isCurrent
                  ? 'bg-blue-50 border-blue-100'
                  : isPast
                    ? 'bg-white border-gray-100'
                    : 'bg-white border-gray-100';

              const badgeCls = isFuture
                ? 'bg-gray-100 text-gray-400'
                : isCurrent
                  ? 'bg-blue-100 text-blue-700'
                  : 'bg-gray-100 text-gray-500';

              const badgeLabel = isFuture ? 'Toekomstig' : isCurrent ? 'Lopend' : 'Afgesloten';

              return (
                <div key={p.key} className={`rounded-2xl border shadow-sm p-5 space-y-3 ${statusCls}`}>
                  {/* Header */}
                  <div className="flex items-start justify-between">
                    <div>
                      <div className="text-lg font-bold text-gray-800">{p.label} <span className="text-sm font-normal text-gray-400">{aangifteYear}</span></div>
                      <div className="text-xs text-gray-400">{p.from} t/m {p.to}</div>
                    </div>
                    <span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${badgeCls}`}>{badgeLabel}</span>
                  </div>

                  {/* Cijfers */}
                  <div className="grid grid-cols-3 gap-2 text-center">
                    <div className="bg-white/70 rounded-xl p-2">
                      <div className="text-xs text-gray-400 mb-0.5">Omzet-BTW</div>
                      <div className={`text-sm font-bold ${aangifteFetched ? 'text-gray-800' : 'text-gray-300'}`}>
                        {aangifteFetched ? fmt(verkoopBtw) : '—'}
                      </div>
                      {aangifteFetched && <div className="text-xs text-gray-400">{pOrders.length} best.</div>}
                    </div>
                    <div className="bg-white/70 rounded-xl p-2">
                      <div className="text-xs text-gray-400 mb-0.5">Voorbelasting</div>
                      <div className="text-sm font-bold text-blue-700">{fmt(voorbelasting)}</div>
                      <div className="text-xs text-gray-400">{pFacturen.length} fact.</div>
                    </div>
                    <div className="bg-white/70 rounded-xl p-2">
                      <div className="text-xs text-gray-400 mb-0.5">Te betalen</div>
                      {aangifteFetched
                        ? <div className={`text-sm font-bold ${teBetalen >= 0 ? 'text-orange-600' : 'text-green-600'}`}>
                            {fmt(Math.abs(teBetalen))}
                          </div>
                        : <div className="text-sm font-bold text-gray-300">—</div>
                      }
                      {aangifteFetched && (
                        <div className={`text-xs font-medium ${teBetalen >= 0 ? 'text-orange-500' : 'text-green-500'}`}>
                          {teBetalen >= 0 ? 'te betalen' : 'terug'}
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Detail inkoop */}
                  {pFacturen.length > 0 && (
                    <div className="text-xs text-gray-400 border-t border-gray-100 pt-2">
                      Inkoop netto: <span className="font-medium text-gray-600">{fmt(inkoopNetto)}</span>
                      {aangifteFetched && <> · Verkoop netto: <span className="font-medium text-gray-600">{fmt(verkoopNetto)}</span></>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {!wcCreds?.enabled && inkoopFacturen.length === 0 && (
            <div className={card + ' text-center py-14'}>
              <div className="text-4xl mb-3">📋</div>
              <p className="text-gray-600 font-medium mb-1">Nog geen aangifte-data</p>
              <p className="text-gray-400 text-sm">Voeg inkoop facturen toe via de Inkoop tab, of koppel WooCommerce voor verkoopcijfers.</p>
            </div>
          )}
        </>);
      })()}

    </div>
  );
}

  const [page, setPage] = useState('dashboard');
  const importRef = useRef(null);
  const bfAutoSynced = React.useRef(false);

  React.useEffect(() => {
    if (bfAutoSynced.current || !bfCreds?.enabled || !bfCreds.userId || !bfCreds.apiKey) return;
    if (!bat || !bi) return;
    bfAutoSynced.current = true;
    (async () => {
      try {
        const bfBatches = await bfGetBatches();
        const newBatches=[], newBis=[], updBatches=[];
        for (const bfB of bfBatches) {
          const existing = bat.find(b => b.brewfather_id === bfB._id ||
            (bfB.batchNo != null && String(b.batch_nummer) === String(bfB.batchNo)));
          const appStatus = BF_TO_APP[bfB.status] || 'Gepland';
          if (!existing) {
            const nb = {...bfMapBatch(bfB), id: newId([...bat, ...newBatches])};
            newBatches.push(nb);
            const nbis = bfMapBis(bfB, nb.id, newId([...bi, ...newBis]) + newBis.length);
            newBis.push(...nbis);
          } else {
            const ch = {brewfather_id: bfB._id};
            if (existing.status !== appStatus) ch.status = appStatus;
            if (bfB.measuredBatchSize) ch.liter_vergist = bfNumSafe(bfB.measuredBatchSize);
            if (bfB.measuredOg)  ch.OG  = bfNumSafe(bfB.measuredOg);
            if (bfB.measuredFg)  ch.FG  = bfNumSafe(bfB.measuredFg);
            if (bfB.measuredAbv) ch.ABV = bfNumSafe(bfB.measuredAbv);
            if (bfB.measuredBrewhouseEfficiency != null) ch.brouwzaal_eff = bfNumSafe(bfB.measuredBrewhouseEfficiency);
            else if (bfB.estimatedBrewhouseEfficiency != null && !existing.brouwzaal_eff) ch.brouwzaal_eff = bfNumSafe(bfB.estimatedBrewhouseEfficiency);
            if (bfB.measuredMashEfficiency != null) ch.maisch_eff = bfNumSafe(bfB.measuredMashEfficiency);
            if (bfB.measuredMashPh != null) ch.maisch_ph = bfNumSafe(bfB.measuredMashPh);
            if (bfB.measuredFermentationPh != null) ch.product_ph = bfNumSafe(bfB.measuredFermentationPh);
            else if (bfB.measuredPh != null && !existing.product_ph) ch.product_ph = bfNumSafe(bfB.measuredPh);
            { const _rawN=bfB.notes||bfB.tasteNotes; if (_rawN && !existing.notities) { ch.notities = Array.isArray(_rawN)?_rawN.map(x=>typeof x==='string'?x:(x?.note||x?.text||x?.message||'')).filter(Boolean).join('\n'):(typeof _rawN==='object'&&_rawN?String(_rawN.$string||_rawN.text||_rawN.note||''):String(_rawN||'')); } }
            updBatches.push({id: existing.id, ch});
          }
        }
        if (newBatches.length) setBat(prev => [...prev, ...newBatches]);
        if (newBis.length)     setBi(prev  => [...prev, ...newBis]);
        if (updBatches.length) setBat(prev => prev.map(b => {
          const u = updBatches.find(x=>x.id===b.id); return u ? {...b, ...u.ch} : b;
        }));
        setBfCreds(prev => ({...prev, lastSync: tod()}));

    })();

        {page==='voorraad' && <VoorraadPage bat={bat} uit={uit} setUit={setUit} acc={acc} setAcc={setAcc} archief={archief} setArchief={setArchief} geslotenBieren={geslotenBieren} setGeslotenBieren={setGeslotenBieren} archiefIngeklapt={archiefIngeklapt} setArchiefIngeklapt={setArchiefIngeklapt} artikelen={artikelen} setArtikelen={setArtikelen} wcCreds={wcCreds} setWcCreds={setWcCreds} wcSyncLog={wcSyncLog} setWcSyncLog={setWcSyncLog} />}
        {page==='accijns' && <AccijnsPage bat={bat} acc={acc} setAcc={setAcc} />}
        {page==='boekhouding' && <BoekhoudingPage wcCreds={wcCreds} inkoopFacturen={inkoopFacturen} setInkoopFacturen={setInkoopFacturen} ing={ing} onderdelen={onderdelen} btwInst={btwInst} />}
        {page==='instellingen' && <InstellingenPage accijnsInst={accijnsInst} setAccijnsInst={setAccijnsInst} log={log} setLog={setLog} doExport={doExport} doImport={doImport} importRef={importRef} logo={logo} setLogo={setLogo} appName={appName} setAppName={setAppName} bfCreds={bfCreds} setBfCreds={setBfCreds} tanks={tanks} setTanks={setTanks} hygieneItems={hygieneItems} setHygieneItems={setHygieneItems} hygieneGroups={hygieneGroups} setHygieneGroups={setHygieneGroups} wcCreds={wcCreds} setWcCreds={setWcCreds} wcSyncLog={wcSyncLog} setWcSyncLog={setWcSyncLog} lang={lang} setLang={setLang} navTheme={navTheme} setNavTheme={setNavTheme} btwInst={btwInst} setBtwInst={setBtwInst} inkoopFacturen={inkoopFacturen} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>

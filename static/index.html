          const beschik = Math.max(0, Number(u.aantal||0) - Number(u.verkocht_stuks||0));
          if (beschik <= 0) continue;
          const extra = Math.min(beschik, teDelen);
          updates[u.id] = Number(u.verkocht_stuks||0) + extra;
          teDelen -= extra;
        }
        if (Object.keys(updates).length) {
          setUit(prev=>prev.map(u=>updates[u.id]!==undefined ? {...u, verkocht_stuks: updates[u.id]} : u));
          bijgewerkt += Object.keys(updates).length;
        }
      }
      setWcCreds(prev=>({...prev, lastSync: new Date().toISOString()}));
      const pullMsg = `${bijgewerkt} uitslag${bijgewerkt!==1?'en':''} bijgewerkt`;
      setWcSyncMsg(`✓ Pull klaar — ${pullMsg}`);
      addWcLog('pull', `↓ Pull verkopen — ${pullMsg}`);
    } catch(e) {
      setWcSyncMsg(`⚠ Pull mislukt: ${e.message}`);
      addWcLog('fout', `↓ Pull mislukt — ${e.message}`);
    }
    setWcSyncing(false);
    setTimeout(()=>setWcSyncMsg(''), 6000);
  };

  // Summary cards: totals per verpakking_type — inclusief gearchiveerde (volledig verkocht)
  const allTypes = [...new Set([
    ...uit.map(u=>u.verpakking_type),
    ...(archief||[]).map(a=>a.verpakking_type),
  ])].sort();
  const typeStat = (type) => {
    const rows     = uit.filter(u=>u.verpakking_type===type);
    const archRows = (archief||[]).filter(a=>a.verpakking_type===type);
    const totUit  = rows.reduce((s,u)=>s+Number(u.aantal||0),0)
                  + archRows.reduce((s,a)=>s+Number(a.aantal||0),0);
    const totVerk = rows.reduce((s,u)=>s+Number(u.verkocht_stuks||0),0)
                  + archRows.reduce((s,a)=>s+Number(a.aantal||0),0); // archief = alles verkocht
    return {totUit, totVerk, beschikbaar: totUit-totVerk};
  };

  const VerkochInput = ({u}) => {
    const n     = Number(u.aantal||0);
    const verk  = Number(u.verkocht_stuks||0);
    const beschik = n - verk;
    return (
      <div className="flex flex-wrap items-center gap-x-3 gap-y-1 mt-2">
        <span className="text-xs text-gray-500 font-medium">{t('stock_sold')}:</span>
        <div className="flex items-center gap-1">
          <button onClick={()=>setVerkocht(u.id, verk-1)} disabled={verk===0}
            className="w-6 h-6 rounded bg-gray-200 hover:bg-gray-300 text-sm font-bold leading-none disabled:opacity-30 flex items-center justify-center">−</button>
          <input
            type="number" min="0" max={n} value={verk}
            onChange={e=>setVerkocht(u.id, e.target.value)}
            className="w-14 border border-gray-300 rounded px-1 py-0.5 text-sm text-center t-input font-mono"
          />
          <button onClick={()=>setVerkocht(u.id, verk+1)} disabled={verk>=n}
            className="w-6 h-6 rounded bg-green-200 hover:bg-green-300 text-sm font-bold leading-none disabled:opacity-30 flex items-center justify-center">+</button>
        </div>
        <span className="text-xs text-gray-400">{t('lbl_of')} {n}</span>
        {beschik > 0
          ? <span className="text-xs font-medium text-amber-600">{beschik}× {t('lbl_available')}</span>
          : <span className="text-xs font-medium text-green-600">{t('stock_all_sold')}</span>
        }
        {verk > 0 && beschik > 0 && (
          <button onClick={()=>setVerkocht(u.id, n)} className="text-xs text-gray-400 hover:text-green-600 underline ml-1">{t('stock_sell_all')}</button>
        )}
      </div>
    );
  };

  const visibleUit = uit.filter(u => !filterBatch || u.batch_id === Number(filterBatch));

  return (
    <div>
      <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
        <h2 className="text-xl font-bold text-gray-800">{t('nav_voorraad')}</h2>
        <div className="flex items-center gap-2 flex-wrap">
          {wcCreds?.enabled && (
            <>
              <button onClick={wcPushAll} disabled={wcSyncing}
                title={t('wc_push_stock_title')}
                className="flex items-center gap-1.5 px-3 py-1.5 bg-purple-600 text-white rounded text-sm font-medium hover:bg-purple-700 transition-colors disabled:opacity-40">
                {wcSyncing ? '⏳ Bezig…' : '↑ Push voorraad'}
              </button>
              <button onClick={wcPullSales} disabled={wcSyncing}
                title={t('wc_pull_sales_title')}
                className="flex items-center gap-1.5 px-3 py-1.5 bg-purple-500 text-white rounded text-sm font-medium hover:bg-purple-600 transition-colors disabled:opacity-40">
                {wcSyncing ? '⏳ Bezig…' : '↓ Pull verkopen'}
              </button>
            </>
          )}
          {wcSyncMsg && <span className={`text-xs font-medium ${wcSyncMsg.startsWith('✓')?'text-green-600':'text-red-500'}`}>{wcSyncMsg}</span>}
          <Sel value={filterBatch} onChange={setFilterBatch}
            opts={bat.map(b=>({v:String(b.id),l:b.naam}))} ph={t('stock_filter_all_beers')} cls="w-52" />
        </div>
      </div>

      {/* Summary cards per verpakkingstype (altijd over alle bieren) */}
      {allTypes.length > 0 && (
        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 mb-5">
          {allTypes.map(vtype => {
            const s = typeStat(vtype);
            return (
              <div key={vtype} className="bg-white rounded-xl shadow-card p-3 border-l-4 t-card-l">
                <div className="font-semibold text-sm text-gray-800 mb-2">{vtype}</div>
                <div className="space-y-1 text-xs">
                  <div className="flex justify-between"><span className="text-gray-500">{t('stock_sold')}</span><span className="font-mono font-medium text-green-600">{s.totVerk}×</span></div>
                  <div className="flex justify-between pt-1 mt-1 border-t">
                    <span className="font-medium text-gray-700">{t('stock_available')}</span>
                    <span className={`font-mono font-bold ${s.beschikbaar>0?'text-amber-600':'text-gray-400'}`}>{s.beschikbaar}×</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {uit.length === 0 && (
        <div className="bg-white rounded-xl shadow-card p-8 text-center text-gray-400">
          {t('stock_no_released')}
        </div>
      )}

      {/* Groepen per biernaam, daaronder per batch */}
      <div className="space-y-6">
        {(() => {
          // Group visible uitslagen by beer name
          const beerNames = [...new Set(
            visibleUit.map(u => getBatch(u.batch_id)?.naam || 'Onbekend')
          )];

          return beerNames.map(beerName => {
            // All batches for this beer that have visible uitslagen
            const beerBatchIds = [...new Set(
              visibleUit
                .filter(u => (getBatch(u.batch_id)?.naam || 'Onbekend') === beerName)
                .map(u => u.batch_id)
            )];
            const beerRows  = visibleUit.filter(u => beerBatchIds.includes(u.batch_id));
            const bTotVerk  = beerRows.reduce((s,u)=>s+Number(u.verkocht_stuks||0),0);
            const bBeschik  = beerRows.reduce((s,u)=>s+Number(u.aantal||0)-Number(u.verkocht_stuks||0),0);
            // Gearchiveerde verkoop voor dit bier ook meetellen
            const bArchVerk = (archief||[]).filter(a=>a.batch_naam===beerName).reduce((s,a)=>s+Number(a.aantal||0),0);

            const beerGesloten = geslotenBieren.includes(beerName);
            const toggleBeer = () => setGeslotenBieren(prev =>
              prev.includes(beerName) ? prev.filter(x=>x!==beerName) : [...prev, beerName]
            );
            return (
              <div key={beerName} className="bg-white rounded-xl shadow-card overflow-x-auto">
                {/* Biernaam-header */}
                <div onClick={toggleBeer} className="px-4 py-3 t-hdr-solid text-white flex items-center justify-between flex-wrap gap-2 cursor-pointer select-none">
                  <span className="flex items-center gap-2 font-bold text-base">
                    <span className="text-gray-400 text-sm">{beerGesloten?'▶':'▼'}</span>
                    {beerName}
                  </span>
                  <div className="flex gap-3 text-sm">
                    <span className="text-green-300">{t('stock_sold')}: <strong>{bTotVerk + bArchVerk}×</strong></span>
                    {bBeschik > 0 && <span className="font-bold text-amber-300">{t('stock_available')}: {bBeschik}×</span>}
                  </div>
                </div>

                {/* Per batch binnen dit bier */}
                {!beerGesloten && beerBatchIds.map(bid => {
                  const b      = getBatch(bid);
                  const bRows  = visibleUit.filter(u=>u.batch_id===bid);
                  const btUit  = bRows.reduce((s,u)=>s+Number(u.aantal||0),0);
                  const btVerk = bRows.reduce((s,u)=>s+Number(u.verkocht_stuks||0),0);
                  const vTypes = [...new Set(bRows.map(u=>u.verpakking_type))].sort();

                  return (
                    <div key={bid}>
                      {/* Batch-subheader */}
                      <div className="px-4 py-2 t-hdr text-white flex items-center justify-between flex-wrap gap-2 text-sm">
                        <div className="flex items-center gap-2">
                          {b?.batch_nummer
                            ? <span className="font-semibold">Batch #{b.batch_nummer}</span>
                            : <span className="text-gray-400 italic">{t('batch_no_number')}</span>
                          }
                          {b?.stijl && <span className="text-xs text-gray-400">{b.stijl}</span>}
                        </div>
                        <div className="flex gap-3 text-xs text-gray-300">
                          <span className="text-green-300">{t('stock_sold')}: <strong>{btVerk}×</strong></span>
                          {btUit-btVerk > 0 && <span className="font-bold text-amber-300">{t('stock_available')}: {btUit-btVerk}×</span>}
                        </div>
                      </div>

                      {/* Sub-groepen per verpakkingstype */}
                      {vTypes.map(vt => {
                        const vtRows   = bRows.filter(u=>u.verpakking_type===vt);
                        const vtTotUit = vtRows.reduce((s,u)=>s+Number(u.aantal||0),0);
                        const vtTotVerk= vtRows.reduce((s,u)=>s+Number(u.verkocht_stuks||0),0);
                        const vtArtikel = (artikelen||[]).find(a=>a.key===artKey(beerName,vt));

                        return (
                          <div key={vt}>
                            <div className="px-4 py-2 bg-gray-50 border-b border-t flex items-center justify-between text-sm">
                              <div className="flex items-center gap-2 min-w-0">
                                <span className="font-medium text-gray-700">{vt}</span>
                                {vtArtikel?.artikelnummer && (
                                  <span className="text-xs text-gray-400 font-mono">#{vtArtikel.artikelnummer}</span>
                                )}
                                {vtArtikel?.verkoopprijs != null && (
                                  <span className="text-xs text-green-600 font-medium">{fmt(vtArtikel.verkoopprijs)}</span>
                                )}
                                <button
                                  onClick={e=>openArtModal(beerName, vt, e)}
                                  title={t('lbl_article_master')}
                                  className="text-gray-300 t-icon-hover transition-colors text-xs leading-none ml-1"
                                >📋</button>
                              </div>
                              <div className="flex gap-3 text-xs text-gray-500">
                                <span className="text-green-600">{t('stock_sold')}: <strong>{vtTotVerk}×</strong></span>
                                {vtTotUit-vtTotVerk > 0 && <span className="font-bold text-amber-600">{t('stock_available')}: {vtTotUit-vtTotVerk}×</span>}
                              </div>
                            </div>

                            {vtRows.map(u => {
                              const verk    = Number(u.verkocht_stuks||0);
                              const beschik = Number(u.aantal||0) - verk;
                              const thtDays = u.tht ? Math.ceil((new Date(u.tht)-new Date())/86400000) : null;
                              const thtExp  = thtDays !== null && thtDays < 0;
                              const thtSoon = thtDays !== null && thtDays >= 0 && thtDays <= 60;
                              const accNietBetaald = acc.some(a => a.uitslag_id === u.id && !a.betaald);
                              return (
                                <div key={u.id} className={`px-4 py-3 border-b last:border-b-0 border-l-4 ${accNietBetaald ? 'border-l-red-400 bg-red-50' : 'border-l-transparent'}`}>
                                  <div className="flex items-start justify-between gap-3">
                                    <div className="min-w-0 flex-1">
                                      <div className="flex flex-wrap items-center gap-x-4 gap-y-1 text-xs text-gray-500">
                                        <span>{t('stock_date_released')}: <strong className="text-gray-700">{fmtD(u.datum)}</strong></span>
                                        {u.tht
                                          ? <span className={thtExp?'text-red-600 font-medium':thtSoon?'text-yellow-600 font-medium':'text-gray-600'}>
                                              {t('lbl_tht')}: <strong>{fmtD(u.tht)}</strong>
                                              {thtExp ? ' ⚠️ ' + t('stock_expired') : thtSoon ? ` (${thtDays}d)` : ''}
                                            </span>
                                          : <span className="text-gray-400">{t('lbl_tht')}: —</span>
                                        }
                                        <span>{u.aantal}× · {Number(u.liter||0).toFixed(1)}L · accijns {fmt(u.accijns)}</span>
                                        {accNietBetaald && <span className="text-red-600 font-semibold">{t('stock_excise_unpaid')}</span>}
                                      </div>
                                      <VerkochInput u={u} />
                                    </div>
                                    <div className="flex flex-col items-end gap-1.5 flex-shrink-0">
                                      {beschik === 0 && (
                                        <button onClick={()=>archiveerUitslag(u)}
                                          className="px-2 py-1 rounded text-xs font-medium bg-green-100 hover:bg-green-200 text-green-700 whitespace-nowrap transition-colors">
                                          {t('stock_archive')}
                                        </button>
                                      )}
                                      <button onClick={()=>{ if(confirm(t('error_confirm_delete'))) { setUit(prev=>prev.filter(x=>x.id!==u.id)); setAcc(prev=>prev.filter(a=>a.uitslag_id!==u.id)); } }}
                                        className="text-red-400 hover:text-red-600 text-xs">✕</button>
                                    </div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            );
          });
        })()}
      </div>

      {/* Artikelenstambestand modal */}
      {artModal && (
        <Modal title={`Artikelstamgegevens — ${artModal.biernaam} · ${artModal.verpakking_type}`} onClose={()=>setArtModal(null)}>
          <div className="space-y-3">
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">{t('stock_article_num')}</label>
                <Inp value={artForm.artikelnummer} onChange={v=>setArtForm(f=>({...f,artikelnummer:v}))} placeholder={t('ph_article_num')} />
              </div>
              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">{t('stock_article_ean')}</label>
                <Inp value={artForm.ean} onChange={v=>setArtForm(f=>({...f,ean:v}))} placeholder={t('ph_ean')} />
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">{t('stock_article_price')}</label>
                <Inp type="number" value={artForm.verkoopprijs} onChange={v=>setArtForm(f=>({...f,verkoopprijs:v}))} placeholder={t('ph_price')} />
              </div>
              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">{t('stock_article_vat')}</label>
                <Sel value={artForm.btw} onChange={v=>setArtForm(f=>({...f,btw:v}))}
                  opts={[{v:'0',l:'0% — vrijgesteld'},{v:'9',l:'9% — laag'},{v:'21',l:'21% — hoog'}]} />
              </div>
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">{t('lbl_description')}</label>
              <Inp value={artForm.omschrijving} onChange={v=>setArtForm(f=>({...f,omschrijving:v}))} placeholder={t('ph_product_desc')} />
            </div>
            <div className="flex justify-between items-center pt-2 border-t">
              {(artikelen||[]).find(a=>a.key===artKey(artModal.biernaam, artModal.verpakking_type)) ? (
                <button onClick={deleteArtikel} className="text-xs text-red-400 hover:text-red-600 underline">{t('stock_article_delete')}</button>
              ) : <span />}
              <div className="flex gap-2">
                <Btn v="secondary" onClick={()=>setArtModal(null)}>{t('btn_cancel')}</Btn>
                <Btn onClick={saveArtikel}>{t('btn_save')}</Btn>
              </div>
            </div>
          </div>
        </Modal>
      )}

      {/* Archief */}
      {(archief||[]).length > 0 && (
        <div className="mt-8">
          <div onClick={()=>setArchiefIngeklapt(v=>!v)} className="flex items-center justify-between mb-3 cursor-pointer select-none group">
            <h3 className="text-base font-semibold text-gray-500 flex items-center gap-2">
              <span className="text-gray-400 text-sm">{archiefIngeklapt?'▶':'▼'}</span>
              {t('stock_archive_title')}
            </h3>
            <span className="text-xs text-gray-400">{t('stock_archive_count').replace('{n}',(archief||[]).length)}</span>
          </div>
          {!archiefIngeklapt && <div className="bg-white rounded-xl shadow-card overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                <tr>
                  <th className="px-3 py-2 text-left">{t('batch_archived')}</th>
                  <th className="px-3 py-2 text-left">{t('stock_archive_beer')}</th>
                  <th className="px-3 py-2 text-left">{t('stock_archive_batch')}</th>
                  <th className="px-3 py-2 text-left">{t('lbl_type')}</th>
                  <th className="px-3 py-2 text-right">{t('stock_archive_qty')}</th>
                  <th className="px-3 py-2 text-right">{t('stock_archive_liters')}</th>
                  <th className="px-3 py-2 text-right">{t('nav_accijns')}</th>
                  <th className="px-3 py-2 text-left">{t('filling_summary_released')}</th>
                  <th className="px-3 py-2"></th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {[...(archief||[])].reverse().map(a => (
                  <tr key={a.id} className="hover:bg-gray-50 text-gray-600">
                    <td className="px-3 py-2 text-xs text-gray-400 whitespace-nowrap">{fmtD(a.archiveer_datum)}</td>
                    <td className="px-3 py-2 font-medium text-gray-700">{a.batch_naam}</td>
                    <td className="px-3 py-2 text-gray-500">{a.batch_nummer ? `#${a.batch_nummer}` : '—'}</td>
                    <td className="px-3 py-2">{a.verpakking_type}</td>
                    <td className="px-3 py-2 text-right font-mono">{a.aantal}×</td>
                    <td className="px-3 py-2 text-right text-gray-500">{Number(a.liter||0).toFixed(1)}L</td>
                    <td className="px-3 py-2 text-right text-gray-500">{fmt(a.accijns)}</td>
                    <td className="px-3 py-2 text-xs text-gray-400 whitespace-nowrap">{fmtD(a.datum)}</td>
                    <td className="px-3 py-2">
                      <button onClick={()=>{ if(confirm(t('err_confirm_delete_archive'))) setArchief(prev=>(prev||[]).filter(x=>x.id!==a.id)); }}
                        className="text-red-300 hover:text-red-500 text-xs">✕</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>}
        </div>
      )}
    </div>
  );
}

// ===== ACCIJNS =====
function AccijnsPage({bat, acc, setAcc}) {
  const {useState, useMemo} = React;
  // acc records: {id, batch_id, batch_nummer, uitslag_id, verpakking_type, datum, aantal, liter, abv, accijns, betaald, betaal_datum}
  const getAccijns = (a) => Number(a.accijns ?? a.totaal_accijns ?? 0);
  const getLiter   = (a) => Number(a.liter   ?? a.totaal_liter   ?? 0);
  const getNaam    = (bid) => bat.find(b=>b.id===bid)?.naam||'—';

  const now = new Date();
  const currentMonthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  const [ingeklapt, setIngeklapt] = useState({});       // {YYYY-MM: bool} = ingeklapt
  const [aangifteView, setAangifteView] = useState(false); // aangifte-view voor lopende maand

  const byMonth = useMemo(() => {
    const g = {};
    (acc||[]).forEach(a => {
      const d = new Date(a.datum);
      const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (!g[k]) g[k] = [];
      g[k].push(a);
    });
    return g;
  }, [acc]);

  const months = Object.keys(byMonth).sort((a,b)=>b.localeCompare(a));

  const fmtMonth = (key) => {
    const [y,m] = key.split('-');
    return new Date(y, Number(m)-1, 1).toLocaleString('nl-NL', {month:'long', year:'numeric'});
  };

  // Groepeer records per unieke batch (batch_id + batch_nummer), alle verpakkingen samengeteld
  const groupRecords = (records) => {
    const g = {};
    records.forEach(a => {
      const k = `${a.batch_id}__${a.batch_nummer||''}`;
      if (!g[k]) g[k] = {
        key: k, batch_id: a.batch_id, naam: getNaam(a.batch_id),
        batch_nummer: a.batch_nummer, abv: a.abv,
        liter: 0, accijns: 0, allPaid: true,
      };
      g[k].liter   += getLiter(a);
      g[k].accijns += getAccijns(a);
      if (!a.betaald) g[k].allPaid = false;
    });
    // Sorteer op batch_nummer numeriek
    return Object.values(g).sort((a,b) =>
      String(a.batch_nummer).localeCompare(String(b.batch_nummer), undefined, {numeric:true})
    );
  };

  const markMonthPaid = (monthKey) => {
    setAcc(prev => prev.map(a => {
      const d = new Date(a.datum);
      const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      return k === monthKey && !a.betaald ? {...a, betaald:true, betaal_datum:tod()} : a;
    }));
    setIngeklapt(prev => ({...prev, [monthKey]: true}));
  };

  const totOpen = (acc||[]).filter(a=>!a.betaald).reduce((s,a)=>s+getAccijns(a),0);
  const totPaid = (acc||[]).filter(a=>a.betaald).reduce((s,a)=>s+getAccijns(a),0);

  /* ── Herbruikbare samenvatting-tabel (aangifte / afgesloten maand) ── */
  const SummaryTable = ({records, monthTotal, allPaid, monthKey}) => {
    const rows = groupRecords(records);
    const totLiter = rows.reduce((s,r) => s + r.liter, 0);
    return (
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead className="text-xs text-gray-500 bg-gray-50">
            <tr>
              <th className="px-3 py-2 text-left">{t('excise_beer')}</th>
              <th className="px-3 py-2 text-left">{t('excise_batch')}</th>
              <th className="px-3 py-2 text-right">{t('excise_abv')}</th>
              <th className="px-3 py-2 text-right">{t('excise_liters')}</th>
              <th className="px-3 py-2 text-right">{t('excise_rate_per_liter')}</th>
              <th className="px-3 py-2 text-right">{t('excise_amount')}</th>
            </tr>
          </thead>
          <tbody className="divide-y divide-gray-100">
            {rows.map(r => (
              <tr key={r.key}>
                <td className="px-3 py-2 font-medium text-gray-800">
                  <span className={`inline-block w-2 h-2 rounded-full mr-2 flex-shrink-0 ${r.allPaid ? 'bg-green-500' : 'bg-red-500'}`} style={{verticalAlign:'middle'}}></span>
                  {r.naam}
                </td>
                <td className="px-3 py-2 text-gray-500">{r.batch_nummer?`#${r.batch_nummer}`:'—'}</td>
                <td className="px-3 py-2 text-right">{r.abv?`${r.abv}%`:'—'}</td>
                <td className="px-3 py-2 text-right">{r.liter.toFixed(1)}L</td>
                <td className="px-3 py-2 text-right text-gray-500">{r.liter>0?`${fmt(r.accijns/r.liter)}/L`:'—'}</td>
                <td className="px-3 py-2 text-right font-semibold text-amber-700">{fmt(r.accijns)}</td>
              </tr>
            ))}
          </tbody>
          <tfoot>
            <tr className="border-t-2 border-gray-200 bg-gray-50">
              <td colSpan="3" className="px-3 py-2.5 text-right text-xs font-semibold text-gray-500 uppercase tracking-wide">{t('excise_month_total')}</td>
              <td className="px-3 py-2.5 text-right font-bold text-gray-700">{totLiter.toFixed(1)}L</td>
              <td></td>
              <td className="px-3 py-2.5 text-right font-bold text-lg text-amber-700">{fmt(monthTotal)}</td>
            </tr>
          </tfoot>
        </table>
        {monthKey && (
          <div className="mt-4 flex items-center justify-between">
            {allPaid ? (
              <span className="text-sm text-green-700 font-medium">✓ {t('excise_month_all_paid')}</span>
            ) : (
              <Btn v="green" onClick={()=>markMonthPaid(monthKey)}>✓ {t('excise_mark_month_paid')}</Btn>
            )}
            <button onClick={()=>setIngeklapt(prev=>({...prev,[monthKey]:true}))}
              className="text-xs text-gray-400 hover:text-gray-600 underline">
              {t('excise_collapse')}
            </button>
          </div>
        )}
      </div>
    );
  };

  return (
    <div>
      {/* Pagina header */}
      <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
        <h2 className="text-xl font-bold text-gray-800">{t('nav_accijns')}</h2>
        <div className="flex items-center gap-2 flex-wrap">
          <button
            onClick={()=>setAangifteView(v=>!v)}
            className={`px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors ${aangifteView ? 't-nav' : 'bg-white border-gray-300 text-gray-600 hover:bg-gray-50'}`}>
            📋 {t('excise_aangifte_view')}
          </button>
          {totPaid > 0 && (
            <div className="px-3 py-2 rounded-lg text-sm font-medium bg-green-100 text-green-700">
              {t('excise_paid')}: {fmt(totPaid)}
            </div>
          )}
          <div className={`px-3 py-2 rounded-lg text-sm font-bold ${totOpen>0?'bg-red-100 text-red-700':'bg-green-100 text-green-700'}`}>
            {t('excise_outstanding')}: {fmt(totOpen)}
          </div>
        </div>
      </div>

      {months.length === 0 && (
        <div className="bg-white rounded-xl shadow-card p-8 text-center text-gray-400">
          {t('excise_no_recorded')}
        </div>
      )}

      {months.map(monthKey => {
        const records    = byMonth[monthKey];
        const isCurrent  = monthKey === currentMonthKey;
        const allPaid    = records.every(a => a.betaald);
        const monthTotal = records.reduce((s,a) => s + getAccijns(a), 0);
        const isOpen     = ingeklapt[monthKey] !== undefined ? !ingeklapt[monthKey] : (!allPaid || isCurrent);
        const showSummary = !isCurrent || aangifteView; // afgesloten maanden altijd; lopende maand alleen bij aangifte-view

        return (
          <div key={monthKey} className="bg-white rounded-xl shadow-card mb-4 overflow-hidden">
            {/* Maand header balk */}
            <div
              className={`px-4 py-3 flex items-center justify-between cursor-pointer select-none ${allPaid ? 'bg-green-50 border-b border-green-100' : isCurrent ? 't-hdr text-white' : 'bg-amber-50 border-b border-amber-100'}`}
              onClick={() => setIngeklapt(prev => ({...prev, [monthKey]: isOpen}))}>
              <div className="flex items-center gap-3">
                <span className={`text-xs font-bold ${isOpen?'rotate-90':''}`} style={{display:'inline-block',transition:'transform 0.15s'}}>▶</span>
                <span className={`font-semibold capitalize text-sm ${isCurrent?'text-white':'text-gray-800'}`}>{fmtMonth(monthKey)}</span>
                {isCurrent && <span className="text-xs px-1.5 py-0.5 rounded font-medium bg-white/20 text-white">{t('excise_current_month')}</span>}
                {!isCurrent && allPaid  && <span className="text-xs text-green-700 font-medium">✓ {t('excise_month_all_paid')}</span>}
                {!isCurrent && !allPaid && <span className="text-xs text-amber-700 font-medium">{t('excise_outstanding')}</span>}
              </div>
              <span className={`font-bold text-sm ${isCurrent?'text-white':allPaid?'text-green-700':'text-amber-700'}`}>{fmt(monthTotal)}</span>
            </div>

            {isOpen && (
              <div className="p-4">
                {showSummary ? (
                  <SummaryTable records={records} monthTotal={monthTotal} allPaid={allPaid} monthKey={monthKey} />
                ) : (
                  /* ── Lopende maand: individuele uitslagen (geen betaal per rij — betaling is per maand) ── */
                  (() => {
                    const sorted = [...records].sort((a,b) =>
                      String(a.batch_nummer).localeCompare(String(b.batch_nummer), undefined, {numeric:true})
                      || (a.verpakking_type||'').localeCompare(b.verpakking_type||'')
                      || a.datum.localeCompare(b.datum)
                    );
                    const totLiter = sorted.reduce((s,a) => s + getLiter(a), 0);
                    return (
                      <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                          <thead className="text-xs text-gray-500 bg-gray-50">
                            <tr>
                              <th className="px-3 py-2 text-left">{t('excise_beer')}</th>
                              <th className="px-3 py-2 text-left">{t('excise_batch')}</th>
                              <th className="px-3 py-2 text-left">{t('excise_packaging')}</th>
                              <th className="px-3 py-2 text-left">{t('excise_release_date')}</th>
                              <th className="px-3 py-2 text-right">{t('excise_liters')}</th>
                              <th className="px-3 py-2 text-right">{t('excise_abv')}</th>
                              <th className="px-3 py-2 text-right">{t('excise_amount')}</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-100">
                            {sorted.map(a => (
                              <tr key={a.id}>
                                <td className="px-3 py-2 font-medium text-gray-800">
                                  <span className={`inline-block w-2 h-2 rounded-full mr-2 flex-shrink-0 ${a.betaald ? 'bg-green-500' : 'bg-red-500'}`} style={{verticalAlign:'middle'}}></span>
                                  {getNaam(a.batch_id)}
                                </td>
                                <td className="px-3 py-2 text-gray-500">{a.batch_nummer?`#${a.batch_nummer}`:'—'}</td>
                                <td className="px-3 py-2 text-gray-600">{a.verpakking_type||'—'}</td>
                                <td className="px-3 py-2 text-gray-600">{fmtD(a.datum)}</td>
                                <td className="px-3 py-2 text-right">{getLiter(a).toFixed(1)}L</td>
                                <td className="px-3 py-2 text-right">{a.abv?`${a.abv}%`:'—'}</td>
                                <td className="px-3 py-2 text-right font-semibold text-amber-700">{fmt(getAccijns(a))}</td>
                              </tr>
                            ))}
                          </tbody>
                          <tfoot>
                            <tr className="border-t-2 border-gray-200 bg-gray-50">
                              <td colSpan="4" className="px-3 py-2.5 text-right text-xs font-semibold text-gray-500 uppercase tracking-wide">{t('excise_month_total')}</td>
                              <td className="px-3 py-2.5 text-right font-bold text-gray-700">{totLiter.toFixed(1)}L</td>
                              <td></td>
                              <td className="px-3 py-2.5 text-right font-bold text-lg text-amber-700">{fmt(monthTotal)}</td>
                            </tr>
                          </tfoot>
                        </table>
                      </div>
                    );
                  })()
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ===== RECEPTEN =====
function ReceptenPage({ing, lots, bfCreds, recepten, setRecepten, verborgen, setVerborgen, gearchiveerdeTags, setGearchiveerdeTags, tagVolgorde, setTagVolgorde, geslotenGroepen, setGeslotenGroepen}) {
  const {useState} = React;
  const [sel, setSel]         = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [msg, setMsg]         = useState('');
  const [zoek, setZoek]       = useState('');
  const [verborgenOpen, setVerborgenOpen] = useState(false);
  const [gearchiveerdTagsOpen, setGearchiveerdTagsOpen] = useState(false);
  const toggleGroep = (tag) => setGeslotenGroepen(prev =>
    prev.includes(tag) ? prev.filter(t=>t!==tag) : [...prev, tag]
  );
  const toggleTagArchief = (tag, e) => {
    e.stopPropagation();
    setGearchiveerdeTags(prev => prev.includes(tag) ? prev.filter(t=>t!==tag) : [...prev, tag]);
  };
  const moveTag = (tag, dir, allTags, e) => {
    e.stopPropagation();
    setTagVolgorde(() => {
      const ordered = [...new Set([...tagVolgorde, ...allTags])].filter(t => allTags.includes(t));
      const idx = ordered.indexOf(tag);
      if (idx === -1) return tagVolgorde;
      const next = [...ordered];
      if (dir === 'up' && idx > 0)              [next[idx-1], next[idx]] = [next[idx], next[idx-1]];
      else if (dir === 'down' && idx < next.length-1) [next[idx+1], next[idx]] = [next[idx], next[idx+1]];
      return next;
    });
  };

  const toggleVerbergen = (id, e) => {
    e.stopPropagation();
    setVerborgen(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
    if (sel === id) setSel(null);
  };

  const runSync = async () => {
    if (!bfCreds?.enabled || !bfCreds.userId || !bfCreds.apiKey) {
      setMsg('⚠ ' + t('settings_brewfather_section')); return;
    }
    setSyncing(true); setMsg('');
    try {
      const recs = await bfGetRecipes();
      setRecepten(recs);
      setMsg(`✓ ${recs.length} recept${recs.length!==1?'en':''} gesynchroniseerd`);
    } catch(e) { setMsg('⚠ Sync mislukt: '+(e.message||String(e))); }
    setSyncing(false);
  };

  const gefilterd = recepten.filter(r =>
    !zoek || r.naam.toLowerCase().includes(zoek.toLowerCase()) || (r.stijl||'').toLowerCase().includes(zoek.toLowerCase())
  );
  const zichtbaar     = gefilterd.filter(r => !verborgen.includes(r.id));
  const verborgenLijst = recepten.filter(r => verborgen.includes(r.id));
  const selRec = recepten.find(r => r.id === sel);

  const checkStock = (naam, benodigdRaw) => {
    const benodigd = Number(benodigdRaw||0);
    const ingMatch = ing.find(i => i.naam.toLowerCase() === naam.toLowerCase());
    if (!ingMatch) return {ok:null, totaal:0, ingLots:[]};
    const ingLots = lots
      .filter(l => l.ingredient_id===ingMatch.id && l.beschikbaar && Number(l.hoeveelheid||0)>0)
      .sort((a,b)=>(a.houdbaarheid||'9999')<(b.houdbaarheid||'9999')?-1:1);
    const totaal = ingLots.reduce((s,l)=>s+Number(l.hoeveelheid||0),0);
    return {ok:totaal>=benodigd, bijna:totaal>0&&totaal<benodigd, totaal, ingLots};
  };

  const IngRow = ({item}) => {
    const {ok, bijna, totaal, ingLots} = checkStock(item.naam, item.hoeveelheid);
    const [open, setOpen] = useState(false);
    const dot = ok===null ? <span className="text-gray-300">●</span>
              : ok        ? <span className="text-green-500">●</span>
              : bijna     ? <span className="text-yellow-500">●</span>
                          : <span className="text-red-500">●</span>;
    return (
      <>
        <tr className={`border-b border-gray-100 ${ingLots.length>0?'cursor-pointer hover:bg-gray-50':''}`}
            onClick={()=>ingLots.length>0&&setOpen(o=>!o)}>
          <td className="px-3 py-2 text-sm text-gray-800">{item.naam}</td>
          <td className="px-3 py-2 text-sm text-right text-gray-600 whitespace-nowrap">
            {Number(item.hoeveelheid||0).toLocaleString('nl-NL',{maximumFractionDigits:3})} {item.eenheid}
          </td>
          <td className="px-3 py-2 text-xs text-gray-400">{item.gebruik||''}</td>
          <td className="px-3 py-2 text-sm text-right whitespace-nowrap">
            {ok!==null
              ? <span className={ok?'text-green-600':bijna?'text-yellow-600':'text-red-600'}>
                  {totaal.toLocaleString('nl-NL',{maximumFractionDigits:3})} {item.eenheid}
                </span>
              : <span className="text-gray-300 text-xs">—</span>}
          </td>
          <td className="px-3 py-2 text-center">{dot}</td>
          <td className="px-3 py-2 text-xs text-gray-300 text-center">{ingLots.length>0?(open?'▲':'▼'):''}</td>
        </tr>
        {open && ingLots.map(l=>(
          <tr key={l.id} className="bg-amber-50 text-xs border-b border-amber-100">
            <td className="pl-6 pr-3 py-1.5 text-gray-500">
              <span className="font-mono text-gray-700">{l.lotnummer||'—'}</span>
              {l.leverancier&&<span className="text-gray-400 ml-2">({l.leverancier})</span>}
            </td>
            <td className="px-3 py-1.5 text-right font-medium text-gray-700 whitespace-nowrap">
              {Number(l.hoeveelheid||0).toLocaleString('nl-NL',{maximumFractionDigits:3})} {l.eenheid}
            </td>
            <td className="px-3 py-1.5 text-gray-400">{l.aankoop_datum?fmtD(l.aankoop_datum):''}</td>
            <td className="px-3 py-1.5 whitespace-nowrap" colSpan={3}>
              {t('lbl_tht')}: {l.houdbaarheid
                ? <span className={`font-medium ${new Date(l.houdbaarheid)<new Date()?'text-red-600':'text-gray-700'}`}>{fmtD(l.houdbaarheid)}</span>
                : <span className="text-gray-300">—</span>}
            </td>
          </tr>
        ))}
      </>
    );
  };

  const IngSection = ({titel, items}) => {
    if (!items?.length) return null;
    const stocks = items.map(i=>checkStock(i.naam,i.hoeveelheid));
    const anyRed = stocks.some(s=>s.ok===false&&!s.bijna);
    const anyYellow = stocks.some(s=>s.bijna);
    const allGreen = stocks.length>0 && stocks.every(s=>s.ok===true);
    const badge = anyRed   ? <span className="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">tekort</span>
                : anyYellow? <span className="text-xs bg-yellow-100 text-yellow-600 px-2 py-0.5 rounded-full">bijna genoeg</span>
                : allGreen ? <span className="text-xs bg-green-100 text-green-600 px-2 py-0.5 rounded-full">✓ beschikbaar</span>
                : null;
    return (
      <div className="mb-5">
        <div className="flex items-center gap-2 mb-1.5">
          <h4 className="text-sm font-semibold text-gray-700">{titel}</h4>
          {badge}
        </div>
        <div className="rounded-lg border border-gray-200 overflow-hidden">
          <table className="w-full">
            <thead>
              <tr className="bg-gray-50 text-xs text-gray-400 uppercase">
                <th className="px-3 py-2 text-left font-medium">{t('log_ingredient')}</th>
                <th className="px-3 py-2 text-right font-medium">{t('recipe_needed')}</th>
                <th className="px-3 py-2 text-left font-medium">{t('recipe_use')}</th>
                <th className="px-3 py-2 text-right font-medium">{t('stock_available')}</th>
                <th className="px-3 py-2 text-center font-medium w-8">●</th>
                <th className="px-3 py-2 w-6"></th>
              </tr>
            </thead>
            <tbody>
              {items.map((item,i)=><IngRow key={i} item={item}/>)}
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  const cardStocks = (r) => [
    ...r.mout.map(i=>checkStock(i.naam,i.hoeveelheid)),
    ...r.hop.map(i=>checkStock(i.naam,i.hoeveelheid)),
    ...r.gist.map(i=>checkStock(i.naam,i.hoeveelheid)),
    ...r.overig.map(i=>checkStock(i.naam,i.hoeveelheid)),
  ];
  const allStock   = selRec ? cardStocks(selRec) : [];
  const overallOk  = allStock.length>0 && allStock.every(s=>s.ok===true);
  const overallRed = allStock.some(s=>s.ok===false&&!s.bijna);
  const overallYel = !overallRed && allStock.some(s=>s.bijna);

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-xl font-bold text-gray-800">{t('nav_recepten')}</h2>
        <div className="flex items-center gap-3">
          {msg && <span className={`text-sm ${msg.startsWith('✓')?'text-green-600':'text-amber-600'}`}>{msg}</span>}
          <Btn onClick={runSync} disabled={syncing||!bfCreds?.enabled}
            cls={!bfCreds?.enabled?'opacity-50 cursor-not-allowed':''}>
            {syncing?t('recipe_syncing'):t('recipe_sync_brewfather')}
          </Btn>
        </div>
      </div>
      <div className="flex flex-col md:flex-row gap-4 md:items-start">
        {/* Lijst */}
        <div className={`w-full md:w-60 md:flex-shrink-0${sel?' hidden md:block':''}`}>
          <div className="mb-2">
            <input type="text" placeholder={t('search_recipe')} value={zoek}
              onChange={e=>setZoek(e.target.value)}
              className="w-full border rounded-lg px-3 py-2 text-sm t-input"/>
          </div>
          <div className="bg-white rounded-xl shadow-card overflow-hidden">
          <div className="flex justify-between px-3 py-1.5 bg-gray-50 text-xs text-gray-500 uppercase tracking-wide border-b">
            <span>{t('lbl_name')}</span><span>{t('lbl_stock')}</span>
          </div>
          {zichtbaar.length===0 && verborgenLijst.length===0 && (
            <div className="text-center text-gray-400 text-xs py-8">
              {recepten.length===0 ? t('recipe_no_recipes') : t('recipe_no_results')}
            </div>
          )}
          {(()=>{
            const RecepKaart = ({r}) => {
              const stocks = cardStocks(r);
              const anyRed  = stocks.some(s=>s.ok===false&&!s.bijna);
              const anyYel  = stocks.some(s=>s.bijna);
              const allGreen= stocks.length>0 && stocks.every(s=>s.ok===true);
              const dot = anyRed?'🔴':anyYel?'🟡':allGreen?'🟢':'⚪';
              return (
                <div onClick={()=>setSel(sel===r.id?null:r.id)}
                  className={`px-3 py-2.5 border-b cursor-pointer t-hover transition-colors group ${sel===r.id?'t-sel border-l-2':''}`}>
                  <div className="flex items-center justify-between gap-1">
                    <span className="font-medium text-sm truncate">{r.naam}</span>
                    <button onClick={e=>toggleVerbergen(r.id,e)}
                      className="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-gray-500 text-xs leading-none px-0.5 transition-opacity flex-shrink-0"
                      title={t('btn_hide')}>✕</button>
                  </div>
                  {r.stijl&&<div className="text-xs text-gray-500 mt-0.5 truncate">{r.stijl}</div>}
                  <div className="flex gap-2 mt-0.5 text-xs text-gray-400">
                    {r.batch_size?<span>{r.batch_size}L</span>:null}
                    {r.ABV?<span>{Number(r.ABV).toFixed(1)}%</span>:null}
                  </div>
                </div>
              );
            };
            const allTagsRaw = [...new Set(zichtbaar.flatMap(r=>r.tags||[]))];
            const sortedTags = [...new Set([...tagVolgorde, ...allTagsRaw])].filter(t => allTagsRaw.includes(t));
            const activeTags = sortedTags.filter(t => !gearchiveerdeTags.includes(t));
            const archiefTags = sortedTags.filter(t => gearchiveerdeTags.includes(t));
            const metTag    = (tag) => zichtbaar.filter(r=>(r.tags||[]).includes(tag));
            const zonderTag = zichtbaar.filter(r=>!r.tags||r.tags.length===0);
            const TagGroep = ({tag, gearchiveerd}) => {
              const items  = metTag(tag);
              const gesloten = geslotenGroepen.includes(tag);
              const stocks = items.flatMap(r=>cardStocks(r));
              const anyRed   = stocks.some(s=>s.ok===false&&!s.bijna);
              const allGreen = stocks.length>0 && stocks.every(s=>s.ok===true);
              const groepDot = anyRed?'🔴':allGreen?'🟢':'⚪';
              const idxInActive = activeTags.indexOf(tag);
              return (
                <div>
                  <div className="flex items-center group/tag bg-gray-50 border-b px-3 py-1.5 hover:bg-gray-100">
                    <button onClick={()=>toggleGroep(tag)}
                      className="flex-1 flex items-center justify-between text-xs font-medium text-gray-500 uppercase tracking-wide">
                      <span className="flex items-center gap-1">
                        <span className="text-gray-400">{gesloten?'▶':'▼'}</span>
                        <span>{tag}</span>
                        <span className="font-normal text-gray-400">({items.length})</span>
                      </span>
                    </button>
                    {!gearchiveerd && (
                      <span className="opacity-0 group-hover/tag:opacity-100 flex transition-opacity flex-shrink-0">
                        <button onClick={e=>moveTag(tag,'up',activeTags,e)} disabled={idxInActive===0}
                          className="px-1 text-gray-300 hover:text-gray-600 text-xs disabled:opacity-20"
                          title={t('btn_up')}>▴</button>
                        <button onClick={e=>moveTag(tag,'down',activeTags,e)} disabled={idxInActive===activeTags.length-1}
                          className="px-1 text-gray-300 hover:text-gray-600 text-xs disabled:opacity-20"
                          title={t('btn_down')}>▾</button>
                      </span>
                    )}
                    <button onClick={e=>toggleTagArchief(tag,e)}
                      className="opacity-0 group-hover/tag:opacity-100 ml-0.5 px-1 text-gray-300 hover:text-gray-500 text-xs transition-opacity flex-shrink-0"
                      title={gearchiveerd?t('btn_tag_restore'):t('btn_tag_archive')}>
                      {gearchiveerd?'↩':'↓'}
                    </button>
                  </div>
                  {!gesloten&&items.map(r=><RecepKaart key={r.id} r={r}/>)}
                </div>
              );
            };
            return (
              <div>
                {activeTags.length > 0
                  ? activeTags.map(tag=><TagGroep key={tag} tag={tag} gearchiveerd={false}/>)
                  : zichtbaar.filter(r=>!r.tags||r.tags.every(t=>!gearchiveerdeTags.includes(t))).map(r=><RecepKaart key={r.id} r={r}/>)
                }
                {zonderTag.length>0 && activeTags.length>0 && (
                  <TagGroep tag={t('lbl_without_tag')} gearchiveerd={false}/>
                )}
                {archiefTags.length>0 && (
                  <div className="border-t">
                    <button onClick={()=>setGearchiveerdTagsOpen(o=>!o)}
                      className="w-full flex items-center justify-between px-3 py-1.5 text-xs font-medium text-gray-500 uppercase hover:text-gray-700 hover:bg-gray-100 transition-colors">
                      <span>{t('lbl_archived_tags')} ({archiefTags.length})</span>
                      <span className="text-gray-400 text-sm">{gearchiveerdTagsOpen?'▼':'▶'}</span>
                    </button>
                    {gearchiveerdTagsOpen&&archiefTags.map(tag=><TagGroep key={tag} tag={tag} gearchiveerd={true}/>)}
                  </div>
                )}
              </div>
            );
          })()}
          {verborgenLijst.length>0&&(
            <div className="border-t">
              <button onClick={()=>setVerborgenOpen(o=>!o)}
                className="w-full flex items-center justify-between px-3 py-1.5 text-xs font-medium text-gray-500 uppercase hover:text-gray-700 hover:bg-gray-100 transition-colors">
                <span>{t('lbl_hidden')} ({verborgenLijst.length})</span>
                <span className="text-gray-400 text-sm">{verborgenOpen?'▼':'▶'}</span>
              </button>
              {verborgenOpen&&verborgenLijst.map(r=>(
                <div key={r.id} onClick={()=>setSel(sel===r.id?null:r.id)}
                  className={`px-3 py-2.5 border-b cursor-pointer t-hover transition-colors group opacity-60 hover:opacity-100 ${sel===r.id?'t-sel border-l-2':''}`}>
                  <div className="flex items-center justify-between gap-1">
                    <span className="font-medium text-sm truncate">{r.naam}</span>
                    <button onClick={e=>toggleVerbergen(r.id,e)}
                      className="text-gray-400 hover:text-green-600 text-xs leading-none px-0.5 transition-colors flex-shrink-0"
                      title={t('btn_restore')}>↩</button>
                  </div>
                </div>
              ))}
            </div>
          )}
          </div>{/* /bg-white recept card */}
        </div>
        {/* Detail */}
        {selRec ? (<>
          <button className="md:hidden mb-2 flex items-center gap-1 text-sm font-semibold t-back border rounded-xl px-3 py-2 w-full transition-colors" onClick={()=>setSel(null)}>{t('btn_back')}</button>
          <div className="flex-1 bg-white rounded-xl shadow-card p-4 min-w-0">
            <div className="flex items-start justify-between gap-4 mb-4">
              <div>
                <h3 className="text-base font-semibold text-gray-800">{selRec.naam}</h3>
                {selRec.stijl&&<div className="text-sm text-gray-500 mt-0.5">{selRec.stijl}</div>}
                {selRec.auteur&&<div className="text-xs text-gray-400 mt-0.5">Door {selRec.auteur}</div>}
              </div>
              <div className={`text-sm font-medium px-3 py-1.5 rounded-full whitespace-nowrap flex-shrink-0 ${overallOk?'bg-green-100 text-green-700':overallRed?'bg-red-100 text-red-700':overallYel?'bg-yellow-100 text-yellow-700':'bg-gray-100 text-gray-500'}`}>
                {overallOk?'✓ Klaar om te brouwen':overallRed?'✗ Ingrediënten tekort':overallYel?'⚠ Controleer voorraad':'— Onbekende voorraad'}
              </div>
            </div>
            <div className="grid grid-cols-4 gap-3 mb-6">
              {[{l:'Batch',v:selRec.batch_size?`${selRec.batch_size} L`:'—'},
                {l:'OG',  v:selRec.OG?Number(selRec.OG).toFixed(3):'—'},
                {l:'FG',  v:selRec.FG?Number(selRec.FG).toFixed(3):'—'},
                {l:'ABV', v:selRec.ABV?`${Number(selRec.ABV).toFixed(1)}%`:'—'},
              ].map(s=>(
                <div key={s.l} className="bg-gray-50 rounded-lg p-3 text-center">
                  <div className="text-xs text-gray-400 mb-0.5">{s.l}</div>
                  <div className="text-lg font-bold text-gray-800">{s.v}</div>
                </div>
              ))}
            </div>
            <IngSection titel={t('recipe_section_grains')} items={selRec.mout}/>
            <IngSection titel={t('recipe_section_hops')} items={selRec.hop}/>
            <IngSection titel={t('recipe_section_yeast')} items={selRec.gist}/>
            <IngSection titel={t('recipe_section_other')} items={selRec.overig}/>
            {selRec.notities&&(
              <div className="mt-2 p-4 bg-gray-50 rounded-lg">
                <div className="text-xs font-semibold text-gray-400 uppercase mb-1">{t('lbl_notes')}</div>
                <div className="text-sm text-gray-700 whitespace-pre-wrap">{selRec.notities}</div>
              </div>
            )}
          </div>
        </>):(
          <div className="flex-1 flex items-center justify-center text-gray-300 text-sm py-24 bg-white rounded-xl shadow-card">
            ← Selecteer een recept
          </div>
        )}
      </div>
    </div>
  );
}

// ===== DASHBOARD =====
function DashboardPage({ing, lots, bat, bi, uit, acc, setPage, tanks}) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dayMs = 86400000;

  const activeLots   = lots.filter(l=>l.beschikbaar && Number(l.hoeveelheid||0)>0);
  const lotsMetTht   = activeLots.filter(l=>l.houdbaarheid);
  const verlopen     = lotsMetTht.filter(l=>new Date(l.houdbaarheid)<today).sort((a,b)=>new Date(a.houdbaarheid)-new Date(b.houdbaarheid));
  const binnen30     = lotsMetTht.filter(l=>{ const d=new Date(l.houdbaarheid); return d>=today && (d-today)/dayMs<=30; }).sort((a,b)=>new Date(a.houdbaarheid)-new Date(b.houdbaarheid));
  const binnen90     = lotsMetTht.filter(l=>{ const d=new Date(l.houdbaarheid); return d>=today && (d-today)/dayMs>30 && (d-today)/dayMs<=90; }).sort((a,b)=>new Date(a.houdbaarheid)-new Date(b.houdbaarheid));

  const daysLeft = (d) => Math.ceil((new Date(d)-today)/dayMs);

  // Uitgeslagen voorraad met THT (alleen stuks die nog beschikbaar zijn)
  const uitMetTht    = uit.filter(u => u.tht && (Number(u.aantal||0)-Number(u.verkocht_stuks||0)) > 0);
  const uitVerlopen  = uitMetTht.filter(u=>new Date(u.tht)<today).sort((a,b)=>new Date(a.tht)-new Date(b.tht));
  const uitBinnen30  = uitMetTht.filter(u=>{ const d=new Date(u.tht); return d>=today && (d-today)/dayMs<=30; }).sort((a,b)=>new Date(a.tht)-new Date(b.tht));

  const openAccijns = acc.filter(a=>!a.betaald);
  const openAccBed  = openAccijns.reduce((s,a)=>s+Number(a.accijns??a.totaal_accijns??0),0);
  const beschVoorraad = uit.reduce((s,u)=>s+Number(u.aantal||0)-Number(u.verkocht_stuks||0),0);
  const actiefBatches = bat.filter(b=>!['Gesloten','Verpakt'].includes(b.status));

  const StatCard = ({label, value, sub, color='gray', onClick}) => {
    const colorMap = {
      blue:  {bg:'bg-blue-50',  text:'text-blue-700',  border:'border-blue-200',  icon:'bg-blue-100'},
      green: {bg:'bg-emerald-50',text:'text-emerald-700',border:'border-emerald-200',icon:'bg-emerald-100'},
      red:   {bg:'bg-red-50',   text:'text-red-700',   border:'border-red-200',   icon:'bg-red-100'},
      amber: {bg:'bg-amber-50', text:'text-amber-700', border:'border-amber-200', icon:'bg-amber-100'},
      gray:  {bg:'bg-gray-50',  text:'text-gray-700',  border:'border-gray-200',  icon:'bg-gray-100'},
    };
    const c = colorMap[color] || colorMap.gray;
    return (
      <div onClick={onClick} className={`${c.bg} rounded-2xl border ${c.border} shadow-card p-5 ${onClick?'cursor-pointer hover:shadow-card-md hover:-translate-y-0.5 transition-all duration-150':''}`}>
        <div className={`text-3xl font-bold ${c.text} tracking-tight`}>{value}</div>
        <div className="text-sm font-semibold text-gray-600 mt-1.5">{label}</div>
        {sub && <div className="text-xs text-gray-400 mt-0.5">{sub}</div>}
      </div>
    );
  };

  const LotRow = ({lot, urgent}) => {
    const days = daysLeft(lot.houdbaarheid);
    const naam = ing.find(i=>i.id===lot.ingredient_id)?.naam||'Onbekend';
    return (
      <div className={`flex items-center justify-between px-4 py-3 rounded-lg border ${urgent?'bg-red-50 border-red-200':'bg-yellow-50 border-yellow-200'}`}>
        <div className="flex flex-col">
          <span className="font-medium text-sm text-gray-800">{naam}</span>
          <span className="text-xs text-gray-500">{t('lbl_lot_short')}: {lot.lotnummer||'—'} · {lot.hoeveelheid} {lot.eenheid}</span>
        </div>
        <div className={`text-right text-sm font-semibold ${urgent?'text-red-600':'text-yellow-700'}`}>
          {urgent ? `${Math.abs(days)}d ${t('stock_expired')}` : days===0 ? t('stock_expires_today') : `${days}d`}
          <div className="text-xs font-normal text-gray-500">{fmtD(lot.houdbaarheid)}</div>
        </div>
      </div>
    );
  };

  const VoorraadRow = ({u, urgent}) => {
    const days    = daysLeft(u.tht);
    const batch   = bat.find(b=>b.id===u.batch_id);
    const bier    = batch?.naam || 'Onbekend';
    const beschik = Number(u.aantal||0) - Number(u.verkocht_stuks||0);
    return (
      <div className={`flex items-center justify-between px-4 py-3 rounded-lg border ${urgent?'bg-red-50 border-red-200':'bg-yellow-50 border-yellow-200'}`}>
        <div className="flex flex-col">
          <div className="flex items-center gap-2">
            <span className="font-medium text-sm text-gray-800">{bier}</span>
            {batch?.batch_nummer && <span className="text-xs text-gray-400 font-mono">#{batch.batch_nummer}</span>}
          </div>
          <span className="text-xs text-gray-500">{u.verpakking_type} · {beschik}× {t('lbl_available')}</span>
        </div>
        <div className={`text-right text-sm font-semibold ${urgent?'text-red-600':'text-yellow-700'}`}>
          {urgent ? `${Math.abs(days)}d ${t('stock_expired')}` : days===0 ? t('stock_expires_today') : `${days}d`}
          <div className="text-xs font-normal text-gray-500">{fmtD(u.tht)}</div>
        </div>
      </div>
    );
  };

  const hasAlerts = verlopen.length>0 || binnen30.length>0 || uitVerlopen.length>0 || uitBinnen30.length>0;

  return (
    <div>
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
        <StatCard label={t('lbl_active_batches')}      value={actiefBatches.length} sub={t('lbl_of_n_total').replace('{n}',bat.length)}                         color="blue"  onClick={()=>setPage('batches')} />
        <StatCard label={t('lbl_stock_available')} value={beschVoorraad}        sub={t('lbl_units_released')}                                   color="green" onClick={()=>setPage('voorraad')} />
        <StatCard label={t('lbl_open_excise')}         value={fmt(openAccBed)}      sub={`${openAccijns.length} ${t('lbl_declarations')}`} color={openAccBed>0?'red':'gray'} onClick={()=>setPage('accijns')} />
        <StatCard label={t('lbl_active_lots')}         value={activeLots.length}    sub={`${lotsMetTht.length} ${t('lbl_with_tht_date')}`}                color="amber" onClick={()=>setPage('ingredienten')} />
      </div>

      {hasAlerts ? (
        <div className="space-y-6 mb-8">
          {(verlopen.length>0 || uitVerlopen.length>0) && (
            <div>
              <h2 className="text-base font-semibold text-red-700 mb-3 flex items-center gap-2">
                <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-red-600 text-white text-xs font-bold">{verlopen.length+uitVerlopen.length}</span>
                {t('dashboard_expired_tht')}
              </h2>
              <div className="space-y-2">
                {verlopen.map(l=><LotRow key={l.id} lot={l} urgent={true} />)}
                {uitVerlopen.map(u=><VoorraadRow key={u.id} u={u} urgent={true} />)}
              </div>
            </div>
          )}
          {(binnen30.length>0 || uitBinnen30.length>0) && (
            <div>
              <h2 className="text-base font-semibold text-yellow-700 mb-3 flex items-center gap-2">
                <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-yellow-500 text-white text-xs font-bold">{binnen30.length+uitBinnen30.length}</span>
                {t('dashboard_expires_30_days')}
              </h2>
              <div className="space-y-2">
                {binnen30.map(l=><LotRow key={l.id} lot={l} urgent={false} />)}
                {uitBinnen30.map(u=><VoorraadRow key={u.id} u={u} urgent={false} />)}
              </div>
            </div>
          )}
        </div>
      ) : (
        <div className="bg-green-50 border border-green-200 rounded-xl px-5 py-4 mb-8 text-green-700 text-sm flex items-center gap-3">
          <span className="text-xl">✓</span>
          <span>{t('dashboard_all_ok')}</span>
        </div>
      )}

      {binnen90.length>0 && (
        <details className="bg-white rounded-xl border border-gray-200 shadow-sm mb-6">
          <summary className="px-5 py-4 cursor-pointer font-medium text-gray-700 text-sm select-none list-none flex items-center gap-2">
            <span>🕐</span>
            <span>{t('dashboard_expires_30_90').replace('{n}',binnen90.length)}</span>
          </summary>
          <div className="px-5 pb-4 pt-1 space-y-2">
            {binnen90.map(l=>(
              <div key={l.id} className="flex items-center justify-between px-4 py-2.5 rounded-lg bg-gray-50 border border-gray-200">
                <div>
                  <span className="font-medium text-sm text-gray-800">{ing.find(i=>i.id===l.ingredient_id)?.naam||'Onbekend'}</span>
                  <span className="text-xs text-gray-500 ml-2">{t('lbl_lot_short')}: {l.lotnummer||'—'} · {l.hoeveelheid} {l.eenheid}</span>
                </div>
                <div className="text-sm text-gray-500 font-medium">{daysLeft(l.houdbaarheid)}d · {fmtD(l.houdbaarheid)}</div>
              </div>
            ))}
          </div>
        </details>
      )}

      {tanks && tanks.length>0 && (
        <div className="flex flex-wrap justify-center gap-4 mb-6">
          {tanks.map(tk=>{
            const batch = bat.find(b=>b.tank===tk.id && (b.status==='Vergisten'||b.status==='Conditioneren'));
            return (
              <div key={tk.id} onClick={batch?()=>setPage('batches'):undefined}
                className={`bg-white rounded-xl shadow-sm border p-4 w-64 flex-shrink-0 ${batch?'t-border cursor-pointer hover:shadow-md':'border-gray-200'}`}>
                <div className="flex items-center gap-3">

const ServerStatusCard = () => {
  const [s, setS]     = useState('loading');
  const [info, setInfo] = useState({fetched:0, total:0, pending:0, errors:0});
  React.useEffect(() => {
    const id = setInterval(() => {
      const allLoaded = _allKeys.size > 0 && _fetchedKeys.size >= _allKeys.size;
      let status;
      if (_serverReachable === false && allLoaded && _syncErrors > 0) status = 'error';
      else if (!allLoaded)       status = 'loading';
      else if (_syncPending > 0) status = 'pending';
      else if (_syncErrors > 0)  status = 'error';
      else if (_serverReachable) status = 'ok';
      else                       status = 'loading';
      setS(status);
      setInfo({ fetched:_fetchedKeys.size, total:_allKeys.size, pending:_syncPending, errors:_syncErrors });
    }, 600);
    return () => clearInterval(id);
  }, []);

  const statuses = [
    { key:'loading', dot:'bg-gray-400 animate-pulse',  label:t('settings_server_connecting'),  desc:t('settings_server_connecting_desc') },
    { key:'pending', dot:'bg-yellow-400 animate-pulse', label:t('settings_server_saving'),       desc:t('settings_server_saving_desc') },
    { key:'ok',      dot:'bg-green-400',                label:t('settings_server_synced'),       desc:t('settings_server_synced_desc') },
    { key:'error',   dot:'bg-red-500',                  label:t('settings_server_error'),        desc:t('settings_server_error_desc') },
  ];
  const current = statuses.find(x=>x.key===s) || statuses[0];

  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
      <h2 className="text-lg font-semibold text-gray-700 mb-1">{t('settings_server_sync')}</h2>
      <p className="text-sm text-gray-500 mb-4">{t('settings_server_status_desc')}</p>

      {/* Huidige status */}
      <div className="flex items-center gap-3 p-3 bg-gray-50 rounded-lg border mb-5">
        <span className={`w-3.5 h-3.5 rounded-full flex-shrink-0 ${current.dot}`} />
        <div>
          <div className="font-semibold text-sm text-gray-800">{current.label}</div>
          <div className="text-xs text-gray-500 mt-0.5">{current.desc}</div>
        </div>
      </div>

      {/* Technische details */}
      <div className="flex flex-wrap gap-x-6 gap-y-1 text-xs text-gray-400 mb-5">
        <span>{t('settings_stores_loaded')}: <strong className="text-gray-600">{info.fetched}/{info.total}</strong></span>
        <span>{t('settings_stores_pending')}: <strong className="text-gray-600">{info.pending}</strong></span>
        {info.errors > 0 && <span className="text-red-500">{t('settings_stores_errors')}: <strong>{info.errors}</strong></span>}
        <span className="w-full text-gray-300 font-mono break-all text-xs mt-0.5">{API_BASE}</span>
      </div>

      {/* Uitleg alle statussen */}
      <div className="border-t pt-4">
        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">{t('settings_status_overview')}</p>
        <div className="space-y-3">
          {statuses.map(st => (
            <div key={st.key} className={`flex items-start gap-3 transition-opacity ${s===st.key?'opacity-100':'opacity-40'}`}>
              <span className={`w-2.5 h-2.5 rounded-full flex-shrink-0 mt-0.5 ${st.dot}`} />
              <div>
                <span className="text-sm font-medium text-gray-700">{st.label}</span>
                <span className="text-xs text-gray-500 ml-2">{st.desc}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

function InstellingenPage({accijnsInst, setAccijnsInst, log, setLog, doExport, doImport, importRef, logo, setLogo, appName, setAppName, bfCreds, setBfCreds, tanks, setTanks, hygieneItems, setHygieneItems, hygieneGroups, setHygieneGroups, wcCreds, setWcCreds, wcSyncLog, setWcSyncLog, lang, setLang, navTheme, setNavTheme, btwInst, setBtwInst, inkoopFacturen=[]}) {
  const [tarieven, setTarieven] = React.useState({
    tarief_per_hl_abv: String(accijnsInst?.tarief_per_hl_abv ?? 7.51),
    tarief_per_hl:     String(accijnsInst?.tarief_per_hl     ?? 24.17),
  });
  const [saved, setSaved] = React.useState(false);
  const [customFormulaEnabled, setCustomFormulaEnabled] = React.useState(accijnsInst?.customFormulaEnabled || false);
  const [customFormula, setCustomFormula] = React.useState(accijnsInst?.customFormula || '');
  const [formulaError, setFormulaError] = React.useState('');

  const testFormula = (formula) => {
    if (!formula.trim()) { setFormulaError(''); return true; }
    try {
      const liter = 100, abv = 5, hl = 1, r1 = 7.51, r2 = 24.17;
      const result = new Function('liter','abv','hl','r1','r2', `"use strict"; return (${formula});`)(liter,abv,hl,r1,r2);
      if (typeof result !== 'number' || isNaN(result)) throw new Error('geen getal');
      setFormulaError('');
      return true;
    } catch(e) {
      setFormulaError(`${t('settings_excise_custom_formula_error')}: ${e.message}`);
      return false;
    }
  };

  const saveTarieven = () => {
    const r1 = parseFloat(tarieven.tarief_per_hl_abv);
    const r2 = parseFloat(tarieven.tarief_per_hl);
    if (isNaN(r1)||isNaN(r2)) { alert(t('err_valid_numbers')); return; }
    if (customFormulaEnabled && !testFormula(customFormula)) return;
    setAccijnsInst({tarief_per_hl_abv: r1, tarief_per_hl: r2, customFormulaEnabled, customFormula});
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };

  const resetTarieven = () => {
    setTarieven({tarief_per_hl_abv:'7.51', tarief_per_hl:'24.17'});
    setCustomFormulaEnabled(false);
    setCustomFormula('');
    setFormulaError('');
    setAccijnsInst({tarief_per_hl_abv:7.51, tarief_per_hl:24.17, customFormulaEnabled:false, customFormula:''});
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };

  const clearLog = () => {
    if (!window.confirm(t('error_confirm_clear_log') + ` (${(log||[]).length} regels)`)) return;
    setLog([]);
  };

  const [tankInput, setTankInput] = React.useState('');
  const [nieuwHygieneItem, setNieuwHygieneItem] = React.useState('');
  const [nieuwHygieneItemGroep, setNieuwHygieneItemGroep] = React.useState('');
  const [nieuwGroep, setNieuwGroep] = React.useState('');
  const addTank = () => {
    const id = tankInput.trim().toUpperCase();
    if (!id) return;
    if (tanks.find(t=>t.id===id)) { alert(t('err_tank_exists').replace('{id}',id)); return; }
    setTanks(prev=>[...prev, {id}]);
    setTankInput('');
  };

  const [bfForm, setBfForm]   = React.useState({userId: bfCreds?.userId||'', apiKey: bfCreds?.apiKey||'', enabled: bfCreds?.enabled||false});
  const [bfTesting, setBfTesting] = React.useState(false);
  const [bfMsg, setBfMsg]     = React.useState('');

  // Omdat useStore({secure:true}) asynchroon laadt (geen localStorage), het formulier
  // eenmalig invullen zodra de server-data beschikbaar is.
  const bfFormInitialized = React.useRef(false);
  React.useEffect(() => {
    if (!bfFormInitialized.current && (bfCreds?.userId || bfCreds?.apiKey || bfCreds?.enabled)) {
      setBfForm({userId: bfCreds.userId||'', apiKey: bfCreds.apiKey||'', enabled: bfCreds.enabled||false});
      bfFormInitialized.current = true;
    }
  }, [bfCreds?.userId, bfCreds?.apiKey, bfCreds?.enabled]);

  const saveBf = () => {
    setBfCreds(prev => ({...prev, ...bfForm}));
    setBfMsg('✓ Opgeslagen');
    setTimeout(() => setBfMsg(''), 2000);
  };
  const testBf = async () => {
    setBfTesting(true); setBfMsg('');
    const ok = await bfTest(bfForm.userId, bfForm.apiKey);
    setBfMsg(ok ? '✓ Verbinding gelukt!' : '⚠ Verbinding mislukt — controleer je User ID en API-sleutel');
    setBfTesting(false);
  };

  // WooCommerce form state

        const groups = hygieneGroups && hygieneGroups.length ? hygieneGroups : DEFAULT_HYGIENE_GROUPS;

        // --- Groepen ---
        const addGroep = () => {
          const label = nieuwGroep.trim();
          if (!label) return;
          if (groups.find(g=>g.label.toLowerCase()===label.toLowerCase())) { alert(t('err_group_exists')); return; }
          const maxId = groups.length ? Math.max(...groups.map(g=>g.id)) : 0;
          setHygieneGroups([...groups, {id: maxId+1, label}]);
          setNieuwGroep('');
        };
        const removeGroep = (id) => {
          if (items.some(i=>i.group_id===id)) {
            if (!confirm(t('settings_hygiene_group_has_items'))) return;
            setHygieneItems(items.map(i=>i.group_id===id ? {...i, group_id:null} : i));
          }
          setHygieneGroups(groups.filter(g=>g.id!==id));
        };
        const moveGroep = (id, dir) => {
          const idx = groups.findIndex(g=>g.id===id);
          if (idx<0) return;
          const next = [...groups];
          const swap = idx+dir;
          if (swap<0||swap>=next.length) return;
          [next[idx],next[swap]]=[next[swap],next[idx]];
          setHygieneGroups(next);
        };

        // --- Items ---
        const addItem = () => {
          const label = nieuwHygieneItem.trim();
          if (!label) return;
          const maxId = items.length ? Math.max(...items.map(i=>i.id)) : 0;
          const group_id = nieuwHygieneItemGroep ? Number(nieuwHygieneItemGroep) : null;
          setHygieneItems([...items, {id: maxId+1, label, group_id}]);
          setNieuwHygieneItem('');
        };
        const removeItem = (id) => setHygieneItems(items.filter(i=>i.id!==id));
        const moveItem = (id, dir) => {
          const idx = items.findIndex(i=>i.id===id);
          if (idx<0) return;
          const next = [...items];
          const swap = idx+dir;
          if (swap<0||swap>=next.length) return;
          [next[idx],next[swap]]=[next[swap],next[idx]];
          setHygieneItems(next);
        };
        const setItemGroep = (id, group_id) => setHygieneItems(items.map(i=>i.id===id?{...i,group_id:group_id?Number(group_id):null}:i));
        const resetAlles = () => { if(confirm(t('settings_hygiene_reset_confirm'))) { setHygieneGroups(DEFAULT_HYGIENE_GROUPS); setHygieneItems(DEFAULT_HYGIENE_ITEMS); }};

        return (

                  <div key={g.id} className="flex items-center gap-2 bg-teal-50 border border-teal-200 rounded-lg px-3 py-1.5">

                    <span className="text-xs text-teal-500">{items.filter(i=>i.group_id===g.id).length} items</span>
                    <button onClick={()=>moveGroep(g.id,-1)} disabled={idx===0} className="text-gray-400 hover:text-gray-600 disabled:opacity-20 text-xs px-1">▲</button>
                    <button onClick={()=>moveGroep(g.id,1)} disabled={idx===groups.length-1} className="text-gray-400 hover:text-gray-600 disabled:opacity-20 text-xs px-1">▼</button>
                    <button onClick={()=>removeGroep(g.id)} className="text-gray-400 hover:text-red-500 text-xs ml-1">✕</button>
                  </div>
                ))}
              </div>
              <div className="flex items-center gap-2">
                <input type="text" value={nieuwGroep} onChange={e=>setNieuwGroep(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&addGroep()}
                  placeholder={t('settings_hygiene_group_add_placeholder')}
                  className="border border-gray-300 rounded px-3 py-1.5 text-sm w-48 focus:outline-none focus:border-teal-500" />
                <button onClick={addGroep}
                  className="px-3 py-1.5 bg-teal-600 text-white rounded text-sm font-medium hover:bg-teal-700 transition-colors">
                  {t('settings_hygiene_group_add_btn')}
                </button>
              </div>
            </div>

            {/* Items beheer */}
            <div className="mb-4">

              <div className="space-y-1 mb-3">
                {items.length===0 && <p className="text-sm text-gray-400 italic">{t('settings_hygiene_items_none')}</p>}
                {items.map((item, idx)=>(
                  <div key={item.id} className="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5">
                    <span className="flex-1 text-sm text-gray-700">{item.label}</span>

                    <button onClick={()=>removeItem(item.id)} className="text-gray-400 hover:text-red-500 text-xs ml-1">✕</button>
                  </div>

                  {t('settings_hygiene_item_add_btn')}
                </button>
              </div>
            </div>

            <button onClick={resetAlles}
              className="px-3 py-1.5 bg-gray-100 text-gray-600 rounded text-sm hover:bg-gray-200 transition-colors">
              {t('settings_logo_reset')}
            </button>
          </div>
        );
      })()}

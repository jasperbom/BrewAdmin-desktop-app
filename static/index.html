              };
              const bLog = (log||[]).filter(l=>l.batch_id===selB.id).slice().reverse();
              if (!bLog.length) return null;
              return (
                <div className="bg-white rounded-lg shadow-sm overflow-x-auto">
                  <div className="px-4 py-2.5 bg-gray-700 text-white font-medium text-sm">{t('batch_log')}</div>
                  <table className="w-full text-sm">
                    <thead className="text-xs text-gray-500 bg-gray-50">
                      <tr>
                        <th className="px-3 py-1.5 text-left">{t('lbl_date')}</th>
                        <th className="px-3 py-1.5 text-left">{t('lbl_type')}</th>
                        <th className="px-3 py-1.5 text-left">{t('batch_log_description')}</th>
                        <th className="px-3 py-1.5 text-right">{t('lbl_quantity')}</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {bLog.map(l=>{
                        const t = TYPE[l.type] || {icon:'•', label:l.type||'—', cls:'text-gray-600 bg-gray-100'};
                        const omschr = l.ingredient_naam
                          ? l.ingredient_naam + (l.lotnummer ? ` · lot: ${l.lotnummer}` : '')
                          : l.verpakking_type || l.referentie || '—';
                        const qty = l.hoeveelheid!=null
                          ? `${l.hoeveelheid} ${l.eenheid||''}${l.referentie&&l.type!=='gebruik'?` (${l.referentie})`:''}`.trim()
                          : '—';
                        return (
                          <tr key={l.id} className="hover:bg-gray-50">
                            <td className="px-3 py-1.5 text-xs text-gray-500 whitespace-nowrap">{l.datum||'—'}</td>
                            <td className="px-3 py-1.5">
                              <span className={`inline-flex items-center gap-1 text-xs font-medium px-1.5 py-0.5 rounded ${t.cls}`}>
                                {t.icon} {t.label}
                              </span>
                            </td>
                            <td className="px-3 py-1.5 text-xs">{omschr}</td>
                            <td className="px-3 py-1.5 text-right font-mono text-xs text-gray-700">{qty}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              );
            })()}
          </div>
        </>)}
      </div>

      {uitModal && (
        <Modal title={`Uitslaan: ${uitModal.verpakking_type}`} onClose={()=>setUitModal(null)}>
          <div className="space-y-3">
            <div className="p-3 bg-blue-50 rounded text-sm text-blue-800">
              <div className="font-medium">{selB?.naam}{selB?.batch_nummer ? ` — #${selB.batch_nummer}` : ''}</div>
              <div>{uitModal.verpakking_type} · {uitModal.inhoud_per_eenheid}L per stuk</div>
              {uitModal.tht && <div className="text-xs mt-0.5">THT: {fmtD(uitModal.tht)}</div>}
              <div className="mt-1">{t('lbl_available')}: <strong>{resterendAv(uitModal)} stuks</strong></div>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <Inp label={`${t('batch_release_count')} *`} type="number" value={uitAantal} onChange={setUitAantal} placeholder={`max ${resterendAv(uitModal)}`} />
              <Inp label={t('lbl_date')} type="date" value={uitDatum} onChange={setUitDatum} />
            </div>
            {uitAantal && Number(uitAantal)>0 && (()=>{
              const liter = Number(uitAantal)*Number(uitModal.inhoud_per_eenheid||0);
              const r1 = Number(accijnsInst?.tarief_per_hl_abv||7.51);
              const r2 = Number(accijnsInst?.tarief_per_hl||24.17);
              const ac = accijnsCalc(liter, selB?.ABV||0, r1, r2, accijnsInst);
              return <div className="p-2 bg-amber-50 rounded text-xs text-amber-800">
                {liter.toFixed(1)}L → accijns: <strong>{fmt(ac)}</strong>
              </div>;
            })()}
            <div className="flex justify-end gap-2">
              <Btn v="secondary" onClick={()=>setUitModal(null)}>{t('btn_cancel')}</Btn>
              <Btn v="blue" onClick={doUitslaan} disabled={!uitAantal||Number(uitAantal)<=0}>{t('log_release')}</Btn>
            </div>
          </div>
        </Modal>
      )}

      {showForm && (
        <Modal title={editId?t('batch_edit_title'):t('batch_new_title')} onClose={()=>setShowForm(false)} wide>
          <div className="space-y-3">
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <Inp label={t('lbl_batch_number')} value={bForm.batch_nummer} onChange={v=>setBForm(f=>({...f,batch_nummer:v}))} placeholder="B-2025-001" />
              <Inp label={t('lbl_name')+' *'} value={bForm.naam} onChange={v=>setBForm(f=>({...f,naam:v}))} placeholder={t('ph_beer_name')} />
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <Inp label={t('lbl_style')} value={bForm.stijl} onChange={v=>setBForm(f=>({...f,stijl:v}))} placeholder={t('ph_beer_style')} />
              <Sel label={t('lbl_status')} value={bForm.status} onChange={v=>setBForm(f=>({...f,status:v}))} opts={STATUSSEN.map(s=>({v:s,l:({Gepland:t('status_planning'),Brouwen:t('status_brewing'),Vergisten:t('status_fermenting'),Conditioneren:t('status_conditioning'),Verpakt:t('status_packaged'),Gesloten:t('status_closed')})[s]||s}))} />
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              {tanks && tanks.length>0
                ? <div>
                    <label className="block text-xs font-medium text-gray-600 mb-0.5">Tank</label>
                    <select value={bForm.tank||''} onChange={e=>setBForm(f=>({...f,tank:e.target.value}))}
                      className="w-full border border-gray-300 rounded px-2 py-1.5 text-sm bg-white focus:ring-1 focus:ring-amber-500 outline-none">
                      <option value="">{t('batch_no_tank')}</option>
                      {tanks.map(t=>{
                        const bezet = bat.find(b=>b.tank===t.id && b.id!==editId && ['Vergisten','Conditioneren'].includes(b.status));
                        return <option key={t.id} value={t.id} disabled={!!bezet}>
                          {t.id}{bezet ? ` — bezet (${bezet.naam})` : ''}
                        </option>;
                      })}
                    </select>
                  </div>
                : <Inp label={t('lbl_tank')} value={bForm.tank} onChange={v=>setBForm(f=>({...f,tank:v}))} placeholder="FV1" />
              }
              <Inp label={t('lbl_date')} type="date" value={bForm.datum} onChange={v=>setBForm(f=>({...f,datum:v}))} />
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              <Inp label={t('lbl_liters_fermented')} type="number" value={bForm.liter_vergist} onChange={v=>setBForm(f=>({...f,liter_vergist:v}))} placeholder="0" />
              <Inp label={t('lbl_og')} type="number" value={bForm.OG} onChange={v=>setBForm(f=>({...f,OG:v}))} placeholder="1.050" />
              <Inp label={t('lbl_fg')} type="number" value={bForm.FG} onChange={v=>setBForm(f=>({...f,FG:v}))} placeholder="1.010" />
              <Inp label={t('lbl_abv')} type="number" value={bForm.ABV} onChange={v=>setBForm(f=>({...f,ABV:v}))} placeholder="5.0" />
            </div>
            <div className="grid grid-cols-3 gap-3">
              <Inp label={t('batch_info_brew_efficiency')} type="number" value={bForm.brouwzaal_eff||''} onChange={v=>setBForm(f=>({...f,brouwzaal_eff:v}))} placeholder="75" />
              <Inp label={t('batch_info_mash_efficiency')} type="number" value={bForm.maisch_eff||''} onChange={v=>setBForm(f=>({...f,maisch_eff:v}))} placeholder="80" />
              <Inp label={t('batch_info_mash_ph')} type="number" value={bForm.maisch_ph||''} onChange={v=>setBForm(f=>({...f,maisch_ph:v}))} placeholder="5.4" />
              <Inp label={t('batch_info_product_ph')} type="number" value={bForm.product_ph||''} onChange={v=>setBForm(f=>({...f,product_ph:v}))} placeholder="4.3" />
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              <Inp label={t('batch_costs_electricity')+' (€)'} type="number" value={bForm.electra_kosten} onChange={v=>setBForm(f=>({...f,electra_kosten:v}))} placeholder="0" />
              <Inp label={t('batch_costs_water')+' (€)'} type="number" value={bForm.water_kosten} onChange={v=>setBForm(f=>({...f,water_kosten:v}))} placeholder="0" />
              <Inp label={t('batch_costs_cleaning')+' (€)'} type="number" value={bForm.schoonmaak_kosten} onChange={v=>setBForm(f=>({...f,schoonmaak_kosten:v}))} placeholder="0" />
              <Inp label={t('batch_costs_other')+' (€)'} type="number" value={bForm.overige_kosten} onChange={v=>setBForm(f=>({...f,overige_kosten:v}))} placeholder="0" />
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-0.5">Notities</label>
              <textarea value={safeStr(bForm.notities)} onChange={e=>setBForm(f=>({...f,notities:e.target.value}))}
                className="w-full border border-gray-300 rounded px-2 py-1.5 text-sm" rows={2} placeholder={t('lbl_notes')+'...'} />
            </div>
            <div className="flex justify-end gap-2"><Btn v="secondary" onClick={()=>setShowForm(false)}>{t('btn_cancel')}</Btn><Btn onClick={saveBatch}>{t('btn_save')}</Btn></div>
          </div>
        </Modal>
      )}

      {showBf && (
        <Modal title={t('batch_brewfather_import_title')} onClose={()=>{setShowBf(false);setBfJson('');setBfFileName('');}} wide>
          <div className="space-y-4">
            <p className="text-xs text-gray-500">{t('batch_brewfather_instruction')}</p>

            {/* Bestandskiezer */}
            <div
              onClick={()=>bfFileRef.current?.click()}
              className="border-2 border-dashed border-amber-300 rounded-lg p-6 text-center cursor-pointer hover:bg-amber-50 transition-colors">
              <div className="text-3xl mb-2">📂</div>
              <div className="text-sm font-medium text-gray-700">{t('batch_brewfather_choose_file')}</div>
              <div className="text-xs text-gray-400 mt-1">{t('batch_brewfather_file_type')}</div>
              {bfFileName && <div className="mt-2 text-xs text-green-700 font-medium">✓ {bfFileName}</div>}
            </div>
            <input ref={bfFileRef} type="file" accept=".json,application/json" className="hidden" onChange={loadBfFile} />

            {/* Of plak JSON */}
            <details>
              <summary className="text-xs text-gray-500 cursor-pointer hover:text-gray-700 select-none">{t('batch_brewfather_paste_json')}</summary>
              <div className="mt-2 space-y-2">
                <textarea value={bfJson} onChange={e=>setBfJson(e.target.value)}
                  className="w-full border border-gray-300 rounded px-2 py-1.5 text-xs font-mono h-32 focus:ring-1 focus:ring-amber-500 outline-none"
                  placeholder='{"name":"Mijn Batch","recipe":{"fermentables":[...],"hops":[...]}}' />
                <div className="flex justify-end">
                  <Btn onClick={importBf} disabled={!bfJson.trim()}>{t('btn_import_json')}</Btn>
                </div>
              </div>
            </details>

            <div className="flex justify-end">
              <Btn v="secondary" onClick={()=>{setShowBf(false);setBfJson('');setBfFileName('');}}>{t('btn_close')}</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ===== AFVULLEN =====
// Uitslagen schema: {id, batch_id, afvulling_id, verpakking_type, inhoud_per_eenheid,
//                    aantal, datum, liter, accijns, status:'uitgeslagen'|'verkocht', verkocht_datum}

function AfvullenPage({bat, setBat, av, setAv, uit, setUit, acc, setAcc, verpakkingen, setVerpakkingen, accijnsInst}) {
  const r1 = Number(accijnsInst?.tarief_per_hl_abv||7.51);
  const r2 = Number(accijnsInst?.tarief_per_hl||24.17);
  const [sel, setSel] = useState(null);
  const [uitModal, setUitModal] = useState(null); // holds afvulling being uitgeslagen
  const [uitAantal, setUitAantal] = useState('');
  const [uitDatum, setUitDatum] = useState(tod());
  const emptyAv = {verpakking_id:'',verpakking_type:'',inhoud_per_eenheid:'',hoeveelheid:'',datum:tod(),tht:''};
  const [avF, setAvF] = useState(emptyAv);

  const activeBat = bat.filter(b=>b.status==='Vergisten'||b.status==='Conditioneren');
  const selB = bat.find(b=>b.id===sel);
  const bAv = sel ? av.filter(a=>a.batch_id===sel) : [];

  // How many of a given afvulling have already been uitgeslagen
  const uitgeslagenVanAfvulling = (avId) =>
    uit.filter(u=>u.afvulling_id===avId).reduce((s,u)=>s+Number(u.aantal||0),0);

  // Remaining per afvulling
  const resterend = (a) => Number(a.hoeveelheid||0) - uitgeslagenVanAfvulling(a.id);

  const totAfgevuld = bAv.reduce((s,a)=>s+Number(a.inhoud_per_eenheid||0)*Number(a.hoeveelheid||0),0);
  const totUitgeslagen = bAv.reduce((s,a)=>{
    const used = uitgeslagenVanAfvulling(a.id);
    return s + used * Number(a.inhoud_per_eenheid||0);
  },0);

  const doAfvullen = () => {
    if (!avF.verpakking_id||!avF.hoeveelheid) { alert(t('err_select_packaging_qty')); return; }
    const n = Number(avF.hoeveelheid);
    const vp = verpakkingen.find(v=>v.id===Number(avF.verpakking_id));
    if (!vp) { alert(t('err_invalid_packaging')); return; }
    if (Number(vp.voorraad||0) < n) { alert(t('err_insufficient_packaging_n').replace('{n}',vp.voorraad||0)); return; }
    // Afboeken van verpakkingen voorraad
    setVerpakkingen(prev=>prev.map(v=>v.id===Number(avF.verpakking_id)?{...v,voorraad:Number(v.voorraad||0)-n}:v));
    setAv(prev=>[...prev,{id:newId(av),batch_id:sel,...avF,verpakking_id:Number(avF.verpakking_id),inhoud_per_eenheid:Number(avF.inhoud_per_eenheid),hoeveelheid:n}]);
    setAvF(emptyAv);
  };

  const doUitslaan = () => {
    if (!uitAantal) { alert(t('err_enter_qty')); return; }
    const n = Number(uitAantal);
    const rest = resterend(uitModal);
    if (n > rest) { alert(t('err_max_available').replace('{n}',rest)); return; }
    const liter = n * Number(uitModal.inhoud_per_eenheid||0);
    const accBed = accijnsCalc(liter, selB?.ABV||0, r1, r2, accijnsInst);
    const nu = {
      id: newId(uit),
      batch_id: sel,
      afvulling_id: uitModal.id,
      verpakking_type: uitModal.verpakking_type,
      inhoud_per_eenheid: uitModal.inhoud_per_eenheid,
      aantal: n, datum: uitDatum,
      liter, accijns: accBed,
      tht: uitModal.tht||null,
      verkocht_stuks: 0
    };
    setUit(prev=>[...prev, nu]);
    // Één accijns-record per uitslag
    setAcc(prev=>[...prev, {
      id: newId(prev),
      batch_id: sel,
      batch_nummer: selB?.batch_nummer||'',
      uitslag_id: nu.id,
      verpakking_type: uitModal.verpakking_type,
      datum: uitDatum,
      aantal: n,
      liter,
      abv: selB?.ABV||0,
      accijns: accBed,
      betaald: false,
      betaal_datum: null
    }]);
    setUitModal(null); setUitAantal(''); setUitDatum(tod());
  };

  const delAv = (id) => {
    if (uit.some(u=>u.afvulling_id===id)) { alert(t('err_cannot_delete_filling')); return; }
    setAv(prev=>prev.filter(a=>a.id!==id));
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-lg font-semibold">{t('nav_afvullen')}</h2>
      </div>
      <div className="flex flex-col md:flex-row gap-4 md:items-start">
        <div className={`w-full md:w-60 md:flex-shrink-0 bg-white rounded-lg shadow-sm overflow-x-auto${sel?' hidden md:block':''}`}>
          <div className="px-3 py-2 bg-gray-700 text-white text-xs font-medium uppercase">{t('nav_batches')}</div>
          {activeBat.length===0 && <div className="p-4 text-sm text-gray-400 text-center">{t('filling_no_active')}</div>}
          {activeBat.map(b=>(
            <div key={b.id} onClick={()=>setSel(b.id===sel?null:b.id)}
              className={`px-3 py-2.5 border-b cursor-pointer hover:bg-amber-50 ${sel===b.id?'bg-amber-50 border-l-2 border-l-amber-500':''}`}>
              <div className="text-sm font-medium">{b.naam}</div>
              <div className="mt-0.5"><Badge s={b.status} /></div>
            </div>
          ))}
        </div>

        {selB && (<>
          <button className="md:hidden mb-2 flex items-center gap-1 text-sm font-medium text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 w-full" onClick={()=>setSel(null)}>{t('btn_back')}</button>
          <div className="flex-1 min-w-0 space-y-4">
            {/* Summary */}
            {(() => {
              const vergist = Number(selB.liter_vergist||0);
              const inTank = Math.max(0, vergist - totAfgevuld);
              const opVoorraad = totAfgevuld - totUitgeslagen;
              const inTankPct = vergist>0 ? Math.round(inTank/vergist*100) : null;
              return (
                <div className="bg-white rounded-lg shadow-sm p-3 grid grid-cols-2 sm:grid-cols-5 gap-3 text-sm">
                  {[
                    ['Vergist', selB.liter_vergist?`${selB.liter_vergist}L`:'—', ''],
                    ['In tank', vergist?`${inTank.toFixed(1)}L${inTankPct!==null?` (${inTankPct}%)`:''}`:' — ', inTank>0?'text-orange-600':'text-gray-400'],
                    [t('lbl_filled'), `${totAfgevuld.toFixed(1)}L`, 'text-green-700'],
                    [t('batch_stat_released'), `${totUitgeslagen.toFixed(1)}L`, 'text-blue-700'],
                    [t('batch_stat_in_stock'), `${opVoorraad.toFixed(1)}L`, 'text-amber-700'],
                  ].map(([l,v,c])=>(
                    <div key={l}><span className="text-gray-500 text-xs">{l}</span><div className={`font-medium ${c}`}>{v}</div></div>
                  ))}
                </div>
              );
            })()}

            {/* Afvullen form */}
            <div className="bg-white rounded-lg shadow-sm overflow-hidden">
              <div className="px-4 py-2.5 bg-gray-700 text-white font-medium text-sm">{t('batch_filling_register')}</div>
              <div className="p-3">
              <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-0.5">{t('lbl_packaging')} <span className="text-red-500">*</span></label>
                  {verpakkingen.length===0
                    ? <div className="border border-dashed border-orange-300 bg-orange-50 rounded px-2 py-1.5 text-xs text-orange-600">
                        Voeg eerst verpakkingen toe via Ingrediënten → Verpakkingen
                      </div>
                    : <select value={avF.verpakking_id} onChange={e=>{
                        const vp = verpakkingen.find(v=>v.id===Number(e.target.value));
                        setAvF(f=>({...f, verpakking_id:e.target.value, verpakking_type:vp?.naam||'', inhoud_per_eenheid:vp?.inhoud_liter||''}));
                      }} className="w-full border border-gray-300 rounded px-2 py-1.5 text-sm focus:ring-1 focus:ring-amber-500 bg-white outline-none">
                        <option value="">{t('batch_filling_select_ph')}</option>
                        {verpakkingen.map(vp=>(
                          <option key={vp.id} value={vp.id} disabled={Number(vp.voorraad||0)===0}>
                            {vp.naam} — {Number(vp.voorraad||0)} stuks
                          </option>
                        ))}
                      </select>
                  }
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-0.5">{t('batch_filling_content')}</label>
                  <div className="border border-gray-200 bg-gray-50 rounded px-2 py-1.5 text-sm text-gray-700 min-h-[34px] flex items-center">
                    {avF.inhoud_per_eenheid ? `${avF.inhoud_per_eenheid}L` : <span className="text-gray-400 text-xs">auto</span>}
                  </div>
                </div>
                <Inp label={t('batch_filling_units')} type="number" value={avF.hoeveelheid} onChange={v=>setAvF(f=>({...f,hoeveelheid:v}))} placeholder="1" />
                <Inp label={t('batch_filling_date')} type="date" value={avF.datum} onChange={v=>setAvF(f=>({...f,datum:v}))} />
                <Inp label={t('batch_filling_tht')} type="date" value={avF.tht} onChange={v=>setAvF(f=>({...f,tht:v}))} />
              </div>
              <div className="mt-2 flex items-center justify-between">
                {avF.inhoud_per_eenheid&&avF.hoeveelheid && <span className="text-sm text-gray-500">{t('lbl_total_colon')} {(Number(avF.inhoud_per_eenheid)*Number(avF.hoeveelheid)).toFixed(1)}L · {avF.hoeveelheid}× {avF.verpakking_type}</span>}
                <Btn onClick={doAfvullen} cls="ml-auto">{t('batch_filling_register_btn')}</Btn>
              </div>
              </div>{/* /p-3 */}
            </div>

            {/* Klaar met afvullen */}
            {selB.status!=='Verpakt' && selB.status!=='Gesloten' && bAv.length>0 && (
              <div className="bg-green-50 border border-green-200 rounded-lg p-3 flex items-center justify-between gap-4">
                <div>
                  <div className="text-sm font-medium text-green-800">{t('batch_ready_confirm')}</div>
                  <div className="text-xs text-green-600 mt-0.5">{t('batch_ready_text')}</div>
                </div>
                <Btn v="green" onClick={()=>{if(confirm(t('err_confirm_mark_packed').replace('{name}',selB.naam))){setBat(prev=>prev.map(b=>b.id===sel?{...b,status:'Verpakt'}:b));addLog({type:'status',batch_id:sel,referentie:`${selB.status} → Verpakt`})}}}>
                  {t('batch_ready_button')}
                </Btn>
              </div>
            )}
            {selB.status==='Verpakt' && (
              <div className="bg-green-50 border border-green-200 rounded-lg px-3 py-2 text-sm text-green-700 flex items-center gap-2">
                <span>✓</span> <span>{t('batch_filling_done_text')} <strong>{t('nav_batches')}</strong> {t('batch_filling_done_page')}.</span>
              </div>
            )}

            {/* Afgevulde voorraad tabel met uitslaan-knop */}
            <div className="bg-white rounded-lg shadow-sm overflow-x-auto">
              <div className="px-4 py-2.5 bg-gray-700 text-white font-medium text-sm">{t('batch_filled_stock')}</div>
              <table className="w-full text-sm">
                <thead className="text-xs text-gray-500 bg-gray-50">
                  <tr>
                    <th className="px-3 py-2 text-left">{t('lbl_packaging')}</th>
                    <th className="px-3 py-2 text-right">{t('lbl_content')}</th>
                    <th className="px-3 py-2 text-right">{t('lbl_total_filled')}</th>
                    <th className="px-3 py-2 text-right">{t('filling_summary_released')}</th>
                    <th className="px-3 py-2 text-right font-semibold text-amber-700">{t('lbl_remaining')}</th>
                    <th className="px-3 py-2 text-left">{t('lbl_date')}</th>
                    <th className="px-3 py-2 text-left">{t('lbl_tht')}</th>
                    <th className="px-3 py-2"></th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {bAv.length===0 && <tr><td colSpan={7} className="px-3 py-4 text-center text-gray-400">{t('batch_no_filled')}</td></tr>}
                  {bAv.map(a => {
                    const uitgeslagen = uitgeslagenVanAfvulling(a.id);
                    const rest = Number(a.hoeveelheid||0) - uitgeslagen;
                    return (
                      <tr key={a.id} className={rest===0?'bg-gray-50 text-gray-400':''}>
                        <td className="px-3 py-2">{a.verpakking_type}</td>
                        <td className="px-3 py-2 text-right">{a.inhoud_per_eenheid}L</td>
                        <td className="px-3 py-2 text-right">{a.hoeveelheid}× ({(a.inhoud_per_eenheid*a.hoeveelheid).toFixed(1)}L)</td>
                        <td className="px-3 py-2 text-right text-blue-600">{uitgeslagen>0?`${uitgeslagen}×`:'—'}</td>
                        <td className={`px-3 py-2 text-right font-semibold ${rest>0?'text-amber-700':'text-gray-400'}`}>{rest>0?`${rest}×`:t('lbl_empty')}</td>
                        <td className="px-3 py-2 text-gray-500">{fmtD(a.datum)}</td>
                        <td className="px-3 py-2 text-gray-500">{a.tht ? fmtD(a.tht) : '—'}</td>
                        <td className="px-3 py-2">
                          <div className="flex gap-1">
                            {rest>0 && <Btn s="sm" v="blue" onClick={()=>{setUitModal(a);setUitAantal('');setUitDatum(tod());}}>{t('log_release')}</Btn>}
                            {uitgeslagen===0 && <button onClick={()=>delAv(a.id)} className="text-red-400 hover:text-red-600 text-xs">✕</button>}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </>)}
      </div>

      {/* Uitslaan modal */}
      {uitModal && (
        <Modal title={`Uitslaan: ${uitModal.verpakking_type}`} onClose={()=>setUitModal(null)}>
          <div className="space-y-3">
            <div className="p-3 bg-blue-50 rounded text-sm text-blue-800">
              <div className="font-medium">{selB?.naam}{selB?.batch_nummer ? ` — #${selB.batch_nummer}` : ''}</div>
              <div>{uitModal.verpakking_type} · {uitModal.inhoud_per_eenheid}L per stuk</div>
              {uitModal.tht && <div className="text-xs mt-0.5">THT: {fmtD(uitModal.tht)}</div>}
              <div className="mt-1">{t('lbl_available')}: <strong>{resterend(uitModal)} stuks</strong></div>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <Inp label={`${t('batch_release_count')} *`} type="number" value={uitAantal} onChange={setUitAantal} placeholder={`max ${resterend(uitModal)}`} />
              <Inp label={t('lbl_date')} type="date" value={uitDatum} onChange={setUitDatum} />
            </div>
            {uitAantal && Number(uitAantal)>0 && (()=>{
              const liter = Number(uitAantal)*Number(uitModal.inhoud_per_eenheid||0);
              const ac = accijnsCalc(liter, selB?.ABV||0, r1, r2, accijnsInst);
              return <div className="p-2 bg-amber-50 rounded text-xs text-amber-800">
                {liter.toFixed(1)}L → accijns: <strong>{fmt(ac)}</strong>
                {selB?.ABV && <span className="ml-1 text-amber-600">(max({(liter/100).toFixed(3)}hL × {selB.ABV}% × €{r1.toFixed(2).replace('.',',')}, {(liter/100).toFixed(3)}hL × €{r2.toFixed(2).replace('.',',')}))</span>}
              </div>;
            })()}
            <div className="flex justify-end gap-2">
              <Btn v="secondary" onClick={()=>setUitModal(null)}>{t('btn_cancel')}</Btn>
              <Btn v="blue" onClick={doUitslaan} disabled={!uitAantal||Number(uitAantal)<=0}>{t('log_release')}</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ===== VOORRAAD (uitgeslagen voorraad) =====
function VoorraadPage({bat, uit, setUit, acc, setAcc, archief, setArchief, geslotenBieren, setGeslotenBieren, archiefIngeklapt, setArchiefIngeklapt, artikelen, setArtikelen, wcCreds, setWcCreds, wcSyncLog, setWcSyncLog}) {
  const [filterBatch, setFilterBatch] = useState('');
  const [wcSyncing, setWcSyncing] = useState(false);
  const [wcSyncMsg, setWcSyncMsg] = useState('');

  // ---- Artikelenstambestand modal ----
  const emptyArt = {artikelnummer:'', ean:'', verkoopprijs:'', btw:'21', omschrijving:''};
  const [artModal, setArtModal] = useState(null); // null = gesloten; {biernaam, verpakking_type}
  const [artForm, setArtForm] = useState(emptyArt);

  const artKey = (biernaam, verpakking_type) => biernaam + '|||' + verpakking_type;

  const openArtModal = (biernaam, verpakking_type, e) => {
    e.stopPropagation();
    const bestaand = (artikelen||[]).find(a => a.key === artKey(biernaam, verpakking_type));
    setArtForm(bestaand ? {
      artikelnummer: bestaand.artikelnummer||'',
      ean:           bestaand.ean||'',
      verkoopprijs:  bestaand.verkoopprijs!=null ? String(bestaand.verkoopprijs) : '',
      btw:           bestaand.btw!=null ? String(bestaand.btw) : '21',
      omschrijving:  bestaand.omschrijving||'',
    } : emptyArt);
    setArtModal({biernaam, verpakking_type});
  };

  const saveArtikel = () => {
    const k = artKey(artModal.biernaam, artModal.verpakking_type);
    const entry = {
      key:            k,
      biernaam:       artModal.biernaam,
      verpakking_type:artModal.verpakking_type,
      artikelnummer:  artForm.artikelnummer.trim(),
      ean:            artForm.ean.trim(),
      verkoopprijs:   artForm.verkoopprijs !== '' ? Number(artForm.verkoopprijs) : null,
      btw:            artForm.btw !== '' ? Number(artForm.btw) : null,
      omschrijving:   artForm.omschrijving.trim(),
    };
    setArtikelen(prev => {
      const filtered = (prev||[]).filter(a => a.key !== k);
      return [...filtered, entry];
    });
    setArtModal(null);
  };

  const deleteArtikel = () => {
    const k = artKey(artModal.biernaam, artModal.verpakking_type);
    setArtikelen(prev => (prev||[]).filter(a => a.key !== k));
    setArtModal(null);
  };
  // ---- einde artikelenstambestand ----

  const setVerkocht = (id, val) => setUit(prev => prev.map(u => {
    if (u.id !== id) return u;
    return {...u, verkocht_stuks: Math.max(0, Math.min(Number(u.aantal||0), Number(val)||0))};
  }));

  const archiveerUitslag = (u) => {
    const b = getBatch(u.batch_id);
    setArchief(prev => [...(prev||[]), {
      ...u,
      batch_naam:   b?.naam         || 'Onbekend',
      batch_nummer: b?.batch_nummer || '',
      archiveer_datum: tod(),
    }]);
    setUit(prev => prev.filter(x => x.id !== u.id));
  };

  const getBatch = (bid) => bat.find(b=>b.id===bid);

  // Helper: accijns betaald of geen accijns verschuldigd voor deze uitslag?
  // Gebruikt filter+every zodat dubbele records (zelfde uitslag_id) allemaal betaald moeten zijn
  const wcAccijnsBetaald = (u) => {
    const records = (acc||[]).filter(ax => String(ax.uitslag_id) === String(u.id));
    if (records.length === 0) return Number(u.accijns||0) === 0;
    return records.every(a => a.betaald === true || Number(a.accijns||0) === 0);
  };

  // Debug helper
  const wcAccijnsReden = (u) => {
    const records = (acc||[]).filter(ax => String(ax.uitslag_id) === String(u.id));
    if (records.length === 0) return Number(u.accijns||0) === 0 ? `✓ geen record, uitslag.accijns=0` : `✗ geen record, uitslag.accijns=${Number(u.accijns||0).toFixed(2)}`;
    const ok = records.every(a => a.betaald === true || Number(a.accijns||0) === 0);
    const detail = records.map(a => `acc.id=${a.id} betaald=${a.betaald} accijns=${Number(a.accijns||0).toFixed(2)}`).join(' & ');
    return `${ok?'✓':'✗'} ${records.length} record(s): ${detail}`;
  };

  const addWcLog = (type, msg, details) => {
    const entry = {id: Date.now(), ts: new Date().toISOString(), type, msg, details: details||''};
    setWcSyncLog(prev => [entry, ...(prev||[])].slice(0, 100));
  };

  // Beschikbare WC-voorraad voor een artikel (alleen uitslagen met betaalde/geen accijns)
  const wcBeschikbaarVoorArt = (art) =>
    (uit||[])
      .filter(u=>{ const b=bat.find(bx=>bx.id===u.batch_id); return b?.naam===art.biernaam && u.verpakking_type===art.verpakking_type; })
      .filter(u=>wcAccijnsBetaald(u))
      .reduce((s,u)=>s+Math.max(0,Number(u.aantal||0)-Number(u.verkocht_stuks||0)), 0);

  // Push alle voorraad naar WooCommerce
  const wcPushAll = async () => {
    if (!wcCreds?.enabled || !wcCreds?.storeUrl) {
      setWcSyncMsg(t('error_no_woocommerce')); return;
    }
    setWcSyncing(true); setWcSyncMsg('');
    try {
      let bijgewerkt = 0;
      const combis = (artikelen||[]).filter(a=>a.artikelnummer);
      for (const art of combis) {
        const beschikbaar = wcBeschikbaarVoorArt(art);
        // Debug: log per uitslag de accijns-beslissing
        const uitslagenVoorArt = (uit||[]).filter(u=>{ const b=bat.find(bx=>bx.id===u.batch_id); return b?.naam===art.biernaam && u.verpakking_type===art.verpakking_type; });
        const debugDetails = uitslagenVoorArt.map(u=>`id=${u.id} aantal=${u.aantal} accijns=${Number(u.accijns||0).toFixed(2)}: ${wcAccijnsReden(u)}`).join(' | ');
        console.log(`WC push ${art.biernaam} ${art.verpakking_type}: beschikbaar=${beschikbaar}`, debugDetails);
        addWcLog('debug', `🔍 ${art.biernaam} ${art.verpakking_type} → ${beschikbaar}×`, debugDetails || 'geen uitslagen');
        const prods = await wcGet(`products?sku=${encodeURIComponent(art.artikelnummer)}&per_page=1`);
        if (!prods?.length) continue;
        await wcPut(`products/${prods[0].id}`, {stock_quantity: beschikbaar, manage_stock: true});
        bijgewerkt++;
      }
      setWcCreds(prev=>({...prev, lastSync: new Date().toISOString()}));
      const pushMsg = `${bijgewerkt} product${bijgewerkt!==1?'en':''} bijgewerkt`;
      setWcSyncMsg(`✓ ${pushMsg}`);
      addWcLog('push', `↑ Push voorraad — ${pushMsg}`, combis.filter(a=>a.artikelnummer).map(a=>`${a.biernaam} ${a.verpakking_type}: ${wcBeschikbaarVoorArt(a)}×`).join(', '));
    } catch(e) {
      setWcSyncMsg(`⚠ Push mislukt: ${e.message}`);
      addWcLog('fout', `↑ Push mislukt — ${e.message}`);
    }
    setWcSyncing(false);
    setTimeout(()=>setWcSyncMsg(''), 6000);
  };

  // Pull verkopen vanuit WooCommerce → verdeel diff FIFO over verkocht_stuks
  const wcPullSales = async () => {
    if (!wcCreds?.enabled || !wcCreds?.storeUrl) {
      setWcSyncMsg(t('error_no_woocommerce')); return;
    }
    setWcSyncing(true); setWcSyncMsg('');
    try {
      let bijgewerkt = 0;
      const combis = (artikelen||[]).filter(a=>a.artikelnummer);
      for (const art of combis) {
        const prods = await wcGet(`products?sku=${encodeURIComponent(art.artikelnummer)}&per_page=1`);
        if (!prods?.length) continue;
        const wcStock = Number(prods[0].stock_quantity||0);
        const uitslagenVoorDitArtikel = (uit||[]).filter(u=>{
          const b = bat.find(bx=>bx.id===u.batch_id);
          return b?.naam===art.biernaam && u.verpakking_type===art.verpakking_type;
        });
        // Alleen accijns-vrije/betaalde uitslagen vergelijken met WC voorraad
        const brewBeschikbaar = uitslagenVoorDitArtikel
          .filter(u=>wcAccijnsBetaald(u))
          .reduce((s,u)=>s+Math.max(0,Number(u.aantal||0)-Number(u.verkocht_stuks||0)),0);
        const diff = brewBeschikbaar - wcStock;
        if (diff <= 0) continue;
        // FIFO: verdeel diff over uitslagen (oudste eerst), ook alleen betaalde accijns
        const gesorteerd = [...uitslagenVoorDitArtikel]
          .filter(u=>wcAccijnsBetaald(u))
          .sort((a,b)=>a.id-b.id);
        let teDelen = diff;
        const updates = {};
        for (const u of gesorteerd) {
          if (teDelen <= 0) break;
          const beschik = Math.max(0, Number(u.aantal||0) - Number(u.verkocht_stuks||0));
          if (beschik <= 0) continue;
          const extra = Math.min(beschik, teDelen);
          updates[u.id] = Number(u.verkocht_stuks||0) + extra;
          teDelen -= extra;
        }
        if (Object.keys(updates).length) {
          setUit(prev=>prev.map(u=>updates[u.id]!==undefined ? {...u, verkocht_stuks: updates[u.id]} : u));
          bijgewerkt += Object.keys(updates).length;
        }
      }
      setWcCreds(prev=>({...prev, lastSync: new Date().toISOString()}));
      const pullMsg = `${bijgewerkt} uitslag${bijgewerkt!==1?'en':''} bijgewerkt`;
      setWcSyncMsg(`✓ Pull klaar — ${pullMsg}`);
      addWcLog('pull', `↓ Pull verkopen — ${pullMsg}`);
    } catch(e) {
      setWcSyncMsg(`⚠ Pull mislukt: ${e.message}`);
      addWcLog('fout', `↓ Pull mislukt — ${e.message}`);
    }
    setWcSyncing(false);
    setTimeout(()=>setWcSyncMsg(''), 6000);
  };

  // Summary cards: totals per verpakking_type — inclusief gearchiveerde (volledig verkocht)
  const allTypes = [...new Set([
    ...uit.map(u=>u.verpakking_type),
    ...(archief||[]).map(a=>a.verpakking_type),
  ])].sort();
  const typeStat = (type) => {
    const rows     = uit.filter(u=>u.verpakking_type===type);
    const archRows = (archief||[]).filter(a=>a.verpakking_type===type);
    const totUit  = rows.reduce((s,u)=>s+Number(u.aantal||0),0)
                  + archRows.reduce((s,a)=>s+Number(a.aantal||0),0);
    const totVerk = rows.reduce((s,u)=>s+Number(u.verkocht_stuks||0),0)
                  + archRows.reduce((s,a)=>s+Number(a.aantal||0),0); // archief = alles verkocht
    return {totUit, totVerk, beschikbaar: totUit-totVerk};
  };

  const VerkochInput = ({u}) => {
    const n     = Number(u.aantal||0);
    const verk  = Number(u.verkocht_stuks||0);
    const beschik = n - verk;
    return (
      <div className="flex flex-wrap items-center gap-x-3 gap-y-1 mt-2">
        <span className="text-xs text-gray-500 font-medium">{t('stock_sold')}:</span>
        <div className="flex items-center gap-1">
          <button onClick={()=>setVerkocht(u.id, verk-1)} disabled={verk===0}
            className="w-6 h-6 rounded bg-gray-200 hover:bg-gray-300 text-sm font-bold leading-none disabled:opacity-30 flex items-center justify-center">−</button>
          <input
            type="number" min="0" max={n} value={verk}
            onChange={e=>setVerkocht(u.id, e.target.value)}
            className="w-14 border border-gray-300 rounded px-1 py-0.5 text-sm text-center focus:ring-1 focus:ring-amber-500 outline-none font-mono"
          />
          <button onClick={()=>setVerkocht(u.id, verk+1)} disabled={verk>=n}
            className="w-6 h-6 rounded bg-green-200 hover:bg-green-300 text-sm font-bold leading-none disabled:opacity-30 flex items-center justify-center">+</button>
        </div>
        <span className="text-xs text-gray-400">{t('lbl_of')} {n}</span>
        {beschik > 0
          ? <span className="text-xs font-medium text-amber-600">{beschik}× {t('lbl_available')}</span>
          : <span className="text-xs font-medium text-green-600">{t('stock_all_sold')}</span>
        }
        {verk > 0 && beschik > 0 && (
          <button onClick={()=>setVerkocht(u.id, n)} className="text-xs text-gray-400 hover:text-green-600 underline ml-1">{t('stock_sell_all')}</button>
        )}
      </div>
    );
  };

  const visibleUit = uit.filter(u => !filterBatch || u.batch_id === Number(filterBatch));

  return (
    <div>
      <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
        <h2 className="text-lg font-semibold">{t('nav_voorraad')}</h2>
        <div className="flex items-center gap-2 flex-wrap">
          {wcCreds?.enabled && (
            <>
              <button onClick={wcPushAll} disabled={wcSyncing}
                title={t('wc_push_stock_title')}
                className="flex items-center gap-1.5 px-3 py-1.5 bg-purple-600 text-white rounded text-sm font-medium hover:bg-purple-700 transition-colors disabled:opacity-40">
                {wcSyncing ? '⏳ Bezig…' : '↑ Push voorraad'}
              </button>
              <button onClick={wcPullSales} disabled={wcSyncing}
                title={t('wc_pull_sales_title')}
                className="flex items-center gap-1.5 px-3 py-1.5 bg-purple-500 text-white rounded text-sm font-medium hover:bg-purple-600 transition-colors disabled:opacity-40">
                {wcSyncing ? '⏳ Bezig…' : '↓ Pull verkopen'}
              </button>
            </>
          )}
          {wcSyncMsg && <span className={`text-xs font-medium ${wcSyncMsg.startsWith('✓')?'text-green-600':'text-red-500'}`}>{wcSyncMsg}</span>}
          <Sel value={filterBatch} onChange={setFilterBatch}
            opts={bat.map(b=>({v:String(b.id),l:b.naam}))} ph={t('stock_filter_all_beers')} cls="w-52" />
        </div>
      </div>

      {/* Summary cards per verpakkingstype (altijd over alle bieren) */}
      {allTypes.length > 0 && (
        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 mb-5">
          {allTypes.map(vtype => {
            const s = typeStat(vtype);
            return (
              <div key={vtype} className="bg-white rounded-lg shadow-sm p-3 border-l-4 border-amber-400">
                <div className="font-semibold text-sm text-gray-800 mb-2">{vtype}</div>
                <div className="space-y-1 text-xs">
                  <div className="flex justify-between"><span className="text-gray-500">{t('stock_sold')}</span><span className="font-mono font-medium text-green-600">{s.totVerk}×</span></div>
                  <div className="flex justify-between pt-1 mt-1 border-t">
                    <span className="font-medium text-gray-700">{t('stock_available')}</span>
                    <span className={`font-mono font-bold ${s.beschikbaar>0?'text-amber-600':'text-gray-400'}`}>{s.beschikbaar}×</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {uit.length === 0 && (
        <div className="bg-white rounded-lg shadow-sm p-8 text-center text-gray-400">
          {t('stock_no_released')}
        </div>
      )}

      {/* Groepen per biernaam, daaronder per batch */}
      <div className="space-y-6">
        {(() => {
          // Group visible uitslagen by beer name
          const beerNames = [...new Set(
            visibleUit.map(u => getBatch(u.batch_id)?.naam || 'Onbekend')
          )];

          return beerNames.map(beerName => {
            // All batches for this beer that have visible uitslagen
            const beerBatchIds = [...new Set(
              visibleUit
                .filter(u => (getBatch(u.batch_id)?.naam || 'Onbekend') === beerName)
                .map(u => u.batch_id)
            )];
            const beerRows  = visibleUit.filter(u => beerBatchIds.includes(u.batch_id));
            const bTotVerk  = beerRows.reduce((s,u)=>s+Number(u.verkocht_stuks||0),0);
            const bBeschik  = beerRows.reduce((s,u)=>s+Number(u.aantal||0)-Number(u.verkocht_stuks||0),0);
            // Gearchiveerde verkoop voor dit bier ook meetellen
            const bArchVerk = (archief||[]).filter(a=>a.batch_naam===beerName).reduce((s,a)=>s+Number(a.aantal||0),0);

            const beerGesloten = geslotenBieren.includes(beerName);
            const toggleBeer = () => setGeslotenBieren(prev =>
              prev.includes(beerName) ? prev.filter(x=>x!==beerName) : [...prev, beerName]
            );
            return (
              <div key={beerName} className="bg-white rounded-lg shadow-sm overflow-x-auto">
                {/* Biernaam-header */}
                <div onClick={toggleBeer} className="px-4 py-3 bg-gray-800 text-white flex items-center justify-between flex-wrap gap-2 cursor-pointer select-none">
                  <span className="flex items-center gap-2 font-bold text-base">
                    <span className="text-gray-400 text-sm">{beerGesloten?'▶':'▼'}</span>
                    {beerName}
                  </span>
                  <div className="flex gap-3 text-sm">
                    <span className="text-green-300">{t('stock_sold')}: <strong>{bTotVerk + bArchVerk}×</strong></span>
                    {bBeschik > 0 && <span className="font-bold text-amber-300">{t('stock_available')}: {bBeschik}×</span>}
                  </div>
                </div>

                {/* Per batch binnen dit bier */}
                {!beerGesloten && beerBatchIds.map(bid => {
                  const b      = getBatch(bid);
                  const bRows  = visibleUit.filter(u=>u.batch_id===bid);
                  const btUit  = bRows.reduce((s,u)=>s+Number(u.aantal||0),0);
                  const btVerk = bRows.reduce((s,u)=>s+Number(u.verkocht_stuks||0),0);
                  const vTypes = [...new Set(bRows.map(u=>u.verpakking_type))].sort();

                  return (
                    <div key={bid}>
                      {/* Batch-subheader */}
                      <div className="px-4 py-2 bg-gray-700 text-gray-100 flex items-center justify-between flex-wrap gap-2 text-sm">
                        <div className="flex items-center gap-2">
                          {b?.batch_nummer
                            ? <span className="font-semibold">Batch #{b.batch_nummer}</span>
                            : <span className="text-gray-400 italic">{t('batch_no_number')}</span>
                          }
                          {b?.stijl && <span className="text-xs text-gray-400">{b.stijl}</span>}
                        </div>
                        <div className="flex gap-3 text-xs text-gray-300">
                          <span className="text-green-300">{t('stock_sold')}: <strong>{btVerk}×</strong></span>
                          {btUit-btVerk > 0 && <span className="font-bold text-amber-300">{t('stock_available')}: {btUit-btVerk}×</span>}
                        </div>
                      </div>

                      {/* Sub-groepen per verpakkingstype */}
                      {vTypes.map(vt => {
                        const vtRows   = bRows.filter(u=>u.verpakking_type===vt);
                        const vtTotUit = vtRows.reduce((s,u)=>s+Number(u.aantal||0),0);
                        const vtTotVerk= vtRows.reduce((s,u)=>s+Number(u.verkocht_stuks||0),0);
                        const vtArtikel = (artikelen||[]).find(a=>a.key===artKey(beerName,vt));

                        return (
                          <div key={vt}>
                            <div className="px-4 py-2 bg-gray-50 border-b border-t flex items-center justify-between text-sm">
                              <div className="flex items-center gap-2 min-w-0">
                                <span className="font-medium text-gray-700">{vt}</span>
                                {vtArtikel?.artikelnummer && (
                                  <span className="text-xs text-gray-400 font-mono">#{vtArtikel.artikelnummer}</span>
                                )}
                                {vtArtikel?.verkoopprijs != null && (
                                  <span className="text-xs text-green-600 font-medium">{fmt(vtArtikel.verkoopprijs)}</span>
                                )}
                                <button
                                  onClick={e=>openArtModal(beerName, vt, e)}
                                  title={t('lbl_article_master')}
                                  className="text-gray-300 hover:text-amber-500 transition-colors text-xs leading-none ml-1"
                                >📋</button>
                              </div>
                              <div className="flex gap-3 text-xs text-gray-500">
                                <span className="text-green-600">{t('stock_sold')}: <strong>{vtTotVerk}×</strong></span>
                                {vtTotUit-vtTotVerk > 0 && <span className="font-bold text-amber-600">{t('stock_available')}: {vtTotUit-vtTotVerk}×</span>}
                              </div>
                            </div>

                            {vtRows.map(u => {
                              const verk    = Number(u.verkocht_stuks||0);
                              const beschik = Number(u.aantal||0) - verk;
                              const thtDays = u.tht ? Math.ceil((new Date(u.tht)-new Date())/86400000) : null;
                              const thtExp  = thtDays !== null && thtDays < 0;
                              const thtSoon = thtDays !== null && thtDays >= 0 && thtDays <= 60;
                              const accNietBetaald = acc.some(a => a.uitslag_id === u.id && !a.betaald);
                              return (
                                <div key={u.id} className={`px-4 py-3 border-b last:border-b-0 border-l-4 ${accNietBetaald ? 'border-l-red-400 bg-red-50' : 'border-l-transparent'}`}>
                                  <div className="flex items-start justify-between gap-3">
                                    <div className="min-w-0 flex-1">
                                      <div className="flex flex-wrap items-center gap-x-4 gap-y-1 text-xs text-gray-500">
                                        <span>{t('stock_date_released')}: <strong className="text-gray-700">{fmtD(u.datum)}</strong></span>
                                        {u.tht
                                          ? <span className={thtExp?'text-red-600 font-medium':thtSoon?'text-yellow-600 font-medium':'text-gray-600'}>
                                              {t('lbl_tht')}: <strong>{fmtD(u.tht)}</strong>
                                              {thtExp ? ' ⚠️ ' + t('stock_expired') : thtSoon ? ` (${thtDays}d)` : ''}
                                            </span>
                                          : <span className="text-gray-400">{t('lbl_tht')}: —</span>
                                        }
                                        <span>{u.aantal}× · {Number(u.liter||0).toFixed(1)}L · accijns {fmt(u.accijns)}</span>
                                        {accNietBetaald && <span className="text-red-600 font-semibold">{t('stock_excise_unpaid')}</span>}
                                      </div>
                                      <VerkochInput u={u} />
                                    </div>
                                    <div className="flex flex-col items-end gap-1.5 flex-shrink-0">
                                      {beschik === 0 && (
                                        <button onClick={()=>archiveerUitslag(u)}
                                          className="px-2 py-1 rounded text-xs font-medium bg-green-100 hover:bg-green-200 text-green-700 whitespace-nowrap transition-colors">
                                          {t('stock_archive')}
                                        </button>
                                      )}
                                      <button onClick={()=>{ if(confirm(t('error_confirm_delete'))) { setUit(prev=>prev.filter(x=>x.id!==u.id)); setAcc(prev=>prev.filter(a=>a.uitslag_id!==u.id)); } }}
                                        className="text-red-400 hover:text-red-600 text-xs">✕</button>
                                    </div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            );
          });
        })()}
      </div>

      {/* Artikelenstambestand modal */}
      {artModal && (
        <Modal title={`Artikelstamgegevens — ${artModal.biernaam} · ${artModal.verpakking_type}`} onClose={()=>setArtModal(null)}>
          <div className="space-y-3">
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">{t('stock_article_num')}</label>
                <Inp value={artForm.artikelnummer} onChange={v=>setArtForm(f=>({...f,artikelnummer:v}))} placeholder={t('ph_article_num')} />
              </div>
              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">{t('stock_article_ean')}</label>
                <Inp value={artForm.ean} onChange={v=>setArtForm(f=>({...f,ean:v}))} placeholder={t('ph_ean')} />
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">{t('stock_article_price')}</label>
                <Inp type="number" value={artForm.verkoopprijs} onChange={v=>setArtForm(f=>({...f,verkoopprijs:v}))} placeholder={t('ph_price')} />
              </div>
              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">{t('stock_article_vat')}</label>
                <Sel value={artForm.btw} onChange={v=>setArtForm(f=>({...f,btw:v}))}
                  opts={[{v:'0',l:'0% — vrijgesteld'},{v:'9',l:'9% — laag'},{v:'21',l:'21% — hoog'}]} />
              </div>
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">{t('lbl_description')}</label>
              <Inp value={artForm.omschrijving} onChange={v=>setArtForm(f=>({...f,omschrijving:v}))} placeholder={t('ph_product_desc')} />
            </div>
            <div className="flex justify-between items-center pt-2 border-t">
              {(artikelen||[]).find(a=>a.key===artKey(artModal.biernaam, artModal.verpakking_type)) ? (
                <button onClick={deleteArtikel} className="text-xs text-red-400 hover:text-red-600 underline">{t('stock_article_delete')}</button>
              ) : <span />}
              <div className="flex gap-2">
                <Btn v="secondary" onClick={()=>setArtModal(null)}>{t('btn_cancel')}</Btn>
                <Btn onClick={saveArtikel}>{t('btn_save')}</Btn>
              </div>
            </div>
          </div>
        </Modal>
      )}

      {/* Archief */}
      {(archief||[]).length > 0 && (
        <div className="mt-8">
          <div onClick={()=>setArchiefIngeklapt(v=>!v)} className="flex items-center justify-between mb-3 cursor-pointer select-none group">
            <h3 className="text-base font-semibold text-gray-500 flex items-center gap-2">
              <span className="text-gray-400 text-sm">{archiefIngeklapt?'▶':'▼'}</span>
              {t('stock_archive_title')}
            </h3>
            <span className="text-xs text-gray-400">{t('stock_archive_count').replace('{n}',(archief||[]).length)}</span>
          </div>
          {!archiefIngeklapt && <div className="bg-white rounded-lg shadow-sm overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                <tr>
                  <th className="px-3 py-2 text-left">{t('batch_archived')}</th>
                  <th className="px-3 py-2 text-left">{t('stock_archive_beer')}</th>
                  <th className="px-3 py-2 text-left">{t('stock_archive_batch')}</th>
                  <th className="px-3 py-2 text-left">{t('lbl_type')}</th>
                  <th className="px-3 py-2 text-right">{t('stock_archive_qty')}</th>
                  <th className="px-3 py-2 text-right">{t('stock_archive_liters')}</th>
                  <th className="px-3 py-2 text-right">{t('nav_accijns')}</th>
                  <th className="px-3 py-2 text-left">{t('filling_summary_released')}</th>
                  <th className="px-3 py-2"></th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {[...(archief||[])].reverse().map(a => (
                  <tr key={a.id} className="hover:bg-gray-50 text-gray-600">
                    <td className="px-3 py-2 text-xs text-gray-400 whitespace-nowrap">{fmtD(a.archiveer_datum)}</td>
                    <td className="px-3 py-2 font-medium text-gray-700">{a.batch_naam}</td>
                    <td className="px-3 py-2 text-gray-500">{a.batch_nummer ? `#${a.batch_nummer}` : '—'}</td>
                    <td className="px-3 py-2">{a.verpakking_type}</td>
                    <td className="px-3 py-2 text-right font-mono">{a.aantal}×</td>
                    <td className="px-3 py-2 text-right text-gray-500">{Number(a.liter||0).toFixed(1)}L</td>
                    <td className="px-3 py-2 text-right text-gray-500">{fmt(a.accijns)}</td>
                    <td className="px-3 py-2 text-xs text-gray-400 whitespace-nowrap">{fmtD(a.datum)}</td>
                    <td className="px-3 py-2">
                      <button onClick={()=>{ if(confirm(t('err_confirm_delete_archive'))) setArchief(prev=>(prev||[]).filter(x=>x.id!==a.id)); }}
                        className="text-red-300 hover:text-red-500 text-xs">✕</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>}
        </div>
      )}
    </div>
  );
}

// ===== ACCIJNS =====
function AccijnsPage({bat, acc, setAcc}) {
  // acc records are now per-uitslag: {id, batch_id, batch_nummer, uitslag_id, verpakking_type, datum, aantal, liter, abv, accijns, betaald, betaal_datum}
  // Support legacy records that use totaal_accijns/totaal_liter field names
  const getAccijns = (a) => Number(a.accijns ?? a.totaal_accijns ?? 0);
  const getLiter   = (a) => Number(a.liter   ?? a.totaal_liter   ?? 0);

  const toggle = (id) => setAcc(prev=>prev.map(a=>a.id===id
    ? {...a, betaald:!a.betaald, betaal_datum:!a.betaald?tod():null}
    : a
  ));

  const totOpen = acc.filter(a=>!a.betaald).reduce((s,a)=>s+getAccijns(a),0);
  const totPaid = acc.filter(a=>a.betaald).reduce((s,a)=>s+getAccijns(a),0);
  const getNaam = (bid) => bat.find(b=>b.id===bid)?.naam||'—';

  return (
    <div>
      {/* Header with totals */}
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-lg font-semibold">{t('nav_accijns')}</h2>
        <div className="flex gap-2">
          {totPaid > 0 && (
            <div className="px-3 py-2 rounded-lg text-sm font-medium bg-green-100 text-green-700">
              {t('excise_paid')}: {fmt(totPaid)}
            </div>
          )}
          <div className={`px-3 py-2 rounded-lg text-sm font-bold ${totOpen>0?'bg-red-100 text-red-700':'bg-green-100 text-green-700'}`}>
            {t('excise_outstanding')}: {fmt(totOpen)}
          </div>
        </div>
      </div>

      {acc.length===0 && (
        <div className="bg-white rounded-lg shadow-sm p-8 text-center text-gray-400">
          {t('excise_no_recorded')}
        </div>
      )}

      {/* Platte tabel — naam + batch per rij */}
      {acc.length > 0 && (
        <div className="bg-white rounded-lg shadow-sm overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="text-xs text-gray-500 bg-gray-50">
              <tr>
                <th className="px-3 py-2 text-left">{t('stock_archive_beer')}</th>
                <th className="px-3 py-2 text-left">{t('stock_archive_batch')}</th>
                <th className="px-3 py-2 text-left">{t('excise_release_date')}</th>
                <th className="px-3 py-2 text-left">{t('lbl_packaging')}</th>
                <th className="px-3 py-2 text-right">{t('stock_archive_qty')}</th>
                <th className="px-3 py-2 text-right">{t('excise_liters')}</th>
                <th className="px-3 py-2 text-right">{t('excise_abv')}</th>
                <th className="px-3 py-2 text-right">{t('nav_accijns')}</th>
                <th className="px-3 py-2 text-center">{t('lbl_status')}</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {acc.map(a => (
                <tr key={a.id} className={a.betaald?'bg-green-50':''}>
                  <td className="px-3 py-2 font-medium text-gray-800">{getNaam(a.batch_id)}</td>
                  <td className="px-3 py-2 text-gray-500">{a.batch_nummer ? `#${a.batch_nummer}` : '—'}</td>
                  <td className="px-3 py-2 text-gray-600">{fmtD(a.datum)}</td>
                  <td className="px-3 py-2">{a.verpakking_type||'—'}</td>
                  <td className="px-3 py-2 text-right">{a.aantal||'—'}×</td>
                  <td className="px-3 py-2 text-right">{getLiter(a).toFixed(1)}L</td>
                  <td className="px-3 py-2 text-right">{a.abv?`${a.abv}%`:'—'}</td>
                  <td className="px-3 py-2 text-right font-semibold text-amber-700">{fmt(getAccijns(a))}</td>
                  <td className="px-3 py-2 text-center">
                    {a.betaald
                      ? <div>
                          <span className="text-xs text-green-700 font-medium">{t('accijns_paid')}</span>
                          <div className="text-xs text-gray-400">{fmtD(a.betaal_datum)}</div>
                          <button onClick={()=>toggle(a.id)} className="text-xs text-gray-400 hover:text-gray-600 underline">{t('excise_restore')}</button>
                        </div>
                      : <Btn s="sm" v="green" onClick={()=>toggle(a.id)}>{t('excise_mark_paid')}</Btn>
                    }
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ===== RECEPTEN =====
function ReceptenPage({ing, lots, bfCreds, recepten, setRecepten, verborgen, setVerborgen, gearchiveerdeTags, setGearchiveerdeTags, tagVolgorde, setTagVolgorde, geslotenGroepen, setGeslotenGroepen}) {
  const {useState} = React;
  const [sel, setSel]         = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [msg, setMsg]         = useState('');
  const [zoek, setZoek]       = useState('');
  const [verborgenOpen, setVerborgenOpen] = useState(false);
  const [gearchiveerdTagsOpen, setGearchiveerdTagsOpen] = useState(false);
  const toggleGroep = (tag) => setGeslotenGroepen(prev =>
    prev.includes(tag) ? prev.filter(t=>t!==tag) : [...prev, tag]
  );
  const toggleTagArchief = (tag, e) => {
    e.stopPropagation();
    setGearchiveerdeTags(prev => prev.includes(tag) ? prev.filter(t=>t!==tag) : [...prev, tag]);
  };
  const moveTag = (tag, dir, allTags, e) => {
    e.stopPropagation();
    setTagVolgorde(() => {
      const ordered = [...new Set([...tagVolgorde, ...allTags])].filter(t => allTags.includes(t));
      const idx = ordered.indexOf(tag);
      if (idx === -1) return tagVolgorde;
      const next = [...ordered];
      if (dir === 'up' && idx > 0)              [next[idx-1], next[idx]] = [next[idx], next[idx-1]];
      else if (dir === 'down' && idx < next.length-1) [next[idx+1], next[idx]] = [next[idx], next[idx+1]];
      return next;
    });
  };

  const toggleVerbergen = (id, e) => {
    e.stopPropagation();
    setVerborgen(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
    if (sel === id) setSel(null);
  };

  const runSync = async () => {
    if (!bfCreds?.enabled || !bfCreds.userId || !bfCreds.apiKey) {
      setMsg('⚠ ' + t('settings_brewfather_section')); return;
    }
    setSyncing(true); setMsg('');
    try {
      const recs = await bfGetRecipes();
      setRecepten(recs);
      setMsg(`✓ ${recs.length} recept${recs.length!==1?'en':''} gesynchroniseerd`);
    } catch(e) { setMsg('⚠ Sync mislukt: '+(e.message||String(e))); }
    setSyncing(false);
  };

  const gefilterd = recepten.filter(r =>
    !zoek || r.naam.toLowerCase().includes(zoek.toLowerCase()) || (r.stijl||'').toLowerCase().includes(zoek.toLowerCase())
  );
  const zichtbaar     = gefilterd.filter(r => !verborgen.includes(r.id));
  const verborgenLijst = recepten.filter(r => verborgen.includes(r.id));
  const selRec = recepten.find(r => r.id === sel);

  const checkStock = (naam, benodigdRaw) => {
    const benodigd = Number(benodigdRaw||0);
    const ingMatch = ing.find(i => i.naam.toLowerCase() === naam.toLowerCase());
    if (!ingMatch) return {ok:null, totaal:0, ingLots:[]};
    const ingLots = lots
      .filter(l => l.ingredient_id===ingMatch.id && l.beschikbaar && Number(l.hoeveelheid||0)>0)
      .sort((a,b)=>(a.houdbaarheid||'9999')<(b.houdbaarheid||'9999')?-1:1);
    const totaal = ingLots.reduce((s,l)=>s+Number(l.hoeveelheid||0),0);
    return {ok:totaal>=benodigd, bijna:totaal>0&&totaal<benodigd, totaal, ingLots};
  };

  const IngRow = ({item}) => {
    const {ok, bijna, totaal, ingLots} = checkStock(item.naam, item.hoeveelheid);
    const [open, setOpen] = useState(false);
    const dot = ok===null ? <span className="text-gray-300">●</span>
              : ok        ? <span className="text-green-500">●</span>
              : bijna     ? <span className="text-yellow-500">●</span>
                          : <span className="text-red-500">●</span>;
    return (
      <>
        <tr className={`border-b border-gray-100 ${ingLots.length>0?'cursor-pointer hover:bg-gray-50':''}`}
            onClick={()=>ingLots.length>0&&setOpen(o=>!o)}>
          <td className="px-3 py-2 text-sm text-gray-800">{item.naam}</td>
          <td className="px-3 py-2 text-sm text-right text-gray-600 whitespace-nowrap">
            {Number(item.hoeveelheid||0).toLocaleString('nl-NL',{maximumFractionDigits:3})} {item.eenheid}
          </td>
          <td className="px-3 py-2 text-xs text-gray-400">{item.gebruik||''}</td>
          <td className="px-3 py-2 text-sm text-right whitespace-nowrap">
            {ok!==null
              ? <span className={ok?'text-green-600':bijna?'text-yellow-600':'text-red-600'}>
                  {totaal.toLocaleString('nl-NL',{maximumFractionDigits:3})} {item.eenheid}
                </span>
              : <span className="text-gray-300 text-xs">—</span>}
          </td>
          <td className="px-3 py-2 text-center">{dot}</td>
          <td className="px-3 py-2 text-xs text-gray-300 text-center">{ingLots.length>0?(open?'▲':'▼'):''}</td>
        </tr>
        {open && ingLots.map(l=>(
          <tr key={l.id} className="bg-amber-50 text-xs border-b border-amber-100">
            <td className="pl-6 pr-3 py-1.5 text-gray-500">
              <span className="font-mono text-gray-700">{l.lotnummer||'—'}</span>
              {l.leverancier&&<span className="text-gray-400 ml-2">({l.leverancier})</span>}
            </td>
            <td className="px-3 py-1.5 text-right font-medium text-gray-700 whitespace-nowrap">
              {Number(l.hoeveelheid||0).toLocaleString('nl-NL',{maximumFractionDigits:3})} {l.eenheid}
            </td>
            <td className="px-3 py-1.5 text-gray-400">{l.aankoop_datum?fmtD(l.aankoop_datum):''}</td>
            <td className="px-3 py-1.5 whitespace-nowrap" colSpan={3}>
              {t('lbl_tht')}: {l.houdbaarheid
                ? <span className={`font-medium ${new Date(l.houdbaarheid)<new Date()?'text-red-600':'text-gray-700'}`}>{fmtD(l.houdbaarheid)}</span>
                : <span className="text-gray-300">—</span>}
            </td>
          </tr>
        ))}
      </>
    );
  };

  const IngSection = ({titel, items}) => {
    if (!items?.length) return null;
    const stocks = items.map(i=>checkStock(i.naam,i.hoeveelheid));
    const anyRed = stocks.some(s=>s.ok===false&&!s.bijna);
    const anyYellow = stocks.some(s=>s.bijna);
    const allGreen = stocks.length>0 && stocks.every(s=>s.ok===true);
    const badge = anyRed   ? <span className="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">tekort</span>
                : anyYellow? <span className="text-xs bg-yellow-100 text-yellow-600 px-2 py-0.5 rounded-full">bijna genoeg</span>
                : allGreen ? <span className="text-xs bg-green-100 text-green-600 px-2 py-0.5 rounded-full">✓ beschikbaar</span>
                : null;
    return (
      <div className="mb-5">
        <div className="flex items-center gap-2 mb-1.5">
          <h4 className="text-sm font-semibold text-gray-700">{titel}</h4>
          {badge}
        </div>
        <div className="rounded-lg border border-gray-200 overflow-hidden">
          <table className="w-full">
            <thead>
              <tr className="bg-gray-50 text-xs text-gray-400 uppercase">
                <th className="px-3 py-2 text-left font-medium">{t('log_ingredient')}</th>
                <th className="px-3 py-2 text-right font-medium">{t('recipe_needed')}</th>
                <th className="px-3 py-2 text-left font-medium">{t('recipe_use')}</th>
                <th className="px-3 py-2 text-right font-medium">{t('stock_available')}</th>
                <th className="px-3 py-2 text-center font-medium w-8">●</th>
                <th className="px-3 py-2 w-6"></th>
              </tr>
            </thead>
            <tbody>
              {items.map((item,i)=><IngRow key={i} item={item}/>)}
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  const cardStocks = (r) => [
    ...r.mout.map(i=>checkStock(i.naam,i.hoeveelheid)),
    ...r.hop.map(i=>checkStock(i.naam,i.hoeveelheid)),
    ...r.gist.map(i=>checkStock(i.naam,i.hoeveelheid)),
    ...r.overig.map(i=>checkStock(i.naam,i.hoeveelheid)),
  ];
  const allStock   = selRec ? cardStocks(selRec) : [];
  const overallOk  = allStock.length>0 && allStock.every(s=>s.ok===true);
  const overallRed = allStock.some(s=>s.ok===false&&!s.bijna);
  const overallYel = !overallRed && allStock.some(s=>s.bijna);

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-lg font-semibold">{t('nav_recepten')}</h2>
        <div className="flex items-center gap-3">
          {msg && <span className={`text-sm ${msg.startsWith('✓')?'text-green-600':'text-amber-600'}`}>{msg}</span>}
          <Btn onClick={runSync} disabled={syncing||!bfCreds?.enabled}
            cls={!bfCreds?.enabled?'opacity-50 cursor-not-allowed':''}>
            {syncing?t('recipe_syncing'):t('recipe_sync_brewfather')}
          </Btn>
        </div>
      </div>
      <div className="flex flex-col md:flex-row gap-4 md:items-start">
        {/* Lijst */}
        <div className={`w-full md:w-60 md:flex-shrink-0${sel?' hidden md:block':''}`}>
          <div className="mb-2">
            <input type="text" placeholder={t('search_recipe')} value={zoek}
              onChange={e=>setZoek(e.target.value)}
              className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"/>
          </div>
          <div className="bg-white rounded-lg shadow-sm overflow-hidden">
          <div className="flex justify-between px-3 py-1.5 bg-gray-50 text-xs text-gray-500 uppercase tracking-wide border-b">
            <span>{t('lbl_name')}</span><span>{t('lbl_stock')}</span>
          </div>
          {zichtbaar.length===0 && verborgenLijst.length===0 && (
            <div className="text-center text-gray-400 text-xs py-8">
              {recepten.length===0 ? t('recipe_no_recipes') : t('recipe_no_results')}
            </div>
          )}
          {(()=>{
            const RecepKaart = ({r}) => {
              const stocks = cardStocks(r);
              const anyRed  = stocks.some(s=>s.ok===false&&!s.bijna);
              const anyYel  = stocks.some(s=>s.bijna);
              const allGreen= stocks.length>0 && stocks.every(s=>s.ok===true);
              const dot = anyRed?'🔴':anyYel?'🟡':allGreen?'🟢':'⚪';
              return (
                <div onClick={()=>setSel(sel===r.id?null:r.id)}
                  className={`px-3 py-2.5 border-b cursor-pointer hover:bg-amber-50 group ${sel===r.id?'bg-amber-50 border-l-2 border-l-amber-500':''}`}>
                  <div className="flex items-center justify-between gap-1">
                    <span className="font-medium text-sm truncate">{r.naam}</span>
                    <button onClick={e=>toggleVerbergen(r.id,e)}
                      className="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-gray-500 text-xs leading-none px-0.5 transition-opacity flex-shrink-0"
                      title={t('btn_hide')}>✕</button>
                  </div>
                  {r.stijl&&<div className="text-xs text-gray-500 mt-0.5 truncate">{r.stijl}</div>}
                  <div className="flex gap-2 mt-0.5 text-xs text-gray-400">
                    {r.batch_size?<span>{r.batch_size}L</span>:null}
                    {r.ABV?<span>{Number(r.ABV).toFixed(1)}%</span>:null}
                  </div>
                </div>
              );
            };
            const allTagsRaw = [...new Set(zichtbaar.flatMap(r=>r.tags||[]))];
            const sortedTags = [...new Set([...tagVolgorde, ...allTagsRaw])].filter(t => allTagsRaw.includes(t));
            const activeTags = sortedTags.filter(t => !gearchiveerdeTags.includes(t));
            const archiefTags = sortedTags.filter(t => gearchiveerdeTags.includes(t));
            const metTag    = (tag) => zichtbaar.filter(r=>(r.tags||[]).includes(tag));
            const zonderTag = zichtbaar.filter(r=>!r.tags||r.tags.length===0);
            const TagGroep = ({tag, gearchiveerd}) => {
              const items  = metTag(tag);
              const gesloten = geslotenGroepen.includes(tag);
              const stocks = items.flatMap(r=>cardStocks(r));
              const anyRed   = stocks.some(s=>s.ok===false&&!s.bijna);
              const allGreen = stocks.length>0 && stocks.every(s=>s.ok===true);
              const groepDot = anyRed?'🔴':allGreen?'🟢':'⚪';
              const idxInActive = activeTags.indexOf(tag);
              return (
                <div>
                  <div className="flex items-center group/tag bg-gray-50 border-b px-3 py-1.5 hover:bg-gray-100">
                    <button onClick={()=>toggleGroep(tag)}
                      className="flex-1 flex items-center justify-between text-xs font-medium text-gray-500 uppercase tracking-wide">
                      <span className="flex items-center gap-1">
                        <span className="text-gray-400">{gesloten?'▶':'▼'}</span>
                        <span>{tag}</span>
                        <span className="font-normal text-gray-400">({items.length})</span>
                      </span>
                    </button>
                    {!gearchiveerd && (
                      <span className="opacity-0 group-hover/tag:opacity-100 flex transition-opacity flex-shrink-0">
                        <button onClick={e=>moveTag(tag,'up',activeTags,e)} disabled={idxInActive===0}
                          className="px-1 text-gray-300 hover:text-gray-600 text-xs disabled:opacity-20"
                          title={t('btn_up')}>▴</button>
                        <button onClick={e=>moveTag(tag,'down',activeTags,e)} disabled={idxInActive===activeTags.length-1}
                          className="px-1 text-gray-300 hover:text-gray-600 text-xs disabled:opacity-20"
                          title={t('btn_down')}>▾</button>
                      </span>
                    )}
                    <button onClick={e=>toggleTagArchief(tag,e)}
                      className="opacity-0 group-hover/tag:opacity-100 ml-0.5 px-1 text-gray-300 hover:text-gray-500 text-xs transition-opacity flex-shrink-0"
                      title={gearchiveerd?t('btn_tag_restore'):t('btn_tag_archive')}>
                      {gearchiveerd?'↩':'↓'}
                    </button>
                  </div>
                  {!gesloten&&items.map(r=><RecepKaart key={r.id} r={r}/>)}
                </div>
              );
            };
            return (
              <div>
                {activeTags.length > 0
                  ? activeTags.map(tag=><TagGroep key={tag} tag={tag} gearchiveerd={false}/>)
                  : zichtbaar.filter(r=>!r.tags||r.tags.every(t=>!gearchiveerdeTags.includes(t))).map(r=><RecepKaart key={r.id} r={r}/>)
                }
                {zonderTag.length>0 && activeTags.length>0 && (
                  <TagGroep tag={t('lbl_without_tag')} gearchiveerd={false}/>
                )}
                {archiefTags.length>0 && (
                  <div className="border-t">
                    <button onClick={()=>setGearchiveerdTagsOpen(o=>!o)}
                      className="w-full flex items-center justify-between px-3 py-1.5 text-xs font-medium text-gray-500 uppercase hover:text-gray-700 hover:bg-gray-100 transition-colors">
                      <span>{t('lbl_archived_tags')} ({archiefTags.length})</span>
                      <span className="text-gray-400 text-sm">{gearchiveerdTagsOpen?'▼':'▶'}</span>
                    </button>
                    {gearchiveerdTagsOpen&&archiefTags.map(tag=><TagGroep key={tag} tag={tag} gearchiveerd={true}/>)}
                  </div>
                )}
              </div>
            );
          })()}
          {verborgenLijst.length>0&&(
            <div className="border-t">
              <button onClick={()=>setVerborgenOpen(o=>!o)}
                className="w-full flex items-center justify-between px-3 py-1.5 text-xs font-medium text-gray-500 uppercase hover:text-gray-700 hover:bg-gray-100 transition-colors">
                <span>{t('lbl_hidden')} ({verborgenLijst.length})</span>
                <span className="text-gray-400 text-sm">{verborgenOpen?'▼':'▶'}</span>
              </button>
              {verborgenOpen&&verborgenLijst.map(r=>(
                <div key={r.id} onClick={()=>setSel(sel===r.id?null:r.id)}
                  className={`px-3 py-2.5 border-b cursor-pointer hover:bg-amber-50 group opacity-60 hover:opacity-100 ${sel===r.id?'bg-amber-50 border-l-2 border-l-amber-500':''}`}>
                  <div className="flex items-center justify-between gap-1">
                    <span className="font-medium text-sm truncate">{r.naam}</span>
                    <button onClick={e=>toggleVerbergen(r.id,e)}
                      className="text-gray-400 hover:text-green-600 text-xs leading-none px-0.5 transition-colors flex-shrink-0"
                      title={t('btn_restore')}>↩</button>
                  </div>
                </div>
              ))}
            </div>
          )}
          </div>{/* /bg-white recept card */}
        </div>
        {/* Detail */}
        {selRec ? (<>
          <button className="md:hidden mb-2 flex items-center gap-1 text-sm font-medium text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 w-full" onClick={()=>setSel(null)}>{t('btn_back')}</button>
          <div className="flex-1 bg-white rounded-lg shadow-sm p-4 min-w-0">
            <div className="flex items-start justify-between gap-4 mb-4">
              <div>
                <h3 className="text-base font-semibold text-gray-800">{selRec.naam}</h3>
                {selRec.stijl&&<div className="text-sm text-gray-500 mt-0.5">{selRec.stijl}</div>}
                {selRec.auteur&&<div className="text-xs text-gray-400 mt-0.5">Door {selRec.auteur}</div>}
              </div>
              <div className={`text-sm font-medium px-3 py-1.5 rounded-full whitespace-nowrap flex-shrink-0 ${overallOk?'bg-green-100 text-green-700':overallRed?'bg-red-100 text-red-700':overallYel?'bg-yellow-100 text-yellow-700':'bg-gray-100 text-gray-500'}`}>
                {overallOk?'✓ Klaar om te brouwen':overallRed?'✗ Ingrediënten tekort':overallYel?'⚠ Controleer voorraad':'— Onbekende voorraad'}
              </div>
            </div>
            <div className="grid grid-cols-4 gap-3 mb-6">
              {[{l:'Batch',v:selRec.batch_size?`${selRec.batch_size} L`:'—'},
                {l:'OG',  v:selRec.OG?Number(selRec.OG).toFixed(3):'—'},
                {l:'FG',  v:selRec.FG?Number(selRec.FG).toFixed(3):'—'},
                {l:'ABV', v:selRec.ABV?`${Number(selRec.ABV).toFixed(1)}%`:'—'},
              ].map(s=>(
                <div key={s.l} className="bg-gray-50 rounded-lg p-3 text-center">
                  <div className="text-xs text-gray-400 mb-0.5">{s.l}</div>
                  <div className="text-lg font-bold text-gray-800">{s.v}</div>
                </div>
              ))}
            </div>
            <IngSection titel={t('recipe_section_grains')} items={selRec.mout}/>
            <IngSection titel={t('recipe_section_hops')} items={selRec.hop}/>
            <IngSection titel={t('recipe_section_yeast')} items={selRec.gist}/>
            <IngSection titel={t('recipe_section_other')} items={selRec.overig}/>
            {selRec.notities&&(

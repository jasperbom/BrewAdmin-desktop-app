<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ===== I18N =====
const SUPPORTED_LANGS = ['nl', 'en', 'de', 'fr', 'es'];
const detectLang = () => {
  const browser = (navigator.language || navigator.userLanguage || 'en').toLowerCase().split('-')[0];
  return SUPPORTED_LANGS.includes(browser) ? browser : 'en';
};
let _lang = 'nl';
const t = (key) => {
  const trans = window.BREW_TRANS;
  if (!trans) return key;

// Eenheden-conversie: zet hoeveelheid om van 'van' naar 'naar' eenheid.
// Geeft null terug als de eenheden niet compatibel zijn (bijv. L naar kg).
const UNIT_BASE = { mL:{group:'volume',f:1}, L:{group:'volume',f:1000}, g:{group:'mass',f:1}, kg:{group:'mass',f:1000} };
const convertEenheid = (amount, van, naar) => {
  if (!amount || van === naar) return Number(amount);
  const v = UNIT_BASE[van], n = UNIT_BASE[naar];
  if (!v || !n || v.group !== n.group) return null; // niet converteerbaar
  return (Number(amount) * v.f) / n.f;
};
// Compatibele eenheden voor een gegeven eenheid (zelfde groep + discrete)
const compatibeleEenheden = (eenheid) => {
  const base = UNIT_BASE[eenheid];
  if (!base) return [eenheid]; // pkg/stuks: alleen zichzelf
  return EENHEDEN.filter(e => UNIT_BASE[e]?.group === base.group);
};

const lsGet = (k, d=[]) => { try { return JSON.parse(localStorage.getItem('craftery_'+k)) ?? d; } catch(e) { return d; } };
const lsSet = (k, v) => localStorage.setItem('craftery_'+k, JSON.stringify(v));

// API base URL — computed from current page URL so it works via direct access
// (http://addon:8099/) AND via HA Ingress (/api/hassio_ingress/TOKEN/).
// Absolute paths like /api/data/... would go to HA's own server, not the addon.
const API_BASE = (() => {
  const p = window.location.pathname;
  return p.replace(/[^/]*$/, '') + 'api/data/';
})();

// Sync state — use Sets so re-renders don't inflate counters
const _allKeys     = new Set(); // all store keys registered (deduped)
const _fetchedKeys = new Set(); // keys whose initial server fetch has resolved
let _syncPending   = 0;         // in-flight save requests
let _syncErrors    = 0;         // failed save requests
let _serverReachable = null;    // null=unknown, true, false

const _postToServer = (key, data) => {
  _syncPending++;
  return fetch(API_BASE + key, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  })
  .then(r => {
    _syncPending = Math.max(0, _syncPending - 1);
    _serverReachable = true;
    if (!r.ok) _syncErrors++;
    return r.ok;
  })
  .catch(() => {
    _syncPending = Math.max(0, _syncPending - 1);
    _serverReachable = false;
    _syncErrors++;
    return false;
  });
};

const useStore = (key, initial=[], { secure=false }={}) => {
  _allKeys.add(key); // Set deduplicates — safe to call on every render
  const [data, setData] = useState(() => secure ? initial : lsGet(key, initial));
  const modified = React.useRef(false);

  React.useEffect(() => {
    fetch(API_BASE + key)
      .then(r => {
        _serverReachable = true;
        if (r.ok) {
          // Server heeft data — verwijder eventuele oude ls-kopie bij secure sleutels
          if (secure) localStorage.removeItem('craftery_' + key);
          return r.json();
        }
        if (r.status === 404) {
          // Server heeft deze sleutel nog niet — push localStorage (of initial) omhoog.
          // Bij secure: ook eventuele oude ls-data migreren (eenmalig upgrade-pad) en dan verwijderen.
          const localRaw = localStorage.getItem('craftery_' + key);
          const toSync = localRaw !== null ? JSON.parse(localRaw) : initial;
          if (secure && localRaw !== null) localStorage.removeItem('craftery_' + key);
          try { _postToServer(key, toSync); } catch(e) {}
        }
        return null;
      })
      .then(d => {
        _fetchedKeys.add(key);
        if (d !== null && d !== undefined && !modified.current) {
          setData(d);
          if (!secure) lsSet(key, d);
        }
      })
      .catch(() => {
        _fetchedKeys.add(key);
        _serverReachable = false;
      });
  }, [key]);

  const save = (val) => {
    modified.current = true;
    setData(prev => {
      const next = typeof val === 'function' ? val(prev) : val;
      if (!secure) lsSet(key, next);
      _postToServer(key, next);
      return next;
    });
  };
  return [data, save];
};

  React.useEffect(() => {
    const id = setInterval(() => {
      const allLoaded = _allKeys.size > 0 && _fetchedKeys.size >= _allKeys.size;
      if (_serverReachable === false && allLoaded && _syncErrors > 0) { setS('error'); return; }
      if (!allLoaded)           { setS('loading'); return; }
      if (_syncPending > 0)     { setS('pending'); return; }
      if (_syncErrors > 0)      { setS('error'); return; }
      if (_serverReachable)     { setS('ok'); return; }
      setS('loading');
    }, 600);
    return () => clearInterval(id);
  }, []);
  const cfg = {
    loading: { cls: 'bg-gray-400 animate-pulse',  title: 'Verbinden met server...' },
    pending: { cls: 'bg-yellow-400 animate-pulse', title: t('msg_saving') },

  );
};

const accijnsCalc = (L, abv, r1=7.51, r2=24.17, inst=null) => {
  const liter = L; const hl = L/100;
  if (inst?.customFormulaEnabled && inst?.customFormula) {
    try {
      const result = new Function('liter','abv','hl','r1','r2', `"use strict"; return (${inst.customFormula});`)(liter,abv||0,hl,r1,r2);
      if (typeof result === 'number' && !isNaN(result)) return result;
    } catch(e) {}
  }
  return Math.max(hl*(abv||0)*r1, hl*r2);
};

      prijs_per_eenheid: lotEdit.prijs_per_eenheid!==''?Number(lotEdit.prijs_per_eenheid):null,
      beschikbaar:    (Number(lotEdit.hoeveelheid)||0)>0,
    }));
    setShowLot(null);
  };
  const doCorrectie = (lot) => {
    const delta = Number(lotCorr.delta);
    if (!delta || delta <= 0) { alert(t('err_valid_qty')); return; }
    const corrEenh = lotCorr.eenheid || lot.eenheid;
    const deltaInLot = convertEenheid(delta, corrEenh, lot.eenheid);
    if (deltaInLot === null) { alert(t('err_convert_units').replace('{from}',corrEenh).replace('{to}',lot.eenheid)); return; }
    const nieuweQty = lotCorr.richting === '+'
      ? Number(lot.hoeveelheid) + deltaInLot
      : Math.max(0, Number(lot.hoeveelheid) - deltaInLot);
    setLots(prev=>prev.map(l=>l.id!==lot.id?l:{...l, hoeveelheid:nieuweQty, beschikbaar:nieuweQty>0}));
    addLog({ingredient_id:lot.ingredient_id, ingredient_naam:ing.find(i=>i.id===lot.ingredient_id)?.naam||'',
      lot_id:lot.id, lotnummer:lot.lotnummer||'', type:'correctie',
      hoeveelheid:lotCorr.richting==='-'?-delta:delta, eenheid:corrEenh,
      referentie: lotCorr.reden||'Handmatige correctie'});
    setLotCorr({delta:'', richting:'+', reden:'', eenheid: lot.eenheid});
    // Sync updated lot into showLot so modal reflects new qty
    setShowLot(prev=>({...prev, hoeveelheid:nieuweQty, beschikbaar:nieuweQty>0}));
    setLotEdit(prev=>({...prev, hoeveelheid:String(nieuweQty)}));
  };

  // --- Verpakkingen state ---
  const [showVOntv, setShowVOntv] = useState(false);
  const emptyVO = {verpakking_id:'',naam:'',inhoud_liter:'',type:'',aantal:'',preset:'',kosten_verpakking:'',kosten_afsluiting:'',kosten_label:'',leverancier:'',factuurnummer:''};
  const [vOntvForm, setVOntvForm] = useState(emptyVO);
  const [showVAfboek, setShowVAfboek] = useState(null);
  const [vAfQty, setVAfQty] = useState('');
  const [showVEdit, setShowVEdit] = useState(null); // holds verpakking being edited
  const emptyVE = {naam:'',inhoud_liter:'',type:'',kosten_verpakking:'',kosten_afsluiting:'',kosten_label:'',leverancier:'',factuurnummer:''};
  const [vEditForm, setVEditForm] = useState(emptyVE);

  // --- Log helper ---
  const addLog = (entry) => setLog(prev=>[...prev,{id:newId(prev||[]),datum:tod(),...entry}]);

  // --- Ingrediënten logic ---
  const activeLots  = (iid) => lots.filter(l=>l.ingredient_id===iid && l.beschikbaar && Number(l.hoeveelheid||0)>0);
  const archiefLots = (iid) => lots.filter(l=>l.ingredient_id===iid && (!l.beschikbaar || Number(l.hoeveelheid||0)===0));
  const totalQty    = (iid) => activeLots(iid).reduce((s,l)=>s+Number(l.hoeveelheid||0),0);
  const lotBatches  = (lotId) => {
    const usages = bi.filter(x=>x.lot_id===lotId && x.afgeboekt);
    return usages.map(x=>({ ...x, batch: bat.find(b=>b.id===x.batch_id) }));
  };

  const voegProductToe = () => {
    if (!productForm.ing_id && !productForm.nieuw.trim()) { alert(t('err_select_ingredient')); return; }
    if (!productForm.qty) { alert(t('err_qty_required')); return; }
    const naam = productForm.ing_id ? (ing.find(i=>i.id===Number(productForm.ing_id))?.naam||'') : productForm.nieuw.trim();
    setProductLijst(prev=>[...prev, {...productForm, _naam:naam, _id:Date.now()}]);
    setProductForm(emptyProduct);
  };

  const saveOntvangst = () => {
    if (productLijst.length===0) { alert(t('err_min_one_product')); return; }
    let updatedIng = [...ing];
    const newLots = [];
    productLijst.forEach(p => {
      let iid;
      if (p.ing_id) { iid = Number(p.ing_id); }
      else {
        const existing = updatedIng.find(i=>i.naam.toLowerCase()===p.nieuw.trim().toLowerCase());
        if (existing) { iid = existing.id; }
        else {
          const n = {id:newId(updatedIng), naam:p.nieuw.trim(), type:p.type, fabrikant:p.fabrikant};
          updatedIng = [...updatedIng, n]; iid = n.id;
        }
      }
      const lot = {id:newId([...lots,...newLots]), ingredient_id:iid, hoeveelheid:Number(p.qty), eenheid:p.eenh,
        houdbaarheid:p.tht||null, lotnummer:p.lotnr||'', leverancier:factuurForm.leverancier||'',
        prijs_per_eenheid:p.prijs?Number(p.prijs):null, factuur_nummer:factuurForm.factuur||'',
        aankoop_datum:factuurForm.datum||tod(), beschikbaar:true};
      newLots.push(lot);
      addLog({ingredient_id:iid, ingredient_naam:updatedIng.find(i=>i.id===iid)?.naam||p.nieuw.trim(),
        lot_id:lot.id, lotnummer:lot.lotnummer||'', type:'ontvangst',
        hoeveelheid:Number(p.qty), eenheid:p.eenh, referentie:factuurForm.factuur||factuurForm.leverancier||''});
    });
    setIng(updatedIng);
    setLots(prev=>[...prev,...newLots]);
    setShowO(false); setFactuurForm(emptyFactuur); setProductForm(emptyProduct); setProductLijst([]);
  };

  const doAfboeken = (lot) => {
    const q = Number(afQty);
    if (!q||q<=0) { alert(t('err_valid_qty')); return; }
    const van = afEenheid || lot.eenheid;
    const qInLot = convertEenheid(q, van, lot.eenheid);
    if (qInLot === null) { alert(t('err_convert_units').replace('{from}',van).replace('{to}',lot.eenheid)); return; }
    setLots(prev=>prev.map(l=>l.id!==lot.id?l:{...l, hoeveelheid:Math.max(0,Number(l.hoeveelheid)-qInLot), beschikbaar:Number(l.hoeveelheid)-qInLot>0}));
    addLog({ingredient_id:lot.ingredient_id, ingredient_naam:ing.find(i=>i.id===lot.ingredient_id)?.naam||'',
      lot_id:lot.id, lotnummer:lot.lotnummer||'', type:'afboeking',
      hoeveelheid:q, eenheid:van, referentie:'Handmatig afgeboekt'});
    setShowA(null); setAfQty(''); setAfEenheid('');
  };

  // --- Verpakkingen logic ---
  const vKosten = (v) => Number(v.kosten_verpakking||0)+Number(v.kosten_afsluiting||0)+Number(v.kosten_label||0);

  const onPreset = (preset) => {
    if (!preset) { setVOntvForm(f=>({...f,preset:'',naam:'',inhoud_liter:'',type:''})); return; }
    const p = VERPAKKING_DEFAULTS.find(d=>d.naam===preset);
    setVOntvForm(f=>({...f, preset, naam:p?.naam||preset, inhoud_liter:String(p?.inhoud_liter||''), type:p?.type||'', verpakking_id:''}));
  };

  const saveVOntvangst = () => {
    const n = Number(vOntvForm.aantal);
    if (!n||n<=0) { alert(t('err_count_required')); return; }
    if (vOntvForm.verpakking_id) {
      // Aanvullen bestaand type — voorraad ophogen + leverancier/factuur bijwerken
      setVerpakkingen(prev=>prev.map(v=>v.id===Number(vOntvForm.verpakking_id)?{
        ...v, voorraad:Number(v.voorraad||0)+n,
        leverancier:vOntvForm.leverancier||v.leverancier||'',
        factuurnummer:vOntvForm.factuurnummer||v.factuurnummer||'',
      }:v));
    } else {
      if (!vOntvForm.naam.trim()) { alert(t('err_name_required')); return; }
      setVerpakkingen(prev=>[...prev,{
        id:newId(prev), naam:vOntvForm.naam.trim(), inhoud_liter:Number(vOntvForm.inhoud_liter||0),
        type:vOntvForm.type||'', voorraad:n,
        kosten_verpakking:vOntvForm.kosten_verpakking?Number(vOntvForm.kosten_verpakking):0,
        kosten_afsluiting:vOntvForm.kosten_afsluiting?Number(vOntvForm.kosten_afsluiting):0,
        kosten_label:vOntvForm.kosten_label?Number(vOntvForm.kosten_label):0,
        leverancier:vOntvForm.leverancier||'', factuurnummer:vOntvForm.factuurnummer||'',
      }]);
    }
    setShowVOntv(false); setVOntvForm(emptyVO);
  };

  const openVEdit = (v) => {
    setVEditForm({naam:v.naam, inhoud_liter:String(v.inhoud_liter||''), type:v.type||'',
      kosten_verpakking:String(v.kosten_verpakking||''), kosten_afsluiting:String(v.kosten_afsluiting||''), kosten_label:String(v.kosten_label||''),
      leverancier:v.leverancier||'', factuurnummer:v.factuurnummer||''});
    setShowVEdit(v);
  };

  const saveVEdit = () => {
    if (!vEditForm.naam.trim()) { alert(t('err_name_required')); return; }
    setVerpakkingen(prev=>prev.map(v=>v.id===showVEdit.id?{...v,
      naam:vEditForm.naam.trim(), inhoud_liter:Number(vEditForm.inhoud_liter||0), type:vEditForm.type||v.type||'',
      kosten_verpakking:Number(vEditForm.kosten_verpakking||0),
      kosten_afsluiting:Number(vEditForm.kosten_afsluiting||0),
      kosten_label:Number(vEditForm.kosten_label||0),
      leverancier:vEditForm.leverancier||'', factuurnummer:vEditForm.factuurnummer||'',
    }:v));
    setShowVEdit(null);
  };

  const doVAfboeken = () => {
    const q = Number(vAfQty);
    if (!q||q<=0) { alert(t('err_valid_count')); return; }
    setVerpakkingen(prev=>prev.map(v=>v.id===showVAfboek.id?{...v,voorraad:Math.max(0,Number(v.voorraad||0)-q)}:v));
    setShowVAfboek(null); setVAfQty('');
  };

  const selIng = ing.find(i=>i.id===sel);
  const tabBtn = (t,l) => (
    <button onClick={()=>setTab(t)}
      className={`px-4 py-2 text-sm font-medium border-b-2 transition-colors ${tab===t?'border-amber-600 text-amber-700':'border-transparent text-gray-500 hover:text-gray-700'}`}>
      {l}
    </button>
  );

  return (
    <div>
      {/* Header: titel + tabs + actieknop op één lijn */}
      <div className="flex items-center justify-between mb-4">
        <div className="flex items-center gap-1">
          <h2 className="text-lg font-semibold mr-4">
            {tab==='verpakkingen'?`${t('ing_tab_packaging')}${verpakkingen.some(v=>Number(v.voorraad||0)===0)?' ⚠️':''}`:tab==='mutaties'?t('ing_tab_mutations'):t('ing_tab_ingredients')}
          </h2>
          {tabBtn('ingredienten',t('ing_tab_ingredients'))}
          {tabBtn('verpakkingen',`${t('ing_tab_packaging')}${verpakkingen.some(v=>Number(v.voorraad||0)===0)?' ⚠️':''}`)}
          {tabBtn('mutaties',t('ing_tab_mutations'))}
        </div>
        {tab==='ingredienten' && <Btn onClick={()=>{setFactuurForm(emptyFactuur);setProductForm(emptyProduct);setProductLijst([]);setShowO(true)}}>{t('btn_ontvangst')}</Btn>}
        {tab==='verpakkingen' && <Btn onClick={()=>{setVOntvForm(emptyVO);setShowVOntv(true)}}>{t('btn_ontvangst')}</Btn>}
        {tab==='mutaties' && <Btn onClick={()=>{setFactuurForm(emptyFactuur);setProductForm(emptyProduct);setProductLijst([]);setShowO(true)}}>{t('btn_ontvangst')}</Btn>}
      </div>

      {/* ======= INGREDIËNTEN TAB ======= */}
      {tab==='ingredienten' && (
        <div className="flex flex-col md:flex-row gap-4 md:items-start">
            <div className={`w-full md:w-60 md:flex-shrink-0${sel?' hidden md:block':''}`}>
              <div className="mb-2">
                <input type="text" placeholder={t('search_ingredient')}
                  className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"
                  value={ingZoek} onChange={e=>{setIngZoek(e.target.value);setSel(null);}} />
              </div>
              <div className="bg-white rounded-lg shadow-sm overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide border-b">
                  <tr><th className="px-3 py-1.5 text-left font-normal">{t('lbl_name')}</th><th className="px-3 py-1.5 text-right font-normal">{t('lbl_stock')}</th></tr>
                </thead>
                {ing.length===0
                  ? <tbody><tr><td colSpan={2} className="px-3 py-6 text-center text-gray-400">{t('msg_no_ingredients')}</td></tr></tbody>
                  : (() => {
                      const zoek = ingZoek.trim().toLowerCase();
                      const filtered = zoek ? ing.filter(i=>i.naam.toLowerCase().includes(zoek)||i.type.toLowerCase().includes(zoek)) : ing;
                      if (filtered.length===0) return <tbody><tr><td colSpan={2} className="px-3 py-6 text-center text-gray-400">Geen resultaten voor "{ingZoek}"</td></tr></tbody>;
                      return ING_TYPES.map(ingTyp => {
                        const groep = [...filtered.filter(i => i.type === ingTyp)].sort((a,b)=>a.naam.localeCompare(b.naam,'nl'));
                        if (groep.length === 0) return null;
                        const dicht = groepDicht[ingTyp] && !zoek; // zoeken forceert open
                        return (
                          <tbody key={ingTyp} className="divide-y divide-gray-100">
                            <tr className="bg-gray-50 cursor-pointer select-none hover:bg-gray-100"
                              onClick={()=>setGroepDicht(p=>({...p,[ingTyp]:!p[ingTyp]}))}>
                              <td colSpan={2} className="px-3 py-1.5 text-xs font-medium text-gray-500 uppercase tracking-wide flex items-center">
                                <span className="mr-1.5 text-gray-400">{dicht?'▶':'▼'}</span>{t('ing_type_'+ingTyp.toLowerCase())}
                                <span className="ml-1.5 font-normal text-gray-400">({groep.length})</span>
                              </td>
                            </tr>
                            {!dicht && groep.map(i => {
                              const tot = totalQty(i.id);
                              const eenh = activeLots(i.id)[0]?.eenheid||'';
                              return <tr key={i.id} onClick={()=>setSel(sel===i.id?null:i.id)}
                                className={`cursor-pointer hover:bg-amber-50 ${sel===i.id?'bg-amber-50':''}`}>
                                <td className="px-3 py-2 font-medium">{i.naam}</td>
                                <td className={`px-3 py-2 text-right font-mono ${tot===0?'text-red-400':''}`}>{tot} {eenh}</td>
                              </tr>;
                            })}
                          </tbody>
                        );
                      });
                    })()
                }
              </table>
              </div>{/* /bg-white ing card */}
            </div>
            {sel && selIng && (<>
              <button className="md:hidden mb-2 flex items-center gap-1 text-sm font-medium text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 w-full" onClick={()=>setSel(null)}>{t('btn_back')}</button>
              <div className="flex-1 min-w-0 bg-white rounded-lg shadow-sm overflow-x-auto">
                <div className="px-3 py-2 bg-gray-700 text-white flex items-center justify-between">
                  <span className="font-medium text-sm">{selIng.naam} — {t('ing_lots')}</span>
                  <Btn s="sm" onClick={()=>{setFactuurForm(emptyFactuur);setProductForm({...emptyProduct,ing_id:String(sel)});setProductLijst([]);setShowO(true)}}>>{t('btn_add_lot')}</Btn>
                </div>
                <table className="w-full text-sm">
                  <thead className="text-xs text-gray-500 bg-gray-50">
                    <tr><th className="px-3 py-2 text-left">{t('lbl_lot_short')}</th><th className="px-3 py-2 text-right">{t('lbl_quantity_short')}</th><th className="px-3 py-2 text-left">{t('lbl_tht')}</th><th className="px-3 py-2 text-right">€/E</th></tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    {activeLots(sel).length===0 && <tr><td colSpan={4} className="px-3 py-4 text-center text-gray-400">{t('msg_no_active_lots')}</td></tr>}
                    {activeLots(sel).map(lot => {
                      const days = lot.houdbaarheid ? Math.ceil((new Date(lot.houdbaarheid)-new Date())/86400000) : null;
                      const exp = days!==null&&days<0; const soon = days!==null&&days>=0&&days<=30;
                      return <tr key={lot.id} className={`cursor-pointer hover:bg-amber-50 ${exp?'bg-red-50':soon?'bg-yellow-50':''}`}
                        onClick={()=>openLot(lot)}>
                        <td className="px-3 py-2">{lot.lotnummer||'—'}</td>
                        <td className="px-3 py-2 text-right font-mono">{lot.hoeveelheid} {lot.eenheid}</td>
                        <td className={`px-3 py-2 text-xs ${exp?'text-red-600':soon?'text-yellow-600':'text-gray-500'}`}>
                          {lot.houdbaarheid?fmtD(lot.houdbaarheid):'—'}{exp?' ⚠️':soon?` (${days}d)`:''}
                        </td>
                        <td className="px-3 py-2 text-right text-xs">{lot.prijs_per_eenheid?fmt(lot.prijs_per_eenheid):'—'}</td>
                      </tr>;
                    })}
                    {archiefLots(sel).length>0 && (
                      <tr>
                        <td colSpan={4} className="px-3 py-1">
                          <button className="flex items-center gap-1 text-xs font-medium text-gray-500 uppercase hover:text-gray-700 py-1"
                            onClick={()=>setArchiefOpen(p=>({...p,[sel]:!p[sel]}))}>
                            <span className="text-gray-400">{archiefOpen[sel]?'▼':'▶'}</span>
                            <span>{t('ing_archived_lots').replace('{n}',archiefLots(sel).length)}</span>
                          </button>
                        </td>
                      </tr>
                    )}
                    {archiefOpen[sel] && archiefLots(sel).map(lot => (
                      <tr key={lot.id} className="bg-gray-50 cursor-pointer hover:bg-gray-100 opacity-70"
                        onClick={()=>openLot(lot)}>
                        <td className="px-3 py-2 text-gray-500">{lot.lotnummer||'—'}</td>
                        <td className="px-3 py-2 text-right font-mono text-gray-400">{lot.hoeveelheid} {lot.eenheid} <span className="text-xs text-gray-300">({t('lbl_empty')})</span></td>
                        <td className="px-3 py-2 text-xs text-gray-400">{lot.houdbaarheid?fmtD(lot.houdbaarheid):'—'}</td>
                        <td className="px-3 py-2 text-right text-xs text-gray-400">{lot.prijs_per_eenheid?fmt(lot.prijs_per_eenheid):'—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </>)}
        </div>
      )}

      {/* ======= VERPAKKINGEN TAB ======= */}
      {tab==='verpakkingen' && (
        <div>
          <div className="bg-white rounded-lg shadow-sm overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                <tr>
                  <th className="px-3 py-2 text-left">{t('lbl_packaging')}</th>
                  <th className="px-3 py-2 text-right">{t('lbl_content')}</th>
                  <th className="px-3 py-2 text-right">{t('lbl_stock')}</th>
                  <th className="px-3 py-2 text-right">{t('lbl_packaging')}</th>
                  <th className="px-3 py-2 text-right">{t('packaging_cost_closure')}</th>
                  <th className="px-3 py-2 text-right">{t('packaging_cost_label')}</th>
                  <th className="px-3 py-2 text-right font-semibold text-gray-600">{t('packaging_cost_per_unit')}</th>
                  <th className="px-3 py-2"></th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {verpakkingen.length===0 && (
                  <tr><td colSpan={8} className="px-3 py-8 text-center text-gray-400">
                    {t('msg_no_packaging')}
                  </td></tr>
                )}
                {verpakkingen.map(v => {
                  const stock = Number(v.voorraad||0);
                  const totk = vKosten(v);
                  const lbl = verpKostenLabels(v.type);
                  return (
                    <tr key={v.id} className={stock===0?'bg-red-50':stock<=5?'bg-yellow-50':''}>
                      <td className="px-3 py-2.5 font-medium">
                        <div>{v.naam}{v.type && <span className="ml-1.5 text-xs text-gray-400 capitalize">{v.type}</span>}</div>
                        {(v.leverancier||v.factuurnummer) && (
                          <div className="text-xs text-gray-400 font-normal mt-0.5">
                            {v.leverancier && <span>{v.leverancier}</span>}
                            {v.leverancier && v.factuurnummer && <span className="mx-1">·</span>}
                            {v.factuurnummer && <span>F: {v.factuurnummer}</span>}
                          </div>
                        )}
                      </td>
                      <td className="px-3 py-2.5 text-right text-gray-500">{Number(v.inhoud_liter||0)}L</td>
                      <td className="px-3 py-2.5 text-right">
                        <span className={`font-mono font-semibold ${stock===0?'text-red-600':stock<=5?'text-yellow-600':'text-gray-800'}`}>{stock}</span>
                        {stock===0 && <span className="ml-1 text-xs text-red-400 font-normal">{t('packaging_empty')}</span>}
                        {stock>0&&stock<=5 && <span className="ml-1 text-xs text-yellow-500 font-normal">{t('packaging_low')}</span>}
                      </td>
                      <td className="px-3 py-2.5 text-right text-xs text-gray-500">
                        {v.kosten_verpakking ? fmt(v.kosten_verpakking) : <span className="text-gray-300">—</span>}
                        <div className="text-gray-400">{lbl.verpakking}</div>
                      </td>
                      <td className="px-3 py-2.5 text-right text-xs text-gray-500">
                        {v.kosten_afsluiting ? fmt(v.kosten_afsluiting) : <span className="text-gray-300">—</span>}
                        <div className="text-gray-400">{lbl.afsluiting}</div>
                      </td>
                      <td className="px-3 py-2.5 text-right text-xs text-gray-500">
                        {v.kosten_label ? fmt(v.kosten_label) : <span className="text-gray-300">—</span>}
                        <div className="text-gray-400">{t('packaging_cost_label')}</div>
                      </td>
                      <td className="px-3 py-2.5 text-right font-semibold text-sm">
                        {totk > 0 ? <span className="text-amber-700">{fmt(totk)}</span> : <span className="text-gray-300">—</span>}
                      </td>
                      <td className="px-3 py-2.5">
                        <div className="flex gap-1 justify-end">

                {(log||[]).length===0 && <tr><td colSpan={6} className="px-3 py-8 text-center text-gray-400">{t('msg_no_mutations')}</td></tr>}
                {[...(log||[])].reverse().map(entry => {
                  const isCorrPos = entry.type==='correctie' && Number(entry.hoeveelheid)>0;
                  const isIn = entry.type==='ontvangst'||entry.type==='terugboeking'||isCorrPos;
                  const clr = {ontvangst:'text-green-600 bg-green-50',gebruik:'text-red-600 bg-red-50',afboeking:'text-orange-600 bg-orange-50',terugboeking:'text-blue-600 bg-blue-50',correctie:'text-purple-600 bg-purple-50'};
                  const lbl = {ontvangst:'↑ '+t('mut_receipt'),gebruik:'↓ '+t('mut_usage'),afboeking:'↓ '+t('mut_booking'),terugboeking:'↑ '+t('mut_return'),correctie:isCorrPos?'↑ '+t('mut_correction'):'↓ '+t('mut_correction')};
                  return <tr key={entry.id} className="hover:bg-gray-50">
                    <td className="px-3 py-2 text-xs text-gray-500 whitespace-nowrap">{fmtD(entry.datum)}</td>
                    <td className="px-3 py-2 font-medium">{entry.ingredient_naam}</td>
                    <td className="px-3 py-2 text-xs text-gray-500">{entry.lotnummer||'—'}</td>
                    <td className="px-3 py-2">
                      <span className={`px-1.5 py-0.5 rounded text-xs font-medium ${clr[entry.type]||'text-gray-600 bg-gray-100'}`}>
                        {lbl[entry.type]||entry.type}
                      </span>
                    </td>
                    <td className={`px-3 py-2 text-right font-mono text-xs font-semibold ${isIn?'text-green-600':'text-red-600'}`}>
                      {isIn?'+':'-'}{Math.abs(entry.hoeveelheid)} {entry.eenheid}
                    </td>
                    <td className="px-3 py-2 text-xs text-gray-500">{entry.referentie||'—'}</td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== BATCHES =====
function BatchesPage({ing, setIng, lots, setLots, bat, setBat, bi, setBi, av, setAv, uit, setUit, acc, setAcc, verpakkingen, setVerpakkingen, log, setLog, bfCreds, bfSync, tanks, accijnsInst, hygieneItems, hygieneGroups, wcCreds, artikelen}) {
  const [sel, setSel] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [showBf, setShowBf] = useState(false);
  const [bfJson, setBfJson] = useState('');
  const [bfFileName, setBfFileName] = useState('');
  const bfFileRef = useRef();
  const [editId, setEditId] = useState(null);
  const emptyB = {batch_nummer:'',naam:'',stijl:'',status:'Gepland',liter_vergist:'',OG:'',FG:'',ABV:'',tank:'',electra_kosten:'',water_kosten:'',schoonmaak_kosten:'',overige_kosten:'',notities:'',brouwzaal_eff:'',maisch_eff:'',maisch_ph:'',product_ph:'',datum:tod()};
  const safeStr = (v) => { if (!v && v!==0) return ''; if (typeof v==='string') return v; if (Array.isArray(v)) return v.map(x=>typeof x==='string'?x:(x?.note||x?.text||x?.message||x?.content||'')).filter(Boolean).join('\n'); if (typeof v==='object') return String(v.$string||v.text||v.note||v.message||''); return String(v); };
  const emptyI = {ingredient_id:'',ingredient_naam:'',ingredient_type:'Mout',hoeveelheid:'',eenheid:'kg',lot_id:'',kosten:'',afboeken:false};
  const [bForm, setBForm] = useState(emptyB);
  const [iForm, setIForm] = useState(emptyI);

  const [batchArchiefIngeklapt, setBatchArchiefIngeklapt] = useStore('batches_archief_ingeklapt', true);
  const [infoIngeklapt, setInfoIngeklapt] = useState(false);
  const [bfSyncing, setBfSyncing] = useState(false);
  const [bfMsg, setBfMsg] = useState('');
  const [hygieneIngeklapt, setHygieneIngeklapt] = useStore('batches_hygiene_ingeklapt', true);
  const [ingIngeklapt, setIngIngeklapt] = useStore('batches_ing_ingeklapt', false);
  const [ingFormOpen, setIngFormOpen] = useState(false);
  const [batchZoek, setBatchZoek] = useState('');
  const emptyAv = {verpakking_id:'',verpakking_type:'',inhoud_per_eenheid:'',hoeveelheid:'',datum:tod(),tht:''};
  const [avF, setAvF] = useState(emptyAv);
  const [uitModal, setUitModal] = useState(null);
  const [uitAantal, setUitAantal] = useState('');
  const [uitDatum, setUitDatum] = useState(tod());

  // ── WooCommerce auto-push helper ─────────────────────────────────────────
  // Helper: is accijns betaald of is er geen accijns verschuldigd?
  const wcAccijnsBetaald = (uitslag) => {
    const records = (acc||[]).filter(ax => String(ax.uitslag_id) === String(uitslag.id));
    if (records.length === 0) return Number(uitslag.accijns||0) === 0;
    return records.every(a => a.betaald === true || Number(a.accijns||0) === 0);
  };

  const wcPushNaBatch = async (batchId, verpakkingType, nieuweUitslag) => {
    if (!wcCreds?.enabled || !wcCreds?.storeUrl) return;
    try {
      const batch = bat.find(b=>b.id===batchId);
      if (!batch) return;
      const art = (artikelen||[]).find(a=>a.biernaam===batch.naam && a.verpakking_type===verpakkingType);
      if (!art?.artikelnummer) return;
      // Bestaande uitslagen: alleen meetellen als accijns betaald (of geen accijns)
      const bestaand = (uit||[])
        .filter(u=>bat.find(b=>b.id===u.batch_id)?.naam===art.biernaam && u.verpakking_type===verpakkingType)
        .filter(u=>wcAccijnsBetaald(u))
        .reduce((s,u)=>s+Math.max(0,Number(u.aantal||0)-Number(u.verkocht_stuks||0)),0);
      // Nieuwe uitslag: accijns-record nog niet in state → check via uitslag.accijns
      const nieuwBeschik = (nieuweUitslag && Number(nieuweUitslag.accijns||0)===0)
        ? Math.max(0, Number(nieuweUitslag.aantal||0) - Number(nieuweUitslag.verkocht_stuks||0))
        : 0;
      const beschikbaar = bestaand + nieuwBeschik;
      const prods = await wcGet(`products?sku=${encodeURIComponent(art.artikelnummer)}&per_page=1`);
      if (!prods?.length) return;
      await wcPut(`products/${prods[0].id}`, {stock_quantity: beschikbaar, manage_stock: true});
    } catch(e) { console.warn('WC auto-push mislukt:', e.message); }
  };

  const runBfSync = async () => {
    if (!bfCreds?.enabled || !bfCreds.userId || !bfCreds.apiKey) {
      setBfMsg('⚠ Geen Brewfather credentials ingesteld');
      return;
    }
    setBfSyncing(true); setBfMsg('');
    try {
      const bfBatches = await bfGetBatches();
      let added=0, updated=0;
      const newBatches=[], newBis=[], updBatches=[], refreshBisFor=[];
      for (const bfB of bfBatches) {
        const existing = bat.find(b => b.brewfather_id === bfB._id ||
          (bfB.batchNo != null && String(b.batch_nummer) === String(bfB.batchNo)));
        const appStatus = BF_TO_APP[bfB.status] || 'Gepland';
        if (!existing) {
          const nb = {...bfMapBatch(bfB), id: newId([...bat, ...newBatches])};
          newBatches.push(nb);
          const nbis = bfMapBis(bfB, nb.id, newId([...bi, ...newBis]) + newBis.length);
          newBis.push(...nbis);
          added++;
        } else {
          const ch = {brewfather_id: bfB._id};
          if (existing.status !== appStatus) ch.status = appStatus;
          if (bfB.measuredBatchSize) ch.liter_vergist = bfNumSafe(bfB.measuredBatchSize);
          if (bfB.measuredOg)  ch.OG  = bfNumSafe(bfB.measuredOg);
          if (bfB.measuredFg)  ch.FG  = bfNumSafe(bfB.measuredFg);
          if (bfB.measuredAbv) ch.ABV = bfNumSafe(bfB.measuredAbv);
          if (bfB.measuredBrewhouseEfficiency != null) ch.brouwzaal_eff = bfNumSafe(bfB.measuredBrewhouseEfficiency);
          else if (bfB.estimatedBrewhouseEfficiency != null && !existing.brouwzaal_eff) ch.brouwzaal_eff = bfNumSafe(bfB.estimatedBrewhouseEfficiency);
          if (bfB.measuredMashEfficiency != null) ch.maisch_eff = bfNumSafe(bfB.measuredMashEfficiency);
          if (bfB.measuredMashPh != null) ch.maisch_ph = bfNumSafe(bfB.measuredMashPh);
          if (bfB.measuredFermentationPh != null) ch.product_ph = bfNumSafe(bfB.measuredFermentationPh);
          else if (bfB.measuredPh != null && !existing.product_ph) ch.product_ph = bfNumSafe(bfB.measuredPh);
          { const _rawN=bfB.notes||bfB.tasteNotes; if (_rawN && !existing.notities) { ch.notities = Array.isArray(_rawN)?_rawN.map(x=>typeof x==='string'?x:(x?.note||x?.text||x?.message||'')).filter(Boolean).join('\n'):(typeof _rawN==='object'&&_rawN?String(_rawN.$string||_rawN.text||_rawN.note||''):String(_rawN||'')); } }
          updBatches.push({id: existing.id, ch});
          // Refresh ingrediënten als er nog geen goed opgeslagen zijn
          const existingBis = bi.filter(x => x.batch_id === existing.id);
          const hasWrongFields = existingBis.length > 0 && existingBis.some(x => x.naam && !x.ingredient_naam);
          const hasNoBis = existingBis.length === 0;
          if (hasWrongFields || hasNoBis) {
            refreshBisFor.push({batchId: existing.id, bfB});
          }
          updated++;
        }
      }
      if (newBatches.length) setBat(prev => [...prev, ...newBatches]);
      if (updBatches.length) setBat(prev => prev.map(b => {
        const u = updBatches.find(x=>x.id===b.id); return u ? {...b, ...u.ch} : b;
      }));
      setBi(prev => {
        let next = [...prev, ...newBis];
        // Verwijder oude ingrediënten met verkeerde veldnamen en vervang door nieuwe
        for (const {batchId, bfB} of refreshBisFor) {
          next = next.filter(x => x.batch_id !== batchId);
          const freshBis = bfMapBis(bfB, batchId, newId(next) + next.length);
          next = [...next, ...freshBis];
        }
        return next;
      });
      setBfMsg(`✓ Gesynchroniseerd — ${added} nieuw, ${updated} bijgewerkt`);
      if (bfSync) bfSync();
    } catch(e) {
      setBfMsg('⚠ Sync mislukt: ' + (e.message||String(e)));
    }
    setBfSyncing(false);
  };

  const getBi = (bid) => bi.filter(x=>x.batch_id===bid);
  const ingKosten = (b) => getBi(b.id).reduce((s,x)=>{
    if (x.kosten) return s+Number(x.kosten);
    const lot = lots.find(l=>l.id===x.lot_id);
    return s + (lot?.prijs_per_eenheid ? lot.prijs_per_eenheid*Number(x.hoeveelheid||0) : 0);
  },0);
  const totalK = (b) => ingKosten(b)+Number(b.electra_kosten||0)+Number(b.water_kosten||0)+Number(b.schoonmaak_kosten||0)+Number(b.overige_kosten||0);

  const handleStatusChange = (nieuweStatus) => {
    const oudeStatus = selB?.status;
    if (oudeStatus === nieuweStatus) return;
    setBat(prev=>prev.map(b=>b.id===selB.id?{...b,status:nieuweStatus}:b));
    addLog({type:'status', batch_id:selB.id, referentie:`${oudeStatus} → ${nieuweStatus}`});
  };

  const saveBatch = () => {
    if (!bForm.naam.trim()) { alert(t('err_name_required')); return; }
    if (bForm.tank && ['Vergisten','Conditioneren'].includes(bForm.status)) {
      const bezet = bat.find(b=>b.tank===bForm.tank && b.id!==editId && ['Vergisten','Conditioneren'].includes(b.status));
      if (bezet) { alert(t('err_tank_occupied').replace('{tank}',bForm.tank).replace('{name}',bezet.naam)); return; }
    }
    if (editId) {
      const oud = bat.find(b=>b.id===editId);
      const velden = {naam:'Naam',stijl:'Stijl',batch_nummer:'Batch #',tank:'Tank',
        liter_vergist:'Liters',OG:'OG',FG:'FG',ABV:'ABV',
        brouwzaal_eff:'Brouwzaal eff.',maisch_eff:'Maisch eff.',maisch_ph:'Maisch pH',product_ph:'Product pH',
        electra_kosten:'Elektra',water_kosten:'Water',
        schoonmaak_kosten:'Schoonmaak',overige_kosten:'Overig',notities:'Notities'};
      const wijz = Object.entries(velden)
        .filter(([k])=>String(oud?.[k]??'')!==String(bForm[k]??''))
        .map(([k,l])=>`${l}: ${oud?.[k]||'—'} → ${bForm[k]||'—'}`);
      setBat(p=>p.map(b=>b.id===editId?{...b,...bForm}:b));
      if (wijz.length>0) addLog({type:'gewijzigd', batch_id:editId, referentie:wijz.join(' | ')});
      setEditId(null);
      setShowForm(false); setBForm(emptyB);
    } else {
      const nb = {id:newId(bat),...bForm};
      setBat(prev=>[...prev,nb]);
      addLog({type:'aangemaakt', batch_id:nb.id, referentie:nb.naam});
      setShowForm(false); setBForm(emptyB);
    }
  };

  const parseBfData = (raw) => {
    // Helpers: zet Brewfather-velden veilig om naar primitieve waarden.
    // Brewfather kan MongoDB extended JSON gebruiken ({$numberDouble:...}) of arrays voor notes.
    const bfNum = (v) => {
      if (v === null || v === undefined) return '';
      if (typeof v === 'number') return v;
      if (typeof v === 'object') {
        const n = v.$numberDouble ?? v.$numberDecimal ?? v.$numberInt ?? v.$numberLong;
        if (n !== undefined) return Number(n)||'';
      }
      const n = Number(v);
      return isNaN(n) ? '' : n;
    };
    const bfStr = (v) => {
      if (!v && v !== 0) return '';
      if (Array.isArray(v)) return v.map(x => typeof x==='string' ? x : (x.note||x.text||x.message||'')).filter(Boolean).join('\n');
      if (typeof v === 'object') return String(v.$string||v.text||v.note||'');
      return String(v);
    };
    const bfDate = (v) => {
      if (!v) return tod();
      if (typeof v === 'number') return new Date(v).toISOString().split('T')[0];
      if (typeof v === 'object') {
        const ms = v.$date?.$numberLong ?? v.$date ?? null;
        if (ms) return new Date(Number(ms)).toISOString().split('T')[0];
      }
      const s = String(v).split('T')[0];
      return s.match(/^\d{4}-\d{2}-\d{2}$/) ? s : tod();
    };

    // Ondersteuning voor array (meerdere batches) of enkel object
    const batches = Array.isArray(raw) ? raw : [raw];
    let nextBatId = bat.length ? Math.max(0,...bat.map(x=>x.id))+1 : 1;
    let nextBiId  = bi.length  ? Math.max(0,...bi.map(x=>x.id))+1  : 1;
    const newBatches=[], newBis=[];

    batches.forEach(d => {
      // Recipe kan genest zijn (batch export) of op top-level (recipe export)
      const r = d.recipe || d;
      const naam = bfStr(r.name||d.name||'');
      if (!naam) return;

      const batch_nummer = bfStr(d.batchNo||d.number||r.batchNo||'');
      if (batch_nummer && bat.find(b=>String(b.batch_nummer)===String(batch_nummer))) {
        alert(t('err_batch_exists').replace('{num}',batch_nummer));
        return;
      }

      const nb = {
        id: nextBatId++,
        batch_nummer,
        naam,
        stijl: bfStr(r.style?.name||d.style?.name||''),
        status: BF_MAP[bfStr(d.status)]||'Gepland',
        liter_vergist: bfNum(d.measuredBatchSize||d.estimatedFinalVolume||r.batchSize||r.equipment?.batchSize||''),
        OG:  bfNum(d.measuredOg||d.estimatedOg||r.og||''),
        FG:  bfNum(d.measuredFg||d.estimatedFg||r.fg||''),
        ABV: bfNum(d.measuredAbv||d.estimatedAbv||r.abv||''),
        tank: '',
        electra_kosten:'',water_kosten:'',schoonmaak_kosten:'',overige_kosten:'',
        notities: bfStr(d.notes||d.tasteNotes||''),
        datum: bfDate(d.brewDate),
      };
      newBatches.push(nb);

      const add = (naam,type,qty,eenh) => {
        const n = bfStr(naam);
        if (!n) return;
        newBis.push({id:nextBiId++,batch_id:nb.id,ingredient_id:null,
          ingredient_naam:n,ingredient_type:type,
          hoeveelheid:bfNum(qty)||0,eenheid:bfStr(eenh)||'g',
          lot_id:null,afgeboekt:false,kosten:null});
      };
      (r.fermentables||[]).forEach(f=>add(f.name,'Mout',f.amount,f.unit||'kg'));
      (r.hops||[]).forEach(h=>add(h.name,'Hop',h.amount,h.unit||'g'));
      (r.yeasts||[]).forEach(y=>add(y.name,'Gist',y.amount||1,y.unit||'pkg'));
      (r.miscs||[]).forEach(m=>add(m.name,'Overig',m.amount,m.unit||'g'));
    });

    if (newBatches.length===0) { alert(t('err_no_valid_batch_data')); return; }
    setBat(prev=>[...prev,...newBatches]);
    setBi(prev=>[...prev,...newBis]);
    setShowBf(false); setBfJson(''); setBfFileName('');
    alert(t('batch_import_success').replace('{batches}',newBatches.length).replace('{ingredients}',newBis.length));
  };

  const importBf = () => {
    try { parseBfData(JSON.parse(bfJson)); }
    catch(e) { alert(t('err_invalid_json')+e.message); }
  };

  const loadBfFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setBfFileName(file.name);
    const reader = new FileReader();
    reader.onload = ev => {
      try { parseBfData(JSON.parse(ev.target.result)); }
      catch(e) { alert(t('err_file_read')+e.message); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const addLog = (entry) => setLog(prev=>[...prev,{id:newId(prev||[]),datum:tod(),...entry}]);

  const fefoSort = (a, b) => {
    if (a.houdbaarheid && b.houdbaarheid) return new Date(a.houdbaarheid)-new Date(b.houdbaarheid);
    if (a.houdbaarheid) return -1;
    if (b.houdbaarheid) return 1;
    return a.id - b.id;
  };

  const haalVanVoorraad = (biRow, ingMatch) => {
    if (!biRow.lot_id) { alert(t('err_select_lot_first')); return; }
    const lot = lots.find(l=>l.id===biRow.lot_id);
    if (!lot) { alert(t('err_lot_not_found')); return; }
    const qty = Number(biRow.hoeveelheid||0);
    if (convertEenheid(qty, biRow.eenheid, lot.eenheid) === null) {
      alert(t('err_convert_units').replace('{from}',biRow.eenheid).replace('{to}',lot.eenheid)); return;
    }
    const selBatch = bat.find(b=>b.id===biRow.batch_id);
    const batchRef = selBatch ? `Batch: ${selBatch.naam}` : 'Batch';
    const r3 = (n) => Math.round(n*1000)/1000;
    const availEenh = Number(lot.hoeveelheid||0);
    const availBi   = r3(convertEenheid(availEenh, lot.eenheid, biRow.eenheid) ?? availEenh);

    if (availBi >= qty - 0.001) {
      // Lot heeft genoeg — volledig afboeken
      const qtyInLot = r3(convertEenheid(qty, biRow.eenheid, lot.eenheid) ?? qty);
      setLots(prev=>prev.map(l=>l.id!==biRow.lot_id?l:{...l,
        hoeveelheid:r3(Math.max(0, Number(l.hoeveelheid||0)-qtyInLot)),
        beschikbaar:r3(Number(l.hoeveelheid||0)-qtyInLot)>0,
      }));
      setBi(prev=>prev.map(x=>x.id===biRow.id?{...x,afgeboekt:true}:x));
      addLog({ingredient_id:ingMatch?.id||null, ingredient_naam:biRow.ingredient_naam,
        lot_id:biRow.lot_id, lotnummer:lot.lotnummer||'', type:'gebruik',
        batch_id:biRow.batch_id, hoeveelheid:qty, eenheid:biRow.eenheid, referentie:batchRef});
    } else {
      // Lot heeft onvoldoende — boek wat beschikbaar is, voeg restrij toe
      if (availBi <= 0.001) {
        alert(t('err_lot_no_stock').replace('{lot}',lot.lotnummer||'—'));
        return;
      }
      const useQty  = availBi;
      const remainQ = r3(qty - useQty);
      const useInLotEenh = r3(convertEenheid(useQty, biRow.eenheid, lot.eenheid) ?? useQty);
      // Depleteer het lot
      setLots(prev=>prev.map(l=>l.id!==biRow.lot_id?l:{...l,
        hoeveelheid:r3(Math.max(0, Number(l.hoeveelheid||0)-useInLotEenh)),
        beschikbaar:false,
      }));
      // Huidige rij → afgeboekt voor beschikbare hoeveelheid; nieuwe rij voor rest
      setBi(prev=>{
        const nextId = prev.length ? Math.max(...prev.map(x=>x.id))+1 : 1;
        return [
          ...prev.map(x=>x.id===biRow.id
            ? {...x, hoeveelheid:useQty, afgeboekt:true,
                kosten:lot.prijs_per_eenheid?r3(lot.prijs_per_eenheid*useQty):x.kosten}
            : x),
          {id:nextId, batch_id:biRow.batch_id, ingredient_id:biRow.ingredient_id,
            ingredient_naam:biRow.ingredient_naam, ingredient_type:biRow.ingredient_type,
            hoeveelheid:remainQ, eenheid:biRow.eenheid,
            lot_id:null, kosten:null, afgevinkt:false, afgeboekt:false},
        ];
      });
      addLog({ingredient_id:ingMatch?.id||null, ingredient_naam:biRow.ingredient_naam,
        lot_id:biRow.lot_id, lotnummer:lot.lotnummer||'', type:'gebruik',
        batch_id:biRow.batch_id, hoeveelheid:useQty, eenheid:biRow.eenheid, referentie:batchRef});
    }
  };

  const addIngFromBatch = (biRow) => {
    const newIngredient = {id:newId(ing), naam:biRow.ingredient_naam, type:biRow.ingredient_type||'Overig', fabrikant:''};
    setIng(prev=>[...prev, newIngredient]);
    setBi(prev=>prev.map(x=>x.id===biRow.id?{...x,ingredient_id:newIngredient.id}:x));
  };

  const addIng = (bid) => {
    const ingObj = ing.find(i=>i.id===Number(iForm.ingredient_id));
    const naam = ingObj ? ingObj.naam : iForm.ingredient_naam.trim();
    const type = ingObj ? ingObj.type : iForm.ingredient_type;
    if (!naam) { alert(t('err_select_ingredient')); return; }
    if (!iForm.hoeveelheid||Number(iForm.hoeveelheid)<=0) { alert(t('err_qty_required')); return; }
    setBi(prev=>[...prev,{
      id:newId(bi), batch_id:bid,
      ingredient_id:ingObj?ingObj.id:null,
      ingredient_naam:naam, ingredient_type:type,
      hoeveelheid:Number(iForm.hoeveelheid||0), eenheid:iForm.eenheid,
      lot_id:iForm.lot_id?Number(iForm.lot_id):null,
      kosten:iForm.kosten?Number(iForm.kosten):null, afgevinkt:false,
      afgeboekt: !!iForm.lot_id,
    }]);
    if (iForm.lot_id) {
      const lotId=Number(iForm.lot_id), qty=Number(iForm.hoeveelheid||0);
      const lot = lots.find(l=>l.id===lotId);
      const qtyInLot = convertEenheid(qty, iForm.eenheid, lot?.eenheid||iForm.eenheid) ?? qty;
      if (lot && convertEenheid(qty, iForm.eenheid, lot.eenheid) === null) {
        alert(t('err_convert_units').replace('{from}',iForm.eenheid).replace('{to}',lot.eenheid)); return;
      }
      setLots(prev=>prev.map(l=>l.id!==lotId?l:{...l,
        hoeveelheid:Math.max(0,Number(l.hoeveelheid||0)-qtyInLot),
        beschikbaar:Number(l.hoeveelheid||0)-qtyInLot>0,
      }));
    }
    setIForm(emptyI);
  };

  const toggleAf = (id) => setBi(prev=>prev.map(x=>x.id===id?{...x,afgevinkt:!x.afgevinkt}:x));
  const removeBI = (id) => {
    const item = bi.find(x=>x.id===id);
    if (item?.afgeboekt && item.lot_id) {
      const qty = Number(item.hoeveelheid||0);
      const lot = lots.find(l=>l.id===item.lot_id);
      const qtyInLot = convertEenheid(qty, item.eenheid, lot?.eenheid||item.eenheid) ?? qty;
      setLots(prev=>prev.map(l=>l.id!==item.lot_id?l:{...l,
        hoeveelheid:Number(l.hoeveelheid||0)+qtyInLot,
        beschikbaar:true,
      }));
      addLog({ingredient_id:item.ingredient_id||null, ingredient_naam:item.ingredient_naam,
        lot_id:item.lot_id, lotnummer:lot?.lotnummer||'', type:'terugboeking',
        batch_id:item.batch_id, hoeveelheid:qty, eenheid:item.eenheid, referentie:'Verwijderd uit batch'});
    }
    setBi(prev=>prev.filter(x=>x.id!==id));
  };
  const removeBatch = (id) => { if(confirm(t('error_confirm_delete_batch'))) { setBat(prev=>prev.filter(b=>b.id!==id)); setBi(prev=>prev.filter(x=>x.batch_id!==id)); setSel(null); } };

  const bAv    = sel ? (av||[]).filter(a=>a.batch_id===sel) : [];
  const uitgeslVanAv = (avId) => (uit||[]).filter(u=>u.afvulling_id===avId).reduce((s,u)=>s+Number(u.aantal||0),0);
  const resterendAv  = (a)    => Number(a.hoeveelheid||0) - uitgeslVanAv(a.id);
  const totAfgevuld  = bAv.reduce((s,a)=>s+Number(a.inhoud_per_eenheid||0)*Number(a.hoeveelheid||0),0);
  const totUitgeslagen = bAv.reduce((s,a)=>s+uitgeslVanAv(a.id)*Number(a.inhoud_per_eenheid||0),0);

  const doAfvullen = () => {
    if (!avF.verpakking_id||!avF.hoeveelheid) { alert(t('err_select_packaging_qty')); return; }
    const n = Number(avF.hoeveelheid);
    const vp = (verpakkingen||[]).find(v=>v.id===Number(avF.verpakking_id));
    if (!vp) { alert(t('err_invalid_packaging')); return; }
    if (Number(vp.voorraad||0) < n) { alert(t('err_insufficient_packaging_n').replace('{n}',vp.voorraad||0)); return; }
    setVerpakkingen(prev=>prev.map(v=>v.id===Number(avF.verpakking_id)?{...v,voorraad:Number(v.voorraad||0)-n}:v));
    setAv(prev=>[...(prev||[]),{id:newId(prev||[]),batch_id:sel,...avF,verpakking_id:Number(avF.verpakking_id),inhoud_per_eenheid:Number(avF.inhoud_per_eenheid),hoeveelheid:n}]);
    addLog({type:'afvullen', batch_id:sel, verpakking_type:vp.naam||avF.verpakking_type,
      hoeveelheid:n, eenheid:'stuks', referentie:`${(n*Number(avF.inhoud_per_eenheid||0)).toFixed(1)}L`});
    setAvF(emptyAv);
  };
  const doUitslaan = () => {
    if (!uitAantal) { alert(t('err_enter_qty')); return; }
    const n = Number(uitAantal);
    const rest = resterendAv(uitModal);
    if (n > rest) { alert(t('err_max_available').replace('{n}',rest)); return; }
    const liter = n * Number(uitModal.inhoud_per_eenheid||0);
    const r1 = Number(accijnsInst?.tarief_per_hl_abv||7.51);
    const r2 = Number(accijnsInst?.tarief_per_hl||24.17);
    const accBed = accijnsCalc(liter, selB?.ABV||0, r1, r2, accijnsInst);
    const nu = {id:newId(uit||[]),batch_id:sel,afvulling_id:uitModal.id,verpakking_type:uitModal.verpakking_type,
      inhoud_per_eenheid:uitModal.inhoud_per_eenheid,aantal:n,datum:uitDatum,liter,accijns:accBed,tht:uitModal.tht||null,verkocht_stuks:0};
    setUit(prev=>[...(prev||[]),nu]);
    setAcc(prev=>[...(prev||[]),{id:newId(prev||[]),batch_id:sel,batch_nummer:selB?.batch_nummer||'',
      uitslag_id:nu.id,verpakking_type:uitModal.verpakking_type,datum:uitDatum,aantal:n,liter,
      abv:selB?.ABV||0,accijns:accBed,betaald:false,betaal_datum:null}]);
    addLog({type:'uitslaan', batch_id:sel, verpakking_type:uitModal.verpakking_type,
      hoeveelheid:n, eenheid:'stuks', referentie:`${liter.toFixed(1)}L`});
    setUitModal(null); setUitAantal(''); setUitDatum(tod());
    wcPushNaBatch(sel, uitModal.verpakking_type, nu);
  };
  const delAv = (id) => {
    if ((uit||[]).some(u=>u.afvulling_id===id)) { alert(t('err_cannot_delete_has_releases')); return; }
    setAv(prev=>(prev||[]).filter(a=>a.id!==id));
  };

  const selB = bat.find(b=>b.id===sel);

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-lg font-semibold">{t('nav_batches')}</h2>
        <div className="flex flex-wrap gap-2 items-center">
          {bfCreds?.enabled && (
            <Btn onClick={runBfSync} disabled={bfSyncing}>
              {bfSyncing ? t('batch_syncing') : t('batch_sync_brewfather')}
            </Btn>
          )}
          {bfMsg && <span className={`text-xs font-medium ${bfMsg.startsWith('✓')?'text-green-600':'text-red-600'}`}>{bfMsg}</span>}
          <Btn v="secondary" onClick={()=>setShowBf(true)}>{t('batch_import_json')}</Btn>
          <Btn onClick={()=>{setEditId(null);setBForm(emptyB);setShowForm(true)}}>{t('batch_add_btn')}</Btn>
        </div>
      </div>
      <div className="flex flex-col md:flex-row gap-4 md:items-start">
        <div className={`w-full md:w-60 md:flex-shrink-0${sel?' hidden md:block':''}`}>
          <div className="mb-2">
            <input type="text" placeholder={t('search_batch')}
              className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"
              value={batchZoek} onChange={e=>{setBatchZoek(e.target.value);setSel(null);}} />
          </div>
          <div className="bg-white rounded-lg shadow-sm overflow-x-auto">
          <div className="flex justify-between px-3 py-1.5 bg-gray-50 text-xs text-gray-500 uppercase tracking-wide border-b">
            <span>{t('lbl_name')}</span><span>{t('lbl_status')}</span>
          </div>
          {bat.length===0 && <div className="p-6 text-center text-gray-400 text-sm">{t('msg_no_batches')}</div>}
          {bat.filter(b=>b.status!=='Gesloten' && (!batchZoek||b.naam?.toLowerCase().includes(batchZoek.toLowerCase())||String(b.batch_nummer||'').includes(batchZoek)||(b.stijl||'').toLowerCase().includes(batchZoek.toLowerCase()))).map(b=>(
            <div key={b.id} onClick={()=>setSel(b.id)}
              className={`px-3 py-2.5 border-b cursor-pointer hover:bg-amber-50 ${sel===b.id?'bg-amber-50 border-l-2 border-l-amber-500':''}`}>
              <div className="flex items-center justify-between">
                <span className="font-medium text-sm">{b.naam||b.batch_nummer}</span>
                <Badge s={b.status} />
              </div>
              <div className="text-xs text-gray-500 mt-0.5">{b.batch_nummer?`#${b.batch_nummer} · `:''}{b.stijl}{b.liter_vergist?` · ${b.liter_vergist}L`:''}</div>
            </div>
          ))}
          {bat.filter(b=>b.status==='Gesloten').length>0 && (
            <div>
              <div onClick={()=>setBatchArchiefIngeklapt(v=>!v)}
                className="px-3 py-2 bg-gray-600 text-white flex items-center justify-between cursor-pointer hover:bg-gray-500 select-none">
                <span className="text-xs font-medium text-gray-200 uppercase">{t('batch_archived')} ({bat.filter(b=>b.status==='Gesloten').length})</span>
                <span className="text-gray-300 text-sm">{batchArchiefIngeklapt?'▶':'▼'}</span>
              </div>
              {!batchArchiefIngeklapt && bat.filter(b=>b.status==='Gesloten').map(b=>(
                <div key={b.id} onClick={()=>setSel(b.id)}
                  className={`px-3 py-2.5 border-b cursor-pointer hover:bg-amber-50 ${sel===b.id?'bg-amber-50 border-l-2 border-l-amber-500':''}`}>
                  <div className="flex items-center justify-between">
                    <span className="font-medium text-sm text-gray-500">{b.naam||b.batch_nummer}</span>
                    <Badge s={b.status} />
                  </div>
                  <div className="text-xs text-gray-400 mt-0.5">{b.batch_nummer?`#${b.batch_nummer} · `:''}{b.stijl}{b.liter_vergist?` · ${b.liter_vergist}L`:''}</div>
                </div>
              ))}
            </div>
          )}
          </div>{/* /bg-white batch card */}
        </div>

        {selB && (<>
          <button className="md:hidden mb-2 flex items-center gap-1 text-sm font-medium text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 w-full" onClick={()=>setSel(null)}>{t('btn_back')}</button>
          <div className="flex-1 min-w-0 space-y-4">
            <div className="bg-white rounded-lg shadow-sm overflow-hidden">
              <div className="px-4 py-3 bg-gray-800 text-white flex items-center justify-between">
                <div className="min-w-0">
                  <div className="text-base font-semibold leading-tight truncate">{selB.naam}</div>
                  {selB.batch_nummer && <div className="text-xs text-gray-400 mt-0.5">#{selB.batch_nummer}{selB.stijl ? ` · ${selB.stijl}` : ''}</div>}
                </div>
                <div className="flex gap-2 items-center flex-shrink-0 ml-3">
                  <select value={selB.status}
                    onChange={e=>handleStatusChange(e.target.value)}
                    className="border border-gray-600 rounded px-2 py-1 text-xs bg-gray-700 text-white focus:ring-1 focus:ring-amber-400 outline-none">
                    {STATUSSEN.map(s=><option key={s} value={s}>{({Gepland:t('status_planning'),Brouwen:t('status_brewing'),Vergisten:t('status_fermenting'),Conditioneren:t('status_conditioning'),Verpakt:t('status_packaged'),Gesloten:t('status_closed')})[s]||s}</option>)}
                  </select>
                  <Btn s="sm" v="secondary" onClick={()=>{setEditId(selB.id);setBForm({...selB});setShowForm(true)}}>{t('btn_edit')}</Btn>
                  <Btn s="sm" v="danger" onClick={()=>removeBatch(selB.id)}>{t('btn_delete')}</Btn>
                </div>
              </div>
              <div className="px-4 py-2 flex items-center justify-between cursor-pointer select-none hover:bg-gray-50 border-b" onClick={()=>setInfoIngeklapt(v=>!v)}>
                <span className="text-xs font-medium text-gray-500 uppercase tracking-wide">{t('batch_info_label')}</span>
                <span className="text-gray-400 text-xs">{infoIngeklapt ? '▶' : '▼'}</span>
              </div>
              {!infoIngeklapt && (
              <div className="p-4">
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-2 text-sm">
                {[[t('lbl_status'),<Badge s={selB.status}/>],[t('batch_info_batch_nr'),selB.batch_nummer||'—'],[t('lbl_date'),fmtD(selB.datum)],
                  [t('batch_info_style'),selB.stijl||'—'],[t('lbl_tank'),selB.tank||'—'],[t('lbl_liters_fermented'),selB.liter_vergist?`${selB.liter_vergist}L`:'—'],
                  [t('batch_info_og'),selB.OG||'—'],[t('batch_info_fg'),selB.FG||'—'],[t('batch_info_alcohol'),selB.ABV?`${selB.ABV}%`:'—'],
                  selB.brouwzaal_eff ? [t('batch_info_brew_efficiency'),`${Number(selB.brouwzaal_eff).toFixed(1)}%`] : null,
                  selB.maisch_eff    ? [t('batch_info_mash_efficiency'),`${Number(selB.maisch_eff).toFixed(1)}%`]    : null,
                  selB.maisch_ph     ? [t('batch_info_mash_ph'),    Number(selB.maisch_ph).toFixed(2)]              : null,
                  selB.product_ph    ? [t('batch_info_product_ph'),   Number(selB.product_ph).toFixed(2)]             : null,
                ].filter(Boolean).map(([l,v])=>(
                  <div key={l}><span className="text-gray-500 text-xs">{l}</span><div className="mt-0.5">{v}</div></div>
                ))}
              </div>
              {/* Notities */}
              {safeStr(selB.notities) && (
                <div className="mt-3 pt-3 border-t">
                  <div className="text-xs font-medium text-gray-500 mb-1">{t('lbl_notes')}</div>
                  <div className="text-sm text-gray-700 whitespace-pre-wrap">{safeStr(selB.notities)}</div>
                </div>
              )}
              </div>
              )}
              {/* Kosten samenvatting */}
              <div className="px-4 pb-4">
              {(()=>{
                const ingK  = ingKosten(selB);
                const overH = Number(selB.electra_kosten||0)+Number(selB.water_kosten||0)+Number(selB.schoonmaak_kosten||0)+Number(selB.overige_kosten||0);
                const totK  = ingK + overH;
                const batchAv = av ? av.filter(a=>a.batch_id===selB.id) : [];
                const totLiterVerpakt = batchAv.reduce((s,a)=>s+Number(a.inhoud_per_eenheid||0)*Number(a.hoeveelheid||0),0);
                const totStuks        = batchAv.reduce((s,a)=>s+Number(a.hoeveelheid||0),0);
                const tankLiter       = Number(selB.liter_vergist||0);
                const verlies         = tankLiter>0 && totLiterVerpakt>0 ? tankLiter-totLiterVerpakt : null;
                const verliesPct      = verlies!==null && tankLiter>0 ? (verlies/tankLiter*100) : null;
                const kostenPerLiter  = totLiterVerpakt>0 ? totK/totLiterVerpakt : (tankLiter>0 ? totK/tankLiter : null);
                return (
                  <div className="mt-3 pt-3 border-t space-y-2 text-sm">
                    <div className="grid grid-cols-2 gap-x-4 gap-y-1">
                      <div className="flex justify-between text-gray-600">
                        <span className="text-xs">{t('nav_ingredienten')}</span>
                        <span className={ingK>0?'':'text-gray-400'}>{ingK>0?fmt(ingK):'—'}</span>
                      </div>
                      <div className="flex justify-between text-gray-600">
                        <span className="text-xs">{t('batch_costs_electricity')}</span>
                        <span className={selB.electra_kosten?'':'text-gray-400'}>{selB.electra_kosten?fmt(selB.electra_kosten):'—'}</span>
                      </div>
                      <div className="flex justify-between text-gray-600">
                        <span className="text-xs">{t('batch_overhead_total')}</span>
                        <span className={overH>0?'':'text-gray-400'}>{overH>0?fmt(overH):'—'}</span>
                      </div>
                      <div className="flex justify-between text-gray-600">
                        <span className="text-xs">{t('batch_costs_water')}</span>
                        <span className={selB.water_kosten?'':'text-gray-400'}>{selB.water_kosten?fmt(selB.water_kosten):'—'}</span>
                      </div>
                      <div className="flex justify-between font-semibold text-gray-800 pt-1 border-t">
                        <span className="text-xs">{t('batch_total_costs')}</span>
                        <span>{fmt(totK)}</span>
                      </div>
                      <div className="flex justify-between text-gray-600">
                        <span className="text-xs">{t('batch_costs_cleaning')}</span>
                        <span className={selB.schoonmaak_kosten?'':'text-gray-400'}>{selB.schoonmaak_kosten?fmt(selB.schoonmaak_kosten):'—'}</span>
                      </div>
                      {kostenPerLiter!==null && (
                        <div className="flex justify-between text-amber-700">
                          <span className="text-xs">{t('batch_costs_per_liter')}</span>
                          <span className="font-medium">{fmt(kostenPerLiter)}</span>
                        </div>
                      )}
                      <div className="flex justify-between text-gray-600">
                        <span className="text-xs">{t('batch_costs_other')}</span>
                        <span className={selB.overige_kosten?'':'text-gray-400'}>{selB.overige_kosten?fmt(selB.overige_kosten):'—'}</span>
                      </div>
                    </div>
                    {batchAv.length>0 && (
                      <div className="pt-2 border-t">
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-2 text-sm">
                          <div>
                            <span className="text-gray-500 text-xs block">{t('status_packaged')}</span>
                            <span className="font-medium">{totLiterVerpakt.toFixed(1)}L</span>
                            <span className="text-gray-400 text-xs ml-1">({totStuks} st)</span>
                          </div>
                          {tankLiter>0 && (
                            <div>
                              <span className="text-gray-500 text-xs block">{t('batch_tank_volume')}</span>
                              <span className="font-medium">{tankLiter}L</span>
                            </div>
                          )}
                          {verlies!==null && (
                            <div>
                              <span className="text-gray-500 text-xs block">{t('batch_loss')}</span>
                              <span className={`font-medium ${verliesPct>10?'text-red-600':verliesPct>5?'text-yellow-600':'text-green-700'}`}>
                                {verlies.toFixed(1)}L
                              </span>
                              {verliesPct!==null && <span className="text-xs text-gray-400 ml-1">({verliesPct.toFixed(1)}%)</span>}
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })()}
              </div>{/* /kosten */}
            </div>

            {/* Hygiëne checklist */}
            {(()=>{
              const items = hygieneItems && hygieneItems.length ? hygieneItems : DEFAULT_HYGIENE_ITEMS;
              const groups = hygieneGroups && hygieneGroups.length ? hygieneGroups : DEFAULT_HYGIENE_GROUPS;
              const checks = selB.hygiene_checks || {};
              const totaal = items.length;
              const gedaan = items.filter(i=>checks[i.id]).length;
              const alleOk = totaal > 0 && gedaan === totaal;
              const toggleCheck = (itemId) => {
                const wordtAangevinkt = !checks[itemId];
                const nieuweChecks = {...checks, [itemId]: wordtAangevinkt};
                setBat(prev=>prev.map(b=>b.id===selB.id ? {...b, hygiene_checks: nieuweChecks} : b));
                const item = items.find(i=>i.id===itemId);
                const groep = item?.group_id ? groups.find(g=>g.id===item.group_id) : null;
                const label = groep ? `${groep.label} — ${item?.label}` : item?.label||`item ${itemId}`;
                addLog({type:'hygiene', batch_id:selB.id, referentie:`${wordtAangevinkt?'✓ Afgevinkt':'✗ Ongedaan'}: ${label}`});
              };
              // Groepeer items
              const ungrouped = items.filter(i=>!i.group_id);
              const gegroepeerd = groups.map(g=>({
                group: g,
                items: items.filter(i=>i.group_id===g.id),
              })).filter(g=>g.items.length>0);
              return (
                <div className="bg-white rounded-lg shadow-sm">
                  <div className="px-4 py-2.5 bg-teal-700 text-white font-medium text-sm flex items-center justify-between cursor-pointer hover:bg-teal-600 select-none"
                    onClick={()=>setHygieneIngeklapt(p=>!p)}>
                    <span className="flex items-center gap-2">
                      <span className="text-teal-300 text-sm">{hygieneIngeklapt?'▶':'▼'}</span>
                      {t('batch_hygiene_title')}
                    </span>
                    <span className={`text-xs font-normal px-2 py-0.5 rounded-full ${alleOk ? 'bg-green-500 text-white' : gedaan>0 ? 'bg-amber-400 text-white' : 'bg-teal-600 text-teal-200'}`}>
                      {totaal===0 ? t('batch_hygiene_no_items_short') : `${gedaan}/${totaal}`}
                    </span>
                  </div>
                  {!hygieneIngeklapt && (
                    <div className="p-3 space-y-3">
                      {totaal === 0 && (
                        <p className="text-sm text-gray-400 italic">{t('batch_hygiene_no_items')}</p>
                      )}
                      {gegroepeerd.map(({group, items:gItems})=>(
                        <div key={group.id}>
                          <div className="text-xs font-semibold text-teal-700 uppercase tracking-wide mb-1.5 pb-1 border-b border-teal-100">{group.label}</div>
                          <div className="space-y-0.5">
                            {gItems.map(item=>(
                              <label key={item.id} className="flex items-center gap-2.5 px-2 py-1.5 rounded hover:bg-gray-50 cursor-pointer select-none">
                                <input type="checkbox" checked={!!checks[item.id]} onChange={()=>toggleCheck(item.id)}
                                  className="w-4 h-4 accent-teal-600 cursor-pointer flex-shrink-0" />
                                <span className={`text-sm ${checks[item.id] ? 'line-through text-gray-400' : 'text-gray-700'}`}>{item.label}</span>
                                {checks[item.id] && <span className="ml-auto text-teal-500 text-xs">✓</span>}
                              </label>
                            ))}
                          </div>
                        </div>
                      ))}
                      {ungrouped.length>0 && (
                        <div>
                          {gegroepeerd.length>0 && <div className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5 pb-1 border-b border-gray-100">{t('lbl_other')}</div>}
                          <div className="space-y-0.5">

                  </div>

                    ? <Inp value={iForm.ingredient_naam} onChange={v=>setIForm(f=>({...f,ingredient_naam:v}))} placeholder={t('ph_ingredient_name')} />

                  }

                        const thtStr = l.houdbaarheid ? ` · THT ${l.houdbaarheid}` : '';

                <div className="space-y-3">

                    {[[t('batch_stat_fermented'), selB.liter_vergist?`${selB.liter_vergist}L`:'—',''],

                      [t('lbl_filled'), `${totAfgevuld.toFixed(1)}L`, 'text-green-700'],
                      [t('batch_stat_released'), `${totUitgeslagen.toFixed(1)}L`, 'text-blue-700'],
                      [t('batch_stat_in_stock'), `${opVoorraad.toFixed(1)}L`, 'text-amber-700'],
                    ].map(([l,v,c])=>(<div key={l}><span className="text-gray-500 text-xs">{l}</span><div className={`font-medium ${c}`}>{v}</div></div>))}

                              className="w-full border border-gray-300 rounded px-2 py-1.5 text-sm focus:ring-1 focus:ring-amber-500 bg-white outline-none">
                              <option value="">{t('batch_filling_select_ph')}</option>

                      <Inp label={t('batch_filling_units')} type="number" value={avF.hoeveelheid} onChange={v=>setAvF(f=>({...f,hoeveelheid:v}))} placeholder="1" />
                      <Inp label={t('batch_filling_date')} type="date" value={avF.datum} onChange={v=>setAvF(f=>({...f,datum:v}))} />
                      <Inp label={t('batch_filling_tht')} type="date" value={avF.tht} onChange={v=>setAvF(f=>({...f,tht:v}))} />

              const batchAv  = av.filter(a=>a.batch_id===selB.id);
              const batchAcc = acc.filter(a=>a.batch_id===selB.id);
              const brouwOverhead = Number(selB.electra_kosten||0)+Number(selB.water_kosten||0)+Number(selB.schoonmaak_kosten||0)+Number(selB.overige_kosten||0);
              const ingKost = ingKosten(selB);
              const totBrouwkosten = brouwOverhead + ingKost;
              const totLiter = batchAv.reduce((s,a)=>s+Number(a.inhoud_per_eenheid||0)*Number(a.hoeveelheid||0),0);
              const totStuks = batchAv.reduce((s,a)=>s+Number(a.hoeveelheid||0),0);
              const brouwPerLiter = totLiter>0 ? totBrouwkosten/totLiter : 0;
              const avTypes = [...new Set(batchAv.map(a=>a.verpakking_type))].sort();
              const typeData = avTypes.map(type => {
                const rows = batchAv.filter(a=>a.verpakking_type===type);
                const stuks = rows.reduce((s,a)=>s+Number(a.hoeveelheid||0),0);
                const liters = rows.reduce((s,a)=>s+Number(a.inhoud_per_eenheid||0)*Number(a.hoeveelheid||0),0);
                // Zoek kosten per stuk via verpakkingen
                const vpId = rows.find(r=>r.verpakking_id)?.verpakking_id;
                const vp = verpakkingen ? (vpId ? verpakkingen.find(v=>v.id===vpId) : verpakkingen.find(v=>v.naam===type)) : null;
                const kPerStuk = vp ? Number(vp.kosten_verpakking||0)+Number(vp.kosten_afsluiting||0)+Number(vp.kosten_label||0) : 0;
                const totVerpK = kPerStuk * stuks;
                const totAcc = batchAcc.filter(a=>a.verpakking_type===type).reduce((s,a)=>s+Number(a.accijns??a.totaal_accijns??0),0);
                const brouwA = brouwPerLiter * liters;
                return {type, stuks, liters, kPerStuk, totVerpK, totAcc, brouwA, totaal: brouwA+totVerpK+totAcc, perStuk: stuks>0?(brouwA+totVerpK+totAcc)/stuks:0};
              });
              const somVerpK = typeData.reduce((s,t)=>s+t.totVerpK,0);
              const somAcc = batchAcc.reduce((s,a)=>s+Number(a.accijns??a.totaal_accijns??0),0);
              const totaalKostprijs = totBrouwkosten + somVerpK + somAcc;
              return (
                <div className="bg-white rounded-lg shadow-sm overflow-x-auto">
                  <div className="px-4 py-2.5 bg-amber-700 text-white font-medium text-sm flex items-center justify-between">
                    <span className="text-white">{t('batch_costs_summary')}</span>
                    <span className="text-xs text-gray-400 font-normal">{t('lbl_excl_vat')}</span>
                  </div>
                  <div className="p-4 space-y-4 text-sm">
                    {/* Brouwkosten */}
                    <div>
                      <p className="text-xs font-semibold text-gray-500 uppercase mb-2">{t('batch_costs_ingredients')}</p>
                      <div className="space-y-1">
                        <div className="flex justify-between text-gray-600"><span>{t('nav_ingredienten')}</span><span>{fmt(ingKost)}</span></div>
                        {Number(selB.electra_kosten)>0 && <div className="flex justify-between text-gray-600"><span>{t('batch_costs_electricity')}</span><span>{fmt(selB.electra_kosten)}</span></div>}
                        {Number(selB.water_kosten)>0 && <div className="flex justify-between text-gray-600"><span>{t('batch_costs_water')}</span><span>{fmt(selB.water_kosten)}</span></div>}
                        {Number(selB.schoonmaak_kosten)>0 && <div className="flex justify-between text-gray-600"><span>{t('batch_costs_cleaning')}</span><span>{fmt(selB.schoonmaak_kosten)}</span></div>}
                        {Number(selB.overige_kosten)>0 && <div className="flex justify-between text-gray-600"><span>{t('batch_costs_other')}</span><span>{fmt(selB.overige_kosten)}</span></div>}
                        <div className="flex justify-between font-medium border-t pt-1"><span>{t('batch_costs_subtotal')}</span><span>{fmt(totBrouwkosten)}</span></div>
                      </div>
                    </div>
                    {/* Per verpakkingstype */}
                    {typeData.map(td=>(
                      <div key={td.type}>
                        <p className="text-xs font-semibold text-gray-500 uppercase mb-2">{td.type} — {td.stuks}× · {td.liters.toFixed(1)}L</p>
                        <div className="bg-gray-50 rounded p-3 space-y-1">
                          <div className="flex justify-between text-gray-600">
                            <span>{t('batch_brewing_cost_share')} ({td.liters.toFixed(1)}L @ {fmt(brouwPerLiter)}/L)</span>
                            <span>{fmt(td.brouwA)}</span>
                          </div>
                          <div className="flex justify-between text-gray-600">
                            <span>{t('lbl_packaging')} ({td.stuks}× @ {fmt(td.kPerStuk)})</span>
                            <span>{td.kPerStuk>0?fmt(td.totVerpK):<span className="text-gray-400">{t('lbl_not_specified')}</span>}</span>
                          </div>
                          <div className="flex justify-between text-gray-600"><span>{t('nav_accijns')}</span><span>{fmt(td.totAcc)}</span></div>
                          <div className="flex justify-between font-semibold border-t pt-1">
                            <span>{t('batch_costs_subtotal_short')}</span><span className="text-amber-700">{fmt(td.totaal)}</span>
                          </div>
                          <div className="flex justify-between text-xs text-gray-500 pt-0.5">
                            <span>{t('batch_cost_per_unit')}</span>
                            <span className="font-semibold text-green-700">{fmt(td.perStuk)}</span>
                          </div>
                        </div>
                      </div>
                    ))}
                    {/* Totaal */}
                    <div className="border-t-2 border-gray-200 pt-3 space-y-1">
                      <div className="flex justify-between text-gray-600"><span>{t('batch_costs_subtotal')}</span><span>{fmt(totBrouwkosten)}</span></div>
                      <div className="flex justify-between text-gray-600"><span>{t('batch_costs_total_packaging')}</span><span>{somVerpK>0?fmt(somVerpK):<span className="text-gray-400">{t('lbl_not_specified')}</span>}</span></div>
                      <div className="flex justify-between text-gray-600"><span>{t('batch_costs_total_excise')}</span><span>{fmt(somAcc)}</span></div>
                      <div className="flex justify-between font-bold text-base border-t pt-2 mt-1">
                        <span>{t('batch_costs_total')}</span><span className="text-amber-700">{fmt(totaalKostprijs)}</span>
                      </div>
                      <div className="flex gap-6 text-xs text-gray-500 pt-1">
                        {totLiter>0 && <span>{t('batch_costs_per_liter')}: <strong className="text-gray-700">{fmt(totaalKostprijs/totLiter)}</strong></span>}
                        {totStuks>0 && <span>{t('batch_costs_avg_per_unit')}: <strong className="text-gray-700">{fmt(totaalKostprijs/totStuks)}</strong></span>}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* Logboek */}
            {(()=>{
              const TYPE = {
                gebruik:     {icon:'📦', label:t('batch_log_ingredient'),   cls:'text-blue-700 bg-blue-50'},
                terugboeking:{icon:'↩',  label:t('batch_log_type_return'), cls:'text-orange-700 bg-orange-50'},
                afvullen:    {icon:'🍺', label:t('batch_log_type_filling'),     cls:'text-green-700 bg-green-50'},
                uitslaan:    {icon:'🚛', label:t('batch_log_type_release'),     cls:'text-purple-700 bg-purple-50'},
                status:      {icon:'🔄', label:'Status',       cls:'text-gray-700 bg-gray-100'},
                aangemaakt:  {icon:'✨', label:t('batch_log_type_created'),   cls:'text-indigo-700 bg-indigo-50'},
                gewijzigd:   {icon:'✏️', label:t('batch_log_type_changed'),    cls:'text-amber-700 bg-amber-50'},
                hygiene:     {icon:'🧹', label:t('batch_log_type_hygiene'),      cls:'text-teal-700 bg-teal-50'},

function BatchesPage({ing, setIng, lots, setLots, bat, setBat, bi, setBi, av, setAv, uit, setUit, acc, setAcc, verpakkingen, setVerpakkingen, onderdelen=[], setOnderdelen, log, setLog, bfCreds, bfSync, tanks, accijnsInst, hygieneItems, hygieneGroups, wcCreds, artikelen}) {
  const [sel, setSel] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [showBf, setShowBf] = useState(false);
  const [bfJson, setBfJson] = useState('');
  const [bfFileName, setBfFileName] = useState('');
  const bfFileRef = useRef();
  const [editId, setEditId] = useState(null);
  const emptyB = {batch_nummer:'',naam:'',stijl:'',status:'Gepland',liter_vergist:'',OG:'',FG:'',ABV:'',tank:'',electra_kosten:'',water_kosten:'',schoonmaak_kosten:'',overige_kosten:'',notities:'',brouwzaal_eff:'',maisch_eff:'',maisch_ph:'',product_ph:'',datum:tod()};
  const safeStr = (v) => { if (!v && v!==0) return ''; if (typeof v==='string') return v; if (Array.isArray(v)) return v.map(x=>typeof x==='string'?x:(x?.note||x?.text||x?.message||x?.content||'')).filter(Boolean).join('\n'); if (typeof v==='object') return String(v.$string||v.text||v.note||v.message||''); return String(v); };
  const emptyI = {ingredient_id:'',ingredient_naam:'',ingredient_type:'Mout',hoeveelheid:'',eenheid:'kg',lot_id:'',kosten:'',afboeken:false};
  const [bForm, setBForm] = useState(emptyB);
  const [iForm, setIForm] = useState(emptyI);

  const [batchArchiefIngeklapt, setBatchArchiefIngeklapt] = useStore('batches_archief_ingeklapt', true);
  const [infoIngeklapt, setInfoIngeklapt] = useState(false);
  const [bfSyncing, setBfSyncing] = useState(false);
  const [bfMsg, setBfMsg] = useState('');
  const [hygieneIngeklapt, setHygieneIngeklapt] = useStore('batches_hygiene_ingeklapt', true);
  const [ingIngeklapt, setIngIngeklapt] = useStore('batches_ing_ingeklapt', false);
  const [afvullenIngeklapt, setAfvullenIngeklapt] = useStore('batches_afvullen_ingeklapt', false);
  const [voorraadIngeklapt, setVoorraadIngeklapt] = useStore('batches_voorraad_ingeklapt', false);
  const [ingFormOpen, setIngFormOpen] = useState(false);
  const [batchZoek, setBatchZoek] = useState('');
  const emptyAv = {verpakking_id:'',verpakking_type:'',inhoud_per_eenheid:'',hoeveelheid:'',datum:tod(),tht:''};
  const [avF, setAvF] = useState(emptyAv);
  const [uitModal, setUitModal] = useState(null);
  const [uitAantal, setUitAantal] = useState('');
  const [uitDatum, setUitDatum] = useState(tod());
  const [agpModal, setAgpModal] = useState(null); // AGP bevestiging na uitslaan

  // ── WooCommerce auto-push helper ─────────────────────────────────────────

  const wcPushNaBatch = async (batchId, verpakkingType, nieuweUitslag) => {
    if (!wcCreds?.enabled || !wcCreds?.storeUrl) return;
    try {
      const batch = bat.find(b=>b.id===batchId);
      if (!batch) return;
      const art = (artikelen||[]).find(a=>a.biernaam===batch.naam && a.verpakking_type===verpakkingType);
      if (!art?.artikelnummer) return;
      // Alle uitslagen meetellen (uitgeslagen = beschikbaar, ongeacht accijns-betaalstatus)
      const bestaand = (uit||[])
        .filter(u=>bat.find(b=>b.id===u.batch_id)?.naam===art.biernaam && u.verpakking_type===verpakkingType)
        .reduce((s,u)=>s+Math.max(0,Number(u.aantal||0)-Number(u.verkocht_stuks||0)),0);
      const nieuwBeschik = nieuweUitslag
        ? Math.max(0, Number(nieuweUitslag.aantal||0) - Number(nieuweUitslag.verkocht_stuks||0))
        : 0;
      const beschikbaar = bestaand + nieuwBeschik;
      const prods = await wcGet(`products?sku=${encodeURIComponent(art.artikelnummer)}&per_page=1`);
      if (!prods?.length) return;
      await wcPut(`products/${prods[0].id}`, {stock_quantity: beschikbaar, manage_stock: true});
    } catch(e) { console.warn('WC auto-push mislukt:', e.message); }
  };

  const runBfSync = async () => {
    if (!bfCreds?.enabled || !bfCreds.userId || !bfCreds.apiKey) {
      setBfMsg('⚠ Geen Brewfather credentials ingesteld');
      return;
    }
    setBfSyncing(true); setBfMsg('');
    try {
      const bfBatches = await bfGetBatches();
      let added=0, updated=0;
      const newBatches=[], newBis=[], updBatches=[], refreshBisFor=[];
      for (const bfB of bfBatches) {
        const existing = bat.find(b => b.brewfather_id === bfB._id ||
          (bfB.batchNo != null && String(b.batch_nummer) === String(bfB.batchNo)));
        const appStatus = BF_TO_APP[bfB.status] || 'Gepland';
        if (!existing) {
          const nb = {...bfMapBatch(bfB), id: newId([...bat, ...newBatches])};
          newBatches.push(nb);
          const nbis = bfMapBis(bfB, nb.id, newId([...bi, ...newBis]) + newBis.length);
          newBis.push(...nbis);
          added++;
        } else {
          const ch = {brewfather_id: bfB._id};
          if (existing.status !== appStatus) ch.status = appStatus;
          if (bfB.measuredBatchSize) ch.liter_vergist = bfNumSafe(bfB.measuredBatchSize);
          if (bfB.measuredOg)  ch.OG  = bfNumSafe(bfB.measuredOg);
          if (bfB.measuredFg)  ch.FG  = bfNumSafe(bfB.measuredFg);
          if (bfB.measuredAbv) ch.ABV = bfNumSafe(bfB.measuredAbv);
          if (bfB.measuredBrewhouseEfficiency != null) ch.brouwzaal_eff = bfNumSafe(bfB.measuredBrewhouseEfficiency);
          else if (bfB.estimatedBrewhouseEfficiency != null && !existing.brouwzaal_eff) ch.brouwzaal_eff = bfNumSafe(bfB.estimatedBrewhouseEfficiency);
          if (bfB.measuredMashEfficiency != null) ch.maisch_eff = bfNumSafe(bfB.measuredMashEfficiency);
          if (bfB.measuredMashPh != null) ch.maisch_ph = bfNumSafe(bfB.measuredMashPh);
          if (bfB.measuredFermentationPh != null) ch.product_ph = bfNumSafe(bfB.measuredFermentationPh);
          else if (bfB.measuredPh != null && !existing.product_ph) ch.product_ph = bfNumSafe(bfB.measuredPh);
          { const _rawN=bfB.notes||bfB.tasteNotes; if (_rawN && !existing.notities) { ch.notities = Array.isArray(_rawN)?_rawN.map(x=>typeof x==='string'?x:(x?.note||x?.text||x?.message||'')).filter(Boolean).join('\n'):(typeof _rawN==='object'&&_rawN?String(_rawN.$string||_rawN.text||_rawN.note||''):String(_rawN||'')); } }
          updBatches.push({id: existing.id, ch});
          // Refresh ingrediënten als er nog geen goed opgeslagen zijn
          const existingBis = bi.filter(x => x.batch_id === existing.id);
          const hasWrongFields = existingBis.length > 0 && existingBis.some(x => x.naam && !x.ingredient_naam);
          const hasNoBis = existingBis.length === 0;
          if (hasWrongFields || hasNoBis) {
            refreshBisFor.push({batchId: existing.id, bfB});
          }
          updated++;
        }
      }
      if (newBatches.length) setBat(prev => [...prev, ...newBatches]);
      if (updBatches.length) setBat(prev => prev.map(b => {
        const u = updBatches.find(x=>x.id===b.id); return u ? {...b, ...u.ch} : b;
      }));
      setBi(prev => {
        let next = [...prev, ...newBis];
        // Verwijder oude ingrediënten met verkeerde veldnamen en vervang door nieuwe
        for (const {batchId, bfB} of refreshBisFor) {
          next = next.filter(x => x.batch_id !== batchId);
          const freshBis = bfMapBis(bfB, batchId, newId(next) + next.length);
          next = [...next, ...freshBis];
        }
        return next;
      });
      setBfMsg(`✓ Gesynchroniseerd — ${added} nieuw, ${updated} bijgewerkt`);
      if (bfSync) bfSync();
    } catch(e) {
      setBfMsg('⚠ Sync mislukt: ' + (e.message||String(e)));
    }
    setBfSyncing(false);
  };

  const getBi = (bid) => bi.filter(x=>x.batch_id===bid);
  const ingKosten = (b) => getBi(b.id).reduce((s,x)=>{
    if (x.kosten) return s+Number(x.kosten);
    const lot = lots.find(l=>l.id===x.lot_id);
    return s + (lot?.prijs_per_eenheid ? lot.prijs_per_eenheid*Number(x.hoeveelheid||0) : 0);
  },0);
  const totalK = (b) => ingKosten(b)+Number(b.electra_kosten||0)+Number(b.water_kosten||0)+Number(b.schoonmaak_kosten||0)+Number(b.overige_kosten||0);

  const handleStatusChange = (nieuweStatus) => {
    const oudeStatus = selB?.status;
    if (oudeStatus === nieuweStatus) return;
    setBat(prev=>prev.map(b=>b.id===selB.id?{...b,status:nieuweStatus}:b));
    addLog({type:'status', batch_id:selB.id, referentie:`${oudeStatus} → ${nieuweStatus}`});
  };

  const saveBatch = () => {
    if (!bForm.naam.trim()) { alert(t('err_name_required')); return; }
    if (bForm.tank && ['Vergisten','Conditioneren'].includes(bForm.status)) {
      const bezet = bat.find(b=>b.tank===bForm.tank && b.id!==editId && ['Vergisten','Conditioneren'].includes(b.status));
      if (bezet) { alert(t('err_tank_occupied').replace('{tank}',bForm.tank).replace('{name}',bezet.naam)); return; }
    }
    if (editId) {
      const oud = bat.find(b=>b.id===editId);
      const velden = {naam:'Naam',stijl:'Stijl',batch_nummer:'Batch #',tank:'Tank',
        liter_vergist:'Liters',OG:'OG',FG:'FG',ABV:'ABV',
        brouwzaal_eff:'Brouwzaal eff.',maisch_eff:'Maisch eff.',maisch_ph:'Maisch pH',product_ph:'Product pH',
        electra_kosten:'Elektra',water_kosten:'Water',
        schoonmaak_kosten:'Schoonmaak',overige_kosten:'Overig',notities:'Notities'};
      const wijz = Object.entries(velden)
        .filter(([k])=>String(oud?.[k]??'')!==String(bForm[k]??''))
        .map(([k,l])=>`${l}: ${oud?.[k]||'—'} → ${bForm[k]||'—'}`);
      setBat(p=>p.map(b=>b.id===editId?{...b,...bForm}:b));
      if (wijz.length>0) addLog({type:'gewijzigd', batch_id:editId, referentie:wijz.join(' | ')});
      setEditId(null);
      setShowForm(false); setBForm(emptyB);
    } else {
      const nb = {id:newId(bat),...bForm};
      setBat(prev=>[...prev,nb]);
      addLog({type:'aangemaakt', batch_id:nb.id, referentie:nb.naam});
      setShowForm(false); setBForm(emptyB);
    }
  };

  const parseBfData = (raw) => {
    // Helpers: zet Brewfather-velden veilig om naar primitieve waarden.
    // Brewfather kan MongoDB extended JSON gebruiken ({$numberDouble:...}) of arrays voor notes.
    const bfNum = (v) => {
      if (v === null || v === undefined) return '';
      if (typeof v === 'number') return v;
      if (typeof v === 'object') {
        const n = v.$numberDouble ?? v.$numberDecimal ?? v.$numberInt ?? v.$numberLong;
        if (n !== undefined) return Number(n)||'';
      }
      const n = Number(v);
      return isNaN(n) ? '' : n;
    };
    const bfStr = (v) => {
      if (!v && v !== 0) return '';
      if (Array.isArray(v)) return v.map(x => typeof x==='string' ? x : (x.note||x.text||x.message||'')).filter(Boolean).join('\n');
      if (typeof v === 'object') return String(v.$string||v.text||v.note||'');
      return String(v);
    };
    const bfDate = (v) => {
      if (!v) return tod();
      if (typeof v === 'number') return new Date(v).toISOString().split('T')[0];
      if (typeof v === 'object') {
        const ms = v.$date?.$numberLong ?? v.$date ?? null;
        if (ms) return new Date(Number(ms)).toISOString().split('T')[0];
      }
      const s = String(v).split('T')[0];
      return s.match(/^\d{4}-\d{2}-\d{2}$/) ? s : tod();
    };

    // Ondersteuning voor array (meerdere batches) of enkel object
    const batches = Array.isArray(raw) ? raw : [raw];
    let nextBatId = bat.length ? Math.max(0,...bat.map(x=>x.id))+1 : 1;
    let nextBiId  = bi.length  ? Math.max(0,...bi.map(x=>x.id))+1  : 1;
    const newBatches=[], newBis=[];

    batches.forEach(d => {
      // Recipe kan genest zijn (batch export) of op top-level (recipe export)
      const r = d.recipe || d;
      const naam = bfStr(r.name||d.name||'');
      if (!naam) return;

      const batch_nummer = bfStr(d.batchNo||d.number||r.batchNo||'');
      if (batch_nummer && bat.find(b=>String(b.batch_nummer)===String(batch_nummer))) {
        alert(t('err_batch_exists').replace('{num}',batch_nummer));
        return;
      }

      const nb = {
        id: nextBatId++,
        batch_nummer,
        naam,
        stijl: bfStr(r.style?.name||d.style?.name||''),
        status: BF_MAP[bfStr(d.status)]||'Gepland',
        liter_vergist: bfNum(d.measuredBatchSize||d.estimatedFinalVolume||r.batchSize||r.equipment?.batchSize||''),
        OG:  bfNum(d.measuredOg||d.estimatedOg||r.og||''),
        FG:  bfNum(d.measuredFg||d.estimatedFg||r.fg||''),
        ABV: bfNum(d.measuredAbv||d.estimatedAbv||r.abv||''),
        tank: '',
        electra_kosten:'',water_kosten:'',schoonmaak_kosten:'',overige_kosten:'',
        notities: bfStr(d.notes||d.tasteNotes||''),
        datum: bfDate(d.brewDate),
      };
      newBatches.push(nb);

      const add = (naam,type,qty,eenh) => {
        const n = bfStr(naam);
        if (!n) return;
        newBis.push({id:nextBiId++,batch_id:nb.id,ingredient_id:null,
          ingredient_naam:n,ingredient_type:type,
          hoeveelheid:bfNum(qty)||0,eenheid:bfStr(eenh)||'g',
          lot_id:null,afgeboekt:false,kosten:null});
      };
      (r.fermentables||[]).forEach(f=>add(f.name,'Mout',f.amount,f.unit||'kg'));
      (r.hops||[]).forEach(h=>add(h.name,'Hop',h.amount,h.unit||'g'));
      (r.yeasts||[]).forEach(y=>add(y.name,'Gist',y.amount||1,y.unit||'pkg'));
      (r.miscs||[]).forEach(m=>add(m.name,'Overig',m.amount,m.unit||'g'));
    });

    if (newBatches.length===0) { alert(t('err_no_valid_batch_data')); return; }
    setBat(prev=>[...prev,...newBatches]);
    setBi(prev=>[...prev,...newBis]);
    setShowBf(false); setBfJson(''); setBfFileName('');
    alert(t('batch_import_success').replace('{batches}',newBatches.length).replace('{ingredients}',newBis.length));
  };

  const importBf = () => {
    try { parseBfData(JSON.parse(bfJson)); }
    catch(e) { alert(t('err_invalid_json')+e.message); }
  };

  const loadBfFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setBfFileName(file.name);
    const reader = new FileReader();
    reader.onload = ev => {
      try { parseBfData(JSON.parse(ev.target.result)); }
      catch(e) { alert(t('err_file_read')+e.message); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const addLog = (entry) => setLog(prev=>[...prev,{id:newId(prev||[]),datum:tod(),...entry}]);

  const fefoSort = (a, b) => {
    if (a.houdbaarheid && b.houdbaarheid) return new Date(a.houdbaarheid)-new Date(b.houdbaarheid);
    if (a.houdbaarheid) return -1;
    if (b.houdbaarheid) return 1;
    return a.id - b.id;
  };

  const haalVanVoorraad = (biRow, ingMatch) => {
    if (!biRow.lot_id) { alert(t('err_select_lot_first')); return; }
    const lot = lots.find(l=>l.id===biRow.lot_id);
    if (!lot) { alert(t('err_lot_not_found')); return; }
    const qty = Number(biRow.hoeveelheid||0);
    if (convertEenheid(qty, biRow.eenheid, lot.eenheid) === null) {
      alert(t('err_convert_units').replace('{from}',biRow.eenheid).replace('{to}',lot.eenheid)); return;
    }
    const selBatch = bat.find(b=>b.id===biRow.batch_id);
    const batchRef = selBatch ? `Batch: ${selBatch.naam}` : 'Batch';
    const r3 = (n) => Math.round(n*1000)/1000;
    const availEenh = Number(lot.hoeveelheid||0);
    const availBi   = r3(convertEenheid(availEenh, lot.eenheid, biRow.eenheid) ?? availEenh);

    if (availBi >= qty - 0.001) {
      // Lot heeft genoeg — volledig afboeken
      const qtyInLot = r3(convertEenheid(qty, biRow.eenheid, lot.eenheid) ?? qty);
      setLots(prev=>prev.map(l=>l.id!==biRow.lot_id?l:{...l,
        hoeveelheid:r3(Math.max(0, Number(l.hoeveelheid||0)-qtyInLot)),
        beschikbaar:r3(Number(l.hoeveelheid||0)-qtyInLot)>0,
      }));
      setBi(prev=>prev.map(x=>x.id===biRow.id?{...x,afgeboekt:true}:x));
      addLog({ingredient_id:ingMatch?.id||null, ingredient_naam:biRow.ingredient_naam,
        lot_id:biRow.lot_id, lotnummer:lot.lotnummer||'', type:'gebruik',
        batch_id:biRow.batch_id, hoeveelheid:qty, eenheid:biRow.eenheid, referentie:batchRef});
    } else {
      // Lot heeft onvoldoende — boek wat beschikbaar is, voeg restrij toe
      if (availBi <= 0.001) {
        alert(t('err_lot_no_stock').replace('{lot}',lot.lotnummer||'—'));
        return;
      }
      const useQty  = availBi;
      const remainQ = r3(qty - useQty);
      const useInLotEenh = r3(convertEenheid(useQty, biRow.eenheid, lot.eenheid) ?? useQty);
      // Depleteer het lot
      setLots(prev=>prev.map(l=>l.id!==biRow.lot_id?l:{...l,
        hoeveelheid:r3(Math.max(0, Number(l.hoeveelheid||0)-useInLotEenh)),
        beschikbaar:false,
      }));
      // Huidige rij → afgeboekt voor beschikbare hoeveelheid; nieuwe rij voor rest
      setBi(prev=>{
        const nextId = prev.length ? Math.max(...prev.map(x=>x.id))+1 : 1;
        return [
          ...prev.map(x=>x.id===biRow.id
            ? {...x, hoeveelheid:useQty, afgeboekt:true,
                kosten:lot.prijs_per_eenheid?r3(lot.prijs_per_eenheid*useQty):x.kosten}
            : x),
          {id:nextId, batch_id:biRow.batch_id, ingredient_id:biRow.ingredient_id,
            ingredient_naam:biRow.ingredient_naam, ingredient_type:biRow.ingredient_type,
            hoeveelheid:remainQ, eenheid:biRow.eenheid,
            lot_id:null, kosten:null, afgevinkt:false, afgeboekt:false},
        ];
      });
      addLog({ingredient_id:ingMatch?.id||null, ingredient_naam:biRow.ingredient_naam,
        lot_id:biRow.lot_id, lotnummer:lot.lotnummer||'', type:'gebruik',
        batch_id:biRow.batch_id, hoeveelheid:useQty, eenheid:biRow.eenheid, referentie:batchRef});
    }
  };

  const addIngFromBatch = (biRow) => {
    const newIngredient = {id:newId(ing), naam:biRow.ingredient_naam, type:biRow.ingredient_type||'Overig', fabrikant:''};
    setIng(prev=>[...prev, newIngredient]);
    setBi(prev=>prev.map(x=>x.id===biRow.id?{...x,ingredient_id:newIngredient.id}:x));
  };

  const addIng = (bid) => {
    const ingObj = ing.find(i=>i.id===Number(iForm.ingredient_id));
    const naam = ingObj ? ingObj.naam : iForm.ingredient_naam.trim();
    const type = ingObj ? ingObj.type : iForm.ingredient_type;
    if (!naam) { alert(t('err_select_ingredient')); return; }
    if (!iForm.hoeveelheid||Number(iForm.hoeveelheid)<=0) { alert(t('err_qty_required')); return; }
    setBi(prev=>[...prev,{
      id:newId(bi), batch_id:bid,
      ingredient_id:ingObj?ingObj.id:null,
      ingredient_naam:naam, ingredient_type:type,
      hoeveelheid:Number(iForm.hoeveelheid||0), eenheid:iForm.eenheid,
      lot_id:iForm.lot_id?Number(iForm.lot_id):null,
      kosten:iForm.kosten?Number(iForm.kosten):null, afgevinkt:false,
      afgeboekt: !!iForm.lot_id,
    }]);
    if (iForm.lot_id) {
      const lotId=Number(iForm.lot_id), qty=Number(iForm.hoeveelheid||0);
      const lot = lots.find(l=>l.id===lotId);
      const qtyInLot = convertEenheid(qty, iForm.eenheid, lot?.eenheid||iForm.eenheid) ?? qty;
      if (lot && convertEenheid(qty, iForm.eenheid, lot.eenheid) === null) {
        alert(t('err_convert_units').replace('{from}',iForm.eenheid).replace('{to}',lot.eenheid)); return;
      }
      setLots(prev=>prev.map(l=>l.id!==lotId?l:{...l,
        hoeveelheid:Math.max(0,Number(l.hoeveelheid||0)-qtyInLot),
        beschikbaar:Number(l.hoeveelheid||0)-qtyInLot>0,
      }));
    }
    setIForm(emptyI);
  };

  const toggleAf = (id) => setBi(prev=>prev.map(x=>x.id===id?{...x,afgevinkt:!x.afgevinkt}:x));
  const removeBI = (id) => {
    const item = bi.find(x=>x.id===id);
    if (item?.afgeboekt && item.lot_id) {
      const qty = Number(item.hoeveelheid||0);
      const lot = lots.find(l=>l.id===item.lot_id);
      const qtyInLot = convertEenheid(qty, item.eenheid, lot?.eenheid||item.eenheid) ?? qty;
      setLots(prev=>prev.map(l=>l.id!==item.lot_id?l:{...l,
        hoeveelheid:Number(l.hoeveelheid||0)+qtyInLot,
        beschikbaar:true,
      }));
      addLog({ingredient_id:item.ingredient_id||null, ingredient_naam:item.ingredient_naam,
        lot_id:item.lot_id, lotnummer:lot?.lotnummer||'', type:'terugboeking',
        batch_id:item.batch_id, hoeveelheid:qty, eenheid:item.eenheid, referentie:'Verwijderd uit batch'});
    }
    setBi(prev=>prev.filter(x=>x.id!==id));
  };
  const removeBatch = (id) => { if(confirm(t('error_confirm_delete_batch'))) { setBat(prev=>prev.filter(b=>b.id!==id)); setBi(prev=>prev.filter(x=>x.batch_id!==id)); setSel(null); } };

  const bAv    = sel ? (av||[]).filter(a=>a.batch_id===sel) : [];
  const uitgeslVanAv = (avId) => (uit||[]).filter(u=>u.afvulling_id===avId).reduce((s,u)=>s+Number(u.aantal||0),0);
  const resterendAv  = (a)    => Number(a.hoeveelheid||0) - uitgeslVanAv(a.id);
  const totAfgevuld  = bAv.reduce((s,a)=>s+Number(a.inhoud_per_eenheid||0)*Number(a.hoeveelheid||0),0);
  const totUitgeslagen = bAv.reduce((s,a)=>s+uitgeslVanAv(a.id)*Number(a.inhoud_per_eenheid||0),0);

  const vpVoorraadB = (vp) => {
    if (!vp.onderdelen?.length) return Number(vp.voorraad||0);
    const stocks = vp.onderdelen.map(o => {
      const od = onderdelen.find(d=>d.id===o.onderdeel_id);
      return Math.floor(Number(od?.voorraad||0) / Number(o.aantal||1));
    });
    return stocks.length ? Math.min(...stocks) : 0;
  };
  const doAfvullen = () => {
    if (!avF.verpakking_id||!avF.hoeveelheid) { alert(t('err_select_packaging_qty')); return; }
    const n = Number(avF.hoeveelheid);
    const vp = (verpakkingen||[]).find(v=>v.id===Number(avF.verpakking_id));
    if (!vp) { alert(t('err_invalid_packaging')); return; }

        const usage=vp.onderdelen.find(o=>o.onderdeel_id===od.id);

      setVerpakkingen(prev=>prev.map(v=>v.id===Number(avF.verpakking_id)?{...v,voorraad:Number(v.voorraad||0)-n}:v));

      hoeveelheid:n, eenheid:'stuks', referentie:`${liter.toFixed(1)}L`});

    setUitModal(null); setUitAantal(''); setUitDatum(tod());
    wcPushNaBatch(sel, uitModal.verpakking_type, nu);
    setAgpModal(agpInfo);

  const delAv = (id) => {

                const tankLiter       = Number(selB.liter_vergist||0);

                const verliesPct      = verlies!==null && tankLiter>0 ? (verlies/tankLiter*100) : null;
                const kostenPerLiter  = totLiterVerpakt>0 ? totK/totLiterVerpakt : (tankLiter>0 ? totK/tankLiter : null);
                return (

              const checks = selB.hygiene_checks || {};
              const totaal = items.length;
              const gedaan = items.filter(i=>checks[i.id]).length;
              const alleOk = totaal > 0 && gedaan === totaal;
              const toggleCheck = (itemId) => {
                const wordtAangevinkt = !checks[itemId];
                const nieuweChecks = {...checks, [itemId]: wordtAangevinkt};
                setBat(prev=>prev.map(b=>b.id===selB.id ? {...b, hygiene_checks: nieuweChecks} : b));
                const item = items.find(i=>i.id===itemId);
                const groep = item?.group_id ? groups.find(g=>g.id===item.group_id) : null;
                const label = groep ? `${groep.label} — ${item?.label}` : item?.label||`item ${itemId}`;
                addLog({type:'hygiene', batch_id:selB.id, referentie:`${wordtAangevinkt?'✓ Afgevinkt':'✗ Ongedaan'}: ${label}`});
              };
              // Groepeer items
              const ungrouped = items.filter(i=>!i.group_id);
              const gegroepeerd = groups.map(g=>({

              return (

                      {ungrouped.length>0 && (

              </div>
              {!ingIngeklapt && (<>
              <table className="w-full text-sm">
                <thead className="text-xs text-gray-500 bg-gray-50">
                  <tr><th className="px-3 py-1.5 text-left">{t('lbl_name')}</th><th className="px-3 py-1.5 text-left">{t('lbl_type')}</th><th className="px-3 py-1.5 text-right">{t('lbl_quantity_short')}</th><th className="px-3 py-1.5 text-left">{t('lbl_lot')}</th><th className="px-3 py-1.5 text-right">{t('lbl_costs')}</th><th className="px-3 py-1.5"></th></tr>
                </thead>
                {(() => {
                  // Groepeer bi-rijen per ingredient (op ingredient_id, of naam als fallback)
                  const allRows = getBi(selB.id);
                  const groups = [];
                  const seen = new Set();
                  for (const x of allRows) {
                    const gKey = x.ingredient_id ? `id:${x.ingredient_id}` : `naam:${x.ingredient_naam}`;
                    if (!seen.has(gKey)) {
                      seen.add(gKey);
                      groups.push({
                        key: gKey,
                        naam: x.ingredient_naam,
                        type: x.ingredient_type,
                        eenheid: x.eenheid,
                        rows: allRows.filter(r =>
                          x.ingredient_id
                            ? r.ingredient_id === x.ingredient_id
                            : !r.ingredient_id && r.ingredient_naam === x.ingredient_naam
                        ),
                      });
                    }
                  }
                  const r3 = n => Math.round(n*1000)/1000;

                  return groups.map(g => {
                    const totalQty  = r3(g.rows.reduce((s,r)=>s+Number(r.hoeveelheid||0),0));

                      <tbody key={g.key} className="divide-y divide-gray-100">

                            ? ing.find(i=>i.id===x.ingredient_id)

                          // FEFO-gesorteerde beschikbare lots voor dit ingredient
                          const ingLots = ingMatch
                            ? [...lots.filter(l=>(l.beschikbaar||(l.id===x.lot_id))&&l.ingredient_id===ingMatch.id)]
                                .sort(fefoSort)
                            : [];

                          // Beschikbaarheid geselecteerd lot tov benodigde hoeveelheid
                          const selLotAvailBi = lot
                            ? (convertEenheid(Number(lot.hoeveelheid||0), lot.eenheid, x.eenheid) ?? Number(lot.hoeveelheid||0))
                            : 0;
                          const lotTekort = x.lot_id && !x.afgeboekt && selLotAvailBi < Number(x.hoeveelheid||0) - 0.001;

                          const lotCell = !ingMatch ? (
                            <button onClick={()=>addIngFromBatch(x)}
                              className="text-xs text-blue-600 hover:text-blue-800 underline whitespace-nowrap">
                              + {t('batch_ingredient_add')}
                            </button>

                            <div className="flex flex-col gap-1">
                              {!x.afgeboekt && (
                                <select value={x.lot_id||''} onChange={e=>setBi(prev=>prev.map(b=>b.id===x.id?{...b,lot_id:e.target.value?Number(e.target.value):null}:b))}

                                  <option value="">{t('ing_choose_lot')}</option>

                                    const avBi = convertEenheid(Number(l.hoeveelheid||0), l.eenheid, x.eenheid) ?? Number(l.hoeveelheid||0);
                                    const ok   = avBi >= Number(x.hoeveelheid||0) - 0.001;
                                    const thtStr = l.houdbaarheid ? ` · THT ${l.houdbaarheid}` : '';
                                    return <option key={l.id} value={l.id}>{ok?'':'⚠ '}{l.lotnummer||'—'} ({r3(avBi)} {x.eenheid}{thtStr})</option>;

                                <button onClick={()=>haalVanVoorraad(x, ingMatch)}

                              {x.afgeboekt && !lot && (
                                <span className="text-xs text-green-600 font-medium">{t('batch_ingredient_booked')}</span>
                              )}
                            </div>
                          );

                          return (
                            <tr key={x.id} className={multi ? 'bg-white' : ''}>
                              <td className={`px-3 py-1.5 ${multi ? 'pl-5 text-gray-500 text-xs' : ''}`}>
                                {multi ? <span className="text-gray-300 mr-1">↳</span> : x.ingredient_naam}
                                {multi && <span>{x.hoeveelheid} {x.eenheid}</span>}
                              </td>
                              <td className="px-3 py-1.5 text-gray-500 text-xs">{multi ? '' : ({Mout:t('ing_type_mout'),Hop:t('ing_type_hop'),Gist:t('ing_type_gist'),Suiker:t('ing_type_suiker'),Overig:t('ing_type_overig')})[x.ingredient_type]||x.ingredient_type}</td>
                              <td className="px-3 py-1.5 text-right font-mono text-xs">{multi ? '' : <>{x.hoeveelheid} {x.eenheid}</>}</td>
                              <td className="px-3 py-1.5" colSpan={multi ? 2 : 1}>{lotCell}</td>
                              {!multi && <td className="px-3 py-1.5 text-right text-xs">{kosten!==null?fmt(kosten):'—'}</td>}

                            </tr>
                          );
                        })}
                      </tbody>
                    );
                  });
                })()}
              </table>
              <div className="bg-gray-50 border-t">
                <button className="w-full flex items-center gap-2 px-3 py-1.5 text-xs font-medium text-gray-500 uppercase tracking-wide hover:bg-gray-100 select-none border-b"

                    <select value={iForm.ingredient_id} onChange={e=>{

                      setIForm(f=>({...f,ingredient_id:id,ingredient_naam:o?o.naam:'',ingredient_type:o?o.type:f.ingredient_type,lot_id:'',kosten:''}));

                      <option value="">{t('ing_choose_ingredient_opt')}</option>

                      <option value="custom">{t('ing_free_fill')}</option>

                    ? <Inp value={iForm.ingredient_naam} onChange={v=>setIForm(f=>({...f,ingredient_naam:v}))} placeholder={t('ph_ingredient_name')} />
                    : <div className="border border-gray-200 rounded px-2 py-1.5 text-sm text-gray-400 bg-gray-50 flex items-center">{iForm.ingredient_type?t('ing_type_'+iForm.ingredient_type.toLowerCase()):<span className="italic text-xs">type</span>}</div>
                  }
                  <Inp type="number" value={iForm.hoeveelheid} onChange={v=>{
                    const lot=lots.find(l=>l.id===Number(iForm.lot_id));
                    setIForm(f=>({...f,hoeveelheid:v,kosten:lot?.prijs_per_eenheid&&v?String((lot.prijs_per_eenheid*Number(v)).toFixed(2)):f.kosten}));
                  }} placeholder={t('ph_qty')} />
                  <Sel value={iForm.eenheid} onChange={v=>setIForm(f=>({...f,eenheid:v}))} opts={EENHEDEN.map(e=>({v:e,l:t('unit_'+e.toLowerCase())}))} />
                </div>
                {/* Rij 2: lot + kosten + afboeken + knop */}
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 items-end">
                  <div>
                    <select value={iForm.lot_id} onChange={e=>{
                      const lid=e.target.value;
                      const lot=lots.find(l=>l.id===Number(lid));
                      setIForm(f=>({...f,lot_id:lid,kosten:lot?.prijs_per_eenheid&&f.hoeveelheid?String((lot.prijs_per_eenheid*Number(f.hoeveelheid)).toFixed(2)):f.kosten}));
                    }} className="w-full border border-gray-300 rounded px-2 py-1.5 text-sm bg-white t-input">
                      <option value="">{t('ing_choose_lot')}</option>
                      {[...(iForm.ingredient_id&&iForm.ingredient_id!=='custom'
                        ?lots.filter(l=>l.ingredient_id===Number(iForm.ingredient_id)&&l.beschikbaar)

                        const thtStr = l.houdbaarheid ? ` · THT ${l.houdbaarheid}` : '';
                        return <option key={l.id} value={l.id}>{l.lotnummer||'—'} ({l.hoeveelheid}{l.eenheid}{thtStr})</option>;
                      })}
                    </select>
                  </div>
                  <Inp type="number" value={iForm.kosten} onChange={v=>setIForm(f=>({...f,kosten:v}))} placeholder={t('ph_costs')} />
                  <div />
                  <Btn s="sm" onClick={()=>addIng(selB.id)}>{t('settings_tank_add_btn')}</Btn>
                </div>
              </div>}
              </div>
              </>)}

            {/* Afvullen sectie — alleen zichtbaar bij status Conditioneren */}

              const vergist   = Number(selB.liter_vergist||0);
              const inTank    = Math.max(0, vergist - totAfgevuld);
              const opVoorraad = totAfgevuld - totUitgeslagen;
              const r1 = Number(accijnsInst?.tarief_per_hl_abv||7.51);
              const r2 = Number(accijnsInst?.tarief_per_hl||24.17);

                      [t('batch_stat_in_tank'), vergist?`${inTank.toFixed(1)}L`:'—', inTank>0?'text-orange-600':'text-gray-400'],
                      [t('lbl_filled'), `${totAfgevuld.toFixed(1)}L`, 'text-green-700'],
                      [t('batch_stat_released'), `${totUitgeslagen.toFixed(1)}L`, 'text-blue-700'],
                      [t('batch_stat_in_stock'), `${opVoorraad.toFixed(1)}L`, 'text-amber-700'],
                    ].map(([l,v,c])=>(<div key={l}><span className="text-gray-500 text-xs">{l}</span><div className={`font-medium ${c}`}>{v}</div></div>))}
                  </div>

                  {/* Afvulling registreren */}
                  <div className="bg-white rounded-xl shadow-card overflow-hidden">
                    <div className="px-4 py-2.5 t-hdr text-white font-medium text-sm flex items-center justify-between cursor-pointer select-none" onClick={() => setAfvullenIngeklapt(v => !v)}>
                      <span>{t('batch_filling_register')}</span>
                      <span className={`text-xs font-bold ${!afvullenIngeklapt ? 'rotate-90' : ''}`} style={{display:'inline-block',transition:'transform 0.15s'}}>▶</span>
                    </div>
                    {!afvullenIngeklapt && <div className="p-3">
                    <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
                      <div>
                        <label className="block text-xs font-medium text-gray-600 mb-0.5">{t('lbl_packaging')} <span className="text-red-500">*</span></label>
                        {(verpakkingen||[]).length===0
                          ? <div className="border border-dashed border-orange-300 bg-orange-50 rounded px-2 py-1.5 text-xs text-orange-600">{t('batch_add_packaging_hint')}</div>
                          : <select value={avF.verpakking_id} onChange={e=>{const vp=(verpakkingen||[]).find(v=>v.id===Number(e.target.value));setAvF(f=>({...f,verpakking_id:e.target.value,verpakking_type:vp?.naam||'',inhoud_per_eenheid:vp?.inhoud_liter||''}));}}
                              className="w-full border border-gray-300 rounded px-2 py-1.5 text-sm t-input bg-white">
                              <option value="">{t('batch_filling_select_ph')}</option>
                              {(verpakkingen||[]).map(vp=>(
                                <option key={vp.id} value={vp.id} disabled={vpVoorraadB(vp)===0}>
                                  {vp.naam} — {vpVoorraadB(vp)} stuks
                                </option>
                              ))}
                            </select>
                        }
                      </div>
                      <div>
                        <label className="block text-xs font-medium text-gray-600 mb-0.5">{t('batch_filling_content')}</label>
                        <div className="border border-gray-200 bg-gray-50 rounded px-2 py-1.5 text-sm text-gray-700 min-h-[34px] flex items-center">
                          {avF.inhoud_per_eenheid ? `${avF.inhoud_per_eenheid}L` : <span className="text-gray-400 text-xs">auto</span>}
                        </div>
                      </div>
                      <Inp label={t('batch_filling_units')} type="number" value={avF.hoeveelheid} onChange={v=>setAvF(f=>({...f,hoeveelheid:v}))} placeholder="1" />
                      <Inp label={t('batch_filling_date')} type="date" value={avF.datum} onChange={v=>setAvF(f=>({...f,datum:v}))} />
                      <Inp label={t('batch_filling_tht')} type="date" value={avF.tht} onChange={v=>setAvF(f=>({...f,tht:v}))} />
                    </div>
                    <div className="mt-2 flex items-center justify-between">
                      {avF.inhoud_per_eenheid&&avF.hoeveelheid && <span className="text-sm text-gray-500">{t('lbl_total_colon')} {(Number(avF.inhoud_per_eenheid)*Number(avF.hoeveelheid)).toFixed(1)}L · {avF.hoeveelheid}× {avF.verpakking_type}</span>}
                      <Btn onClick={doAfvullen} cls="ml-auto">{t('batch_filling_register_btn')}</Btn>
                    </div>
                    </div>}{/* /p-3 */}
                  </div>

                  {/* Klaar-knop: zet batch op Verpakt */}
                  {bAv.length > 0 && (
                    <div className="bg-green-50 border border-green-200 rounded-lg p-3 flex items-center justify-between gap-4">
                      <div>
                        <div className="text-sm font-medium text-green-800">{t('batch_ready_confirm')}</div>
                        <div className="text-xs text-green-600 mt-0.5">{t('batch_ready_text')}</div>
                      </div>
                      <Btn v="green" onClick={()=>{if(confirm(t('err_confirm_mark_packed').replace('{name}',selB.naam))){setBat(prev=>prev.map(b=>b.id===sel?{...b,status:'Verpakt'}:b));addLog({type:'status',batch_id:sel,referentie:`${selB.status} → Verpakt`})}}}> 
                        {t('batch_ready_button')}
                      </Btn>
                    </div>

                  <div className="bg-white rounded-xl shadow-card overflow-hidden">
                    <div className="px-4 py-2.5 t-hdr text-white font-medium text-sm flex items-center justify-between cursor-pointer select-none" onClick={() => setVoorraadIngeklapt(v => !v)}>
                      <span>{t('batch_filled_stock')}</span>
                      <span className={`text-xs font-bold ${!voorraadIngeklapt ? 'rotate-90' : ''}`} style={{display:'inline-block',transition:'transform 0.15s'}}>▶</span>
                    </div>

                    <table className="w-full text-sm">
                      <thead className="text-xs text-gray-500 bg-gray-50">
                        <tr>

                          <th className="px-3 py-2 text-right">{t('lbl_content')}</th>

                          <th className="px-3 py-2 text-right">{t('filling_summary_released')}</th>
                          <th className="px-3 py-2 text-right font-semibold text-amber-700">{t('lbl_remaining')}</th>

                          <th className="px-3 py-2 text-left">{t('lbl_tht')}</th>

                                  {rest>0 && <Btn s="sm" v="blue" onClick={()=>{setUitModal(a);setUitAantal('');setUitDatum(tod());}}>{t('log_release')}</Btn>}

            {/* Kostprijsoverzicht — zichtbaar wanneer status Verpakt of Gesloten */}
            {(selB.status==='Verpakt'||selB.status==='Gesloten') && av && acc && (() => {
              const batchAv  = av.filter(a=>a.batch_id===selB.id);
              const batchAcc = acc.filter(a=>a.batch_id===selB.id);
              const brouwOverhead = Number(selB.electra_kosten||0)+Number(selB.water_kosten||0)+Number(selB.schoonmaak_kosten||0)+Number(selB.overige_kosten||0);
              const ingKost = ingKosten(selB);
              const totBrouwkosten = brouwOverhead + ingKost;
              const totLiter = batchAv.reduce((s,a)=>s+Number(a.inhoud_per_eenheid||0)*Number(a.hoeveelheid||0),0);
              const totStuks = batchAv.reduce((s,a)=>s+Number(a.hoeveelheid||0),0);
              const brouwPerLiter = totLiter>0 ? totBrouwkosten/totLiter : 0;
              const avTypes = [...new Set(batchAv.map(a=>a.verpakking_type))].sort();
              const typeData = avTypes.map(type => {
                const rows = batchAv.filter(a=>a.verpakking_type===type);
                const stuks = rows.reduce((s,a)=>s+Number(a.hoeveelheid||0),0);
                const liters = rows.reduce((s,a)=>s+Number(a.inhoud_per_eenheid||0)*Number(a.hoeveelheid||0),0);
                // Zoek kosten per stuk via verpakkingen
                const vpId = rows.find(r=>r.verpakking_id)?.verpakking_id;
                const vp = verpakkingen ? (vpId ? verpakkingen.find(v=>v.id===vpId) : verpakkingen.find(v=>v.naam===type)) : null;
                const kPerStuk = vp ? Number(vp.kosten_verpakking||0)+Number(vp.kosten_afsluiting||0)+Number(vp.kosten_label||0) : 0;
                const totVerpK = kPerStuk * stuks;
                const totAcc = batchAcc.filter(a=>a.verpakking_type===type).reduce((s,a)=>s+Number(a.accijns??a.totaal_accijns??0),0);
                const brouwA = brouwPerLiter * liters;
                return {type, stuks, liters, kPerStuk, totVerpK, totAcc, brouwA, totaal: brouwA+totVerpK+totAcc, perStuk: stuks>0?(brouwA+totVerpK+totAcc)/stuks:0};
              });
              const somVerpK = typeData.reduce((s,t)=>s+t.totVerpK,0);
              const somAcc = batchAcc.reduce((s,a)=>s+Number(a.accijns??a.totaal_accijns??0),0);
              const totaalKostprijs = totBrouwkosten + somVerpK + somAcc;
              return (
                <div className="bg-white rounded-xl shadow-card overflow-x-auto">
                  <div className="px-4 py-2.5 t-hdr text-white font-medium text-sm flex items-center justify-between">
                    <span className="text-white">{t('batch_costs_summary')}</span>
                    <span className="text-xs text-gray-400 font-normal">{t('lbl_excl_vat')}</span>
                  </div>
                  <div className="p-4 space-y-4 text-sm">
                    {/* Brouwkosten */}
                    <div>
                      <p className="text-xs font-semibold text-gray-500 uppercase mb-2">{t('batch_costs_ingredients')}</p>
                      <div className="space-y-1">
                        <div className="flex justify-between text-gray-600"><span>{t('nav_ingredienten')}</span><span>{fmt(ingKost)}</span></div>
                        {Number(selB.electra_kosten)>0 && <div className="flex justify-between text-gray-600"><span>{t('batch_costs_electricity')}</span><span>{fmt(selB.electra_kosten)}</span></div>}
                        {Number(selB.water_kosten)>0 && <div className="flex justify-between text-gray-600"><span>{t('batch_costs_water')}</span><span>{fmt(selB.water_kosten)}</span></div>}
                        {Number(selB.schoonmaak_kosten)>0 && <div className="flex justify-between text-gray-600"><span>{t('batch_costs_cleaning')}</span><span>{fmt(selB.schoonmaak_kosten)}</span></div>}
                        {Number(selB.overige_kosten)>0 && <div className="flex justify-between text-gray-600"><span>{t('batch_costs_other')}</span><span>{fmt(selB.overige_kosten)}</span></div>}
                        <div className="flex justify-between font-medium border-t pt-1"><span>{t('batch_costs_subtotal')}</span><span>{fmt(totBrouwkosten)}</span></div>
                      </div>
                    </div>
                    {/* Per verpakkingstype */}
                    {typeData.map(td=>(
                      <div key={td.type}>
                        <p className="text-xs font-semibold text-gray-500 uppercase mb-2">{td.type} — {td.stuks}× · {td.liters.toFixed(1)}L</p>
                        <div className="bg-gray-50 rounded p-3 space-y-1">
                          <div className="flex justify-between text-gray-600">
                            <span>{t('batch_brewing_cost_share')} ({td.liters.toFixed(1)}L @ {fmt(brouwPerLiter)}/L)</span>
                            <span>{fmt(td.brouwA)}</span>
                          </div>
                          <div className="flex justify-between text-gray-600">
                            <span>{t('lbl_packaging')} ({td.stuks}× @ {fmt(td.kPerStuk)})</span>
                            <span>{td.kPerStuk>0?fmt(td.totVerpK):<span className="text-gray-400">{t('lbl_not_specified')}</span>}</span>
                          </div>
                          <div className="flex justify-between text-gray-600"><span>{t('nav_accijns')}</span><span>{fmt(td.totAcc)}</span></div>
                          <div className="flex justify-between font-semibold border-t pt-1">
                            <span>{t('batch_costs_subtotal_short')}</span><span className="text-amber-700">{fmt(td.totaal)}</span>
                          </div>
                          <div className="flex justify-between text-xs text-gray-500 pt-0.5">
                            <span>{t('batch_cost_per_unit')}</span>
                            <span className="font-semibold text-green-700">{fmt(td.perStuk)}</span>
                          </div>
                        </div>
                      </div>
                    ))}
                    {/* Totaal */}
                    <div className="border-t-2 border-gray-200 pt-3 space-y-1">
                      <div className="flex justify-between text-gray-600"><span>{t('batch_costs_subtotal')}</span><span>{fmt(totBrouwkosten)}</span></div>
                      <div className="flex justify-between text-gray-600"><span>{t('batch_costs_total_packaging')}</span><span>{somVerpK>0?fmt(somVerpK):<span className="text-gray-400">{t('lbl_not_specified')}</span>}</span></div>
                      <div className="flex justify-between text-gray-600"><span>{t('batch_costs_total_excise')}</span><span>{fmt(somAcc)}</span></div>
                      <div className="flex justify-between font-bold text-base border-t pt-2 mt-1">
                        <span>{t('batch_costs_total')}</span><span className="text-amber-700">{fmt(totaalKostprijs)}</span>
                      </div>
                      <div className="flex gap-6 text-xs text-gray-500 pt-1">
                        {totLiter>0 && <span>{t('batch_costs_per_liter')}: <strong className="text-gray-700">{fmt(totaalKostprijs/totLiter)}</strong></span>}
                        {totStuks>0 && <span>{t('batch_costs_avg_per_unit')}: <strong className="text-gray-700">{fmt(totaalKostprijs/totStuks)}</strong></span>}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* Logboek */}
            {(()=>{
              const TYPE = {
                gebruik:     {icon:'📦', label:t('batch_log_ingredient'),   cls:'text-blue-700 bg-blue-50'},
                terugboeking:{icon:'↩',  label:t('batch_log_type_return'), cls:'text-orange-700 bg-orange-50'},
                afvullen:    {icon:'🍺', label:t('batch_log_type_filling'),     cls:'text-green-700 bg-green-50'},
                uitslaan:    {icon:'🚛', label:t('batch_log_type_release'),     cls:'text-purple-700 bg-purple-50'},
                status:      {icon:'🔄', label:'Status',       cls:'text-gray-700 bg-gray-100'},
                aangemaakt:  {icon:'✨', label:t('batch_log_type_created'),   cls:'text-indigo-700 bg-indigo-50'},
                gewijzigd:   {icon:'✏️', label:t('batch_log_type_changed'),    cls:'text-amber-700 bg-amber-50'},
                hygiene:     {icon:'🧹', label:t('batch_log_type_hygiene'),      cls:'text-teal-700 bg-teal-50'},
              };
              const bLog = (log||[]).filter(l=>l.batch_id===selB.id).slice().reverse();
              if (!bLog.length) return null;
              return (
                <div className="bg-white rounded-xl shadow-card overflow-x-auto">
                  <div className="px-4 py-2.5 t-hdr text-white font-medium text-sm">{t('batch_log')}</div>
                  <table className="w-full text-sm">
                    <thead className="text-xs text-gray-500 bg-gray-50">
                      <tr>
                        <th className="px-3 py-1.5 text-left">{t('lbl_date')}</th>
                        <th className="px-3 py-1.5 text-left">{t('lbl_type')}</th>
                        <th className="px-3 py-1.5 text-left">{t('batch_log_description')}</th>
                        <th className="px-3 py-1.5 text-right">{t('lbl_quantity')}</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {bLog.map(l=>{
                        const t = TYPE[l.type] || {icon:'•', label:l.type||'—', cls:'text-gray-600 bg-gray-100'};
                        const omschr = l.ingredient_naam
                          ? l.ingredient_naam + (l.lotnummer ? ` · lot: ${l.lotnummer}` : '')
                          : l.verpakking_type || l.referentie || '—';
                        const qty = l.hoeveelheid!=null
                          ? `${l.hoeveelheid} ${l.eenheid||''}${l.referentie&&l.type!=='gebruik'?` (${l.referentie})`:''}`.trim()
                          : '—';
                        return (
                          <tr key={l.id} className="hover:bg-gray-50">
                            <td className="px-3 py-1.5 text-xs text-gray-500 whitespace-nowrap">{l.datum||'—'}</td>
                            <td className="px-3 py-1.5">
                              <span className={`inline-flex items-center gap-1 text-xs font-medium px-1.5 py-0.5 rounded ${t.cls}`}>
                                {t.icon} {t.label}
                              </span>
                            </td>
                            <td className="px-3 py-1.5 text-xs">{omschr}</td>
                            <td className="px-3 py-1.5 text-right font-mono text-xs text-gray-700">{qty}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              );
            })()}
          </div>
        </>)}
      </div>

      {agpModal && (
        <Modal title="Accijns Goederen Plaats" hideClose>
          <div className="space-y-4">
            <div className="p-4 bg-amber-50 border border-amber-200 rounded-lg text-amber-900 text-sm leading-relaxed">

            <div className="flex justify-end">
              <Btn v="green" onClick={()=>setAgpModal(null)}>✓ Gedaan</Btn>
            </div>
          </div>
        </Modal>
      )}

      {uitModal && (
        <Modal title={`Uitslaan: ${uitModal.verpakking_type}`} onClose={()=>setUitModal(null)}>
          <div className="space-y-3">
            <div className="p-3 bg-blue-50 rounded text-sm text-blue-800">
              <div className="font-medium">{selB?.naam}{selB?.batch_nummer ? ` — #${selB.batch_nummer}` : ''}</div>
              <div>{uitModal.verpakking_type} · {uitModal.inhoud_per_eenheid}L per stuk</div>
              {uitModal.tht && <div className="text-xs mt-0.5">THT: {fmtD(uitModal.tht)}</div>}
              <div className="mt-1">{t('lbl_available')}: <strong>{resterendAv(uitModal)} stuks</strong></div>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <Inp label={`${t('batch_release_count')} *`} type="number" value={uitAantal} onChange={setUitAantal} placeholder={`max ${resterendAv(uitModal)}`} />
              <Inp label={t('lbl_date')} type="date" value={uitDatum} onChange={setUitDatum} />
            </div>
            {uitAantal && Number(uitAantal)>0 && (()=>{
              const liter = Number(uitAantal)*Number(uitModal.inhoud_per_eenheid||0);
              const r1 = Number(accijnsInst?.tarief_per_hl_abv||7.51);
              const r2 = Number(accijnsInst?.tarief_per_hl||24.17);
              const ac = accijnsCalc(liter, selB?.ABV||0, r1, r2, accijnsInst);
              return <div className="p-2 bg-amber-50 rounded text-xs text-amber-800">
                {liter.toFixed(1)}L → accijns: <strong>{fmt(ac)}</strong>
              </div>;
            })()}
            <div className="flex justify-end gap-2">
              <Btn v="secondary" onClick={()=>setUitModal(null)}>{t('btn_cancel')}</Btn>
              <Btn v="blue" onClick={doUitslaan} disabled={!uitAantal||Number(uitAantal)<=0}>{t('log_release')}</Btn>
            </div>
          </div>
        </Modal>
      )}

      {showForm && (
        <Modal title={editId?t('batch_edit_title'):t('batch_new_title')} onClose={()=>setShowForm(false)} wide>
          <div className="space-y-3">
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <Inp label={t('lbl_batch_number')} value={bForm.batch_nummer} onChange={v=>setBForm(f=>({...f,batch_nummer:v}))} placeholder="B-2025-001" />
              <Inp label={t('lbl_name')+' *'} value={bForm.naam} onChange={v=>setBForm(f=>({...f,naam:v}))} placeholder={t('ph_beer_name')} />
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <Inp label={t('lbl_style')} value={bForm.stijl} onChange={v=>setBForm(f=>({...f,stijl:v}))} placeholder={t('ph_beer_style')} />
              <Sel label={t('lbl_status')} value={bForm.status} onChange={v=>setBForm(f=>({...f,status:v}))} opts={STATUSSEN.map(s=>({v:s,l:({Gepland:t('status_planning'),Brouwen:t('status_brewing'),Vergisten:t('status_fermenting'),Conditioneren:t('status_conditioning'),Verpakt:t('status_packaged'),Gesloten:t('status_closed')})[s]||s}))} />
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              {tanks && tanks.length>0
                ? <div>
                    <label className="block text-xs font-medium text-gray-600 mb-0.5">Tank</label>
                    <select value={bForm.tank||''} onChange={e=>setBForm(f=>({...f,tank:e.target.value}))}
                      className="w-full border border-gray-300 rounded px-2 py-1.5 text-sm bg-white t-input">
                      <option value="">{t('batch_no_tank')}</option>
                      {tanks.map(t=>{
                        const bezet = bat.find(b=>b.tank===t.id && b.id!==editId && ['Vergisten','Conditioneren'].includes(b.status));
                        return <option key={t.id} value={t.id} disabled={!!bezet}>
                          {t.id}{bezet ? ` — bezet (${bezet.naam})` : ''}
                        </option>;
                      })}
                    </select>
                  </div>
                : <Inp label={t('lbl_tank')} value={bForm.tank} onChange={v=>setBForm(f=>({...f,tank:v}))} placeholder="FV1" />
              }
              <Inp label={t('lbl_date')} type="date" value={bForm.datum} onChange={v=>setBForm(f=>({...f,datum:v}))} />
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              <Inp label={t('lbl_liters_fermented')} type="number" value={bForm.liter_vergist} onChange={v=>setBForm(f=>({...f,liter_vergist:v}))} placeholder="0" />
              <Inp label={t('lbl_og')} type="number" value={bForm.OG} onChange={v=>setBForm(f=>({...f,OG:v}))} placeholder="1.050" />
              <Inp label={t('lbl_fg')} type="number" value={bForm.FG} onChange={v=>setBForm(f=>({...f,FG:v}))} placeholder="1.010" />
              <Inp label={t('lbl_abv')} type="number" value={bForm.ABV} onChange={v=>setBForm(f=>({...f,ABV:v}))} placeholder="5.0" />
            </div>
            <div className="grid grid-cols-3 gap-3">
              <Inp label={t('batch_info_brew_efficiency')} type="number" value={bForm.brouwzaal_eff||''} onChange={v=>setBForm(f=>({...f,brouwzaal_eff:v}))} placeholder="75" />
              <Inp label={t('batch_info_mash_efficiency')} type="number" value={bForm.maisch_eff||''} onChange={v=>setBForm(f=>({...f,maisch_eff:v}))} placeholder="80" />
              <Inp label={t('batch_info_mash_ph')} type="number" value={bForm.maisch_ph||''} onChange={v=>setBForm(f=>({...f,maisch_ph:v}))} placeholder="5.4" />
              <Inp label={t('batch_info_product_ph')} type="number" value={bForm.product_ph||''} onChange={v=>setBForm(f=>({...f,product_ph:v}))} placeholder="4.3" />
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              <Inp label={t('batch_costs_electricity')+' (€)'} type="number" value={bForm.electra_kosten} onChange={v=>setBForm(f=>({...f,electra_kosten:v}))} placeholder="0" />
              <Inp label={t('batch_costs_water')+' (€)'} type="number" value={bForm.water_kosten} onChange={v=>setBForm(f=>({...f,water_kosten:v}))} placeholder="0" />
              <Inp label={t('batch_costs_cleaning')+' (€)'} type="number" value={bForm.schoonmaak_kosten} onChange={v=>setBForm(f=>({...f,schoonmaak_kosten:v}))} placeholder="0" />
              <Inp label={t('batch_costs_other')+' (€)'} type="number" value={bForm.overige_kosten} onChange={v=>setBForm(f=>({...f,overige_kosten:v}))} placeholder="0" />

              <textarea value={safeStr(bForm.notities)} onChange={e=>setBForm(f=>({...f,notities:e.target.value}))}

      {showBf && (
        <Modal title={t('batch_brewfather_import_title')} onClose={()=>{setShowBf(false);setBfJson('');setBfFileName('');}} wide>
          <div className="space-y-4">

              <summary className="text-xs text-gray-500 cursor-pointer hover:text-gray-700 select-none">{t('batch_brewfather_paste_json')}</summary>

// ===== AFVULLEN =====
// Uitslagen schema: {id, batch_id, afvulling_id, verpakking_type, inhoud_per_eenheid,
//                    aantal, datum, liter, accijns, status:'uitgeslagen'|'verkocht', verkocht_datum}

function AfvullenPage({bat, setBat, av, setAv, uit, setUit, acc, setAcc, verpakkingen, setVerpakkingen, onderdelen=[], setOnderdelen, accijnsInst}) {
  const r1 = Number(accijnsInst?.tarief_per_hl_abv||7.51);
  const r2 = Number(accijnsInst?.tarief_per_hl||24.17);
  const [sel, setSel] = useState(null);
  const [uitModal, setUitModal] = useState(null); // holds afvulling being uitgeslagen
  const [uitAantal, setUitAantal] = useState('');
  const [uitDatum, setUitDatum] = useState(tod());
  const [agpModal, setAgpModal] = useState(null); // AGP bevestiging na uitslaan
  const emptyAv = {verpakking_id:'',verpakking_type:'',inhoud_per_eenheid:'',hoeveelheid:'',datum:tod(),tht:''};
  const [avF, setAvF] = useState(emptyAv);

  const activeBat = bat.filter(b=>b.status==='Vergisten'||b.status==='Conditioneren');
  const selB = bat.find(b=>b.id===sel);
  const bAv = sel ? av.filter(a=>a.batch_id===sel) : [];

  // How many of a given afvulling have already been uitgeslagen
  const uitgeslagenVanAfvulling = (avId) =>
    uit.filter(u=>u.afvulling_id===avId).reduce((s,u)=>s+Number(u.aantal||0),0);

  // Remaining per afvulling
  const resterend = (a) => Number(a.hoeveelheid||0) - uitgeslagenVanAfvulling(a.id);

  const totAfgevuld = bAv.reduce((s,a)=>s+Number(a.inhoud_per_eenheid||0)*Number(a.hoeveelheid||0),0);
  const totUitgeslagen = bAv.reduce((s,a)=>{
    const used = uitgeslagenVanAfvulling(a.id);
    return s + used * Number(a.inhoud_per_eenheid||0);
  },0);

  const vpVoorraadA = (vp) => {
    if (!vp.onderdelen?.length) return Number(vp.voorraad||0);
    const stocks = vp.onderdelen.map(o => {
      const od = onderdelen.find(d=>d.id===o.onderdeel_id);
      return Math.floor(Number(od?.voorraad||0) / Number(o.aantal||1));
    });
    return stocks.length ? Math.min(...stocks) : 0;
  };
  const doAfvullen = () => {
    if (!avF.verpakking_id||!avF.hoeveelheid) { alert(t('err_select_packaging_qty')); return; }
    const n = Number(avF.hoeveelheid);
    const vp = verpakkingen.find(v=>v.id===Number(avF.verpakking_id));
    if (!vp) { alert(t('err_invalid_packaging')); return; }
    const avail = vpVoorraadA(vp);
    if (avail < n) { alert(t('err_insufficient_packaging_n').replace('{n}',avail)); return; }
    if (vp.onderdelen?.length) {
      setOnderdelen(prev=>prev.map(od=>{
        const usage=vp.onderdelen.find(o=>o.onderdeel_id===od.id);
        return usage?{...od,voorraad:Math.max(0,Number(od.voorraad||0)-n*Number(usage.aantal||1))}:od;
      }));
    } else {
      setVerpakkingen(prev=>prev.map(v=>v.id===Number(avF.verpakking_id)?{...v,voorraad:Number(v.voorraad||0)-n}:v));
    }
    setAv(prev=>[...prev,{id:newId(av),batch_id:sel,...avF,verpakking_id:Number(avF.verpakking_id),inhoud_per_eenheid:Number(avF.inhoud_per_eenheid),hoeveelheid:n}]);
    setAvF(emptyAv);
  };

  const doUitslaan = () => {
    if (!uitAantal) { alert(t('err_enter_qty')); return; }
    const n = Number(uitAantal);
    const rest = resterend(uitModal);
    if (n > rest) { alert(t('err_max_available').replace('{n}',rest)); return; }
    const liter = n * Number(uitModal.inhoud_per_eenheid||0);
    const accBed = accijnsCalc(liter, selB?.ABV||0, r1, r2, accijnsInst);
    const nu = {
      id: newId(uit),
      batch_id: sel,
      afvulling_id: uitModal.id,
      verpakking_type: uitModal.verpakking_type,
      inhoud_per_eenheid: uitModal.inhoud_per_eenheid,
      aantal: n, datum: uitDatum,
      liter, accijns: accBed,
      tht: uitModal.tht||null,
      verkocht_stuks: 0
    };
    setUit(prev=>[...prev, nu]);
    // Één accijns-record per uitslag
    setAcc(prev=>[...prev, {
      id: newId(prev),
      batch_id: sel,
      batch_nummer: selB?.batch_nummer||'',
      uitslag_id: nu.id,
      verpakking_type: uitModal.verpakking_type,
      datum: uitDatum,
      aantal: n,
      liter,
      abv: selB?.ABV||0,
      accijns: accBed,
      betaald: false,
      betaal_datum: null
    }]);
    const agpInfo = {
      label: `${selB?.naam||''}${selB?.batch_nummer ? ` — #${selB.batch_nummer}` : ''} · ${uitModal.verpakking_type} (${n} stuks)`
    };
    setUitModal(null); setUitAantal(''); setUitDatum(tod());
    setAgpModal(agpInfo);
  };

  const delAv = (id) => {
    if (uit.some(u=>u.afvulling_id===id)) { alert(t('err_cannot_delete_filling')); return; }
    setAv(prev=>prev.filter(a=>a.id!==id));
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-xl font-bold text-gray-800">{t('nav_afvullen')}</h2>
      </div>
      <div className="flex flex-col md:flex-row gap-4 md:items-start">
        <div className={`w-full md:w-60 md:flex-shrink-0 bg-white rounded-xl shadow-card overflow-x-auto${sel?' hidden md:block':''}`}>
          <div className="px-4 py-2.5 t-hdr text-white text-xs font-medium uppercase tracking-widest rounded-t-xl">{t('nav_batches')}</div>
          {activeBat.length===0 && <div className="p-4 text-sm text-gray-400 text-center">{t('filling_no_active')}</div>}
          {activeBat.map(b=>(
            <div key={b.id} onClick={()=>setSel(b.id===sel?null:b.id)}
              className={`px-3 py-2.5 border-b cursor-pointer t-hover transition-colors ${sel===b.id?'t-sel border-l-2':''}`}>
              <div className="text-sm font-medium">{b.naam}</div>
              <div className="mt-0.5"><Badge s={b.status} /></div>
            </div>
          ))}
        </div>

        {selB && (<>
          <button className="md:hidden mb-2 flex items-center gap-1 text-sm font-semibold t-back border rounded-xl px-3 py-2 w-full transition-colors" onClick={()=>setSel(null)}>{t('btn_back')}</button>
          <div className="flex-1 min-w-0 space-y-4">
            {/* Summary */}
            {(() => {
              const vergist = Number(selB.liter_vergist||0);
              const inTank = Math.max(0, vergist - totAfgevuld);
              const opVoorraad = totAfgevuld - totUitgeslagen;
              const inTankPct = vergist>0 ? Math.round(inTank/vergist*100) : null;
              return (
                <div className="bg-white rounded-xl shadow-card p-3 grid grid-cols-2 sm:grid-cols-5 gap-3 text-sm">
                  {[
                    ['Vergist', selB.liter_vergist?`${selB.liter_vergist}L`:'—', ''],
                    ['In tank', vergist?`${inTank.toFixed(1)}L${inTankPct!==null?` (${inTankPct}%)`:''}`:' — ', inTank>0?'text-orange-600':'text-gray-400'],
                    [t('lbl_filled'), `${totAfgevuld.toFixed(1)}L`, 'text-green-700'],
                    [t('batch_stat_released'), `${totUitgeslagen.toFixed(1)}L`, 'text-blue-700'],
                    [t('batch_stat_in_stock'), `${opVoorraad.toFixed(1)}L`, 'text-amber-700'],
                  ].map(([l,v,c])=>(
                    <div key={l}><span className="text-gray-500 text-xs">{l}</span><div className={`font-medium ${c}`}>{v}</div></div>
                  ))}
                </div>
              );
            })()}

            {/* Afvullen form */}
            <div className="bg-white rounded-xl shadow-card overflow-hidden">
              <div className="px-4 py-2.5 t-hdr text-white font-medium text-sm">{t('batch_filling_register')}</div>
              <div className="p-3">
              <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-0.5">{t('lbl_packaging')} <span className="text-red-500">*</span></label>
                  {verpakkingen.length===0
                    ? <div className="border border-dashed border-orange-300 bg-orange-50 rounded px-2 py-1.5 text-xs text-orange-600">
                        Voeg eerst verpakkingen toe via Ingrediënten → Verpakkingen
                      </div>
                    : <select value={avF.verpakking_id} onChange={e=>{
                        const vp = verpakkingen.find(v=>v.id===Number(e.target.value));
                        setAvF(f=>({...f, verpakking_id:e.target.value, verpakking_type:vp?.naam||'', inhoud_per_eenheid:vp?.inhoud_liter||''}));
                      }} className="w-full border border-gray-300 rounded px-2 py-1.5 text-sm t-input bg-white">
                        <option value="">{t('batch_filling_select_ph')}</option>
                        {verpakkingen.map(vp=>(
                          <option key={vp.id} value={vp.id} disabled={vpVoorraadA(vp)===0}>
                            {vp.naam} — {vpVoorraadA(vp)} stuks
                          </option>
                        ))}
                      </select>
                  }
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-0.5">{t('batch_filling_content')}</label>
                  <div className="border border-gray-200 bg-gray-50 rounded px-2 py-1.5 text-sm text-gray-700 min-h-[34px] flex items-center">
                    {avF.inhoud_per_eenheid ? `${avF.inhoud_per_eenheid}L` : <span className="text-gray-400 text-xs">auto</span>}
                  </div>
                </div>
                <Inp label={t('batch_filling_units')} type="number" value={avF.hoeveelheid} onChange={v=>setAvF(f=>({...f,hoeveelheid:v}))} placeholder="1" />
                <Inp label={t('batch_filling_date')} type="date" value={avF.datum} onChange={v=>setAvF(f=>({...f,datum:v}))} />
                <Inp label={t('batch_filling_tht')} type="date" value={avF.tht} onChange={v=>setAvF(f=>({...f,tht:v}))} />
              </div>
              <div className="mt-2 flex items-center justify-between">
                {avF.inhoud_per_eenheid&&avF.hoeveelheid && <span className="text-sm text-gray-500">{t('lbl_total_colon')} {(Number(avF.inhoud_per_eenheid)*Number(avF.hoeveelheid)).toFixed(1)}L · {avF.hoeveelheid}× {avF.verpakking_type}</span>}
                <Btn onClick={doAfvullen} cls="ml-auto">{t('batch_filling_register_btn')}</Btn>
              </div>
              </div>{/* /p-3 */}
            </div>

            {/* Klaar met afvullen */}
            {selB.status!=='Verpakt' && selB.status!=='Gesloten' && bAv.length>0 && (
              <div className="bg-green-50 border border-green-200 rounded-lg p-3 flex items-center justify-between gap-4">
                <div>
                  <div className="text-sm font-medium text-green-800">{t('batch_ready_confirm')}</div>
                  <div className="text-xs text-green-600 mt-0.5">{t('batch_ready_text')}</div>
                </div>
                <Btn v="green" onClick={()=>{if(confirm(t('err_confirm_mark_packed').replace('{name}',selB.naam))){setBat(prev=>prev.map(b=>b.id===sel?{...b,status:'Verpakt'}:b));addLog({type:'status',batch_id:sel,referentie:`${selB.status} → Verpakt`})}}}>
                  {t('batch_ready_button')}
                </Btn>
              </div>
            )}
            {selB.status==='Verpakt' && (
              <div className="bg-green-50 border border-green-200 rounded-lg px-3 py-2 text-sm text-green-700 flex items-center gap-2">
                <span>✓</span> <span>{t('batch_filling_done_text')} <strong>{t('nav_batches')}</strong> {t('batch_filling_done_page')}.</span>
              </div>
            )}

            {/* Afgevulde voorraad tabel met uitslaan-knop */}
            <div className="bg-white rounded-xl shadow-card overflow-x-auto">
              <div className="px-4 py-2.5 t-hdr text-white font-medium text-sm">{t('batch_filled_stock')}</div>
              <table className="w-full text-sm">
                <thead className="text-xs text-gray-500 bg-gray-50">
                  <tr>
                    <th className="px-3 py-2 text-left">{t('lbl_packaging')}</th>
                    <th className="px-3 py-2 text-right">{t('lbl_content')}</th>
                    <th className="px-3 py-2 text-right">{t('lbl_total_filled')}</th>
                    <th className="px-3 py-2 text-right">{t('filling_summary_released')}</th>
                    <th className="px-3 py-2 text-right font-semibold text-amber-700">{t('lbl_remaining')}</th>
                    <th className="px-3 py-2 text-left">{t('lbl_date')}</th>
                    <th className="px-3 py-2 text-left">{t('lbl_tht')}</th>
                    <th className="px-3 py-2"></th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {bAv.length===0 && <tr><td colSpan={7} className="px-3 py-4 text-center text-gray-400">{t('batch_no_filled')}</td></tr>}
                  {bAv.map(a => {
                    const uitgeslagen = uitgeslagenVanAfvulling(a.id);
                    const rest = Number(a.hoeveelheid||0) - uitgeslagen;
                    return (
                      <tr key={a.id} className={rest===0?'bg-gray-50 text-gray-400':''}>
                        <td className="px-3 py-2">{a.verpakking_type}</td>
                        <td className="px-3 py-2 text-right">{a.inhoud_per_eenheid}L</td>
                        <td className="px-3 py-2 text-right">{a.hoeveelheid}× ({(a.inhoud_per_eenheid*a.hoeveelheid).toFixed(1)}L)</td>
                        <td className="px-3 py-2 text-right text-blue-600">{uitgeslagen>0?`${uitgeslagen}×`:'—'}</td>
                        <td className={`px-3 py-2 text-right font-semibold ${rest>0?'text-amber-700':'text-gray-400'}`}>{rest>0?`${rest}×`:t('lbl_empty')}</td>
                        <td className="px-3 py-2 text-gray-500">{fmtD(a.datum)}</td>
                        <td className="px-3 py-2 text-gray-500">{a.tht ? fmtD(a.tht) : '—'}</td>
                        <td className="px-3 py-2">
                          <div className="flex gap-1">
                            {rest>0 && <Btn s="sm" v="blue" onClick={()=>{setUitModal(a);setUitAantal('');setUitDatum(tod());}}>{t('log_release')}</Btn>}
                            {uitgeslagen===0 && <button onClick={()=>delAv(a.id)} className="text-red-400 hover:text-red-600 text-xs">✕</button>}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </>)}
      </div>

      {agpModal && (
        <Modal title="Accijns Goederen Plaats" hideClose>
          <div className="space-y-4">
            <div className="p-4 bg-amber-50 border border-amber-200 rounded-lg text-amber-900 text-sm leading-relaxed">
              Verplaats deze <strong>{agpModal.label}</strong> voorraad uit de Accijns Goederen Plaats.
            </div>
            <div className="flex justify-end">
              <Btn v="green" onClick={()=>setAgpModal(null)}>✓ Gedaan</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* Uitslaan modal */}
      {uitModal && (
        <Modal title={`Uitslaan: ${uitModal.verpakking_type}`} onClose={()=>setUitModal(null)}>
          <div className="space-y-3">
            <div className="p-3 bg-blue-50 rounded text-sm text-blue-800">
              <div className="font-medium">{selB?.naam}{selB?.batch_nummer ? ` — #${selB.batch_nummer}` : ''}</div>
              <div>{uitModal.verpakking_type} · {uitModal.inhoud_per_eenheid}L per stuk</div>
              {uitModal.tht && <div className="text-xs mt-0.5">THT: {fmtD(uitModal.tht)}</div>}
              <div className="mt-1">{t('lbl_available')}: <strong>{resterend(uitModal)} stuks</strong></div>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <Inp label={`${t('batch_release_count')} *`} type="number" value={uitAantal} onChange={setUitAantal} placeholder={`max ${resterend(uitModal)}`} />
              <Inp label={t('lbl_date')} type="date" value={uitDatum} onChange={setUitDatum} />
            </div>
            {uitAantal && Number(uitAantal)>0 && (()=>{
              const liter = Number(uitAantal)*Number(uitModal.inhoud_per_eenheid||0);
              const ac = accijnsCalc(liter, selB?.ABV||0, r1, r2, accijnsInst);
              return <div className="p-2 bg-amber-50 rounded text-xs text-amber-800">
                {liter.toFixed(1)}L → accijns: <strong>{fmt(ac)}</strong>
                {selB?.ABV && <span className="ml-1 text-amber-600">(max({(liter/100).toFixed(3)}hL × {selB.ABV}% × €{r1.toFixed(2).replace('.',',')}, {(liter/100).toFixed(3)}hL × €{r2.toFixed(2).replace('.',',')}))</span>}
              </div>;
            })()}
            <div className="flex justify-end gap-2">
              <Btn v="secondary" onClick={()=>setUitModal(null)}>{t('btn_cancel')}</Btn>
              <Btn v="blue" onClick={doUitslaan} disabled={!uitAantal||Number(uitAantal)<=0}>{t('log_release')}</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ===== VOORRAAD (uitgeslagen voorraad) =====
function VoorraadPage({bat, uit, setUit, acc, setAcc, archief, setArchief, geslotenBieren, setGeslotenBieren, archiefIngeklapt, setArchiefIngeklapt, artikelen, setArtikelen, wcCreds, setWcCreds, wcSyncLog, setWcSyncLog}) {
  const [filterBatch, setFilterBatch] = useState('');
  const [wcSyncing, setWcSyncing] = useState(false);
  const [wcSyncMsg, setWcSyncMsg] = useState('');

  // ---- Artikelenstambestand modal ----
  const emptyArt = {artikelnummer:'', ean:'', verkoopprijs:'', btw:'21', omschrijving:''};
  const [artModal, setArtModal] = useState(null); // null = gesloten; {biernaam, verpakking_type}
  const [artForm, setArtForm] = useState(emptyArt);

  const artKey = (biernaam, verpakking_type) => biernaam + '|||' + verpakking_type;

  const openArtModal = (biernaam, verpakking_type, e) => {
    e.stopPropagation();
    const bestaand = (artikelen||[]).find(a => a.key === artKey(biernaam, verpakking_type));
    setArtForm(bestaand ? {
      artikelnummer: bestaand.artikelnummer||'',
      ean:           bestaand.ean||'',
      verkoopprijs:  bestaand.verkoopprijs!=null ? String(bestaand.verkoopprijs) : '',
      btw:           bestaand.btw!=null ? String(bestaand.btw) : '21',
      omschrijving:  bestaand.omschrijving||'',
    } : emptyArt);
    setArtModal({biernaam, verpakking_type});
  };

  const saveArtikel = () => {
    const k = artKey(artModal.biernaam, artModal.verpakking_type);
    const entry = {
      key:            k,
      biernaam:       artModal.biernaam,
      verpakking_type:artModal.verpakking_type,
      artikelnummer:  artForm.artikelnummer.trim(),
      ean:            artForm.ean.trim(),
      verkoopprijs:   artForm.verkoopprijs !== '' ? Number(artForm.verkoopprijs) : null,
      btw:            artForm.btw !== '' ? Number(artForm.btw) : null,
      omschrijving:   artForm.omschrijving.trim(),
    };
    setArtikelen(prev => {
      const filtered = (prev||[]).filter(a => a.key !== k);
      return [...filtered, entry];
    });
    setArtModal(null);
  };

  const deleteArtikel = () => {
    const k = artKey(artModal.biernaam, artModal.verpakking_type);
    setArtikelen(prev => (prev||[]).filter(a => a.key !== k));
    setArtModal(null);
  };
  // ---- einde artikelenstambestand ----

  const setVerkocht = (id, val) => setUit(prev => prev.map(u => {
    if (u.id !== id) return u;
    return {...u, verkocht_stuks: Math.max(0, Math.min(Number(u.aantal||0), Number(val)||0))};
  }));

  const archiveerUitslag = (u) => {
    const b = getBatch(u.batch_id);
    setArchief(prev => [...(prev||[]), {
      ...u,
      batch_naam:   b?.naam         || 'Onbekend',
      batch_nummer: b?.batch_nummer || '',
      archiveer_datum: tod(),
    }]);
    setUit(prev => prev.filter(x => x.id !== u.id));
  };

  const getBatch = (bid) => bat.find(b=>b.id===bid);


  const addWcLog = (type, msg, details) => {
    const entry = {id: Date.now(), ts: new Date().toISOString(), type, msg, details: details||''};
    setWcSyncLog(prev => [entry, ...(prev||[])].slice(0, 100));
  };

  // Beschikbare WC-voorraad voor een artikel (alle uitgeslagen items, ongeacht accijns-betaalstatus)
  const wcBeschikbaarVoorArt = (art) =>
    (uit||[])
      .filter(u=>{ const b=bat.find(bx=>bx.id===u.batch_id); return b?.naam===art.biernaam && u.verpakking_type===art.verpakking_type; })
      .reduce((s,u)=>s+Math.max(0,Number(u.aantal||0)-Number(u.verkocht_stuks||0)), 0);

  // Push alle voorraad naar WooCommerce
  const wcPushAll = async () => {
    if (!wcCreds?.enabled || !wcCreds?.storeUrl) {
      setWcSyncMsg(t('error_no_woocommerce')); return;
    }
    setWcSyncing(true); setWcSyncMsg('');
    try {
      let bijgewerkt = 0;
      const combis = (artikelen||[]).filter(a=>a.artikelnummer);
      for (const art of combis) {
        const beschikbaar = wcBeschikbaarVoorArt(art);
        addWcLog('debug', `🔍 ${art.biernaam} ${art.verpakking_type} → ${beschikbaar}×`, '');
        const prods = await wcGet(`products?sku=${encodeURIComponent(art.artikelnummer)}&per_page=1`);
        if (!prods?.length) continue;
        await wcPut(`products/${prods[0].id}`, {stock_quantity: beschikbaar, manage_stock: true});
        bijgewerkt++;
      }
      setWcCreds(prev=>({...prev, lastSync: new Date().toISOString()}));
      const pushMsg = `${bijgewerkt} product${bijgewerkt!==1?'en':''} bijgewerkt`;
      setWcSyncMsg(`✓ ${pushMsg}`);
      addWcLog('push', `↑ Push voorraad — ${pushMsg}`, combis.filter(a=>a.artikelnummer).map(a=>`${a.biernaam} ${a.verpakking_type}: ${wcBeschikbaarVoorArt(a)}×`).join(', '));
    } catch(e) {
      setWcSyncMsg(`⚠ Push mislukt: ${e.message}`);
      addWcLog('fout', `↑ Push mislukt — ${e.message}`);
    }
    setWcSyncing(false);
    setTimeout(()=>setWcSyncMsg(''), 6000);
  };

  // Pull verkopen vanuit WooCommerce → verdeel diff FIFO over verkocht_stuks
  const wcPullSales = async () => {
    if (!wcCreds?.enabled || !wcCreds?.storeUrl) {
      setWcSyncMsg(t('error_no_woocommerce')); return;
    }
    setWcSyncing(true); setWcSyncMsg('');
    try {
      let bijgewerkt = 0;
      const combis = (artikelen||[]).filter(a=>a.artikelnummer);
      for (const art of combis) {
        const prods = await wcGet(`products?sku=${encodeURIComponent(art.artikelnummer)}&per_page=1`);
        if (!prods?.length) continue;
        const wcStock = Number(prods[0].stock_quantity||0);
        const uitslagenVoorDitArtikel = (uit||[]).filter(u=>{
          const b = bat.find(bx=>bx.id===u.batch_id);
          return b?.naam===art.biernaam && u.verpakking_type===art.verpakking_type;
        });
        // Alle uitgeslagen items vergelijken met WC voorraad (ongeacht accijns-betaalstatus)
        const brewBeschikbaar = uitslagenVoorDitArtikel
          .reduce((s,u)=>s+Math.max(0,Number(u.aantal||0)-Number(u.verkocht_stuks||0)),0);
        const diff = brewBeschikbaar - wcStock;
        if (diff <= 0) continue;
        // FIFO: verdeel diff over uitslagen (oudste eerst)
        const gesorteerd = [...uitslagenVoorDitArtikel]
          .sort((a,b)=>a.id-b.id);
        let teDelen = diff;
        const updates = {};
        for (const u of gesorteerd) {
          if (teDelen <= 0) break;
